 can roll back to the previous version. The solution must meet the following requirements:\n•\tMinimize downtime during the deployment.\n•\tMinimize the time it takes for the rollback.\nWhat should you use?", "choices": [{"letter": "A", "text": "a single web app and two deployment slots"}, {"letter": "B", "text": "a single web app and two deployment pipelines"}, {"letter": "C", "text": "two web apps and an Azure Standard Load Balancer"}, {"letter": "D", "text": "two web apps and an Azure Traffic Manager instance"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A single web app with two deployment slots gives near-zero-downtime swaps and instant rollback by swapping back."}, {"key": "AZ-400|T9|Q6", "topic": 9, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/111505-exam-az-400-topic-9-question-6-discussion/", "text": "You have an app named App1 that you release by using Azure Pipelines. App1 has the versions shown in the following table.\nYou complete a code change to fix a bug that was introduced in version 3.4.3.\nWhich version number should you assign to the release?", "choices": [{"letter": "A", "text": "3.4.4"}, {"letter": "B", "text": "3.4.8"}, {"letter": "C", "text": "3.5.0"}, {"letter": "D", "text": "4.0.1"}], "community": "D", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image70.png"], "kiro_answer": "A", "kiro_rationale": "A bug fix on the 3.4.x line bumps the patch to 3.4.4 under SemVer."}, {"key": "AZ-400|T9|Q7", "topic": 9, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/111507-exam-az-400-topic-9-question-7-discussion/", "text": "You are automating the testing process for your company.\nYou need to automate UI testing of a web application.\nWhich framework should you use?", "choices": [{"letter": "A", "text": "JaCoco"}, {"letter": "B", "text": "Playwright"}, {"letter": "C", "text": "Xamarin.UITest"}, {"letter": "D", "text": "Microsoft.CodeAnalysis"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Playwright is a modern framework for automated web UI testing."}, {"key": "AZ-400|T9|Q8", "topic": 9, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/111508-exam-az-400-topic-9-question-8-discussion/", "text": "You have a project in Azure DevOps named Project1 that references an Azure Artifacts feed named Feed1.\nYou have a package named Package1 that has the versions shown in the following table.\nYou need to perform a build of Project1.\nWhich version of Package1 will be used?", "choices": [{"letter": "A", "text": "1.0.3"}, {"letter": "B", "text": "1.4.0"}, {"letter": "C", "text": "2.0.0"}, {"letter": "D", "text": "2.3.1"}], "community": "B", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image71.png"], "kiro_answer": "B", "kiro_rationale": "Azure Artifacts resolves to the highest non-prerelease stable version available (1.4.0 here, given 2.x are prerelease)."}, {"key": "AZ-400|T9|Q9", "topic": 9, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/111403-exam-az-400-topic-9-question-9-discussion/", "text": "HOTSPOT\n-\nYou have an Azure subscription.\nYou need to create a storage account by using a Bicep file.\nHow should you complete the file? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image72.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q10", "topic": 9, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/116456-exam-az-400-topic-9-question-10-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository named repo1 that stores the code of an app named App1. You need deploy a workflow for repo1 by using GitHub Actions. The solution must meet the following requirements:\n•\tScan on pushes to the main branch.\n•\tScan on pull requests to the main branch.\n•\tScan on pull requests to any branch that has a prefix of releases/.\n•\tScan all the files in the subdirectories of the src directory.\nHow should you complete the code? To answer, drag he appropriate values to the correct targets. Each value may be used once, more than once, or not at all.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image80.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q11", "topic": 9, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/116392-exam-az-400-topic-9-question-11-discussion/", "text": "You use Azure Pipelines to build and test code projects.\nYou notice an increase in cycle times.\nYou need to identify whether agent pool exhaustion is causing the issue.\nWhat are two possible ways to achieve this goal? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Query the PipelineRun/PipelineRuns endpoint."}, {"letter": "B", "text": "Query the TaskAgentPoolSizeSnapshots endpoint."}, {"letter": "C", "text": "View the Pipeline duration report."}, {"letter": "D", "text": "View the pool consumption report at the organization level."}], "community": "BD", "type": "multiple-choice", "images": [], "kiro_answer": "BD", "kiro_rationale": "Query the TaskAgentPoolSizeSnapshots endpoint (B) or view the org-level pool consumption report (D) to detect pool exhaustion."}, {"key": "AZ-400|T9|Q12", "topic": 9, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/122736-exam-az-400-topic-9-question-12-discussion/", "text": "You have an Azure subscription that contains an Azure pipeline named Pipeline1 and a GitHub repository named Repo1. Repo1 contains Bicep modules. Pipeline1 deploys Azure resources by using the Bicep modules.\nYou need to ensure that all releases comply with Azure Policy before they are deployed to production.\nWhat should you do?", "choices": [{"letter": "A", "text": "To Pipeline1, add a step that runs a What if deployment before the deployment step."}, {"letter": "B", "text": "Configure a deployment gate for Pipeline1 that uses Azure Automation to run a What If deployment."}, {"letter": "C", "text": "Create an Azure DevOps build that runs on the creation of a pull request and assesses the code for compliance."}, {"letter": "D", "text": "Configure a deployment gate for Pipeline1 and include the Azure DevOps Security and compliance assessment task."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Configure a deployment gate with the Security and compliance assessment task to enforce Azure Policy before prod."}, {"key": "AZ-400|T9|Q13", "topic": 9, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/122236-exam-az-400-topic-9-question-13-discussion/", "text": "DRAG DROP\n-\nYou use Semantic Versioning (SemVer) as a dependency versioning strategy.\nYou perform changes to code as shown in the following table.\nWhich part of the version should you increment for each change? To answer, drag the appropriate parts to the correct changes. Each part may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image88.png", "https://img.examtopics.com/az-400/image89.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q14", "topic": 9, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/124562-exam-az-400-topic-9-question-14-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure pipeline that is used to deploy a web app. The pipeline includes a test suite named TestSuite1. TestSuite1 is used to validate the operations of the web app.\nTestSuite1 fails intermittently.\nYou identify that the failures are unrelated to changes in the source code and execution environment.\nYou need to minimize troubleshooting effort for the TestSuite1 failures.\nSolution: You enable flaky test management.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Flaky test management minimizes effort on intermittent, source-unrelated test failures."}, {"key": "AZ-400|T9|Q15", "topic": 9, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/122524-exam-az-400-topic-9-question-15-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure pipeline that is used to deploy a web app. The pipeline includes a test suite named TestSuite1. TestSuite1 is used to validate the operations of the web app.\nTestSuite1 fails intermittently.\nYou identify that the failures are unrelated to changes in the source code and execution environment.\nYou need to minimize troubleshooting effort for the TestSuite1 failures.\nSolution: You implement the Test Results Trend widget.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A Test Results Trend widget visualizes trends but doesn't reduce flaky-test troubleshooting."}, {"key": "AZ-400|T9|Q16", "topic": 9, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/127286-exam-az-400-topic-9-question-16-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure pipeline that is used to deploy a web app. The pipeline includes a test suite named TestSuite1. TestSuite1 is used to validate the operations of the web app.\nTestSuite1 fails intermittently.\nYou identify that the failures are unrelated to changes in the source code and execution environment.\nYou need to minimize troubleshooting effort for the TestSuite1 failures.\nSolution: You enable Test Impact Analysis (TIA).\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. TIA selects which tests to run; it doesn't address intermittent flaky failures."}, {"key": "AZ-400|T9|Q17", "topic": 9, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/127490-exam-az-400-topic-9-question-17-discussion/", "text": "You plan to publish build artifacts by using an Azure pipeline.\nYou need to create an .artifactignore file that meets the following requirements:\n•\tIncludes all files in the build output folder and all subfolders\n•\tExcludes files that have the .dll extension\nWhat should you include in the file?", "choices": [{"letter": "A", "text": "./** !*.dll"}, {"letter": "B", "text": "**/* !*.dll"}, {"letter": "C", "text": "*/** *.dll"}, {"letter": "D", "text": "**/* #*.dll"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "'**/* ' includes everything recursively and '!*.dll' excludes DLLs in an .artifactignore file."}, {"key": "AZ-400|T9|Q18", "topic": 9, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/127491-exam-az-400-topic-9-question-18-discussion/", "text": "HOTSPOT\n-\nYou have a GitHub repository.\nYou plan to use the repository to create a container.\nYou need to configure GitHub Actions to deploy the container to GitHub Container Registry.\nHow should you complete the script? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image100.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q19", "topic": 9, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/129202-exam-az-400-topic-9-question-19-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure pipeline that is used to deploy a web app. The pipeline includes a test suite named TestSuite1. TestSuite1 is used to validate the operations of the web app.\nTestSuite1 fails intermittently.\nYou identify that the failures are unrelated to changes in the source code and execution environment.\nYou need to minimize troubleshooting effort for the TestSuite1 failures.\nSolution: You increase code coverage.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Increasing code coverage does not reduce flaky-test troubleshooting effort."}, {"key": "AZ-400|T9|Q20", "topic": 9, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/132008-exam-az-400-topic-9-question-20-discussion/", "text": "You have an Azure pipeline that is used to build and deploy an app named App1. The build job uses a Microsoft-hosted Windows agent.\nThe build job for App1 intermittently returns a timeout error.\nYou need to ensure that the build job completes successfully. The solution must minimize administrative effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "Change the configuration of the build agent."}, {"letter": "B", "text": "Deploy a self-hosted agent."}, {"letter": "C", "text": "Change to a Microsoft-hosted Linux agent."}, {"letter": "D", "text": "Purchase more parallel jobs."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Intermittent timeouts from queueing are best addressed by purchasing more parallel jobs (minimal effort)."}, {"key": "AZ-400|T9|Q21", "topic": 9, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/131262-exam-az-400-topic-9-question-21-discussion/", "text": "You have an Azure subscription that contains an Azure Pipelines pipeline named Pipeline1 and a user named User1. Pipeline1 is used to build and test an app named App1. User1 is assigned the Contributors role for Pipeline1.\nYou plan to test App1 by using an Azure Deployment Environments environment.\nYou need to ensure that User1 can provision the environment. The solution must follow the principle of least privilege.\nWhich role should you assign to User1?", "choices": [{"letter": "A", "text": "DevCenter Project Admin"}, {"letter": "B", "text": "Deployment Environments User"}, {"letter": "C", "text": "Contributors"}, {"letter": "D", "text": "Build Administrators"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Assign the Deployment Environments User role so User1 can provision an environment (least privilege)."}, {"key": "AZ-400|T9|Q22", "topic": 9, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/131263-exam-az-400-topic-9-question-22-discussion/", "text": "HOTSPOT\n-\nYou have an Azure subscription that contains Azure DevOps build pipelines.\nYou need to implement pipeline caching by using the cache task.\nHow should you complete the YAML definition? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image107.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q23", "topic": 9, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/132267-exam-az-400-topic-9-question-23-discussion/", "text": "HOTSPOT\n-\nYou have a management group that contains four Azure subscriptions. Each subscription contains four resource groups.\nYou develop a new web app named App1.\nYou plan to deploy an instance of App1 to each resource group.\nYou need to create a Bicep template that will be used to deploy App1. The solution must meet the following requirements:\n•\tThe name of each App1 instance must be consistent for each subscription and resource group.\n•\tThe name of each App Service plan used to host App1 must be consistent.\nHow should you complete the template? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image109.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q24", "topic": 9, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/131301-exam-az-400-topic-9-question-24-discussion/", "text": "DRAG DROP\n-\nYou use an Azure pipeline to build a .NET app that has NuGet dependencies.\nYou need to ensure that the pipeline caches required NuGet packages.\nHow should you configure the pipeline? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image111.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q25", "topic": 9, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/132223-exam-az-400-topic-9-question-25-discussion/", "text": "You have an Azure pipeline that is used to deploy an app named App1.\nYou need to ensure that new versions of App1 are released only if they exceed performance baselines. The solution must minimize administrative effort.\nWhat should you configure?", "choices": [{"letter": "A", "text": "an Azure Pipelines release artifact"}, {"letter": "B", "text": "an Azure Repos branch policy"}, {"letter": "C", "text": "an Azure Monitor alert"}, {"letter": "D", "text": "an Azure Pipelines deployment gate"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "An Azure Pipelines deployment gate evaluates performance baselines before releasing (minimal effort)."}, {"key": "AZ-400|T9|Q26", "topic": 9, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/146704-exam-az-400-topic-9-question-26-discussion/", "text": "DRAG DROP\n-\nYou have an Azure subscription.\nYou have the standards shown in the following table.\nYou plan to use Azure Pipelines to build and release web apps.\nYou need to recommend a solution to build the pipelines. The solution must meet the following requirements:\n•\tEnsure that all new pipelines meet the security requirements defined in Standard1.\n•\tEnsure that the first stage of all new pipelines contains the software prerequisites defined in Standard2.\n•\tMinimize administrative effort.\nWhat should you use to implement each standard? To answer, drag the appropriate options to the correct standards. Each component may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image120.png", "https://img.examtopics.com/az-400/image121.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q27", "topic": 9, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/146379-exam-az-400-topic-9-question-27-discussion/", "text": "You have an Azure subscription.\nYou create two Bicep templates named Template1 and Template2 that will be used to create a virtual machine and a website.\nYou need to create a template named Template3 that will reuse logic from Template1 and Template2.\nWhat should you define first?", "choices": [{"letter": "A", "text": "outputs"}, {"letter": "B", "text": "resources"}, {"letter": "C", "text": "modules"}, {"letter": "D", "text": "parameters"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Define modules first so Template3 can reuse logic from Template1 and Template2."}, {"key": "AZ-400|T9|Q28", "topic": 9, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/146650-exam-az-400-topic-9-question-28-discussion/", "text": "You have an Azure subscription.\nYou use Bicep templates to deploy websites and Azure SQL infrastructure.\nYou need to automate the deployments by using Azure Pipelines and a self-hosted agent that runs on two virtual machines. The solution must minimize administrative effort.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Create a service principal."}, {"letter": "B", "text": "Create an Azure Automation account."}, {"letter": "C", "text": "Create a user-assigned managed identity."}, {"letter": "D", "text": "On each virtual machine, enable a system-assigned managed identity."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Create a service principal first so the self-hosted agent VMs can authenticate to Azure for Bicep deployments."}, {"key": "AZ-400|T9|Q29", "topic": 9, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/146651-exam-az-400-topic-9-question-29-discussion/", "text": "HOTSPOT\n-\nYou have an Azure subscription that contains a user named User1.\nYou have an Azure Resource Manager (ARM) template named Template1.\nYou plan to perform the following actions:\n•\tDeploy an Azure key vault named KV1.\n•\tDeploy Azure resources by using Template1 to retrieve secrets from KV1.\nYou need to ensure that User1 can deploy Template1. The solution must follow the principle of least privilege.\nWhich permission should you grant to User1, and which parameter should be specified when you create KV1? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image123.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q30", "topic": 9, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/148013-exam-az-400-topic-9-question-30-discussion/", "text": "DRAG DROP\n-\nYou have an Azure subscription that contains an Azure Traffic Manager profile named ATM1 and a web app named App1. ATM1 manages App1 traffic. ATM1 is configured to route callers to the endpoint that has the lowest latency.\nYou need to configure ATM1 to route all traffic from Asia to an endpoint in Australia.\nWhich three actions should you perform in sequence from the Azure portal? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image129.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q31", "topic": 9, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/146380-exam-az-400-topic-9-question-31-discussion/", "text": "You plan to deploy a solution that will include multiple microservices.\nYou need to recommend a deployment strategy for the microservices. The solution must meet the following requirements:\n•\tEnable users to test new features by using a specific URL.\n•\tMinimize the effort required to promote a test version to production.\n•\tMinimize the effort required to revert production code to the previous version.\nWhich strategy should you recommend?", "choices": [{"letter": "A", "text": "A/B"}, {"letter": "B", "text": "feature toggle"}, {"letter": "C", "text": "progressive exposure"}, {"letter": "D", "text": "blue/green"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Blue/green lets users test the new version via a specific (staging) URL, swap to promote, and swap back to revert quickly."}, {"key": "AZ-400|T9|Q32", "topic": 9, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/146652-exam-az-400-topic-9-question-32-discussion/", "text": "You manage a project by using Azure Boards. You manage the project code by using GitHub.\nYou have three work items that have IDs of 456, 457, and 458.\nYou need to create a pull request that will be linked to all the work items. The solution must set the state of work item 456 to done.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "Done #456, #457, #458"}, {"letter": "B", "text": "Fixes #456, #457, #458"}, {"letter": "C", "text": "Fixes #AB456, #A8457, #A8458"}, {"letter": "D", "text": "#AB456, #AB457, #AB458 Completed #AB456"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "For a GitHub-linked board, 'Fixes #AB456, #AB457, #AB458' links all and sets state. NOTE: community voted C; the AB# form is the GitHub-linking syntax - verify exact option text."}, {"key": "AZ-400|T9|Q33", "topic": 9, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/146381-exam-az-400-topic-9-question-33-discussion/", "text": "You plan to deploy a solution that will include multiple microservices.\nYou need to recommend a deployment strategy for the microservices. The solution must meet the following requirements:\n•\tEnable testing and monitoring of changes during a gradual rollout.\n•\tControl the number of users that will receive new code releases.\nWhich strategy should you recommend?", "choices": [{"letter": "A", "text": "progressive exposure"}, {"letter": "B", "text": "A/B"}, {"letter": "C", "text": "feature toggle"}, {"letter": "D", "text": "blue/green"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Progressive exposure (ring-based) gradually rolls out and controls how many users get new code."}, {"key": "AZ-400|T9|Q34", "topic": 9, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/146653-exam-az-400-topic-9-question-34-discussion/", "text": "HOTSPOT\n-\nYou have an Azure Pipelines pipeline named Pipeline1 that has the following YAML definition.\nFor each of the following statements, select Yes if True. Otherwise select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image131.png", "https://img.examtopics.com/az-400/image132.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q35", "topic": 9, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/148016-exam-az-400-topic-9-question-35-discussion/", "text": "You use Azure Pipelines to build and test code.\nYou need to analyze the agent pool usage.\nWhat are two ways to achieve the goal? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Review the historical graph for the agent pools."}, {"letter": "B", "text": "Review the Pipeline duration report."}, {"letter": "C", "text": "Query the TaskAgentPoolSizeSnapshot/TaskAgentPoolSizeSnapshots endpoint."}, {"letter": "D", "text": "Query the PipelineRun/PipelineRuns endpoint."}], "community": "AC", "type": "multiple-choice", "images": [], "kiro_answer": "AC", "kiro_rationale": "Review the agent pool historical graph (A) or query the TaskAgentPoolSizeSnapshots endpoint (C)."}, {"key": "AZ-400|T9|Q36", "topic": 9, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/146706-exam-az-400-topic-9-question-36-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub organization.\nYou are creating a GitHub Actions workflow.\nYou need to perform authenticated API requests by using a GitHub app name App1.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image134.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q37", "topic": 9, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/146707-exam-az-400-topic-9-question-37-discussion/", "text": "You use an Azure Pipelines pipeline to build and deploy an app.\nYou have a custom test task that has the following inputs:\n•\ttestResultsFiles: **/TEST-*.trx\n•\tsearchFolder: $(System.DefaultWorkingDirectory)\n•\tmergeTestResults: true\nWhich format should you use for the input data of testResultsFiles?", "choices": [{"letter": "A", "text": "VSTest"}, {"letter": "B", "text": "NUnit"}, {"letter": "C", "text": "CTest"}, {"letter": "D", "text": "JUnit"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": ".trx result files are the VSTest format."}, {"key": "AZ-400|T9|Q38", "topic": 9, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/146558-exam-az-400-topic-9-question-38-discussion/", "text": "You use an Azure Pipelines pipeline to build, test, and deploy an app named App1.\nYou need to reduce how long it takes to complete unit and integration tests for App1. The solution must ensure that the code coverage testing ratio is maintained.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable flaky test management."}, {"letter": "B", "text": "Purchase additional parallel jobs."}, {"letter": "C", "text": "Enable Test Impact Analysis (TIA)."}, {"letter": "D", "text": "Add an agent pool."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Test Impact Analysis runs only the tests affected by the change, cutting time while preserving coverage."}, {"key": "AZ-400|T9|Q39", "topic": 9, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/146708-exam-az-400-topic-9-question-39-discussion/", "text": "You have an app that is deployed to two environments named Production-A and Production-B by using Azure Pipelines.\nYou need to configure a release pipeline that will mark the app as complete and ready for release into the Production-B environment. The solution must meet the following requirements:\n•\tEnsure that there are no active Azure Monitor alerts in the Production-A environment before the app is marked as complete.\n•\tMinimize administrative effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "To the Production-B environment stage, add a pre-deployment gate that will query Azure Monitor."}, {"letter": "B", "text": "To the Production-A environment stage, add a post-deployment gate that will query Azure Monitor."}, {"letter": "C", "text": "To the Production-A environment stage, add a post-deployment approval."}, {"letter": "D", "text": "To the Production-A environment stage, add a pre-deployment gate that will query Azure Monitor."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Add a post-deployment gate on the Production-A stage that queries Azure Monitor for active alerts before marking complete."}, {"key": "AZ-400|T9|Q40", "topic": 9, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/146709-exam-az-400-topic-9-question-40-discussion/", "text": "You manage package feeds by using Azure Artifacts.\nYou plan to create a new package feed that will include the following views:\n•\t@Local\n•\t@Latest\n•\t@Release\n•\t@Prerelease\nWhich view should you create manually?", "choices": [{"letter": "A", "text": "@Local"}, {"letter": "B", "text": "@Latest"}, {"letter": "C", "text": "@Release"}, {"letter": "D", "text": "@Prerelease"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "@Local/@Latest/@Release exist by default-ish; the @Prerelease view must be created manually. NOTE: community voted D; verify against current default Artifacts views."}, {"key": "AZ-400|T9|Q41", "topic": 9, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/148017-exam-az-400-topic-9-question-41-discussion/", "text": "You plan to create an image that will contain a .NET Core application.\nYou have a Dockerfile file that contains the following code. (Line numbers are included for reference only.)\nYou need to ensure that the image is as small as possible when the image is built.\nWhich line should you modify in the file?", "choices": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "3"}, {"letter": "C", "text": "4"}, {"letter": "D", "text": "7"}], "community": "C", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image136.png"], "kiro_answer": "A", "kiro_rationale": "Use a smaller base image on the FROM line to minimize image size. NOTE: depends on the exhibit; verify the FROM line number."}, {"key": "AZ-400|T9|Q42", "topic": 9, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/146710-exam-az-400-topic-9-question-42-discussion/", "text": "You have an Azure subscription that includes an app named App1.\nYou have an Azure DevOps project that contains two environments named Staging and Production.\nYou use Azure Pipelines to deploy App1.\nYou need to validate the performance of App1 in the Staging environment before it is deployed to Production. The solution must minimize administrative effort.\nWhat should you do in the Azure DevOps project?", "choices": [{"letter": "A", "text": "In the production branch policy, add a status check to query Azure Monitor Alerts for active alerts."}, {"letter": "B", "text": "In the Production environment, add a check to query Azure Monitor Alerts for active alerts."}, {"letter": "C", "text": "In the Production environment stage, add a post-deployment approval for the Azure Monitor Alerts group."}, {"letter": "D", "text": "In the Staging environment add a check to query Azure Monitor Alerts for active alerts."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Add a check on the Staging environment that queries Azure Monitor Alerts before promoting to Production (minimal effort)."}, {"key": "AZ-400|T9|Q43", "topic": 9, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/149962-exam-az-400-topic-9-question-43-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it As a result these questions will not appear in the review screen.\nYou need to use an Azure Pipelines pipeline to build and test an app and test the database of the app. The solution must meet the following requirements.\n•\tThe test stages must be run in parallel.\n•\tThe Publish_Test_Results stage must always be run.\n•\tThe test stages must be run after successful completion of the build stage.\n•\tThe Publish_Test_Results stage must be run after completion of all the test stages.\nSolution: You include the following elements in the YAML definition of the pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image137.png"], "kiro_answer": "B", "kiro_rationale": "No (per this YAML series' key); the shown dependsOn/condition layout does not satisfy all four ordering requirements."}, {"key": "AZ-400|T9|Q44", "topic": 9, "question": ussions/microsoft/view/78895-exam-az-400-topic-10-question-3-discussion/", "text": "You need to meet the technical requirements for monitoring App1.\nWhat should you use?", "choices": [{"letter": "A", "text": "Splunk"}, {"letter": "B", "text": "Azure Application Insights"}, {"letter": "C", "text": "Azure Advisor"}, {"letter": "D", "text": "App Service logs"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use Azure Application Insights to monitor App1 per the technical requirements."}]};
const examLabels = Object.keys(DATA);
let current = examLabels[0];
const selections = {};   // key -> Set of chosen letters
let graded = false;

function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function esc(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function renderSidebar(){
  const list = document.getElementById("exam-list");
  list.innerHTML = "";
  examLabels.forEach(label=>{
    const qs = DATA[label];
    const reviewed = qs.filter(q=>q.kiro_answer).length;
    const btn = el("button","exam-btn"+(label===current?" active":""));
    btn.innerHTML = esc(label)+"<small>"+qs.length+" questions &middot; "+reviewed+" reviewed</small>";
    btn.onclick = ()=>{ selectExam(label); };
    list.appendChild(btn);
  });
  const sel = document.getElementById("exam-select");
  if(sel && sel.value !== current) sel.value = current;
}

function populateDropdown(){
  const sel = document.getElementById("exam-select");
  sel.innerHTML = "";
  examLabels.forEach(label=>{
    const opt = document.createElement("option");
    opt.value = label;
    opt.textContent = label + " (" + DATA[label].length + " questions)";
    sel.appendChild(opt);
  });
  sel.value = current;
  sel.onchange = ()=> selectExam(sel.value);
}

function selectExam(label){
  current = label;
  graded = false;
  document.getElementById("scorebar").classList.remove("show");
  renderSidebar();
  renderExam();
}

function renderExam(){
  const qs = DATA[current];
  document.getElementById("exam-title").textContent = current + " — Mock Exam";
  const reviewed = qs.filter(q=>q.kiro_answer).length;
  const comm = qs.filter(q=>q.community).length;
  document.getElementById("exam-sub").textContent =
    qs.length+" questions in this exam only. "+reviewed+" with Kiro's suggested answer, "+comm+" with a community answer.";
  const wrap = document.getElementById("questions");
  wrap.innerHTML = "";
  const filter = document.getElementById("search").value.toLowerCase();
  qs.forEach(q=>{
    const hay = (q.text+" "+(q.choices||[]).map(c=>c.text).join(" ")).toLowerCase();
    if(filter && !hay.includes(filter)) return;
    wrap.appendChild(renderCard(q));
  });
  if(!wrap.children.length){ wrap.appendChild(el("p","empty","No questions match the filter.")); }
}

function renderCard(q){
  const card = el("div","qcard");
  card.dataset.key = q.key;
  const head = el("div","qhead");
  head.appendChild(el("span","qid","Topic "+q.topic+" · Question "+q.question));
  head.appendChild(el("span","qtype",esc(q.type)));
  card.appendChild(head);

  card.appendChild(el("div","qtext",esc(q.text)));

  // Inline images (HOTSPOT / drag-drop / exhibits) pulled from ExamTopics CDN
  if(q.images && q.images.length){
    const wrap = el("div","qimages");
    wrap.appendChild(el("div","imglabel","Exhibit / drag-drop image"+(q.images.length>1?"s":"")+" (click to open full size):"));
    q.images.forEach(src=>{
      const im = el("img");
      im.src = src;
      im.loading = "lazy";
      im.alt = "Question exhibit image";
      im.onclick = ()=>window.open(src, "_blank");
      wrap.appendChild(im);
    });
    card.appendChild(wrap);
  }

  const kiro = (q.kiro_answer||"").toUpperCase();
  const multi = kiro.length > 1; // e.g. "AD" => choose multiple
  const sel = selections[q.key] || new Set();
  (q.choices||[]).forEach(c=>{
    const ch = el("div","choice");
    ch.innerHTML = "<span class='ltr'>"+esc(c.letter)+".</span>"+esc(c.text);
    ch.dataset.letter = c.letter;
    if(sel.has(c.letter)) ch.classList.add("selected");
    ch.onclick = ()=>{
      const s = selections[q.key] || new Set();
      if(multi){
        if(s.has(c.letter)) s.delete(c.letter); else s.add(c.letter);
      } else {
        const had = s.has(c.letter);
        s.clear();
        if(!had) s.add(c.letter);
      }
      selections[q.key] = s;
      // reflect selection in UI
      card.querySelectorAll(".choice").forEach(o=>{
        o.classList.toggle("selected", s.has(o.dataset.letter));
      });
    };
    card.appendChild(ch);
  });

  const reveal = el("div","reveal");
  const btn = el("button",null,"Show answer");
  const ans = el("div","answers");
  btn.onclick = ()=>{
    ans.classList.toggle("show");
    btn.textContent = ans.classList.contains("show") ? "Hide answer" : "Show answer";
    if(kiro){
      card.querySelectorAll(".choice").forEach(ch=>{
        if(kiro.includes(ch.dataset.letter)) ch.classList.toggle("kiro-correct", ans.classList.contains("show"));
      });
    }
  };
  reveal.appendChild(btn);
  card.appendChild(reveal);

  // Kiro answer
  const kr = el("div","ans-row");
  if(q.kiro_answer){
    kr.innerHTML = "<span class='lbl'>Kiro's suggested answer</span> <span class='pill kiro'>"+esc(q.kiro_answer)+"</span>";
  } else {
    kr.innerHTML = "<span class='lbl'>Kiro's suggested answer</span> <span class='pill none'>Not yet reviewed</span>";
  }
  ans.appendChild(kr);
  if(q.kiro_rationale){ ans.appendChild(el("div","rationale",esc(q.kiro_rationale))); }

  // Community answer
  const cr = el("div","ans-row");
  cr.style.marginTop = "10px";
  if(q.community){
    cr.innerHTML = "<span class='lbl'>Community most-voted</span> <span class='pill comm'>"+esc(q.community)+"</span>";
  } else {
    cr.innerHTML = "<span class='lbl'>Community most-voted</span> <span class='pill none'>no votes</span>";
  }
  ans.appendChild(cr);

  if(q.url){ const a=el("a","src","View source discussion ↗"); a.href=q.url; a.target="_blank"; a.style.display="inline-block"; a.style.marginTop="10px"; ans.appendChild(a); }

  card.appendChild(ans);
  return card;
}

document.getElementById("search").addEventListener("input", renderExam);
document.getElementById("reveal-all").onclick = ()=>document.querySelectorAll(".answers").forEach(a=>{a.classList.add("show");});
document.getElementById("hide-all").onclick = ()=>document.querySelectorAll(".answers").forEach(a=>{a.classList.remove("show");});

function setEq(a, b){
  if(a.size !== b.size) return false;
  for(const x of a) if(!b.has(x)) return false;
  return true;
}

function gradeExam(){
  const qs = DATA[current];
  let correct=0, wrong=0, skipped=0, nokey=0, gradable=0;
  qs.forEach(q=>{
    const kiro = (q.kiro_answer||"").toUpperCase();
    const card = document.querySelector('.qcard[data-key="'+CSS.escape(q.key)+'"]');
    if(!kiro){ nokey++; if(card) markCard(card,"q-nokey"); return; }
    gradable++;
    const want = new Set(kiro.split(""));
    const got = selections[q.key] || new Set();
    if(got.size===0){ skipped++; if(card) markCard(card,"q-skipped"); return; }
    const ok = setEq(want, got);
    if(ok) correct++; else wrong++;
    if(card){
      markCard(card, ok?"q-correct":"q-wrong");
      card.querySelectorAll(".choice").forEach(ch=>{
        const l = ch.dataset.letter;
        ch.classList.remove("graded-correct","graded-wrong");
        if(want.has(l)){ ch.classList.add("graded-correct"); addMark(ch,"✓"); }
        if(got.has(l) && !want.has(l)){ ch.classList.add("graded-wrong"); addMark(ch,"✗"); }
      });
      // open the answer panel so rationale shows
      const ans = card.querySelector(".answers"); if(ans) ans.classList.add("show");
    }
  });
  graded = true;
  showScore(correct, wrong, skipped, nokey, gradable);
}

function markCard(card, cls){
  card.classList.remove("q-correct","q-wrong","q-skipped","q-nokey");
  card.classList.add(cls);
}
function addMark(ch, sym){
  if(ch.querySelector(".mark")) return;
  const m = el("span","mark", sym);
  ch.appendChild(m);
}

function showScore(correct, wrong, skipped, nokey, gradable){
  const attempted = correct + wrong;
  const pct = attempted ? Math.round(100*correct/attempted) : 0;
  const bar = document.getElementById("scorebar");
  bar.classList.add("show");
  bar.innerHTML =
    "<span class='pct'>"+pct+"%</span> &nbsp; ("+correct+" / "+attempted+" attempted correct)" +
    "<div class='bd'>"+correct+" correct · "+wrong+" wrong · "+skipped+
    " skipped · "+gradable+" gradable vs Kiro's key · "+nokey+
    " not gradable (image / not reviewed). Score is against Kiro's suggested answers, not the official key.</div>";
  bar.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function resetAnswers(){
  for(const k in selections) delete selections[k];
  graded = false;
  document.getElementById("scorebar").classList.remove("show");
  renderExam();
}

document.getElementById("grade-btn").onclick = gradeExam;
document.getElementById("reset-btn").onclick = resetAnswers;

populateDropdown();
renderSidebar();
renderExam();
</script>
