topic-3-question-5-discussion/", "text": "A team manages an Azure Machine Learning workspace and deploys a model to an endpoint.\nA deployed online endpoint shows inconsistent response times during periods of high traffic.\nYou need to identify potential performance degradation.\nWhich three metrics should you monitor? Each correct answer presents part of the solution. Choose three.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Feature count"}, {"letter": "B", "text": "Requests per minute"}, {"letter": "C", "text": "Connections active"}, {"letter": "D", "text": "Dataset size"}, {"letter": "E", "text": "Request latency"}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q6", "topic": 3, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404604-exam-ai-300-topic-3-question-6-discussion/", "text": "DRAG DROP -\nA team deploys a machine learning model to a managed online endpoint. The team monitors model performance and data quality metrics in production.\nWhen monitoring thresholds are exceeded, the team requires an automated operational response that notifies downstream systems.\nYou need to configure the monitoring solution to meet the requirements.\nWhich configuration should you associate with each requirement as a first step? To answer, move the appropriate configurations to the correct requirements. You may use each configuration once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q7", "topic": 3, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404605-exam-ai-300-topic-3-question-7-discussion/", "text": "HOTSPOT -\nYou use Azure Machine Learning to train models across multiple experiments by using the same workspace.\nYou must record training runs in a centralized location to compare results from different jobs.\nDuring training, performance values must be captured so they appear in the experiment run history.\nYou need to configure experiment tracking.\nWhat should you configure for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q8", "topic": 3, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/404606-exam-ai-300-topic-3-question-8-discussion/", "text": "A data science team trains a classification model that predicts loan approval outcomes.\nBefore registering the model, the team must ensure the following:\nPredictions must not disproportionately impact protected groups.\nPrediction errors can be evaluated across different data segments.\nYou need to assess whether the model meets Responsible AI expectations.\nWhich two approaches should you use? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Analyze error rates across the global cohort."}, {"letter": "B", "text": "Measure endpoint latency under load."}, {"letter": "C", "text": "Validate inference schema compatibility."}, {"letter": "D", "text": "Evaluate feature importance for prediction transparency."}, {"letter": "E", "text": "Analyze error rates across defined demographic cohorts."}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q9", "topic": 3, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/404568-exam-ai-300-topic-3-question-9-discussion/", "text": "A team deploys a model to a real-time endpoint in Azure Machine Learning. You deploy some updates to the endpoint.\nThe endpoint returns errors after the new deployment is released.\nYou need to restore the service as quickly as possible.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Roll back traffic to the previous deployment."}, {"letter": "B", "text": "Delete the endpoint and immediately redeploy it."}, {"letter": "C", "text": "Change the authentication type to Azure Machine Learning token-based authentication."}, {"letter": "D", "text": "Increase the compute size."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "When a new deployment is unhealthy, the first mitigation is to roll traffic back to the previous known-good deployment to restore service, then investigate."}, {"key": "AI-300|T3|Q10", "topic": 3, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/404569-exam-ai-300-topic-3-question-10-discussion/", "text": "HOTSPOT -\nYou train a model in Azure Machine Learning.\nYou plan to capture experiment details for later comparison. The training code must log parameters and metrics for each run.\nYou review the following training script.\nYou need to verify whether the training script meets the experiment tracking requirement. For each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q11", "topic": 3, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/404570-exam-ai-300-topic-3-question-11-discussion/", "text": "A data science team completes multiple training runs within an experiment by using MLflow.\nThe team wants to store a selected model in Azure Machine Learning so that it can be versioned and deployed later.\nThe model must be versioned centrally for reuse across environments.\nYou need to version the trained model.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Locate and capture the model artifacts from the outputs of the training run."}, {"letter": "B", "text": "Register the model in the Azure Machine Learning workspace."}, {"letter": "C", "text": "Tag the training experiment with a name."}, {"letter": "D", "text": "Export the model files to local storage."}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q12", "topic": 3, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/404571-exam-ai-300-topic-3-question-12-discussion/", "text": "DRAG DROP -\nA team deploys a classification model to production and monitors performance and data changes.\nThe team wants to ensure that significant drops in prediction accuracy automatically trigger the following:\nStakeholders must be notified of the drops.\nRetraining must be initiated when thresholds are exceeded\nYou need to configure monitoring to meet the requirements.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q13", "topic": 3, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/404572-exam-ai-300-topic-3-question-13-discussion/", "text": "An Azure Machine Learning workspace contains multiple registered versions of a model that is used in production.\nAn older model version must no longer be deployable, but it must remain available for compliance review and potential rollback.\nYou need to change the state of the model version to meet the requirements.\nWhat should you do?", "choices": [{"letter": "A", "text": "Archive the training dataset for the model version."}, {"letter": "B", "text": "Delete the model version."}, {"letter": "C", "text": "Archive the model version."}, {"letter": "D", "text": "Unregister the model version."}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Archive the model version to retire it from active use while preserving lineage/auditability. Deleting or unregistering destroys history."}, {"key": "AI-300|T3|Q14", "topic": 3, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/404573-exam-ai-300-topic-3-question-14-discussion/", "text": "A team is deploying machine learning models to a production inference endpoint in Azure Machine Learning.\nThe team requires a safe way to validate a new model version without disrupting existing users.\nYou need to recommend a deployment strategy for controlled testing of a new model version.\nWhat should you configure?", "choices": [{"letter": "A", "text": "traffic splitting between deployments"}, {"letter": "B", "text": "the model asset version in the registry"}, {"letter": "C", "text": "deployment to a separate staging endpoint"}, {"letter": "D", "text": "an evaluation script in Azure Machine Learning"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Traffic splitting between deployments on the online endpoint enables safe staged rollout/comparison of a new model version."}, {"key": "AI-300|T3|Q15", "topic": 3, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/404574-exam-ai-300-topic-3-question-15-discussion/", "text": "HOTSPOT -\nYou are monitoring a fine-tuned large language model deployed in Microsoft Foundry.\nYou evaluate the model before and after fine-tuning by using the same evaluation dataset.\nYou review the following evaluation results:\nYou need to determine whether the fine-tuned model shows improved performance without introducing regression. For each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q1", "topic": 4, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404575-exam-ai-300-topic-4-question-1-discussion/", "text": "DRAG DROP -\nA team runs training jobs by using multiple Azure Machine Learning pipelines.\nThe team must ensure that all runs use the same Python packages and system libraries. The solution must allow dependency updates to be versioned without modifying training code.\nYou need to configure the workspace so that runtime dependencies are consistent and reusable.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q2", "topic": 4, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404576-exam-ai-300-topic-4-question-2-discussion/", "text": "DRAG DROP -\nA company is standardizing generative AI development across multiple teams.\nEach team requires an isolated workspace. Governance and shared connections must be centrally managed.\nYou need to implement a Microsoft Foundry environment structure that supports centralized governance and team isolation.\nWhich type of configuration should you use for each requirement? To answer, move the appropriate configurations to the correct requirements. You may use each configuration once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q3", "topic": 4, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404577-exam-ai-300-topic-4-question-3-discussion/", "text": "A financial services company is deploying Microsoft Foundry to host generative AI workloads that process regulated customer data. The Microsoft Foundry environment must prevent any public network exposure while still allowing services managed by Microsoft Foundry to communicate with dependent Azure resources.\nSecurity auditors require that all traffic to and from the Microsoft Foundry resource remain on private networks, with no public endpoints available.\nYou need to configure the Microsoft Foundry environment so that network access is restricted while maintaining full platform functionality.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Configure a managed virtual network for the Microsoft Foundry resource."}, {"letter": "B", "text": "Use API key authentication for all model endpoints."}, {"letter": "C", "text": "Deploy the Microsoft Foundry resource in a separate Azure subscription."}, {"letter": "D", "text": "Disable public network access to the Microsoft Foundry resource."}, {"letter": "E", "text": "Disable all inbound network access."}], "community": "AD", "type": "multiple-choice", "kiro_answer": "AD", "kiro_rationale": "Configure a managed virtual network for the Foundry resource (A) and disable public network access (D) to lock it down. API keys (B) violate least-privilege/no-secrets; a separate subscription (C) and disabling all inbound (E) are not the required network-isolation steps. Matches community AD."}, {"key": "AI-300|T4|Q4", "topic": 4, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404578-exam-ai-300-topic-4-question-4-discussion/", "text": "DRAG DROP -\nAn organization uses Microsoft Foundry to develop generative AI projects that access shared Azure resources such as storage accounts and vector databases.\nThe organization s security policy requires eliminating secret key-based authentication and enforcing least-privilege access.\nYou must configure identity and access so that:\nServices authenticate without stored credentials.\nPermissions are scoped appropriately across projects and shared resources.\nYou need to configure the appropriate identity or access mechanism for each requirement.\nWhat should you configure in Microsoft Foundry to meet each requirement? To answer, move the appropriate configuration mechanisms to the correct requirements. You may use each configuration mechanism once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q5", "topic": 4, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404579-exam-ai-300-topic-4-question-5-discussion/", "text": "DRAG DROP -\nA company plans to deploy a foundation model in Microsoft Foundry.\nThe mode must support the following workloads:\nA customer support workload used across multiple regions\nA marketing workload that must remain within a specific region due to data residency requirements\nYou need to select the deployment type.\nWhich deployment type should you use for each workload? To answer, move the appropriate deployment types to the correct requirements. You may use each deployment type once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q6", "topic": 4, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404580-exam-ai-300-topic-4-question-6-discussion/", "text": "DRAG DROP -\nA team manages prompts that are used by a generative AI application built on Microsoft Foundry. Multiple developers contribute prompt updates, and changes must be reviewed and tracked over time.\nThe team requires that:\nPrompt changes are reviewed before being applied to the version in production.\nPrevious prompt versions can be restored if issues occur.\nPrompt updates follow the same governance practices as the application code.\nYou need to implement a controlled process for managing and updating prompts in production.\nHow should you manage prompt updates to meet the requirements? To answer, move the appropriate actions to the correct requirements. You may use each action once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q7", "topic": 4, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404607-exam-ai-300-topic-4-question-7-discussion/", "text": "A team develops multiple AI applications in Microsoft Foundry that rely on shared prompt templates.\nThe team requires a centralized way to track, version, and reuse prompt content across projects.\nYou need to recommend a solution to track and reuse prompt content.\nWhich approach should you recommend?", "choices": [{"letter": "A", "text": "Store prompts as versioned files in a Git repository."}, {"letter": "B", "text": "Register prompts as datasets in the Azure Machine Learning workspace."}, {"letter": "C", "text": "Embed prompts directly in application configuration files."}, {"letter": "D", "text": "Persist prompts in Azure Blob Storage with folder-level organization."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Store prompts as versioned files in Git for change history, review and rollback - prompt assets are code-like and benefit from source control."}, {"key": "AI-300|T4|Q8", "topic": 4, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/404608-exam-ai-300-topic-4-question-8-discussion/", "text": "A team plans to deploy a large foundation model in Microsoft Foundry as part of a new enterprise AI capability.\nDifferent business units across the team's organization will access the model from various internal applications.\nYou need to deploy a foundation model by minimizing latency.\nWhich deployment type should you use?", "choices": [{"letter": "A", "text": "Developer"}, {"letter": "B", "text": "Data Zone Batch"}, {"letter": "C", "text": "Data Zone Standard"}, {"letter": "D", "text": "Global Batch"}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Data Zone Standard gives low-latency, real-time (non-batch) interactive throughput within a data zone for many applications. Batch types add latency; Developer is for limited dev use."}, {"key": "AI-300|T4|Q9", "topic": 4, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/404609-exam-ai-300-topic-4-question-9-discussion/", "text": "A company's platform engineers manage the resource settings and governance of Microsoft Foundry.\nDevelopers must be able to create and update project assets but must not be able to change resource-level configurations.\nYou need to enforce least privilege access for the engineers and developers.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Assign a resource-level Azure AI Administrator role to the platform engineers."}, {"letter": "B", "text": "Disable Microsoft Entra ID authentication for the Microsoft Foundry resource."}, {"letter": "C", "text": "Assign the Azure AI Developer role to the developers."}, {"letter": "D", "text": "Share a single API key across all teams."}], "community": null, "type": "multiple-choice", "kiro_answer": "AC", "kiro_rationale": "Use Entra ID RBAC with least privilege: assign Azure AI Developer to developers (C) and an appropriate admin role where needed (A). Disabling Entra auth (B) and sharing one API key (D) violate the security requirements."}, {"key": "AI-300|T4|Q10", "topic": 4, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/404610-exam-ai-300-topic-4-question-10-discussion/", "text": "You have a Microsoft Foundry project.\nYou plan to use the Microsoft Foundry portal to fine-tune a base Azure OpenAI Service model that can accept both text and images as input.\nYou need to choose the suitable model.\nWhich model should you choose?", "choices": [{"letter": "A", "text": "davinci-002"}, {"letter": "B", "text": "gpt-4o"}, {"letter": "C", "text": "gpt-35-turbo"}, {"letter": "D", "text": "gpt-4"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "gpt-4o is the multimodal Azure OpenAI model that accepts both text and images and supports fine-tuning. davinci-002, gpt-35-turbo and gpt-4 (base) do not fit the text+image fine-tune requirement."}, {"key": "AI-300|T4|Q11", "topic": 4, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/404611-exam-ai-300-topic-4-question-11-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou work in Microsoft Foundry with a prompt flow.\nYou must manually evaluate prompts and compare results across prompt variants.\nYou need to capture the inputs, outputs, token usage, and latencies for each flow run for the evaluation.\nSolution: Create prompt variants and compare their outputs in the Evaluation experience.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Yes. The Evaluation experience with prompt variants captures inputs, outputs, token usage and latency for comparison, meeting the goal. Community voted A."}, {"key": "AI-300|T4|Q12", "topic": 4, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/404612-exam-ai-300-topic-4-question-12-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou work in Microsoft Foundry with a prompt flow.\nYou must manually evaluate prompts and compare results across prompt variants.\nYou need to capture the inputs, outputs, token usage, and latencies for each flow run for the evaluation.\nSolution: Use the prompt flow SDK to enable tracing for the flow before executing runs. Then run the flow to generate traceable results.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Yes. Enabling tracing via the prompt flow SDK before runs captures inputs, outputs, token usage and latencies - a valid solution to the same goal."}, {"key": "AI-300|T4|Q13", "topic": 4, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/404613-exam-ai-300-topic-4-question-13-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou work in Microsoft Foundry with a prompt flow.\nYou must manually evaluate prompts and compare results across prompt variants.\nYou need to capture the inputs, outputs, token usage, and latencies for each flow run for the evaluation.\nSolution: In Microsoft Foundry, turn on Tracing for the prompt flow of the project and execute test runs to produce trace data.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Yes. Turning on Tracing for the project's prompt flow in Foundry and running tests produces the required trace data (inputs/outputs/tokens/latency). NOTE: community voted B for this variant - verify, as wording differences in this Yes/No series matter."}, {"key": "AI-300|T5|Q1", "topic": 5, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404614-exam-ai-300-topic-5-question-1-discussion/", "text": "DRAG DROP -\nA team iterates prompts used by a generative AI agent. The team must support internal review before releasing changes.\nThe team must:\nTrack prompt changes with a clear history for audit and rollback.\nCompare prompt variants in parallel without affecting the prompt used in the production environment.\nYou need to select the appropriate source control approach for each requirement.\nWhat should you use for each requirement? To answer, move the appropriate source controls to the correct requirements. You may use each source control once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T5|Q2", "topic": 5, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404615-exam-ai-300-topic-5-question-2-discussion/", "text": "DRAG DROP -\nA team deploys a generative AI application that uses a model deployed in Microsoft Foundry. The application must support latency monitoring under production load.\nYou need to enable performance observability.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T5|Q3", "topic": 5, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404616-exam-ai-300-topic-5-question-3-discussion/", "text": "A team is developing a generative AI assistant. The team is experimenting with multiple prompt variants to improve the user experience.\nWhen comparing prompt variants, the team plans to assess whether the generated responses are grammatically correct.\nYou need to evaluate the quality of the language from the generated responses.\nWhich evaluator should you use?", "choices": [{"letter": "A", "text": "Coherence"}, {"letter": "B", "text": "Textual similarity"}, {"letter": "C", "text": "Grounded ness"}, {"letter": "D", "text": "Fluency"}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Groundedness measures whether a generated answer is supported by the provided source/context - the evaluator for RAG factual grounding. Coherence/fluency/similarity assess other qualities."}, {"key": "AI-300|T5|Q4", "topic": 5, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404617-exam-ai-300-topic-5-question-4-discussion/", "text": "You manage a Microsoft Foundry project. You build a multi-turn chatbot application.\nYou plan to filter your traces to identify issues while observing how the application is responding. The solution must not use an external knowledge base.\nYou need to select an evaluation metric.\nWhich built-in evaluator should you use?", "choices": [{"letter": "A", "text": "RelevanceEvaluator"}, {"letter": "B", "text": "SimilarityEvaluator"}, {"letter": "C", "text": "QAEvaluator"}, {"letter": "D", "text": "CoherenceEvaluator"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "RelevanceEvaluator scores how relevant the response is to the question/context. Use it when relevance is the target metric."}, {"key": "AI-300|T5|Q5", "topic": 5, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404618-exam-ai-300-topic-5-question-5-discussion/", "text": "DRAG DROP -\nAn organization operates a generative AI application in production by using Microsoft Foundry. The application serves live user traffic and is updated by a data scientist team regularly as prompts and models evolve.\nThe application intermittently times out during production use, which requires ongoing visibility into runtime behavior.\nThe team must also validate model quality and safety before releasing new updates to avoid introducing regressions.\nYou need to apply the correct mechanisms for continuous runtime monitoring and for release time validation.\nWhich mechanisms should you use for each requirement? To answer, move the appropriate mechanisms to the correct requirements. You may use each mechanism once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T5|Q6", "topic": 5, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404619-exam-ai-300-topic-5-question-6-discussion/", "text": "An organization validates generative AI applications during CI/CD Microsoft Foundry.\nEvaluation must run automatically and block releases when quality thresholds are NOT met. Manual evaluation is no longer acceptable.\nEvaluation must use both predefined quality metrics and custom safety checks.\nYou need to implement an automated evaluation workflow that supports both built-in and custom metrics.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable application tracing to collect runtime telemetry."}, {"letter": "B", "text": "Review evaluation results manually after deployment."}, {"letter": "C", "text": "Monitor latency metrics during model inference."}, {"letter": "D", "text": "Implement an evaluation step by using GitHub Actions."}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Implement an evaluation step in CI (GitHub Actions) so prompts/models are automatically evaluated before deployment - the repeatable, automated gate. Manual review and latency monitoring are not automated quality gates."}, {"key": "AI-300|T5|Q7", "topic": 5, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404620-exam-ai-300-topic-5-question-7-discussion/", "text": "A team develops and manages a conversational assistant by using Microsoft Foundry.\nThe team must be able to validate that the assistant does not produce hateful responses before the application is exposed to any users.\nYou need to evaluate the model output for hateful responses as part of a repeatable validation process.\nWhich evaluator should you configure first?", "choices": [{"letter": "A", "text": "Protected material"}, {"letter": "B", "text": "Groundedness"}, {"letter": "C", "text": "Indirect attacks"}, {"letter": "D", "text": "Content safety"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "For a RAG solution, configure the Groundedness evaluator first to ensure answers are supported by retrieved content. Protected material/indirect attacks/content safety address different risks."}, {"key": "AI-300|T6|Q1", "topic": 6, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404621-exam-ai-300-topic-6-question-1-discussion/", "text": "An organization is deploying several generative AI workloads by using Microsoft Foundry. Each workload must meet different requirements related to data governance, task specialization, and operational cost control.\nThe organization requires models that meet the following requirements:\nModel behavior aligns with the task being performed.\nData handling aligns with internal governance policies.\nOperational complexity and cost are justified by workload needs.\nYou need to select the foundation model options that meet the requirements.\nWhich three models can you select? Each correct answer presents a complete solution. Choose three.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "A model that is optimized for conversational reasoning when deploying an interactive assistant"}, {"letter": "B", "text": "The largest available model to simplify operational management"}, {"letter": "C", "text": "The smallest available model to minimize the usage cost"}, {"letter": "D", "text": "A model that supports multiple input types when workloads require combined text and image analysis"}, {"letter": "E", "text": "A model that offers enterprise governance controls when workloads process regulated business data"}], "community": "ADE", "type": "multiple-choice", "kiro_answer": "ADE", "kiro_rationale": "Choose a model fit for purpose: conversational-reasoning model for an interactive assistant (A), multimodal when combining text+image (D), and one with enterprise governance for regulated data (E). 'Largest' (B) and 'smallest' (C) as blanket rules are wrong. Matches community ADE."}, {"key": "AI-300|T6|Q2", "topic": 6, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404622-exam-ai-300-topic-6-question-2-discussion/", "text": "HOTSPOT -\nA team is building a generative AI agent by using Retrieval-Augmented Generation (RAG) in Microsoft Foundry.\nThe team frequently updates prompt content. The team must be able to track changes across contributors while avoiding full application redeployments.\nYou need to enable rapid prompt iteration with traceability. Applications consuming the agent must be able to use updated prompts without requiring redeployment.\nWhat should you configure for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q3", "topic": 6, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404623-exam-ai-300-topic-6-question-3-discussion/", "text": "HOTSPOT -\nA company is creating an internal tool that summarizes long meeting transcripts and extracts action items.\nThe model must:\nProcess text inputs up to 200k tokens long.\nGenerate concise summaries in seconds.\nSupport interactive testing before integration into the app.\nYou need to select, deploy, and test a model that supports summarization with low latency.\nHow should you complete the configuration plan? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q4", "topic": 6, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404624-exam-ai-300-topic-6-question-4-discussion/", "text": "HOTSPOT -\nYou manage a Retrieval-Augmented Generation (RAG) system that retrieves internal policy documents from a vector index.\nRecent analysis shows that:\nRetrieved results frequently include duplicated content from the same document.\nRetrieved chunks sometimes span unrelated policy sections.\nYou review the following retrieval and ingestion configurations:\nYou need to reduce duplicated retrieval results and improve chunk relevance across policy sections. For each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q5", "topic": 6, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404625-exam-ai-300-topic-6-question-5-discussion/", "text": "HOTSPOT -\nYou are reviewing a dataset that will be used for an advanced fine-tuning job in Microsoft Foundry.\nThe fine-tuning job uses preference comparison data.\nYou review the following dataset excerpt.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q6", "topic": 6, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404626-exam-ai-300-topic-6-question-6-discussion/", "text": "HOTSPOT -\nYou manage a Retrieval-Augmented Generation (RAG) system that uses Azure AI Search to retrieve documents from an indexed knowledge base.\nThe system must support the following retrieval requirements:\nQueries that include exact policy identifiers must return matching documents even when semantic similarity is low.\nNatural-language questions must prioritize semantically relevant documents even when keywords are not an exact match.\nYou need to configure the retrieval approach to meet the requirements.\nHow should you configure the retrieval behavior for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q7", "topic": 6, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404627-exam-ai-300-topic-6-question-7-discussion/", "text": "A Retrieval-Augmented Generation (RAG) solution returns incomplete answers because relevant content is inconsistently retrieved from the knowledge source.\nYou need to improve RAG accuracy without changing the embedding model currently in use. You need to achieve this goal while minimizing operational costs.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Tune chunk size and overlap to match content structure."}, {"letter": "B", "text": "Implement an optimized re-ranker."}, {"letter": "C", "text": "Increase token limits for all requests."}, {"letter": "D", "text": "Optimize the length of embedding vectors."}], "community": null, "type": "multiple-choice", "kiro_answer": "AB", "kiro_rationale": "To improve RAG retrieval quality, tune chunk size/overlap to the content (A) and add an optimized re-ranker (B). Raising token limits (C) and changing embedding length (D) do not directly fix retrieval relevance."}]};
const examLabels = Object.keys(DATA);
let current = examLabels[0];
const selections = {};   // key -> Set of chosen letters
let graded = false;

function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function esc(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function renderSidebar(){
  const list = document.getElementById("exam-list");
  list.innerHTML = "";
  examLabels.forEach(label=>{
    const qs = DATA[label];
    const reviewed = qs.filter(q=>q.kiro_answer).length;
    const btn = el("button","exam-btn"+(label===current?" active":""));
    btn.innerHTML = esc(label)+"<small>"+qs.length+" questions &middot; "+reviewed+" reviewed</small>";
    btn.onclick = ()=>{ selectExam(label); };
    list.appendChild(btn);
  });
  const sel = document.getElementById("exam-select");
  if(sel && sel.value !== current) sel.value = current;
}

function populateDropdown(){
  const sel = document.getElementById("exam-select");
  sel.innerHTML = "";
  examLabels.forEach(label=>{
    const opt = document.createElement("option");
    opt.value = label;
    opt.textContent = label + " (" + DATA[label].length + " questions)";
    sel.appendChild(opt);
  });
  sel.value = current;
  sel.onchange = ()=> selectExam(sel.value);
}

function selectExam(label){
  current = label;
  graded = false;
  document.getElementById("scorebar").classList.remove("show");
  renderSidebar();
  renderExam();
}

function renderExam(){
  const qs = DATA[current];
  document.getElementById("exam-title").textContent = current + " — Mock Exam";
  const reviewed = qs.filter(q=>q.kiro_answer).length;
  const comm = qs.filter(q=>q.community).length;
  document.getElementById("exam-sub").textContent =
    qs.length+" questions in this exam only. "+reviewed+" with Kiro's suggested answer, "+comm+" with a community answer.";
  const wrap = document.getElementById("questions");
  wrap.innerHTML = "";
  const filter = document.getElementById("search").value.toLowerCase();
  qs.forEach(q=>{
    const hay = (q.text+" "+(q.choices||[]).map(c=>c.text).join(" ")).toLowerCase();
    if(filter && !hay.includes(filter)) return;
    wrap.appendChild(renderCard(q));
  });
  if(!wrap.children.length){ wrap.appendChild(el("p","empty","No questions match the filter.")); }
}

function renderCard(q){
  const card = el("div","qcard");
  card.dataset.key = q.key;
  const head = el("div","qhead");
  head.appendChild(el("span","qid","Topic "+q.topic+" · Question "+q.question));
  head.appendChild(el("span","qtype",esc(q.type)));
  card.appendChild(head);

  card.appendChild(el("div","qtext",esc(q.text)));

  const kiro = (q.kiro_answer||"").toUpperCase();
  const multi = kiro.length > 1; // e.g. "AD" => choose multiple
  const sel = selections[q.key] || new Set();
  (q.choices||[]).forEach(c=>{
    const ch = el("div","choice");
    ch.innerHTML = "<span class='ltr'>"+esc(c.letter)+".</span>"+esc(c.text);
    ch.dataset.letter = c.letter;
    if(sel.has(c.letter)) ch.classList.add("selected");
    ch.onclick = ()=>{
      const s = selections[q.key] || new Set();
      if(multi){
        if(s.has(c.letter)) s.delete(c.letter); else s.add(c.letter);
      } else {
        const had = s.has(c.letter);
        s.clear();
        if(!had) s.add(c.letter);
      }
      selections[q.key] = s;
      // reflect selection in UI
      card.querySelectorAll(".choice").forEach(o=>{
        o.classList.toggle("selected", s.has(o.dataset.letter));
      });
    };
    card.appendChild(ch);
  });

  const reveal = el("div","reveal");
  const btn = el("button",null,"Show answer");
  const ans = el("div","answers");
  btn.onclick = ()=>{
    ans.classList.toggle("show");
    btn.textContent = ans.classList.contains("show") ? "Hide answer" : "Show answer";
    if(kiro){
      card.querySelectorAll(".choice").forEach(ch=>{
        if(kiro.includes(ch.dataset.letter)) ch.classList.toggle("kiro-correct", ans.classList.contains("show"));
      });
    }
  };
  reveal.appendChild(btn);
  card.appendChild(reveal);

  // Kiro answer
  const kr = el("div","ans-row");
  if(q.kiro_answer){
    kr.innerHTML = "<span class='lbl'>Kiro's suggested answer</span> <span class='pill kiro'>"+esc(q.kiro_answer)+"</span>";
  } else {
    kr.innerHTML = "<span class='lbl'>Kiro's suggested answer</span> <span class='pill none'>Not yet reviewed</span>";
  }
  ans.appendChild(kr);
  if(q.kiro_rationale){ ans.appendChild(el("div","rationale",esc(q.kiro_rationale))); }

  // Community answer
  const cr = el("div","ans-row");
  cr.style.marginTop = "10px";
  if(q.community){
    cr.innerHTML = "<span class='lbl'>Community most-voted</span> <span class='pill comm'>"+esc(q.community)+"</span>";
  } else {
    cr.innerHTML = "<span class='lbl'>Community most-voted</span> <span class='pill none'>no votes</span>";
  }
  ans.appendChild(cr);

  if(q.url){ const a=el("a","src","View source discussion ↗"); a.href=q.url; a.target="_blank"; a.style.display="inline-block"; a.style.marginTop="10px"; ans.appendChild(a); }

  card.appendChild(ans);
  return card;
}

document.getElementById("search").addEventListener("input", renderExam);
document.getElementById("reveal-all").onclick = ()=>document.querySelectorAll(".answers").forEach(a=>{a.classList.add("show");});
document.getElementById("hide-all").onclick = ()=>document.querySelectorAll(".answers").forEach(a=>{a.classList.remove("show");});

function setEq(a, b){
  if(a.size !== b.size) return false;
  for(const x of a) if(!b.has(x)) return false;
  return true;
}

function gradeExam(){
  const qs = DATA[current];
  let correct=0, wrong=0, skipped=0, nokey=0, gradable=0;
  qs.forEach(q=>{
    const kiro = (q.kiro_answer||"").toUpperCase();
    const card = document.querySelector('.qcard[data-key="'+CSS.escape(q.key)+'"]');
    if(!kiro){ nokey++; if(card) markCard(card,"q-nokey"); return; }
    gradable++;
    const want = new Set(kiro.split(""));
    const got = selections[q.key] || new Set();
    if(got.size===0){ skipped++; if(card) markCard(card,"q-skipped"); return; }
    const ok = setEq(want, got);
    if(ok) correct++; else wrong++;
    if(card){
      markCard(card, ok?"q-correct":"q-wrong");
      card.querySelectorAll(".choice").forEach(ch=>{
        const l = ch.dataset.letter;
        ch.classList.remove("graded-correct","graded-wrong");
        if(want.has(l)){ ch.classList.add("graded-correct"); addMark(ch,"✓"); }
        if(got.has(l) && !want.has(l)){ ch.classList.add("graded-wrong"); addMark(ch,"✗"); }
      });
      // open the answer panel so rationale shows
      const ans = card.querySelector(".answers"); if(ans) ans.classList.add("show");
    }
  });
  graded = true;
  showScore(correct, wrong, skipped, nokey, gradable);
}

function markCard(card, cls){
  card.classList.remove("q-correct","q-wrong","q-skipped","q-nokey");
  card.classList.add(cls);
}
function addMark(ch, sym){
  if(ch.querySelector(".mark")) return;
  const m = el("span","mark", sym);
  ch.appendChild(m);
}

function showScore(correct, wrong, skipped, nokey, gradable){
  const attempted = correct + wrong;
  const pct = attempted ? Math.round(100*correct/attempted) : 0;
  const bar = document.getElementById("scorebar");
  bar.classList.add("show");
  bar.innerHTML =
    "<span class='pct'>"+pct+"%</span> &nbsp; ("+correct+" / "+attempted+" attempted correct)" +
    "<div class='bd'>"+correct+" correct · "+wrong+" wrong · "+skipped+
    " skipped · "+gradable+" gradable vs Kiro's key · "+nokey+
    " not gradable (image / not reviewed). Score is against Kiro's suggested answers, not the official key.</div>";
  bar.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function resetAnswers(){
  for(const k in selections) delete selections[k];
  graded = false;
  document.getElementById("scorebar").classList.remove("show");
  renderExam();
}

document.getElementById("grade-btn").onclick = gradeExam;
document.getElementById("reset-btn").onclick = resetAnswers;

populateDropdown();
renderSidebar();
renderExam();
</script>
</body>
</html>
