<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock Exam</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --panel2:#222c38; --line:#2e3a48;
          --text:#e6edf3; --muted:#8b98a5; --accent:#4c9aff; --good:#3fb950;
          --warn:#d29922; --pick:#1f6feb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
  #sidebar { width:240px; background:var(--panel); border-right:1px solid var(--line);
             padding:18px 14px; flex-shrink:0; position:sticky; top:0; height:100vh; overflow:auto; }
  #sidebar h1 { font-size:16px; margin:0 0 16px; }
  .exam-btn { display:block; width:100%; text-align:left; padding:11px 12px; margin-bottom:8px;
              background:var(--panel2); color:var(--text); border:1px solid var(--line);
              border-radius:8px; cursor:pointer; font-size:14px; }
  .exam-btn:hover { border-color:var(--accent); }
  .exam-btn.active { background:var(--pick); border-color:var(--pick); }
  .exam-btn small { display:block; color:var(--muted); margin-top:3px; }
  .exam-btn.active small { color:#cfe2ff; }
  #main { flex:1; padding:26px 34px; max-width:1000px; }
  #exam-title { margin:0 0 4px; font-size:24px; }
  #exam-sub { color:var(--muted); margin:0 0 18px; font-size:13px; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
  .toolbar input { background:var(--panel2); border:1px solid var(--line); color:var(--text);
                   padding:8px 10px; border-radius:7px; width:240px; }
  .toolbar button { background:var(--panel2); border:1px solid var(--line); color:var(--text);
                    padding:8px 12px; border-radius:7px; cursor:pointer; }
  .toolbar button:hover { border-color:var(--accent); }
  .qcard { background:var(--panel); border:1px solid var(--line); border-radius:10px;
           padding:18px 20px; margin-bottom:16px; }
  .qhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .qhead .qid { font-weight:600; color:var(--accent); }
  .qhead .qtype { font-size:11px; color:var(--muted); border:1px solid var(--line);
                  padding:2px 8px; border-radius:20px; }
  .qtext { white-space:pre-wrap; line-height:1.5; margin-bottom:14px; font-size:14px; }
  .choice { padding:9px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:7px;
            cursor:pointer; font-size:14px; }
  .choice:hover { border-color:var(--accent); }
  .choice.selected { border-color:var(--pick); background:rgba(31,111,235,.15); }
  .choice .ltr { font-weight:700; margin-right:8px; }
  .reveal { margin-top:6px; }
  .reveal button { background:var(--panel2); border:1px solid var(--line); color:var(--text);
                   padding:7px 12px; border-radius:7px; cursor:pointer; font-size:13px; }
  .answers { margin-top:12px; border-top:1px dashed var(--line); padding-top:12px; display:none; }
  .answers.show { display:block; }
  .ans-row { margin-bottom:8px; font-size:14px; }
  .ans-row .lbl { color:var(--muted); display:inline-block; min-width:170px; }
  .pill { display:inline-block; font-weight:700; padding:1px 9px; border-radius:6px; }
  .pill.kiro { background:rgba(63,185,80,.18); color:var(--good); border:1px solid var(--good); }
  .pill.comm { background:rgba(76,154,255,.16); color:var(--accent); border:1px solid var(--accent); }
  .pill.none { background:transparent; color:var(--muted); border:1px solid var(--line); }
  .rationale { font-size:13px; color:#cdd7e0; line-height:1.5; margin-top:6px;
               background:var(--panel2); padding:10px 12px; border-radius:8px; }
  .choice.kiro-correct { border-color:var(--good); background:rgba(63,185,80,.12); }
  .choice.graded-correct { border-color:var(--good); background:rgba(63,185,80,.18); }
  .choice.graded-wrong { border-color:#f85149; background:rgba(248,81,73,.16); }
  .choice .mark { float:right; font-weight:700; }
  .scorebar { display:none; background:var(--panel2); border:1px solid var(--line);
              border-radius:10px; padding:14px 18px; margin-bottom:18px; font-size:15px; }
  .scorebar.show { display:block; }
  .scorebar .pct { font-size:26px; font-weight:700; }
  .scorebar .bd { color:var(--muted); font-size:13px; margin-top:6px; }
  .qcard.q-correct { border-left:4px solid var(--good); }
  .qcard.q-wrong { border-left:4px solid #f85149; }
  .qcard.q-skipped { border-left:4px solid var(--warn); }
  .qcard.q-nokey { border-left:4px solid var(--line); }
  a.src { color:var(--muted); font-size:12px; text-decoration:none; }
  a.src:hover { color:var(--accent); }
  .empty { color:var(--muted); }
  .exam-picker { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .exam-picker label { color:var(--muted); font-size:14px; }
  .exam-picker select { background:var(--panel2); color:var(--text); border:1px solid var(--line);
                        border-radius:8px; padding:9px 12px; font-size:15px; min-width:260px; cursor:pointer; }
  .exam-picker select:hover { border-color:var(--accent); }
</style>
</head>
<body>
  <nav id="sidebar">
    <h1>Mock Exams</h1>
    <div id="exam-list"></div>
  </nav>
  <main id="main">
    <div class="exam-picker">
      <label for="exam-select">Choose exam:</label>
      <select id="exam-select"></select>
    </div>
    <h2 id="exam-title"></h2>
    <p id="exam-sub"></p>
    <div class="toolbar">
      <input id="search" placeholder="Filter questions...">
      <button id="reveal-all">Reveal all answers</button>
      <button id="hide-all">Hide all answers</button>
      <button id="grade-btn">Grade exam</button>
      <button id="reset-btn">Reset answers</button>
    </div>
    <div id="scorebar" class="scorebar"></div>
    <div id="questions"></div>
  </main>

<script>
const DATA = {"AI-103": [{"key": "AI-103|T1|Q1", "topic": 1, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/412433-exam-ai-103-topic-1-question-1-discussion/", "text": "HOTSPOT -\nCase Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will bed to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the “Next” button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the “Question” button to return to the question.\nOverview -\nCompany Information -\nContoso, Ltd is a multinational retail company that builds, deploys, and manages generative AI and agent-based solutions by using Microsoft Foundry.\nExisting Environment -\nIdentity Environment -\nContoso uses Microsoft Entra ID for identity management, authentication, and authorization capabilities that enable agents to access organizational resources and services.\nContoso recently formed a new AI engineering team named Agent1Dev Team to optimize and maintain existing AI solutions.\nThe team collaborates with solution architects, DevOps engineers, and security engineers to design, implement. monitor, and secure AI applications.\nContoso also has a team named Agent1Test Team that is responsible for validating AI solutions before the solution deployments.\nGenerative Environment -\nContoso has a Microsoft Foundry deployment that contains two projects named Project1 and Project2.\nProject1 -\nProject1 contains a customer support agent named Agent1 that assists customers with product inquiries and troubleshooting requests.\nAgent1 has the following configurations:\nAgent1 uses a base model deployment.\nA safety evaluation pipeline is NOT enabled.\nTool invocation approval workflows are NOT enabled.\nConversation memory constraints are NOT configured.\nAgent1 interacts with customers by using digital support channels and answers general questions about Contoso products.\nProject1 is deployed to an Azure region located in the European Union (EU).\nAgent1Dev Team will use Project1 to optimize and maintain Agent1.\nProject2 -\nProject2 contains a deployed video generation model. The marketing department at Contoso has access to Project2 and plans to use the model to develop a video creation solution.\nDevelopment of the solution is incomplete.\nData Environment -\nContoso stores product-related information in Azure resources that support AI applications.\nThe Azure environment contains an Azure Blob Storage account named storage1 that stores product detail sheets for all the Contoso products.\nThe product sheets include specifications, feature descriptions, and product support information that Agent1 can use to answer customer questions. The product sheets are stored in the PDF format.\nProblem Statements -\nContoso identifies the following issues:\nAgent1 has only general knowledge of the Contoso products.\nA recent chat interaction with Agent1 was analyzed for sentiment. The results of the analysis have NOT been processed yet.\nAgent1 does NOT use the detailed product information in the product sheets stored in storage1 when responding to customer questions.\nThe finance department at Contoso reports that vendor invoices must be reviewed manually to ensure that the invoices match the terms defined in the vendor contracts. The invoices contain tables, logos, and varied layouts that make the documents difficult to process consistently.\nRequirements -\nPlanned Changes -\nContoso plans to implement the following changes:\nImplement a solution for Project1 that analyzes the vendor invoices by evaluating both the visual layout and the textual content of the invoices, so that the invoice details can be verified against the vendor contract terms.\nUpdate the base model deployment used by Agent1 and standardize the model version to ensure continuity and consistent responses.\nEnable Agent1 to retrieve and use the detailed product information from the product sheets stored in storage1.\nImplement an indexing solution for the product sheets that Agent1 can use to answer customer questions.\nComplete the development of the video creation solution.\nTechnical Requirements -\nContoso identifies the following technical requirements:\nThe model deployment used by Agent1 must support scalable, high-throughput generative AI workloads and dynamically scale to handle variable customer support traffic, without requiring reserved throughput capacity.\nThe product sheets must be processed by using an indexing pipeline that enables semantic and vector search, so that Agent1 can retrieve the relevant product information.\nResponses generated by using the product sheet information must be relevant, complete, and accurate.\nAgent1 must be able to use the product sheets to answer natural language questions about product details.\nThe model version used by Agent1 must remain consistent to ensure stable responses.\nThe data processed by the model must remain within the EU.\nSecurity and Compliance Requirements\nContoso identifies the following security and compliance requirements:\nAPI keys must NOT be used to access Foundry-deployed models.\nAccess to the Azure resources must follow the principle of least privilege.\nThe developers at Contoso must authenticate to Microsoft Foundry resources by using Microsoft Entra authentication.\nAccess to Project1 must be assigned to the members of Agent1Dev Team by using a security group named SC_Agent1_Dev.\nAccess to Project1 must be assigned to the members of Agent1Test Team by using a security group named SC_Agent1_Test.\nAgent1 must never reveal customer information, even if a document that contains customer data is added erroneously to the product sheet repository in storage1.\nThe product sheets might contain images that include embedded text. Agent1 must be protected from malicious instructions potentially hidden within the images.\nBusiness Requirements -\nContoso identifies the following business requirements:\nUsers that interact with Agent1 must have a personalized experience in future interactions, including the ability for Agent1 to retain conversation context and recall relevant information from previous interactions.\nAgent1 must answer questions only about the products sold by Contoso.\nYou need to configure the model deployment for Agent1 to meet the technical requirements.\nWhat should you configure? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q2", "topic": 1, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/412434-exam-ai-103-topic-1-question-2-discussion/", "text": d maintain existing AI solutions.\nThe team collaborates with solution architects, DevOps engineers, and security engineers to design, implement. monitor, and secure AI applications.\nContoso also has a team named Agent1Test Team that is responsible for validating AI solutions before the solution deployments.\nGenerative Environment -\nContoso has a Microsoft Foundry deployment that contains two projects named Project1 and Project2.\nProject1 -\nProject1 contains a customer support agent named Agent1 that assists customers with product inquiries and troubleshooting requests.\nAgent1 has the following configurations:\nAgent1 uses a base model deployment.\nA safety evaluation pipeline is NOT enabled.\nTool invocation approval workflows are NOT enabled.\nConversation memory constraints are NOT configured.\nAgent1 interacts with customers by using digital support channels and answers general questions about Contoso products.\nProject1 is deployed to an Azure region located in the European Union (EU).\nAgent1Dev Team will use Project1 to optimize and maintain Agent1.\nProject2 -\nProject2 contains a deployed video generation model. The marketing department at Contoso has access to Project2 and plans to use the model to develop a video creation solution.\nDevelopment of the solution is incomplete.\nData Environment -\nContoso stores product-related information in Azure resources that support AI applications.\nThe Azure environment contains an Azure Blob Storage account named storage1 that stores product detail sheets for all the Contoso products.\nThe product sheets include specifications, feature descriptions, and product support information that Agent1 can use to answer customer questions. The product sheets are stored in the PDF format.\nProblem Statements -\nContoso identifies the following issues:\nAgent1 has only general knowledge of the Contoso products.\nA recent chat interaction with Agent1 was analyzed for sentiment. The results of the analysis have NOT been processed yet.\nAgent1 does NOT use the detailed product information in the product sheets stored in storage1 when responding to customer questions.\nThe finance department at Contoso reports that vendor invoices must be reviewed manually to ensure that the invoices match the terms defined in the vendor contracts. The invoices contain tables, logos, and varied layouts that make the documents difficult to process consistently.\nRequirements -\nPlanned Changes -\nContoso plans to implement the following changes:\nImplement a solution for Project1 that analyzes the vendor invoices by evaluating both the visual layout and the textual content of the invoices, so that the invoice details can be verified against the vendor contract terms.\nUpdate the base model deployment used by Agent1 and standardize the model version to ensure continuity and consistent responses.\nEnable Agent1 to retrieve and use the detailed product information from the product sheets stored in storage1.\nImplement an indexing solution for the product sheets that Agent1 can use to answer customer questions.\nComplete the development of the video creation solution.\nTechnical Requirements -\nContoso identifies the following technical requirements:\nThe model deployment used by Agent1 must support scalable, high-throughput generative AI workloads and dynamically scale to handle variable customer support traffic, without requiring reserved throughput capacity.\nThe product sheets must be processed by using an indexing pipeline that enables semantic and vector search, so that Agent1 can retrieve the relevant product information.\nResponses generated by using the product sheet information must be relevant, complete, and accurate.\nAgent1 must be able to use the product sheets to answer natural language questions about product details.\nThe model version used by Agent1 must remain consistent to ensure stable responses.\nThe data processed by the model must remain within the EU.\nSecurity and Compliance Requirements\nContoso identifies the following security and compliance requirements:\nAPI keys must NOT be used to access Foundry-deployed models.\nAccess to the Azure resources must follow the principle of least privilege.\nThe developers at Contoso must authenticate to Microsoft Foundry resources by using Microsoft Entra authentication.\nAccess to Project1 must be assigned to the members of Agent1Dev Team by using a security group named SC_Agent1_Dev.\nAccess to Project1 must be assigned to the members of Agent1Test Team by using a security group named SC_Agent1_Test.\nAgent1 must never reveal customer information, even if a document that contains customer data is added erroneously to the product sheet repository in storage1.\nThe product sheets might contain images that include embedded text. Agent1 must be protected from malicious instructions potentially hidden within the images.\nBusiness Requirements -\nContoso identifies the following business requirements:\nUsers that interact with Agent1 must have a personalized experience in future interactions, including the ability for Agent1 to retain conversation context and recall relevant information from previous interactions.\nAgent1 must answer questions only about the products sold by Contoso.\nYou need to configure Agent1 to meet the security and compliance requirements.\nWhat should you use?", "choices": [{"letter": "A", "text": "self-harm content filtering"}, {"letter": "B", "text": "prompt shields"}, {"letter": "C", "text": "Personally identifiable information (PII) Detection"}, {"letter": "D", "text": "violence content filtering"}], "community": "C", "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "PII Detection prevents the agent from revealing customer information even if a document with customer data is added by mistake. Prompt shields target injection; content filters target harmful categories. Community voted C."}, {"key": "AI-103|T1|Q3", "topic": 1, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/412435-exam-ai-103-topic-1-question-3-discussion/", "text": "You are planning a Microsoft Foundry project named Project1 that will contain multiple agents. Each agent will access the same Azure AI Search resource.\nYou need to recommend a solution to centrally manage the Azure AI Search credentials within Project1. The solution must be implemented across all the agents.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Enable role-based access control (RBAC) for the Azure AI Search resource."}, {"letter": "B", "text": "Disable key-based access control on the Azure AI Search resource."}, {"letter": "C", "text": "Add a connection to the Azure AI Search resource."}, {"letter": "D", "text": "Create a managed private endpoint that connects to the Azure AI Search resource."}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "To let the agent use the product sheets, add a connection to the Azure AI Search resource in the project so the agent can retrieve from the index."}, {"key": "AI-103|T1|Q4", "topic": 1, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/412436-exam-ai-103-topic-1-question-4-discussion/", "text": "HOTSPOT -\nYour company is piloting a customer support agent in a Microsoft Foundry project name Project1. Project1 is connected to an existing Application Insights resource, and the company’s support team reviews runs in the Traces tab.\nThe Foundry Agent Service is configured to perform the following actions:\nRetrieve the Application Insights connection string by calling project_client.telemetry.get_application_insights_connection_string().\nCall configure_azure_monitor(connection_string=...) to enable telemetry.\nA separate LangChain service is configured to use OpenTelemetry and has the following configurations:\nUses AzureAIOpenTelemetryTracer(connection_string=..., enable_content_recording=False)\nPasses the tracer by using config={“callbacks”:[azure_tracer]}\nCompany policy has the following requirements:\nTelemetry from LangChain and OpenTelemetry must be distinguishable within the same Application Insights resource.\nSecrets and credentials must NOT be stored in prompts, tool arguments, or span attributes.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q5", "topic": 1, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/412437-exam-ai-103-topic-1-question-5-discussion/", "text": "DRAG DROP -\nYou have a Microsoft Foundry project that processes procurement documents submitted by suppliers.\nYou need to implement two pipelines by using Azure Content Understanding in Foundry Tools. The solution must meet the following requirements:\nInclude a pipeline named Pipeline1 that supports cost-effective, high-volume processing of standalone PDF invoices.\nInclude a pipeline named Pipeline2 that supports cross-document validation by using multi-step reasoning and reference data.\nHow should you configure each pipeline? To answer, drag the appropriate configurations to the correct pipelines. Each configuration may be used once, more than once, of not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q6", "topic": 1, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/412438-exam-ai-103-topic-1-question-6-discussion/", "text": "HOTSPOT -\nYou have a Python application named App1 that integrates with a Microsoft Foundry project named Project1.\nYou need to ensure that App1 meets the following requirements:\nAuthenticates by using a Microsoft Entra managed identity\nSends prompts to a deployed model by using the Azure OpenAI Responses API\nHow should you complete the Python code? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q7", "topic": 1, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/412439-exam-ai-103-topic-1-question-7-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains a workflow for a customer support triage process.\nYou have an Ask a question node that stores user responses in a local variable named Var01.\nYou need to create the following Power Fx expressions:\nAn if/else condition expression that ensures that Var01 contains a value\nA Send message expression that returns the stored user response in uppercase\nHow should you configure the expressions? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q8", "topic": 1, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/412440-exam-ai-103-topic-1-question-8-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains a customer support agent built by using the Foundry Agent Service.\nThe agent uploads user-provided screenshots to Azure Storage through a ticketing tool and receives a blob URL for additional reasoning.\nYou need to use image moderation during agent runs and prevent harmful content from being returned during runs. Azure AI Content Safety must access the images by using the blob URL. The solution must follow the principle of least privilege.\nWhat should you configure for Content Safety? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q9", "topic": 1, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/412441-exam-ai-103-topic-1-question-9-discussion/", "text": "You have a Microsoft Foundry project that contains three agents as shown in the following table.\nYou need to orchestrate the agents to ensure that the customer requests meet the following requirements:\nSupport a deterministic, step-based process that uses conditional branching and shared state across the agents.\nOptionally trigger a ticket action based on the triage result.\nThe solution must minimize development effort.\nWhat should you include in the solution?", "choices": [{"letter": "A", "text": "a workflow"}, {"letter": "B", "text": "threads and runs without a workflow"}, {"letter": "C", "text": "a multi-agent group chat session"}, {"letter": "D", "text": "separate agent runs coordinated in the application code"}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "When multiple agents must collaborate on one task, use a multi-agent group chat session so agents coordinate within the orchestration rather than ad-hoc app code."}, {"key": "AI-103|T1|Q10", "topic": 1, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/412442-exam-ai-103-topic-1-question-10-discussion/", "text": "You have a Microsoft Foundry project that contains an agent. The agent uses Azure Speech in Foundry Tools.\nYou fine-tune a baseline speech to text model for the en-us locale and publish the model.\nThe agent calls the Speech to text REST API and returns an error message indicating that the project ID is invalid.\nYou need to set the project property to the correct ID.\nTo what should you set the project property?", "choices": [{"letter": "A", "text": "the project URL"}, {"letter": "B", "text": "the custom speech project ID"}, {"letter": "C", "text": "the project ID"}, {"letter": "D", "text": "the custom speech endpoint URL"}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q11", "topic": 1, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/412443-exam-ai-103-topic-1-question-11-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains an agent named PaymentAgent.\nPaymentAgent includes a function tool that issues customer refunds by using an external API.\nYou are creating a workflow in YAML.\nYou need to ensure that the workflow pauses for human approval and continues with the refund step only after approval is granted.\nHow should you complete the workflow definition? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q12", "topic": 1, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/412444-exam-ai-103-topic-1-question-12-discussion/", "text": "You have an Azure Speech in Foundry Tools resource that hosts a custom speech to text model deployed to a custom endpoint. An agent uses the endpoint to perform real-time speech recognition.\nYou are approaching the expiration date of the custom speech to text model.\nWhat is the expected behavior when the model expires?", "choices": [{"letter": "A", "text": "Speech recognition requests will return a 4xx error until a new custom model is deployed."}, {"letter": "B", "text": "Speech recognition requests will continue to use the expired custom model until the model is removed manually."}, {"letter": "C", "text": "Speech recognition requests will fall back to the most recent base model for the same locale."}, {"letter": "D", "text": "The custom model will be deleted automatically when the model expires."}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "When a custom speech model expires, recognition requests fall back to the most recent base model for the same locale; they do not error out or auto-delete the model."}, {"key": "AI-103|T1|Q13", "topic": 1, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/412445-exam-ai-103-topic-1-question-13-discussion/", "text": "You have a Microsoft Foundry project that contains a model deployment.\nYou have an application that calls the deployment by using the Azure OpenAI v1 API and DefaultAzureCredential.\nThe developers at your company receive HTTP 403 errors when they send inference requests, even after running az login.\nYou need to ensure that the developers can perform model inference. The solution must follow the principle of least privilege.\nWhich role-based access control (RBAC) role should you assign to the developers?", "choices": [{"letter": "A", "text": "Cognitive Services User"}, {"letter": "B", "text": "Cognitive Services OpenAI User"}, {"letter": "C", "text": "Contributor"}, {"letter": "D", "text": "Cognitive Services Data Reader"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "To call Azure OpenAI models, assign Cognitive Services OpenAI User (least-privilege data-plane access for inference). Contributor is over-privileged; the others do not grant OpenAI inference."}, {"key": "AI-103|T1|Q14", "topic": 1, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/412446-exam-ai-103-topic-1-question-14-discussion/", "text": "You have a Microsoft Foundry project that contains an agent. The agent has a Model Context Protocol (MCP) tool that queries a knowledge base stored in Azure AI Search.\nSome agent runs return answers from the base model without invoking the knowledge base, which results in responses without grounded citations.\nYou are provided with the following code snippet that runs the agent.\nYou need to add the correct tool _choice parameter to the code to deterministically force the agent to invoke the MCP tool on each run.\nWhat should you add?", "choices": [{"letter": "A", "text": "tool_choice={“required”}"}, {"letter": "B", "text": "tool_choice={“auto”}"}, {"letter": "C", "text": "tool_choice={“type”:“knowledge_base”}"}, {"letter": "D", "text": "tool_choice ={“type”:“mcp”}"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "To require the agent to use an MCP tool, set tool_choice to the mcp type. 'auto' leaves it optional; 'required' is not the MCP-specific binding; knowledge_base is not the MCP tool type."}, {"key": "AI-103|T1|Q15", "topic": 1, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/412447-exam-ai-103-topic-1-question-15-discussion/", "text": "DRAG DROP -\nYou have a Microsoft Foundry project that contains a customer support agent grounded in internal documentation.\nAfter a recent update, users report the following issues:\nSome answers are unsupported by retrieved documents.\nA small number of responses are flagged for policy violations.\nYou need to evaluate each issue.\nWhich observability signals should you use for each issue? To answer, drag the appropriate observability signals to the correct issues. Each observability signal may be used once, more than once, or not at all. You may need to drag the spit bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q16", "topic": 1, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/412448-exam-ai-103-topic-1-question-16-discussion/", "text": "You have a Microsoft Foundry project named Project1 that contains an agent. The agent uses an OpenAPI 3.0 specification to call an external weather service.\nThe weather service requires a key to be passed in an HTTP header. The key value is stored as a connection in Project1.\nYou need to ensure that the key value from the connection is included automatically whenever the OpenAPI tool is invoked.\nWhat should you configure in the OpenAPI specification?", "choices": [{"letter": "A", "text": "a header parameter defined for each operation"}, {"letter": "B", "text": "an Azure Key Vault connection"}, {"letter": "C", "text": "an API key security scheme"}, {"letter": "D", "text": "a Bearer token security scheme"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Because API keys are not allowed and Entra auth is required, configure a Bearer token security scheme in the OpenAPI spec so the tool authenticates with an Entra token."}, {"key": "AI-103|T1|Q17", "topic": 1, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/412449-exam-ai-103-topic-1-question-17-discussion/", "text": "You have a Microsoft Foundry project that serves a high-volume chat app.\nMost requests are simple FAQs, but some require advanced reasoning.\nYou need to reduce costs and latency for common queries, without degrading the quality of the responses to complex questions.\nWhat should you do?", "choices": [{"letter": "A", "text": "Route all the requests to a smaller model."}, {"letter": "B", "text": "Use a model cascade that routes the requests to different models."}, {"letter": "C", "text": "Increase the value of the max_tokens parameter for all the requests."}, {"letter": "D", "text": "Route all the requests to the most capable model."}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "A model cascade routes easy requests to a smaller/cheaper model and escalates only hard ones to the capable model, balancing cost and quality. Routing all to one model wastes cost or quality."}, {"key": "AI-103|T1|Q18", "topic": 1, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/412450-exam-ai-103-topic-1-question-18-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains an internal Q&A agent.\nUsers report the following issues when they ask the agent questions:\nAn increase in the following response: “No relevant information found”\nPeriodic HTTP 429 rate limit exceeded errors during peak hours\nYou need to identify whether each issue is caused by model unavailability, resource limits, or inference failures.\nWhat should you do? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q19", "topic": 1, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/412451-exam-ai-103-topic-1-question-19-discussion/", "text": "You have a Microsoft Foundry project that contains a high-traffic agent.\nAfter a recent update, operational costs increase significantly.\nMonitoring confirms that the volume of user traffic to the agent remains unchanged.\nYou suspect that changes to the request or response characteristics are causing the increase. You need to identify whether the additional costs are driven by the model input size, the model output size, or expanded tool usage.\nWhich observability capability should you use?", "choices": [{"letter": "A", "text": "latency"}, {"letter": "B", "text": "evaluation metrics"}, {"letter": "C", "text": "run success rate"}, {"letter": "D", "text": "token usage"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "To judge output quality/correctness, use evaluation metrics. Latency, run success rate and token usage are operational, not quality, signals."}, {"key": "AI-103|T1|Q20", "topic": 1, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/412452-exam-ai-103-topic-1-question-20-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains an agent.\nThe agent uses tools to retrieve internal content and call external APIs. The agent is configured to let the model decide when to call the tools.\nYou need to publish the agent for a compliance workflow. The solution must meet the following requirements:\nEach workflow run must include a retrieval step before generating a response.\nTool calls must authenticate by using the published agent’s own identity.\nTool access must use an identity isolated from other project resources.\nTool access must use support audit tracing.\nWhat should you do? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q21", "topic": 1, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/412453-exam-ai-103-topic-1-question-21-discussion/", "text": "You have a Microsoft Foundry project named Project1 that contains the following:\nAn OpenAPI tool that calls an external API\nA project connection named Connection1 that stores the API key of the external API\nWhen an agent calls the OpenAPI tool, the API returns a 401 unauthorized error, and traces show that the API key header is NOT being sent.\nYou need to ensure that the OpenAPI tool automatically includes the API key from Connection1 on all requests.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable identity passthrough so that the tool uses the Microsoft Entra token of the caller."}, {"letter": "B", "text": "Add the API key header manually to the OpenAPI specification."}, {"letter": "C", "text": "Configure the tool to use the default connection of Project1."}, {"letter": "D", "text": "Connect the tool to Connection1."}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Connect the tool to the existing Connection1 so it uses the configured, secured connection rather than manual API keys or caller identity passthrough."}, {"key": "AI-103|T1|Q22", "topic": 1, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/412454-exam-ai-103-topic-1-question-22-discussion/", "text": "You have a Microsoft Foundry project that contains a customer support agent. The agent calls an internal knowledge API tool before generating responses.\nUsers report the following issues:\nSome requests take more than 15 seconds to complete.\nSome responses are incorrect, even when the knowledge API returns the expected data.\nYou need to inspect individual agent runs to view the ordered sequence of large language model (LLM) calls, tool invocations, and timing information.\nWhich observability capability should you use?", "choices": [{"letter": "A", "text": "token usage"}, {"letter": "B", "text": "monitoring"}, {"letter": "C", "text": "safety metrics"}, {"letter": "D", "text": "tracing"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Tracing gives the per-step execution detail needed to diagnose where/why an agent run behaves unexpectedly. Token usage/monitoring/safety metrics are aggregate signals."}, {"key": "AI-103|T1|Q23", "topic": 1, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/412455-exam-ai-103-topic-1-question-23-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a multimodal AI generative model that accepts image uploads and uses extracted image text to generate responses.\nYou discover that users can upload unsafe images and embed hidden instructions into images to manipulate the model.\nYou need to implement controls to mitigate the risk.\nSolution: You configure a prompt shield for user prompts.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. A prompt shield for user prompts guards text prompt injection, not hidden instructions embedded inside uploaded images. It does not mitigate the image-based risk."}, {"key": "AI-103|T1|Q24", "topic": 1, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/412456-exam-ai-103-topic-1-question-24-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a multimodal AI generative model that accepts image uploads and uses extracted image text to generate responses.\nYou discover that users can upload unsafe images and embed hidden instructions into images to manipulate the model.\nYou need to implement controls to mitigate the risk.\nSolution: You configure image moderation to block unsafe content before processing the images.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Yes. Image moderation blocks unsafe images before processing, which directly mitigates the unsafe-image upload risk in this scenario."}, {"key": "AI-103|T1|Q25", "topic": 1, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/412457-exam-ai-103-topic-1-question-25-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a multimodal AI generative model that accepts image uploads and uses extracted image text to generate responses.\nYou discover that users can upload unsafe images and embed hidden instructions into images to manipulate the model.\nYou need to implement controls to mitigate the risk.\nSolution: You configure a prompt shield for documents.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. Prompt shields for documents target injected instructions in grounding documents/text, not malicious instructions hidden in uploaded images."}, {"key": "AI-103|T1|Q26", "topic": 1, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/412458-exam-ai-103-topic-1-question-26-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a multimodal AI generative model that accepts image uploads and uses extracted image text to generate responses.\nYou discover that users can upload unsafe images and embed hidden instructions into images to manipulate the model.\nYou need to implement controls to mitigate the risk.\nSolution: You configure protected material detection.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. Protected material detection flags copyrighted content, not unsafe images or hidden image-borne instructions, so it does not meet the goal."}, {"key": "AI-103|T1|Q27", "topic": 1, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/412459-exam-ai-103-topic-1-question-27-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will bed to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the “Next” button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the “Question” button to return to the question.\nOverview -\nCompany Information -\nContoso, Ltd is a multinational retail company that builds, deploys, and manages generative AI and agent-based solutions by using Microsoft Foundry.\nExisting Environment -\nIdentity Environment -\nContoso uses Microsoft Entra ID for identity management, authentication, and authorization capabilities that enable agents to access organizational resources and services.\nContoso recently formed a new AI engineering team named Agent1Dev Team to optimize and maintain existing AI solutions.\nThe team collaborates with solution architects, DevOps engineers, and security engineers to design, implement. monitor, and secure AI applications.\nContoso also has a team named Agent1Test Team that is responsible for validating AI solutions before the solution deployments.\nGenerative Environment -\nContoso has a Microsoft Foundry deployment that contains two projects named Project1 and Project2.\nProject1 -\nProject1 contains a customer support agent named Agent1 that assists customers with product inquiries and troubleshooting requests.\nAgent1 has the following configurations:\nAgent1 uses a base model deployment.\nA safety evaluation pipeline is NOT enabled.\nTool invocation approval workflows are NOT enabled.\nConversation memory constraints are NOT configured.\nAgent1 interacts with customers by using digital support channels and answers general questions about Contoso products.\nProject1 is deployed to an Azure region located in the European Union (EU).\nAgent1Dev Team will use Project1 to optimize and maintain Agent1.\nProject2 -\nProject2 contains a deployed video generation model. The marketing department at Contoso has access to Project2 and plans to use the model to develop a video creation solution.\nDevelopment of the solution is incomplete.\nData Environment -\nContoso stores product-related information in Azure resources that support AI applications.\nThe Azure environment contains an Azure Blob Storage account named storage1 that stores product detail sheets for all the Contoso products.\nThe product sheets include specifications, feature descriptions, and product support information that Agent1 can use to answer customer questions. The product sheets are stored in the PDF format.\nProblem Statements -\nContoso identifies the following issues:\nAgent1 has only general knowledge of the Contoso products.\nA recent chat interaction with Agent1 was analyzed for sentiment. The results of the analysis have NOT been processed yet.\nAgent1 does NOT use the detailed product information in the product sheets stored in storage1 when responding to customer questions.\nThe finance department at Contoso reports that vendor invoices must be reviewed manually to ensure that the invoices match the terms defined in the vendor contracts. The invoices contain tables, logos, and varied layouts that make the documents difficult to process consistently.\nRequirements -\nPlanned Changes -\nContoso plans to implement the following changes:\nImplement a solution for Project1 that analyzes the vendor invoices by evaluating both the visual layout and the textual content of the invoices, so that the invoice details can be verified against the vendor contract terms.\nUpdate the base model deployment used by Agent1 and standardize the model version to ensure continuity and consistent responses.\nEnable Agent1 to retrieve and use the detailed product information from the product sheets stored in storage1.\nImplement an indexing solution for the product sheets that Agent1 can use to answer customer questions.\nComplete the development of the video creation solution.\nTechnical Requirements -\nContoso identifies the following technical requirements:\nThe model deployment used by Agent1 must support scalable, high-throughput generative AI workloads and dynamically scale to handle variable customer support traffic, without requiring reserved throughput capacity.\nThe product sheets must be processed by using an indexing pipeline that enables semantic and vector search, so that Agent1 can retrieve the relevant product information.\nResponses generated by using the product sheet information must be relevant, complete, and accurate.\nAgent1 must be able to use the product sheets to answer natural language questions about product details.\nThe model version used by Agent1 must remain consistent to ensure stable responses.\nThe data processed by the model must remain within the EU.\nSecurity and Compliance Requirements\nContoso identifies the following security and compliance requirements:\nAPI keys must NOT be used to access Foundry-deployed models.\nAccess to the Azure resources must follow the principle of least privilege.\nThe developers at Contoso must authenticate to Microsoft Foundry resources by using Microsoft Entra authentication.\nAccess to Project1 must be assigned to the members of Agent1Dev Team by using a security group named SC_Agent1_Dev.\nAccess to Project1 must be assigned to the members of Agent1Test Team by using a security group named SC_Agent1_Test.\nAgent1 must never reveal customer information, even if a document that contains customer data is added erroneously to the product sheet repository in storage1.\nThe product sheets might contain images that include embedded text. Agent1 must be protected from malicious instructions potentially hidden within the images.\nBusiness Requirements -\nContoso identifies the following business requirements:\nUsers that interact with Agent1 must have a personalized experience in future interactions, including the ability for Agent1 to retain conversation context and recall relevant information from previous interactions.\nAgent1 must answer questions only about the products sold by Contoso.\nYou need to recommend a solution to assess the responses generated by Agent1 when the agent uses the product information stored in storage1. The solution must meet the technical requirements.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "a Retrieval Augmented Generation (RAG) evaluator"}, {"letter": "B", "text": "a custom guardrail"}, {"letter": "C", "text": "model fine-tuning"}, {"letter": "D", "text": "a groundedness evaluator"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Use a groundedness evaluator to detect responses not supported by retrieved content (hallucinations). A RAG evaluator is broader; guardrails/fine-tuning are not the measurement asked for."}, {"key": "AI-103|T1|Q28", "topic": 1, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/412460-exam-ai-103-topic-1-question-28-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will bed to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the “Next” button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the “Question” button to return to the question.\nOverview -\nCompany Information -\nContoso, Ltd is a multinational retail company that builds, deploys, and manages generative AI and agent-based solutions by using Microsoft Foundry.\nExisting Environment -\nIdentity Environment -\nContoso uses Microsoft Entra ID for identity management, authentication, and authorization capabilities that enable agents to access organizational resources and services.\nContoso recently formed a new AI engineering team named Agent1Dev Team to optimize and maintain existing AI solutions.\nThe team collaborates with solution architects, DevOps engineers, and security engineers to design, implement. monitor, and secure AI applications.\nContoso also has a team named Agent1Test Team that is responsible for validating AI solutions before the solution deployments.\nGenerative Environment -\nContoso has a Microsoft Foundry deployment that contains two projects named Project1 and Project2.\nProject1 -\nProject1 contains a customer support agent named Agent1 that assists customers with product inquiries and troubleshooting requests.\nAgent1 has the following configurations:\nAgent1 uses a base model deployment.\nA safety evaluation pipeline is NOT enabled.\nTool invocation approval workflows are NOT enabled.\nConversation memory constraints are NOT configured.\nAgent1 interacts with customers by using digital support channels and answers general questions about Contoso products.\nProject1 is deployed to an Azure region located in the European Union (EU).\nAgent1Dev Team will use Project1 to optimize and maintain Agent1.\nProject2 -\nProject2 contains a deployed video generation model. The marketing department at Contoso has access to Project2 and plans to use the model to develop a video creation solution.\nDevelopment of the solution is incomplete.\nData Environment -\nContoso stores product-related information in Azure resources that support AI applications.\nThe Azure environment contains an Azure Blob Storage account named storage1 that stores product detail sheets for all the Contoso products.\nThe product sheets include specifications, feature descriptions, and product support information that Agent1 can use to answer customer questions. The product sheets are stored in the PDF format.\nProblem Statements -\nContoso identifies the following issues:\nAgent1 has only general knowledge of the Contoso products.\nA recent chat interaction with Agent1 was analyzed for sentiment. The results of the analysis have NOT been processed yet.\nAgent1 does NOT use the detailed product information in the product sheets stored in storage1 when responding to customer questions.\nThe finance department at Contoso reports that vendor invoices must be reviewed manually to ensure that the invoices match the terms defined in the vendor contracts. The invoices contain tables, logos, and varied layouts that make the documents difficult to process consistently.\nRequirements -\nPlanned Changes -\nContoso plans to implement the following changes:\nImplement a solution for Project1 that analyzes the vendor invoices by evaluating both the visual layout and the textual content of the invoices, so that the invoice details can be verified against the vendor contract terms.\nUpdate the base model deployment used by Agent1 and standardize the model version to ensure continuity and consistent responses.\nEnable Agent1 to retrieve and use the detailed product information from the product sheets stored in storage1.\nImplement an indexing solution for the product sheets that Agent1 can use to answer customer questions.\nComplete the development of the video creation solution.\nTechnical Requirements -\nContoso identifies the following technical requirements:\nThe model deployment used by Agent1 must support scalable, high-throughput generative AI workloads and dynamically scale to handle variable customer support traffic, without requiring reserved throughput capacity.\nThe product sheets must be processed by using an indexing pipeline that enables semantic and vector search, so that Agent1 can retrieve the relevant product information.\nResponses generated by using the product sheet information must be relevant, complete, and accurate.\nAgent1 must be able to use the product sheets to answer natural language questions about product details.\nThe model version used by Agent1 must remain consistent to ensure stable responses.\nThe data processed by the model must remain within the EU.\nSecurity and Compliance Requirements\nContoso identifies the following security and compliance requirements:\nAPI keys must NOT be used to access Foundry-deployed models.\nAccess to the Azure resources must follow the principle of least privilege.\nThe developers at Contoso must authenticate to Microsoft Foundry resources by using Microsoft Entra authentication.\nAccess to Project1 must be assigned to the members of Agent1Dev Team by using a security group named SC_Agent1_Dev.\nAccess to Project1 must be assigned to the members of Agent1Test Team by using a security group named SC_Agent1_Test.\nAgent1 must never reveal customer information, even if a document that contains customer data is added erroneously to the product sheet repository in storage1.\nThe product sheets might contain images that include embedded text. Agent1 must be protected from malicious instructions potentially hidden within the images.\nBusiness Requirements -\nContoso identifies the following business requirements:\nUsers that interact with Agent1 must have a personalized experience in future interactions, including the ability for Agent1 to retain conversation context and recall relevant information from previous interactions.\nAgent1 must answer questions only about the products sold by Contoso.\nYou need to configure Agent1 to answer customer questions about only the Contoso products. The solution must meet the business requirements.\nWhat should you do?", "choices": [{"letter": "A", "text": "Modify the system message instructions."}, {"letter": "B", "text": "Add few-shot examples."}, {"letter": "C", "text": "Apply top-p sampling."}, {"letter": "D", "text": "Increase the value of the temperature parameter."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Modify the system message instructions to constrain behavior/scope - the most direct, reliable control. Few-shot, top-p and temperature do not enforce scope as deterministically."}, {"key": "AI-103|T1|Q29", "topic": 1, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/412461-exam-ai-103-topic-1-question-29-discussion/", "text": "You have a Microsoft Foundry project.\nYou plan to build a customer support solution that contains an agent. The solution must meet the following requirements:\nProvide accurate, context-aware responses grounded in internal product documentation stored in Azure AI Search.\nRequire deep, multi-step reasoning across long contexts.\nGenerate detailed natural language responses.\nWhich type of model should you use to power the agent?", "choices": [{"letter": "A", "text": "a multimodal model"}, {"letter": "B", "text": "a small language model (SLM)"}, {"letter": "C", "text": "a key phrase extraction model"}, {"letter": "D", "text": "a large language model (LLM)"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "A multimodal model is needed to analyze invoices by combining visual layout and textual content. An SLM/LLM (text-only) or key-phrase model cannot evaluate the visual layout."}, {"key": "AI-103|T1|Q30", "topic": 1, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/412462-exam-ai-103-topic-1-question-30-discussion/", "text": "DRAG DROP -\nYou have a Microsoft Foundry project that contains a deployed ticket-triage agent.\nYou discover that sometimes the agent responds without calling any tools, even when a tool is required.\nYou need to ensure that the agent calls a tool during execution.\nHow should you complete the Python code? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q31", "topic": 1, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/412463-exam-ai-103-topic-1-question-31-discussion/", "text": "You are building a web app named App1 that generates responses by using a model deployed to a Microsoft Foundry project named Project1.\nBefore sending the prompts to the model, App1 must retrieve documents by using Azure AI Search.\nYou need to integrate Project1 and App1. The solution must meet the following requirements:\nMultiple client applications must use the same search configuration.\nA security policy must prevent key-based authentication.\nAdministrative effort must be minimized.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create a custom HTTP connection in Foundry and manually configure Azure AI Search endpoints per application."}, {"letter": "B", "text": "Configure an Azure AI Search connection in Project1 and reference the connection in each application."}, {"letter": "C", "text": "Call Azure AI Search directly from each application by using Microsoft Entra authentication."}, {"letter": "D", "text": "Enable a managed identity for each application and call Azure AI Search directly."}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Configure one Azure AI Search connection in Project1 and reference it from each application - centralized, governed, least-privilege. Per-app custom HTTP/direct calls duplicate config and weaken governance."}, {"key": "AI-103|T1|Q32", "topic": 1, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/412464-exam-ai-103-topic-1-question-32-discussion/", "text": "DRAG DROP -\nYou have a Microsoft Foundry project that contains an agent used by the financial analysts at your company.\nYou need to optimize the agent workflow by providing additional data access and processing capabilities. The solution must meet the following requirements:\nEnsure that the agent can perform calculations during conversations.\nEnsure that the agent can access up-to-date information from public websites.\nEnsure that the agent can retrieve information from documents uploaded directly to the agent.\nWhat should you use for each requirement? To answer, drag the appropriate tools to the correct requirements. Each tool may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q33", "topic": 1, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/412465-exam-ai-103-topic-1-question-33-discussion/", "text": "You have a Microsoft Foundry project that contains a prompt agent used by a customer support web app.\nThe agent is invoked from a Python service that does NOT run in the Foundry portal.\nYou need to implement end-to-end tracing to capture latency breakdowns and exceptions across agent runs.\nWhich two components can you use? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "a Log Analytics workspace"}, {"letter": "B", "text": "Application Insights"}, {"letter": "C", "text": "OpenTelemetry"}, {"letter": "D", "text": "the Azure Monitor Agent"}, {"letter": "E", "text": "Microsoft Sentinel"}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q34", "topic": 1, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/412466-exam-ai-103-topic-1-question-34-discussion/", "text": "You have a customer support agent that uses the Microsoft Foundry Agent Service.\nSometimes, customers return to a session days later to continue the same support case, and the agent must resume with the full historical context. The agent must provide the following:\nMulti-turn continuity within the session\nCross-session continuity for the same case\nAccess to the full interaction history, including user messages, agent messages, tool calls, and tool outputs\nYou need to ensure that the agent automatically reloads the complete history on each new turn.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create and reuse a conversation by storing the conversation’s ID and supplying the ID on subsequent requests."}, {"letter": "B", "text": "Persist only the final model response stored in the client application and prepend the response to future prompts."}, {"letter": "C", "text": "Enable memory summarization on the agent definition to persist the context automatically."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Persist conversation context by storing the conversation/thread ID and supplying it on subsequent requests, so the service retains state across turns."}, {"key": "AI-103|T1|Q35", "topic": 1, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/412467-exam-ai-103-topic-1-question-35-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains a deployed chat model.\nYou have a Python service that sends API requests to the model. The service is integrated with an automated validation system that compares generated outputs against approved response patterns.\nStakeholders report that small wording differences are causing validation mismatches.\nYou need to update the request parameters to improve output stability. The solution must maximize reasoning quality.\nHow should you complete the Python code? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q36", "topic": 1, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/412468-exam-ai-103-topic-1-question-36-discussion/", "text": "You have a chat app in a Microsoft Foundry project and an Azure AI Search vectorized index.\nYou need to connect to the index to meet the following requirements:\nComplex questions must retrieve information from multiple chunks.\nMulti-turn conversations must influence retrieval planning.\nRetrievals must run in parallel to reduce latency.\nWhich retrieval approach should you use?", "choices": [{"letter": "A", "text": "iterative retrieval"}, {"letter": "B", "text": "agentic Retrieval Augmented Generation (RAG)"}, {"letter": "C", "text": "chain of thought"}, {"letter": "D", "text": "classic Retrieval Augmented Generation (RAG)"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Agentic RAG lets the agent plan and run multiple targeted retrievals/reasoning steps for complex queries, improving completeness over a single classic RAG pass."}, {"key": "AI-103|T1|Q37", "topic": 1, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/412469-exam-ai-103-topic-1-question-37-discussion/", "text": "HOTSPOT -\nYou need to recommend a plan to create a customer support agent by using the Microsoft Foundry Agent Service. The agent must meet the following requirements:\nRetain user preferences across multiple conversations.\nEnable users to provide contextual grounding by directly uploading documents during a chat.\nWhich Foundry capability should you recommend for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q38", "topic": 1, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/412470-exam-ai-103-topic-1-question-38-discussion/", "text": "You have a Microsoft Foundry project that contains an agent. The agent generates summaries from retrieved policy documents.\nYou need to improve response completeness. The solution must be implemented in the logic of the application code before responses are returned.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add a retry evaluation before the responses are returned."}, {"letter": "B", "text": "Decrease the value of the max_tokens parameter."}, {"letter": "C", "text": "Switch to Retrieval Augmented Generation (RAG)."}, {"letter": "D", "text": "Replace the model with a smaller deployment."}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Switch to Retrieval Augmented Generation so responses are grounded in source content, improving completeness/accuracy. Token/model tweaks do not add the missing grounded content."}, {"key": "AI-103|T1|Q39", "topic": 1, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/412471-exam-ai-103-topic-1-question-39-discussion/", "text": "You have a customer support agent built by using the Microsoft Foundry Agent Service. The agent calls an Azure OpenAI model deployment.\nDuring load testing, calls intermittently fail and return an HTTP 429 rate limit exceeded error.\nYou need to handle throttling to reduce call failures and improve reliability under load. The solution must remain within the service and model limits.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create a new thread and retry the calls immediately."}, {"letter": "B", "text": "Reduce the number of registered tools."}, {"letter": "C", "text": "Implement a retry policy that uses exponential backoff and jitter."}, {"letter": "D", "text": "Spit uploaded content into smaller files."}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "For throttling/429 errors, implement a retry policy with exponential backoff and jitter. New threads, fewer tools or smaller files do not address rate limiting."}, {"key": "AI-103|T1|Q40", "topic": 1, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/412472-exam-ai-103-topic-1-question-40-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains an agent.\nYou use a GitHub Actions workflow for CI/CD.\nYou need to configure the workflow to automatically evaluate the agent when a pull request (PR) is created and prevent branches from merging if the evaluation results do NOT meet the defined thresholds.\nHow should you configure the workflow? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q41", "topic": 1, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/412473-exam-ai-103-topic-1-question-41-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a Microsoft Foundry project that contains an agent. The agent generates summaries from retrieved policy documents.\nUsers report that some responses omit required regulatory clauses, even when the clauses are present in the retrieved content.\nYou need to improve response completeness.\nSolution: You increase the value of the max_tokens parameter.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. Increasing max_tokens only raises the output length cap; it does not make the model include required clauses that it is already omitting."}, {"key": "AI-103|T1|Q42", "topic": 1, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/412474-exam-ai-103-topic-1-question-42-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a Microsoft Foundry project that contains an agent. The agent generates summaries from retrieved policy documents.\nUsers report that some responses omit required regulatory clauses, even when the clauses are present in the retrieved content.\nYou need to improve response completeness.\nSolution: You add a reflection pass that regenerates the response if the required clauses are missing.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Yes. A reflection pass that regenerates the response when required clauses are missing directly improves completeness."}, {"key": "AI-103|T1|Q43", "topic": 1, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/412475-exam-ai-103-topic-1-question-43-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a Microsoft Foundry project that contains an agent. The agent generates summaries from retrieved policy documents.\nUsers report that some responses omit required regulatory clauses, even when the clauses are present in the retrieved content.\nYou need to improve response completeness.\nSolution: You increase the value of the temperature parameter.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. Increasing temperature adds randomnes
