y watch teams"}, {"letter": "B", "text": "Participating"}, {"letter": "C", "text": "Automatically watch repositories"}, {"letter": "D", "text": "Watching"}], "community": "AC", "type": "multiple-choice", "images": [], "kiro_answer": "AC", "kiro_rationale": "Clear 'Automatically watch teams' (A) and 'Automatically watch repositories' (C) so you're only notified for participation/mentions."}, {"key": "AZ-400|T5|Q22", "topic": 5, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/95839-exam-az-400-topic-5-question-22-discussion/", "text": "You have an Azure Automation account that contains a runbook. The runbook is used to configure the application infrastructure of an Azure subscription.\nYou have a project in Azure DevOps named Project1. Project1 contains a repository that stores code for the runbook.\nYou need to ensure that every committed change to the code will update automatically and publish the runbook to Azure Automation.\nWhat should you configure?", "choices": [{"letter": "A", "text": "the Service hooks settings for Project1"}, {"letter": "B", "text": "the Connections settings for the Automation account"}, {"letter": "C", "text": "the Source control settings for the Automation account"}, {"letter": "D", "text": "the Service connections settings for Project1"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Configure the Automation account's Source control settings to auto-sync and publish the runbook on commit."}, {"key": "AZ-400|T5|Q23", "topic": 5, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/95843-exam-az-400-topic-5-question-23-discussion/", "text": "You use Git for source control.\nYou enable GitHub code scanning.\nYou raise a pull request from a non-default branch. In the code scanning output, you receive the following error message: “Analysis not found.”\nYou need to ensure that the code scanning completes successfully for the pull request.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Add the name of the default branch to the on: push specification in the code scanning workflow."}, {"letter": "B", "text": "Add the name of the non-default branch to the on:push specification in the code scanning workflow."}, {"letter": "C", "text": "Delete the pull request, and then raise the request again from the default branch."}, {"letter": "D", "text": "Update the code in the pull request."}, {"letter": "E", "text": "Add a new workflow for code scanning."}], "community": "BD", "type": "multiple-choice", "images": [], "kiro_answer": "BD", "kiro_rationale": "Add the non-default branch to on:push in the workflow (B) and update the PR code to re-trigger (D)."}, {"key": "AZ-400|T5|Q24", "topic": 5, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/96638-exam-az-400-topic-5-question-24-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository named repo1 that stores the code of an app named App1.\nYou need deploy a workflow for repo1 by using GitHub Actions. The solution must meet the following requirements:\n•\tScan on pushes to the main branch.\n•\tScan on pull requests to the main branch.\n•\tScan on pull requests to any branch that has a prefix of releases/.\n•\tScan all the files in the subdirectories of the src directory.\n•\tExclude scanning of markdown files.\nHow should you complete the code? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image13.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q25", "topic": 5, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/96019-exam-az-400-topic-5-question-25-discussion/", "text": "You have a GitHub repository that contains multiple versions of an Azure Pipelines template.\nYou plan to deploy multiple pipelines that will use a template stored in the repository.\nYou need to ensure that you use a fixed version of the template.\nWhat should you use to reference which version of the template repository to use?", "choices": [{"letter": "A", "text": "the serial"}, {"letter": "B", "text": "the SHA-based hashes"}, {"letter": "C", "text": "the runner"}, {"letter": "D", "text": "the branch"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Reference a SHA-based hash to pin a fixed, immutable template version."}, {"key": "AZ-400|T5|Q26", "topic": 5, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/95882-exam-az-400-topic-5-question-26-discussion/", "text": "DRAG DROP\n-\nYou have the repositories shown in the following table.\nYou need to migrate the contents of the GitHub repository to the Azure Repos repository. The solution must ensure that the Azure Repos repository only contains branches and history from the GitHub repository.\nWhich three commands should you run in sequence? To answer, move the appropriate commands from the list of commands to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image15.png", "https://img.examtopics.com/az-400/image16.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q27", "topic": 5, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/95986-exam-az-400-topic-5-question-27-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository that contains the code for an app named App1.\nApp1 depends on a library of functions from a repository at https://github.com/contoso/afeed.\nYou need to keep a clone of the afeed repository as a subdirectory of the App1 repository.\nHow should you complete the Git command? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image18.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q28", "topic": 5, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/96483-exam-az-400-topic-5-question-28-discussion/", "text": "HOTSPOT\n-\nYou use Git for source control.\nYou need to optimize the performance of a repository. The solution must meet the following requirements:\n•\tPermanently remove all items referenced only in the reflog.\n•\tRemove history that is NOT in any current branch.\nHow should you complete the command? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image20.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q29", "topic": 5, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/96029-exam-az-400-topic-5-question-29-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Repos Git repository named repo1.\nYou need to ensure that you can authenticate to repo1 by using SSH.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nNOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image22.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q30", "topic": 5, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/95879-exam-az-400-topic-5-question-30-discussion/", "text": "DRAG DROP\n-\nYou use Git for source control.\nYou delete a file, commit the changes, and continue to work.\nYou need to recover the deleted file.\nWhich three commands should you run in sequence? To answer, move the appropriate commands from the list of commands to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image24.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q31", "topic": 5, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/95999-exam-az-400-topic-5-question-31-discussion/", "text": "HOTSPOT\n-\nYou use Git for source control. You have an app named App1.\nIn the main branch, you need to restore the third most recent revision of a file named App.exe.config.\nHow should you complete the command? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image26.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q32", "topic": 5, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/95982-exam-az-400-topic-5-question-32-discussion/", "text": "HOTSPOT\n-\nYou company uses a Git source-code repository.\nYou plan to implement GitFlow as a workflow strategy.\nYou need to identify which branch types are used for production code and preproduction code in the strategy.\nWhich branch type should you identify for each code type? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image28.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q33", "topic": 5, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/111398-exam-az-400-topic-5-question-33-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Repos repository named repo1.\nYou need to clone repo1. The solution must clone only a directory named src/web.\nHow should you complete the script? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image46.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q34", "topic": 5, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/111166-exam-az-400-topic-5-question-34-discussion/", "text": "You use GitHub for source control and Microsoft Teams for collaboration.\nYou need to send a notification to a Teams channel for each commit. The solution must minimize development effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "Use Azure Automation to connect to the GitHub Actions API and send a message to the Teams channel."}, {"letter": "B", "text": "Use the Microsoft Teams for GitHub app and configure a subscription to receive notifications in the Teams channel."}, {"letter": "C", "text": "Use GitHub Actions with a dispatch to send a message to the Teams channel by using the Teams API."}, {"letter": "D", "text": "Use Azure Functions to connect to the GitHub REST API and send a message to the Teams channel."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use the Microsoft Teams for GitHub app and subscribe the channel to commit notifications (minimal effort)."}, {"key": "AZ-400|T5|Q35", "topic": 5, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/111399-exam-az-400-topic-5-question-35-discussion/", "text": "You manage source code control and versioning by using GitHub.\nYou need to ensure that a PowerShell script is executed automatically before rebase operations are performed.\nWhat should you use?", "choices": [{"letter": "A", "text": "a package"}, {"letter": "B", "text": "GitHub Copilot"}, {"letter": "C", "text": "a webhook"}, {"letter": "D", "text": "a gist"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A (client-side) hook/webhook mechanism runs the script before the rebase operation."}, {"key": "AZ-400|T5|Q36", "topic": 5, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/111285-exam-az-400-topic-5-question-36-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository named repo1.\nYou migrate repo1 to an Azure Repos repository named repo2.\nAfter the migration, changes are made to repo1.\nYou need to sync the changes to repo2.\nHow should you complete the script? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image62.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q37", "topic": 5, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/111453-exam-az-400-topic-5-question-37-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Repos repository named repo1.\nYou delete a branch named features/feature11.\nYou need to recover the deleted branch.\nWhich three commands should you run in sequence? To answer, move the appropriate commands from the list of commands to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image64.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q38", "topic": 5, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/111454-exam-az-400-topic-5-question-38-discussion/", "text": "You use GitHub to host container packages that use Semantic Versioning (SemVer).\nYou have an app named App1. The current version of App1 is 11.2.0.\nYou change the code of App1 to fix a bug that was introduced in version 10.5.1.\nWhich version number should you assign to the release?", "choices": [{"letter": "A", "text": "10.5.1-PATCH"}, {"letter": "B", "text": "11.2.1"}, {"letter": "C", "text": "10.5.2"}, {"letter": "D", "text": "10.6.0"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "A bug fix on the current 11.2.0 line bumps the patch to 11.2.1 under SemVer."}, {"key": "AZ-400|T5|Q39", "topic": 5, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/112020-exam-az-400-topic-5-question-39-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Repos repository that contains large PSD files.\nYou need to configure Git LFS to manage all the files.\nHow should you complete the script? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image66.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q40", "topic": 5, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/111297-exam-az-400-topic-5-question-40-discussion/", "text": "You manage code by using GitHub.\nYou need to ensure that repository owners are notified if a new vulnerable dependency or malware is found in their repository.\nWhat should you do?", "choices": [{"letter": "A", "text": "Configure CodeQL scanning actions."}, {"letter": "B", "text": "Configure Dependabot alerts."}, {"letter": "C", "text": "Configure branch protection rules for each repository."}, {"letter": "D", "text": "Subscribe all the repository owners to the GitHub Advisory Database."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Dependabot alerts notify owners of vulnerable dependencies/malware."}, {"key": "AZ-400|T5|Q41", "topic": 5, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/111298-exam-az-400-topic-5-question-41-discussion/", "text": "You have a public GitHub repository named Public1.\nA commit is made to Public1. The commit contains a pattern that matches a regular expression.\nWho is notified first when the commit is made?", "choices": [{"letter": "A", "text": "the administrator of the GitHub organization"}, {"letter": "B", "text": "the committer"}, {"letter": "C", "text": "the owner of Public1"}, {"letter": "D", "text": "the secret scanning partner"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "On a public repo, the secret scanning partner is notified first when a matching pattern is committed."}, {"key": "AZ-400|T5|Q42", "topic": 5, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/114985-exam-az-400-topic-5-question-42-discussion/", "text": "You have a GitHub repository.\nYou need to ensure that all the code in the repository is scanned for vulnerabilities.\nWhat should you use?", "choices": [{"letter": "A", "text": "Dependabot alerts"}, {"letter": "B", "text": "branch protection rules"}, {"letter": "C", "text": "CodeQL actions"}, {"letter": "D", "text": "GitHub Advisory Database databases"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "CodeQL actions scan all repository code for vulnerabilities."}, {"key": "AZ-400|T5|Q43", "topic": 5, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/114888-exam-az-400-topic-5-question-43-discussion/", "text": "DRAG DROP\n-\nYou create a Git repository named Repo1 in Azure Repos.\nYou need to configure Repo1 to meet the following requirements:\n•\tWork items must be linked to a pull request.\n•\tPull requests must have a minimum of two reviewers.\n•\tPull requests must complete a code review by using a third-party tool.\nThe solution must minimize administrative effort.\nWhich type of policy should you use for each requirement? To answer, drag the appropriate policy types to the correct requirements. Each type policy may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image76.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q44", "topic": 5, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/114851-exam-az-400-topic-5-question-44-discussion/", "text": "You have a 1-TB Azure Repos repository named repo1.\nYou need to clone repo1. The solution must meet the following requirements:\n•\tYou must be able to search the commit history of the /src directory\n•\tThe amount of time it takes to clone the repository must be minimized\nWhich command should you run?", "choices": [{"letter": "A", "text": "git clone –-depth-1 [email protected] :v3/org/Project1/repo1"}, {"letter": "B", "text": "git clone –-filter=blob:none [email protected] :v3/org/Project1/repo1"}, {"letter": "C", "text": "git clone [email protected] :v3/org/Project1/repo1"}, {"letter": "D", "text": "git clone –-filter=true:0 [email protected] :v3/org/Project1/repo1"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "git clone --filter=blob:none does a partial (blobless) clone that keeps full history for searching /src while minimizing clone time."}, {"key": "AZ-400|T5|Q45", "topic": 5, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/115239-exam-az-400-topic-5-question-45-discussion/", "text": "You use GitHub for source control.\nYou are evaluating whether to use proxying to add a private upstream MyGet package feed to your MyGet feed.\nWhat are two possible advantages of this approach? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "minimizes the impact of upstream source availability issues"}, {"letter": "B", "text": "minimizes latency when accessing the package"}, {"letter": "C", "text": "provides automatic authentication"}, {"letter": "D", "text": "minimizes the impact on your storage quota"}], "community": "CD", "type": "multiple-choice", "images": [], "kiro_answer": "AD", "kiro_rationale": "Proxying an upstream feed cushions upstream availability outages (A) and avoids consuming your storage quota for upstream packages (D)."}, {"key": "AZ-400|T5|Q46", "topic": 5, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/114853-exam-az-400-topic-5-question-46-discussion/", "text": "You manage source code control and versioning by using GitHub.\nA large file is committed to a repository accidentally.\nYou need to reduce the size of the repository. The solution must remove the file from the repository.\nWhat should you use?", "choices": [{"letter": "A", "text": "bfg"}, {"letter": "B", "text": "lfs"}, {"letter": "C", "text": "gvfs"}, {"letter": "D", "text": "init"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "BFG Repo-Cleaner removes a large/sensitive file from history and shrinks the repo."}, {"key": "AZ-400|T5|Q47", "topic": 5, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/122247-exam-az-400-topic-5-question-47-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository.\nYou need to configure Dependabot dependency scanning. The solution must meet the following requirements:\n•\tAutomatically open a pull request to resolve an alert.\n•\tAutomatically open a pull request when a dependency is updated.\nWhat should you enable for each requirement? To answer, drag the appropriate features to the correct requirements. Each feature may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image84.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q48", "topic": 5, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/122307-exam-az-400-topic-5-question-48-discussion/", "text": "DRAG DROP\n-\nYou have a large repository named Repo1 that contains a directory named directory1.\nYou plan to modify files in directory1.\nYou need to create a clone of Repo1. The solution must minimize the amount of transferred data.\nHow should you complete the script? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image86.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q49", "topic": 5, "question": 49, "url": "https://www.examtopics.com/discussions/microsoft/view/131317-exam-az-400-topic-5-question-49-discussion/", "text": "You have a project in Azure DevOps.\nYou need to implement a new branching solution. The solution must ensure that all pull requests meet the following requirements:\n•\tInclude linked work items.\n•\tPass build validation policies.\n•\tRequire at least three reviewers.\nWhat should you include in the solution?", "choices": [{"letter": "A", "text": "branch policies"}, {"letter": "B", "text": "pull request templates"}, {"letter": "C", "text": "branch security"}, {"letter": "D", "text": "pull request permissions"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Branch policies enforce linked work items, build validation and required reviewers."}, {"key": "AZ-400|T5|Q50", "topic": 5, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/131773-exam-az-400-topic-5-question-50-discussion/", "text": "You use Git for source control.\nYou need to commit a 3-GB ZIP file that contains virtual machines used for testing. The solution must meet the following requirements:\n•\tThe file must be versioned.\n•\tThe file must be associated with the corresponding code commits.\nWhich two actions should you include in the solution? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Install the git-fat extension and associate the extension to ZIP files."}, {"letter": "B", "text": "Install the Git LFS extension and associate the extension to ZIP files."}, {"letter": "C", "text": "Install the git-stash extension and associate the extension to ZIP files."}, {"letter": "D", "text": "Use GZip to compress the file before committing the file."}, {"letter": "E", "text": "Store files in Azure Storage and enable blob versions."}], "community": "BE", "type": "multiple-choice", "images": [], "kiro_answer": "BE", "kiro_rationale": "Use Git LFS for the versioned 3-GB file tied to commits (B); alternatively store in Azure blob with versioning (E)."}, {"key": "AZ-400|T5|Q51", "topic": 5, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/146296-exam-az-400-topic-5-question-51-discussion/", "text": "You manage source control by using GitHub.\nYou have a file named Data.txt that contains sensitive data. A user pushes Data.txt to a repository.\nYou need to purge the file from the repository.\nWhich two commands can you use? Each correct answer presents a complete solution.\nNOTE: Each correct solution is worth one point.", "choices": [{"letter": "A", "text": "git checkout git reset -hard -pathspec data.txt"}, {"letter": "B", "text": "git checkout git clean -d data.txt --force"}, {"letter": "C", "text": "bfg --delete-files data.txt git push --force"}, {"letter": "D", "text": "git rm data.txt git push --force"}, {"letter": "E", "text": "git filter-repo --invert-paths --path data.txt git push origin --force --all"}, {"letter": "F", "text": "git revert -edit data.txt git push -force"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "CE", "kiro_rationale": "bfg --delete-files (C) and git filter-repo --invert-paths (E) both purge the file from history."}, {"key": "AZ-400|T5|Q52", "topic": 5, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/146723-exam-az-400-topic-5-question-52-discussion/", "text": "You use GitHub Enterprise for source control repositories. The repositories store C# code.\nYou need to enable CodeQL scanning for the repositories.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable Dependabot security updates."}, {"letter": "B", "text": "Enable Dependabot alerts."}, {"letter": "C", "text": "Configure a required GitHub Actions workflow for all the repositories."}, {"letter": "D", "text": "Push a GitHub Actions workflow to all the repositories."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Push a GitHub Actions CodeQL workflow to the repositories to enable code scanning."}, {"key": "AZ-400|T5|Q53", "topic": 5, "question": 53, "url": "https://www.examtopics.com/discussions/microsoft/view/146364-exam-az-400-topic-5-question-53-discussion/", "text": "HOTSPOT\n-\nYou have a GitHub repository that contains a workflow named WF1. WF1 is used to build code for an app named App1.\nYou need to add a build status badge to the README.md file in the repository for App1.\nHow should you complete the URL for the badge? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image125.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q54", "topic": 5, "question": 54, "url": "https://www.examtopics.com/discussions/microsoft/view/146724-exam-az-400-topic-5-question-54-discussion/", "text": "You have a GitHub repository.\nYou need to create a tag named v3.0.5 and ensure that the tag is available in the remote repository.\nWhich two commands should you run? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "git push -force"}, {"letter": "B", "text": "git push origin v3.0.5"}, {"letter": "C", "text": "git tag v3.0.5"}, {"letter": "D", "text": "git commit -m ‘tag v3.0.5’"}, {"letter": "E", "text": "git add ‘tag v3.0.5’"}], "community": "BC", "type": "multiple-choice", "images": [], "kiro_answer": "BC", "kiro_rationale": "git tag v3.0.5 (C) creates the tag; git push origin v3.0.5 (B) publishes it to the remote."}, {"key": "AZ-400|T5|Q55", "topic": 5, "question": 55, "url": "https://www.examtopics.com/discussions/microsoft/view/146725-exam-az-400-topic-5-question-55-discussion/", "text": "You have a GitHub repository.\nYou need to ensure that all changes to code are validated by your company’s security department before the main branch is deployed.\nWhich two actions can you perform? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Require signed commits."}, {"letter": "B", "text": "Create a branch protection rule for the feature branches."}, {"letter": "C", "text": "Create a LICENSE file."}, {"letter": "D", "text": "Create a branch protection rule for the main branch."}, {"letter": "E", "text": "Create a CODEOWNERS file."}], "community": "DE", "type": "multiple-choice", "images": [], "kiro_answer": "DE", "kiro_rationale": "Create a main-branch protection rule (D) requiring review and a CODEOWNERS file (E) assigning the security team as required reviewers."}, {"key": "AZ-400|T5|Q56", "topic": 5, "question": 56, "url": "https://www.examtopics.com/discussions/microsoft/view/146365-exam-az-400-topic-5-question-56-discussion/", "text": "HOTSPOT\n-\nYou have a .NET app named App1.\nYou need to upload App1 to GitHub Packages.\nHow should you complete the command? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image127.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q59", "topic": 5, "question": 59, "url": "https://www.examtopics.com/discussions/microsoft/view/149092-exam-az-400-topic-5-question-59-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository named repo1 and an Azure key vault named kv1.\nIn repo1, you plan to create a workflow named Workflow1 that will deploy a database server by using credentials stored in kv1.\nYou need to ensure that Workflow1 can retrieve the credentials from kv1.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nNOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image175.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q1", "topic": 6, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/78941-exam-az-400-topic-6-question-1-discussion/", "text": "Your company has 60 developers who are assigned to four teams. Each team has 15 members.\nThe company uses an agile development methodology.\nYou need to structure the work of the development teams so that each team owns their respective work while working together to reach a common goal.\nWhich parts of the taxonomy should you enable the team to perform autonomously?", "choices": [{"letter": "A", "text": "Features and Tasks"}, {"letter": "B", "text": "Initiatives and Epics"}, {"letter": "C", "text": "Epics and Features"}, {"letter": "D", "text": "Stories and Tasks"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Teams own Epics and Features autonomously while contributing to shared higher-level goals."}, {"key": "AZ-400|T6|Q2", "topic": 6, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/35806-exam-az-400-topic-6-question-2-discussion/", "text": "Your company creates a new Azure DevOps team.\nYou plan to use Azure DevOps for sprint planning.\nYou need to visualize the flow of your work by using an agile methodology.\nWhich Azure DevOps component should you use?", "choices": [{"letter": "A", "text": "Kanban boards"}, {"letter": "B", "text": "sprint planning"}, {"letter": "C", "text": "delivery plans"}, {"letter": "D", "text": "portfolio backlogs"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Kanban boards visualize the flow of work in an agile methodology."}, {"key": "AZ-400|T6|Q3", "topic": 6, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/35745-exam-az-400-topic-6-question-3-discussion/", "text": "Your company implements an Agile development methodology.\nYou plan to implement retrospectives at the end of each sprint.\nWhich three questions should you include? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Who performed well?"}, {"letter": "B", "text": "Who should have performed better?"}, {"letter": "C", "text": "What could have gone better?"}, {"letter": "D", "text": "What went well?"}, {"letter": "E", "text": "What should we try next?"}], "community": "CDE", "type": "multiple-choice", "images": [], "kiro_answer": "CDE", "kiro_rationale": "Blameless retrospectives ask what went well (D), what could have gone better (C), and what to try next (E) - not who to blame."}, {"key": "AZ-400|T6|Q4", "topic": 6, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/48639-exam-az-400-topic-6-question-4-discussion/", "text": "Your team uses an agile development approach.\nYou need to recommend a branching strategy for the team's Git repository. The strategy must meet the following requirements.\n✑ Provide the ability to work on multiple independent tasks in parallel.\n✑ Ensure that checked-in code remains in a releasable state always.\n✑ Ensure that new features can be abandoned at any time.\n✑ Encourage experimentation.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "a single long-running branch without forking"}, {"letter": "B", "text": "multiple long-running branches"}, {"letter": "C", "text": "a single fork per team member"}, {"letter": "D", "text": "a single long-running branch with multiple short-lived feature branches"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "A single long-running (main) branch with short-lived feature branches supports parallel work, releasable main, abandonable features and experimentation."}, {"key": "AZ-400|T6|Q5", "topic": 6, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/48642-exam-az-400-topic-6-question-5-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou integrate a cloud-hosted Jenkins server and a new Azure DevOps deployment.\nYou need Azure DevOps to send a notification to Jenkins when a developer commits changes to a branch in Azure Repos.\nSolution: You create a service hook subscription that uses the build completed event.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. The build-completed event fires on build, not on developer commits to a branch; use a code-pushed event."}, {"key": "AZ-400|T6|Q6", "topic": 6, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/75184-exam-az-400-topic-6-question-6-discussion/", "text": "You have a project in Azure DevOps that has a release pipeline.\nYou need to integrate work item tracking and an Agile project management system to meet the following requirements:\n✑ Ensure that developers can track whether their commits are deployed to production.\n✑ Report the deployment status.\n✑ Minimize integration effort.\nWhich system should you use?", "choices": [{"letter": "A", "text": "Asana"}, {"letter": "B", "text": "Basecamp"}, {"letter": "C", "text": "Trello"}, {"letter": "D", "text": "Jira"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Jira integrates with Azure DevOps for work-item tracking and deployment status with minimal effort among the options."}, {"key": "AZ-400|T6|Q7", "topic": 6, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/74557-exam-az-400-topic-6-question-7-discussion/", "text": "You plan to onboard 10 new developers.\nYou need to recommend a development environment that meets the following requirements:\n✑ Integrates with GitHub\n✑ Provides integrated debugging tools\n✑ Supports remote workers and hot-desking environments\n✑ Supports developers who use browsers, tablets, and Chromebooks\nWhat should you recommend?", "choices": [{"letter": "A", "text": "VS Code"}, {"letter": "B", "text": "Xamarin Studio"}, {"letter": "C", "text": "MonoDevelop"}, {"letter": "D", "text": "Github Codespaces"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "GitHub Codespaces is a browser-accessible (tablet/Chromebook) cloud dev environment with debugging and GitHub integration."}, {"key": "AZ-400|T6|Q8", "topic": 6, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/24172-exam-az-400-topic-6-question-8-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou integrate a cloud-hosted Jenkins server and a new Azure DevOps deployment.\nYou need Azure DevOps to send a notification to Jenkins when a developer commits changes to a branch in Azure Repos.\nSolution: You create an email subscription to an Azure DevOps notification.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. An email subscription notifies people, not Jenkins; use a service hook with the code-pushed event."}, {"key": "AZ-400|T6|Q9", "topic": 6, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/36373-exam-az-400-topic-6-question-9-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou integrate a cloud-hosted Jenkins server and a new Azure DevOps deployment.\nYou need Azure DevOps to send a notification to Jenkins when a developer commits changes to a branch in Azure Repos.\nSolution: You create a service hook subscription that uses the code pushed event.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. A service hook subscription using the code-pushed event notifies Jenkins on commits."}, {"key": "AZ-400|T6|Q10", "topic": 6, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/31555-exam-az-400-topic-6-question-10-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou integrate a cloud-hosted Jenkins server and a new Azure DevOps deployment.\nYou need Azure DevOps to send a notification to Jenkins when a developer commits changes to a branch in Azure Repos.\nSolution: You add a trigger to the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A build pipeline trigger builds on commit; it does not send the notification to Jenkins."}, {"key": "AZ-400|T6|Q11", "topic": 6, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/35766-exam-az-400-topic-6-question-11-discussion/", "text": "You plan to create in Azure DevOps. Multiple developers will work on the project. The developers will work offline frequently and will require access to the full project history while they are offline.\nWhich version control solution should you use?", "choices": [{"letter": "A", "text": "Team Foundation Version Control"}, {"letter": "B", "text": "Git"}, {"letter": "C", "text": "TortoiseSVN"}, {"letter": "D", "text": "Subversion"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Git is distributed, so developers have the full history offline."}, {"key": "AZ-400|T6|Q12", "topic": 6, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/44471-exam-az-400-topic-6-question-12-discussion/", "text": "You plan to onboard 10 new developers.\nYou need to recommend a development environment that meets the following requirements:\n✑ Integrates with GitHub\n✑ Provides integrated debugging tools\n✑ Supports remote workers and hot-desking environments\n✑ Supports developers who use browsers, tablets, and Chromebooks\nWhat should you recommend?", "choices": [{"letter": "A", "text": "VS Code"}, {"letter": "B", "text": "Xamarin Studio"}, {"letter": "C", "text": "MonoDevelop"}, {"letter": "D", "text": "Visual Studio Codespaces"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Visual Studio Codespaces is the browser-accessible cloud dev environment meeting all requirements."}, {"key": "AZ-400|T6|Q13", "topic": 6, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/45695-exam-az-400-topic-6-question-13-discussion/", "text": "You have a build pipeline in Azure Pipelines.\nYou create a Slack App Integration.\nYou need to send build notifications to a Slack channel named #Development.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Create a project-level notification."}, {"letter": "B", "text": "Configure a service connection."}, {"letter": "C", "text": "Create a global notification."}, {"letter": "D", "text": "Creates a service hook subscription."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Create a service hook subscription to send build notifications to the Slack channel."}, {"key": "AZ-400|T6|Q14", "topic": 6, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/36493-exam-az-400-topic-6-question-14-discussion/", "text": "You have an Azure DevOps organization named Contoso and an Azure subscription.\nYou use Azure DevOps to build and deploy a web app named App1. Azure Monitor is configured to generate an email notification in response to alerts generated whenever App1 generates a server-side error.\nYou need to receive notifications in Microsoft Teams whenever an Azure Monitor alert is generated.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Create an Azure Monitor workbook."}, {"letter": "B", "text": "Create an Azure logic app that has an HTTP request trigger."}, {"letter": "C", "text": "Create an Azure logic app that has an Azure DevOps trigger."}, {"letter": "D", "text": "Modify an action group in Azure Monitor."}, {"letter": "E", "text": "Modify the Diagnostics settings in Azure Monitor."}], "community": "BD", "type": "multiple-choice", "images": [], "kiro_answer": "BD", "kiro_rationale": "Create a logic app with an HTTP request trigger (B) and point an Azure Monitor action group webhook at it (D) to post to Teams."}, {"key": "AZ-400|T6|Q15", "topic": 6, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/51071-exam-az-400-topic-6-question-15-discussion/", "text": "HOTSPOT -\nYour company uses Azure DevOps for Git source control.\nYou have a project in Azure DevOps named Contoso App that contains the following repositories:\n✑ https://dev.azure.com/contoso/contoso-app/core-api\n✑ https://dev.azure.com/contoso/contoso-app/core-spa\n✑ https://dev.azure.com/contoso/contoso-app/core-db\nYou need to ensure that developers receive Slack notifications when there are pull requests created for Contoso App.\nWhat should you run in Slack? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0026500004.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q16", "topic": 6, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/57155-exam-az-400-topic-6-question-16-discussion/", "text": "You have an Azure DevOps organization that contains a project named Project1.\nYou need to create a published wiki in Project1.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Modify the Storage settings of Project1."}, {"letter": "B", "text": "In Project1, create an Azure DevOps pipeline."}, {"letter": "C", "text": "In Project1, create an Azure DevOps repository."}, {"letter": "D", "text": "Modify the Team configuration settings of Project1."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A code wiki needs a Git repository first; create a repo in Project1."}, {"key": "AZ-400|T6|Q17", "topic": 6, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/48859-exam-az-400-topic-6-question-17-discussion/", "text": "Your company plans to use an agile approach to software development.\nYou need to recommend an application to provide communication between members of the development team who work in locations around the world. The applications must meet the following requirements:\n✑ Provide the ability to isolate the members of different project teams into separate communication channels and to keep a history of the chats within those channels.\n✑ Be available on Windows 10, Mac OS, iOS, and Android operating systems.\n✑ Provide the ability to add external contractors and suppliers to projects.\n✑ Integrate directly with Azure DevOps.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Microsoft Project"}, {"letter": "B", "text": "Bamboo"}, {"letter": "C", "text": "Microsoft Lync"}, {"letter": "D", "text": "Microsoft Teams"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Microsoft Teams provides channels with history, cross-platform clients, guest access and Azure DevOps integration."}, {"key": "AZ-400|T6|Q18", "topic": 6, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/9784-exam-az-400-topic-6-question-18-discussion/", "text": "You are developing a multi-tier application. The application will use Azure App Service web apps as the front end and an Azure SQL database as the back end.\nThe application will use Azure functions to write some data to Azure Storage.\nYou need to send the Azure DevOps team an email message when the front end fails to return a status code of 200.\nWhich feature should you use?", "choices": [{"letter": "A", "text": "Service Map in Azure Log Analytics"}, {"letter": "B", "text": "availability tests in Azure Application Insights"}, {"letter": "C", "text": "Profiler in Azure Application Insights"}, {"letter": "D", "text": "Application Map in Azure Application Insights"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Application Insights availability tests email the team when the front end stops returning 200."}, {"key": "AZ-400|T6|Q19", "topic": 6, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/73972-exam-az-400-topic-6-question-19-discussion/", "text": "You have a project in Azure DevOps named Project1. Project1 contains a published wiki.\nYou need to change the order of pages in the navigation pane of the published wiki in the Azure DevOps portal.\nWhat should you do?", "choices": [{"letter": "A", "text": "At the root of the wiki, create a file named .order that defines the page hierarchy."}, {"letter": "B", "text": "At the root of the wiki, create a file named wiki.md that defines the page hierarchy."}, {"letter": "C", "text": "Rename the pages in the navigation pane."}, {"letter": "D", "text": "Drag and drop the pages in the navigation pane."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Create a .order file at the wiki root to control page ordering in the navigation pane."}, {"key": "AZ-400|T6|Q20", "topic": 6, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/73973-exam-az-400-topic-6-question-20-discussion/", "text": "DRAG DROP -\nYou have a GitHub organization named org1 and an Azure tenant named Tenant1.\nYou need to enable single sign-on (SSO) in Azure Active Directory (Azure AD) for the users in org1.\nWhich URIs should you use for the SAML configuration in Azure AD? To answer, drag the appropriate URIs to the correct settings. Each URI may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0027000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q21", "topic": 6, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/10249-exam-az-400-topic-6-question-21-discussion/", "text": "Your company plans to use an agile approach to software development.\nYou need to recommend an application to provide communication between members of the development team who work in locations around the world. The applications must meet the following requirements:\n✑ Provide the ability to isolate the members of different project teams into separate communication channels and to keep a history of the chats within those channels.\n✑ Be available on Windows 10, Mac OS, iOS, and Android operating systems.\n✑ Provide the ability to add external contractors and suppliers to projects.\n✑ Integrate directly with Azure DevOps.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Skype for Business"}, {"letter": "B", "text": "Bamboo"}, {"letter": "C", "text": "Octopus"}, {"letter": "D", "text": "Slack"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Slack offers channels with history, cross-platform clients, guest access and Azure DevOps integration."}, {"key": "AZ-400|T6|Q22", "topic": 6, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/78675-exam-az-400-topic-6-question-22-discussion/", "text": "You are designing a YAML template for use with Azure Pipelines. The template will include the outputfile parameter.\nWhich two methods can you use to reference the parameter? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "${{parameters.outputfile}}"}, {"letter": "B", "text": "$(parameters['outputfile'])"}, {"letter": "C", "text": "$(parameters.outputfile)"}, {"letter": "D", "text": "$(parameters[outputfile])"}, {"letter": "E", "text": "${{parameters['outputfile']}}"}], "community": "AE", "type": "multiple-choice", "images": [], "kiro_answer": "AE", "kiro_rationale": "Compile-time template parameters use the ${{ }} syntax: ${{parameters.outputfile}} (A) and ${{parameters['outputfile']}} (E)."}, {"key": "AZ-400|T6|Q23", "topic": 6, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/95966-exam-az-400-topic-6-question-23-discussion/", "text": "You have a pipeline named Pipeline1 in Azure Pipelines.\nYou need to create a service connection to enable Pipeline1 to download a public container image.\nWhich type of service connection should you create?", "choices": [{"letter": "A", "text": "a Docker host"}, {"letter": "B", "text": "a Docker registry"}, {"letter": "C", "text": "Azure Service Fabric"}, {"letter": "D", "text": "Azure Kubernetes Service (AKS)"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use a Docker Registry service connection to pull a public container image."}, {"key": "AZ-400|T6|Q24", "topic": 6, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/95953-exam-az-400-topic-6-question-24-discussion/", "text": "You have a project in Azure DevOps named Project1 that contains a Kanban board named Board1.\nYou create a Microsoft Teams channel and add the Azure Boards app to the channel.\nYou need to ensure that users can create work items in Board1 from Microsoft Teams.\nWhich command should you run?", "choices": [{"letter": "A", "text": "@azure boards subscriptions"}, {"letter": "B", "text": "@azure boards create"}, {"letter": "C", "text": "@azure boards sign in"}, {"letter": "D", "text": "@azure boards link"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Run '@azure boards link' first to connect the channel to the board (then create work items)."}, {"key": "AZ-400|T6|Q25", "topic": 6, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/95835-exam-az-400-topic-6-question-25-discussion/", "text": "You manage a project by using Azure Board, and you manage the project code by using Azure Repos.\nYou have a bug work item that has an ID of 123.\nYou need to set the work item state to Resolved.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "#123 completes"}, {"letter": "B", "text": "#123 Resolved"}, {"letter": "C", "text": "Completed #123"}, {"letter": "D", "text": "Fixes #123"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Azure Repos commit keyword 'Fixes #123' transitions the work item to Resolved."}, {"key": "AZ-400|T6|Q26", "topic": 6, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/95970-exam-az-400-topic-6-question-26-discussion/", "text": "You have an Azure subscription that contains a storage account and 20 virtual machines.\nYou plan to use LogRhythm for aggregation and analysis of the virtual machine logs.\nYou need to configure AzLog to export the logs and push them to the storage account.\nIn which format should you export the logs?", "choices": [{"letter": "A", "text": "JSON"}, {"letter": "B", "text": "EVTX"}, {"letter": "C", "text": "EVT"}, {"letter": "D", "text": "binary"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Export AzLog logs in JSON format for LogRhythm ingestion via the storage account."}, {"key": "AZ-400|T6|Q27", "topic": 6, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/96173-exam-az-400-topic-6-question-27-discussion/", "text": "DRAG DROP\n-\nYou use Exabeam Fusion SIEM and the Azure cloud platform.\nYou need to integrate Exabeam and Azure. The solution must use OAuth authentication.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image30.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q28", "topic": 6, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/95836-exam-az-400-topic-6-question-28-discussion/", "text": "You use GitHub for source control and Azure Boards for project management. GitHub and Azure Boards are integrated.\nYou plan to create a pull request in GitHub.\nYou need to automatically link the request to an existing Azure Boards work item by using the text of AB#.\nTo which two elements can you add the text? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "milestone"}, {"letter": "B", "text": "label"}, {"letter": "C", "text": "title"}, {"letter": "D", "text": "comment"}, {"letter": "E", "text": "description"}], "community": "CE", "type": "multiple-choice", "images": [], "kiro_answer": "CE", "kiro_rationale": "AB# linking works from the PR title (C) and description (E)."}, {"key": "AZ-400|T6|Q29", "topic": 6, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/111209-exam-az-400-topic-6-question-29-discussion/", "text": "HOTSPOT\n-\nYou are using Agile process methodologies in Azure DevOps.\nYou need to deploy a dashboard that will provide progress reports for the following work items:\n•\tHow long it took to close a work item after it was created.\n•\tHow long it took to close a work item after the work was started.\nWhich type of widget should you use for each work item? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image48.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q30", "topic": 6, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/111458-exam-az-400-topic-6-question-30-discussion/", "text": "You are integrating an Azure Boards project and a GitHub repository.\nYou need to authenticate Azure Boards to GitHub.\nWhich two authentication methods can you use? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "a publisher certificate"}, {"letter": "B", "text": "a trusted root certificate"}, {"letter": "C", "text": "Microsoft Azure Active Directory (Azure AD), part of Microsoft Entra"}, {"letter": "D", "text": "GitHub user credentials"}, {"letter": "E", "text": "a personal access token (PAT)"}], "community": "DE", "type": "multiple-choice", "images": [], "kiro_answer": "DE", "kiro_rationale": "Azure Boards authenticates to GitHub via GitHub username/password credentials (D) or a personal access token (E)."}, {"key": "AZ-400|T6|Q31", "topic": 6, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/111392-exam-az-400-topic-6-question-31-discussion/", "text": "You have a GitHub repository that is integrated with Azure Boards. Azure Boards has a work item that has the number 715.\nYou need to ensure that when you commit source code in GitHub, the work item is updated automatically.\nWhat should you include in the commit comments?", "choices": [{"letter": "A", "text": "the URL of the work item"}, {"letter": "B", "text": "AB#715"}, {"letter": "C", "text": "@715"}, {"letter": "D", "text": "#715"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use AB#715 in the GitHub commit to update the linked Azure Boards work item."}, {"key": "AZ-400|T6|Q32", "topic": 6, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/111395-exam-az-400-topic-6-question-32-discussion/", "text": "You are creating a dashboard in Azure Boards.\nYou need to visualize the time from when work starts on a work item until the work item is closed.\nWhich type of widget should you use?", "choices": [{"letter": "A", "text": "cycle time"}, {"letter": "B", "text": "velocity"}, {"letter": "C", "text": "cumulative flow"}, {"letter": "D", "text": "lead time"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Cycle time measures from work start to closed (lead time is creation to closed)."}, {"key": "AZ-400|T6|Q33", "topic": 6, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/111393-exam-az-400-topic-6-question-33-discussion/", "text": "You manage a project by using Azure Boards. You manage the project code by using GitHub.\nYou have three work items that have IDs of 456, 457, and 458.\nYou need to create a pull request that will be linked to all the work items. The solution must set the state of work item 456 to done.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "Fixes #456, #457, #458"}, {"letter": "B", "text": "Fixes #AB456, #AB457, #AB458"}, {"letter": "C", "text": "#456, #457, #458 Completed #456"}, {"letter": "D", "text": "#AB456, #AB457, #AB458"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "In Azure Repos, 'Fixes #456, #457, #458' links all three and resolves them (matches this item's key)."}, {"key": "AZ-400|T6|Q34", "topic": 6, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/114836-exam-az-400-topic-6-question-34-discussion/", "text": "You manage code by using GitHub.\nYou plan to ensure that all GitHub Actions are validated by a security team.\nYou create a branch protection rule requiring that code changes be reviewed by code owners.\nYou need to create the CODEOWNERS file.\nWhere should you create the file?", "choices": [{"letter": "A", "text": ".github/actions/"}, {"letter": "B", "text": ".github/"}, {"letter": "C", "text": ".git/"}, {"letter": "D", "text": ".github/workflows/"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "CODEOWNERS lives in the .github/ directory (or repo root)."}, {"key": "AZ-400|T6|Q35", "topic": 6, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/115136-exam-az-400-topic-6-question-35-discussion/", "text": "DRAG DROP\n-\nYou are implementing a new project in Azure DevOps.\nYou need to assess the performance of the project. The solution must identify the following metrics:\n•\tHow long it takes to complete a work item\n•\tThe percentage of defects found in production\nWhich DevOps KPI should you review for each metric? To answer, drag the appropriate KPIs to the correct metrics. Each KPI may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image78.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q36", "topic": 6, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/114837-exam-az-400-topic-6-question-36-discussion/", "text": "You manage a project by using Azure Boards. You manage the project code by using GitHub.\nYou have three work items that have IDs of 456, 457, and 458.\nYou need to create a pull request that will be linked to all the work items. The solution must set the state of work item 456 to done.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "Done #456, #457, #458"}, {"letter": "B", "text": "#AB456, #AB457, #AB458"}, {"letter": "C", "text": "#456, #457, #458 Completed #456"}, {"letter": "D", "text": "#AB456, #AB457, #AB458 Completed #AB456"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "For GitHub-linked boards, '#AB456, #AB457, #AB458 Completed #AB456' links all and completes 456."}, {"key": "AZ-400|T6|Q37", "topic": 6, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/122251-exam-az-400-topic-6-question-37-discussion/", "text": "You have an Azure subscription that contains an Azure container registry. The container registry contains an ACR Tasks task named Task1. Task1 is configured to run once every five days.\nYou need to trigger Task1 to run immediately.\nWhich command should you run?", "choices": [{"letter": "A", "text": "az acr task run"}, {"letter": "B", "text": "az acr build"}, {"letter": "C", "text": "az acr taskrun"}, {"letter": "D", "text": "az acr run"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "az acr task run triggers an existing ACR Task immediately."}, {"key": "AZ-400|T6|Q38", "topic": 6, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/122516-exam-az-400-topic-6-question-38-discussion/", "text": "You manage a project by using Azure Boards. You manage the project code by using GitHub.\nYou have three work items that have IDs of 456, 457, and 458.\nYou need to create a pull request that will be linked to all the work items. The solution must set the state of work item 456 to done.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "#AB456, #AB457, #AB458 Completed #AB456"}, {"letter": "B", "text": "#456, #457, #458 Completed #456"}, {"letter": "C", "text": "Done #AB456, #AB457, #AB458"}, {"letter": "D", "text": "#AB456, #AB457, #AB458 Verifies #AB456"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "'#AB456, #AB457, #AB458 Completed #AB456' links all three and sets 456 to done (GitHub-linked board)."}, {"key": "AZ-400|T6|Q39", "topic": 6, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/122515-exam-az-400-topic-6-question-39-discussion/", "text": "You manage projects by using Azure Boards.\nYou have a current work item name itemA that is dependant on a work item named itemB.\nYou need to define the dependency for itemA.\nWhat should you do in the web portal for Azure DevOps?", "choices": [{"letter": "A", "text": "Add a Parent link to the user story of itemA."}, {"letter": "B", "text": "From Backlogs, open the context menu, select Add link, and then select itemA. Set Link type to Successor and add the ID of itemB."}, {"letter": "C", "text": "From itemA, open the Links tab, and then select Add link. Set Link type to References and add the ID of itemB."}, {"letter": "D", "text": "From Backlogs, open he context menu, select Add link, and then select itemA. Set Link type to References and add the ID of itemB."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Add a Successor link on itemA pointing to itemB to express the dependency."}, {"key": "AZ-400|T6|Q40", "topic": 6, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/122517-exam-az-400-topic-6-question-40-discussion/", "text": "You manage projects by using Azure Boards.\nYou have a current work item name itemA that is dependant on a work item named itemB.\nYou need to define the dependency for itemA.\nWhat should you do in the web portal for Azure DevOps?", "choices": [{"letter": "A", "text": "From itemA, open the Links tab, and then select Add link. Set Link type to Related and add the ID of itemB."}, {"letter": "B", "text": "From Backlogs, open the context menu, select Add link, and then select itemA. Set Link type to Successor and add the ID of itemB."}, {"letter": "C", "text": "From itemA, open the Links tab, and then select Add link. Set Link type to References and add the ID of itemB."}, {"letter": "D", "text": "From Queries, open the context menu, select Add link, and then select Existing Item. Set Link type to Affected By and add the ID of itemB."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Add a Successor link from itemA to itemB to define the dependency."}, {"key": "AZ-400|T6|Q41", "topic": 6, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/127148-exam-az-400-topic-6-question-41-discussion/", "text": "You have the services shown in the following table.\nYou manage a project by using Azure Boards.\nYou need to notify the services of build status changes.\nWhich services can be notified by using a webhook?", "choices": [{"letter": "A", "text": "Service1 only"}, {"letter": "B", "text": "Service2 only"}, {"letter": "C", "text": "Service1 and Service2"}], "community": "C", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image96.png"], "kiro_answer": "C", "kiro_rationale": "Both services support webhook notifications for build status changes."}, {"key": "AZ-400|T6|Q42", "topic": 6, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/127149-exam-az-400-topic-6-question-42-discussion/", "text": "DRAG DROP\n-\nYou are using Agile process methodologies and Azure Boards in Azure DevOps.\nYou import the work items shown in the following table.\nYou need to categorize the items.\nWhich state should you assign to each item? To answer, drag the appropriate states to the correct items. Each state may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image97.png", "https://img.examtopics.com/az-400/image98.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q43", "topic": 6, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/131631-exam-az-400-topic-6-question-43-discussion/", "text": "You have an Azure subscription that contains an Azure Pipelines pipeline named Pipeline1 and an app named App1. Pipeline1 is used to automate the building of App1.\nYou have a Slack channel named App1chat that includes an incoming webhook.\nYou need to ensure that when a successful build of App1 is created, a notification is sent to App1chat by using the webhook.\nWhat should you use?", "choices": [{"letter": "A", "text": "a notification"}, {"letter": "B", "text": "an alert rule"}, {"letter": "C", "text": "a subscription"}, {"letter": "D", "text": "an action group"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Create a (Slack) subscription so a successful build posts to the incoming webhook channel."}, {"key": "AZ-400|T6|Q44", "topic": 6, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/131632-exam-az-400-topic-6-question-44-discussion/", "text": "You manage projects by using Azure Boards. You manage project code by using GitHub.\nYou have a work item that has an ID of 123.\nYou need to link work item 123 to a new pull request.\nWhat are two ways to achieve this goal? Each correct answer presents a complete solution.\nNOTE: Each correct solution is worth one point.", "choices": [{"letter": "A", "text": "In the Development section for work item 123, select Add link, and then enter the URL of the pull request."}, {"letter": "B", "text": "To the description of the pull request, add #AB123."}, {"letter": "C", "text": "To work item 123 add a comment that includes the URL of the pull request."}, {"letter": "D", "text": "From work item 123, open the Links tab, select Add link, select Existing item, and then enter the URL of the commit."}], "community": "AB", "type": "multiple-choice", "images": [], "kiro_answer": "AB", "kiro_rationale": "Link via the work item's Development > Add link with the PR URL (A), or add #AB123 to the PR description (B)."}, {"key": "AZ-400|T6|Q45", "topic": 6, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/131858-exam-az-400-topic-6-question-45-discussion/", "text": "DRAG DROP\n-\nYou plan to use Azure DevOps in development processes.\nYou identify the following issues with the existing development processes:\n•\tFrequent discovery of bugs in production\n•\tIncreasing detection of bugs by customers\n•\tSlow resolution of bugs and slow resumption of production\nYou need to implement Key Performance Indicators (KPIs) to track each issue.\nWhich KPI should you implement for each issue? To answer, drag the appropriate KPIs to the correct issues. Each KPI may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image105.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q46", "topic": 6, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/132204-exam-az-400-topic-6-question-46-discussion/", "text": "You manage projects by using Azure Boards.\nYou have a current work item name itemA that is dependant on a work item named itemB.\nYou need to define the dependency for itemA.\nWhat should you do in the web portal for Azure DevOps?", "choices": [{"letter": "A", "text": "Add a Parent link to the user story of itemA."}, {"letter": "B", "text": "From Backlogs, open the context menu, select Add link, and then select itemA. Set Link type to References and add the ID of itemB."}, {"letter": "C", "text": "From itemA, open the Links tab, and then select Add link. Set Link type to References and add the ID of itemB."}, {"letter": "D", "text": "From itemA, open the Links tab, and then select Add link. Set Link type to Successor and add the ID of itemB."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "From itemA, add a Successor link to itemB to define the dependency."}, {"key": "AZ-400|T6|Q47", "topic": 6, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/131377-exam-az-400-topic-6-question-47-discussion/", "text": "You have a project in Azure DevOps named App Project that is used to develop an app named App1. App1Project has an Azure Boards team dashboard that is used to monitor the progress of App1 and track work items.\nYou need to track how long it takes to close a work item once work for the item has commenced.\nWhich type of widget should you add to the dashboard?", "choices": [{"letter": "A", "text": "sprint burndown"}, {"letter": "B", "text": "velocity"}, {"letter": "C", "text": "lead time"}, {"letter": "D", "text": "cycle time"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Cycle time tracks how long to close a work item once work has commenced."}, {"key": "AZ-400|T6|Q48", "topic": 6, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/132205-exam-az-400-topic-6-question-48-discussion/", "text": "You manage a project by using Azure Board, and you manage the project code by using Azure Repos.\nYou have a bug work item that has an ID of 123.\nYou need to set the work item state to Resolved.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "#123 completes"}, {"letter": "B", "text": "Resolves #AB-123"}, {"letter": "C", "text": "Verifies #123"}, {"letter": "D", "text": "Fixes #123"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "'Fixes #123' in an Azure Repos commit resolves the work item."}, {"key": "AZ-400|T6|Q49", "topic": 6, "question": 49, "url": "https://www.examtopics.com/discussions/microsoft/view/149196-exam-az-400-topic-6-question-49-discussion/", "text": "You manage a project by using Azure Boards, and you manage the project code by using GitHub repositories.\nYou have a work item that has an ID of 123.\nYou need to link a commit message in GitHub to work item 123 on the board.\nWhat are two ways to achieve the goal? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "From the Development settings of work item 123, select Add link, and then enter the URL of the commit."}, {"letter": "B", "text": "Add AB#123 to the text of the commit message."}, {"letter": "C", "text": "Add GH-123 to the text of the commit message."}, {"letter": "D", "text": "From the Links settings of work item 123, select Add link, select Existing item, and then enter the URL of the commit."}, {"letter": "E", "text": "To work item 123, add a comment that includes the URL of the commit."}], "community": "AB", "type": "multiple-choice", "images": [], "kiro_answer": "AB", "kiro_rationale": "Link from the work item's Development settings with the commit URL (A), or add AB#123 to the commit message (B)."}, {"key": "AZ-400|T6|Q50", "topic": 6, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/146603-exam-az-400-topic-6-question-50-discussion/", "text": "You have a project in Azure DevOps that uses an Azure Boards board and stores
