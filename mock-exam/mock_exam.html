ate Azure services to the correct assets. Each service may be used once. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0036800001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q76", "topic": 7, "question": 76, "url": "https://www.examtopics.com/discussions/microsoft/view/9789-exam-az-400-topic-7-question-76-discussion/", "text": "You plan to share packages that you wrote, tested, validated, and deployed by using Azure Artifacts.\nYou need to release multiple builds of each package by using a single feed. The solution must limit the release of packages that are in development.\nWhat should you use?", "choices": [{"letter": "A", "text": "local symbols"}, {"letter": "B", "text": "views"}, {"letter": "C", "text": "global symbols"}, {"letter": "D", "text": "upstream sources"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Feed views (@prerelease/@release) release multiple builds from one feed while limiting in-development packages."}, {"key": "AZ-400|T7|Q77", "topic": 7, "question": 77, "url": "https://www.examtopics.com/discussions/microsoft/view/44295-exam-az-400-topic-7-question-77-discussion/", "text": "You have a project in Azure DevOps named Project1. Project1 contains a build pipeline named Pipe1 that builds an application named App1.\nYou have an agent pool named Pool1 that contains a Windows Server 2019-based self-hosted agent. Pipe1 uses Pool1.\nYou plan to implement another project named Project2. Project2 will have a build pipeline named Pipe2 that builds an application named App2.\nApp1 and App2 have conflicting dependencies.\nYou need to minimize the possibility that the two build pipelines will conflict with each other. The solution must minimize infrastructure costs.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add another self-hosted agent."}, {"letter": "B", "text": "Add a Docker Compose task to the build pipelines."}, {"letter": "C", "text": "Change the self-hosted agent to use Red Hat Enterprise Linux (RHEL) 8."}, {"letter": "D", "text": "Create two container jobs."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Use container jobs so the two pipelines' conflicting dependencies are isolated, reusing the same agent (minimal cost)."}, {"key": "AZ-400|T7|Q78", "topic": 7, "question": 78, "url": "https://www.examtopics.com/discussions/microsoft/view/21072-exam-az-400-topic-7-question-78-discussion/", "text": "SIMULATION -\nYou plan to store signed images in an Azure Container Registry instance named az4009940427acr1.\nYou need to modify the SKU for az4009940427acr1 to support the planned images. The solution must minimize costs.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q79", "topic": 7, "question": 79, "url": "https://www.examtopics.com/discussions/microsoft/view/20512-exam-az-400-topic-7-question-79-discussion/", "text": "You manage build pipelines and deployment pipelines by using Azure DevOps.\nYour company has a team of 500 developers. New members are added continually to the team.\nYou need to automate the management of users and licenses whenever possible.\nWhich task must you perform manually?", "choices": [{"letter": "A", "text": "modifying group memberships"}, {"letter": "B", "text": "adding users"}, {"letter": "C", "text": "assigning entitlements"}, {"letter": "D", "text": "procuring licenses"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "License procurement must be done manually; memberships, user adds and entitlements can be automated."}, {"key": "AZ-400|T7|Q80", "topic": 7, "question": 80, "url": "https://www.examtopics.com/discussions/microsoft/view/57386-exam-az-400-topic-7-question-80-discussion/", "text": "HOTSPOT -\nYour company uses Team Foundation Server 2013 (TFS 2013).\nYou plan to migrate to Azure DevOps.\nYou need to recommend a migration strategy that meets the following requirements:\n✑ Preserves the dates of Team Foundation Version Control changesets\n✑ Preserves the changed dates of work items revisions\nMinimizes migration effort -\n✑ Migrates all TFS artifacts\nWhat should you recommend? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0037200006.png", "/assets/media/exam-media/04257/0037300002.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q81", "topic": 7, "question": 81, "url": "https://www.examtopics.com/discussions/microsoft/view/78926-exam-az-400-topic-7-question-81-discussion/", "text": "Your company is building a new solution in Java.\nThe company currently uses a SonarQube server to analyze the code of .NET solutions.\nYou need to analyze and monitor the code quality of the Java solution.\nWhich task types should you add to the build pipeline?", "choices": [{"letter": "A", "text": "Octopus"}, {"letter": "B", "text": "Chef"}, {"letter": "C", "text": "CocoaPods"}, {"letter": "D", "text": "Gradle"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "For a Java project, add the Gradle task to run SonarQube analysis."}, {"key": "AZ-400|T7|Q82", "topic": 7, "question": 82, "url": "https://www.examtopics.com/discussions/microsoft/view/78925-exam-az-400-topic-7-question-82-discussion/", "text": "Your company is building a new solution in Java.\nThe company currently uses a SonarQube server to analyze the code of .NET solutions.\nYou need to analyze and monitor the code quality of the Java solution.\nWhich task types should you add to the build pipeline?", "choices": [{"letter": "A", "text": "Maven"}, {"letter": "B", "text": "CocoaPods"}, {"letter": "C", "text": "Xcode"}, {"letter": "D", "text": "Gulp"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "For a Java/Maven project, add the Maven task to run SonarQube analysis."}, {"key": "AZ-400|T7|Q83", "topic": 7, "question": 83, "url": "https://www.examtopics.com/discussions/microsoft/view/78973-exam-az-400-topic-7-question-83-discussion/", "text": "You have an Azure subscription named Subscription1 that contains a custom Azure policy named Policy1. Policy1 is an audit policy that monitors naming convention compliance for the resources deployed to Subscription1.\nYou have a pipeline named Pipeline1 in Azure Pipelines. Pipeline1 deploys Azure Resource Manager (ARM) resources to Subscription1.\nYou need to ensure that the resources deployed by Pipeline1 comply with Policy1.\nWhat should you add to Pipeline1?", "choices": [{"letter": "A", "text": "a pre-deployment task that runs a security and compliance assessment"}, {"letter": "B", "text": "a post-deployment task that runs a security and compliance assessment"}, {"letter": "C", "text": "an ARM template deployment task to assign Policy1 to Subscription1"}, {"letter": "D", "text": "an ARM template deployment task to deploy Policy1 to Subscription1"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Add a post-deployment task that runs a security and compliance assessment to verify Policy1 compliance."}, {"key": "AZ-400|T7|Q84", "topic": 7, "question": 84, "url": "https://www.examtopics.com/discussions/microsoft/view/74181-exam-az-400-topic-7-question-84-discussion/", "text": "HOTSPOT -\nYou plan to use Desired State Configuration (DSC) to maintain the configuration state of virtual machines that run Windows Server.\nYou need to perform the following:\n✑ Install Internet Information Services (IIS) on the virtual machines.\n✑ Update the default home page of the IIS web server.\nHow should you configure the DSC configuration file? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0038000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q85", "topic": 7, "question": 85, "url": "https://www.examtopics.com/discussions/microsoft/view/78975-exam-az-400-topic-7-question-85-discussion/", "text": "You have a project in Azure DevOps.\nYou need to push notifications about pull requests to a Microsoft Teams channel. The solution must minimize development effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "Install the Azure Pipelines app for Teams and configure a subscription to receive notifications in the channel."}, {"letter": "B", "text": "Use Azure Automation to connect to the Azure DevOps REST API and send messages to Teams."}, {"letter": "C", "text": "Install the Azure Repos app for Teams and configure a subscription to receive notifications in the channel."}, {"letter": "D", "text": "Use an Azure function to connect to the Azure DevOps REST API and send messages to Teams."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Install the Azure Repos app for Teams and subscribe to PR notifications (minimal effort)."}, {"key": "AZ-400|T7|Q86", "topic": 7, "question": 86, "url": "https://www.examtopics.com/discussions/microsoft/view/79317-exam-az-400-topic-7-question-86-discussion/", "text": "HOTSPOT -\nYou are creating a YAML-based Azure pipeline to deploy an Azure Data Factory instance that has the following requirements:\n✑ If a Data Factory instance exists already, the instance must be overwritten.\n✑ No other resources in a resource group named Fabrikam must be affected.\nHow should you complete the code? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0038400001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q87", "topic": 7, "question": 87, "url": "https://www.examtopics.com/discussions/microsoft/view/95983-exam-az-400-topic-7-question-87-discussion/", "text": "You have an Azure DevOps project that produces Node Package Manager (npm) packages. Multiple projects consume the packages.\nYou need to configure Azure Artifacts to ensure that both the latest and pre-release versions of the packages are available for consumption.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create two feed views named @prerelease and @release, Set @release as the default view. Configure a release pipeline that tags the packages as release after successful testing."}, {"letter": "B", "text": "Create a feed view named @prerelease. Configure a release pipeline that tags the packages as release after successful testing."}, {"letter": "C", "text": "Create two feed views named @prerelease and @default. Configure a release pipeline that promotes a package to the @default view after successful testing."}, {"letter": "D", "text": "Create two feed views named @prerelease and @release. Set @release as the default view. Configure a release pipeline that promotes a package to the @release view after successful testing."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Create @prerelease and @release views, set @release default, and promote packages to @release after testing."}, {"key": "AZ-400|T7|Q88", "topic": 7, "question": 88, "url": "https://www.examtopics.com/discussions/microsoft/view/96141-exam-az-400-topic-7-question-88-discussion/", "text": "You have an Azure subscription that contains the resources shown in the following table.\nProject produces npm packages that are published to Feed1. Feed1 is consumed by multiple projects.\nYou need to ensure that only tested packages are available for consumption. The solution must minimize development effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create a feed view named @release and set @release as the default view. After the npm packages test successfully, configure a release pipeline that promotes a package to the @release view."}, {"letter": "B", "text": "Create a feed view named @release and set @release as the default view. After the npm packages test successfully, configure a release pipeline that tags the packages as release."}, {"letter": "C", "text": "Create a feed view named @default. After the npm packages test successfully, configure a release pipeline that tags the packages as release."}, {"letter": "D", "text": "Create a feed view named @default. After the npm packages test successfully, configure a release pipeline that promotes a package to the @default view."}], "community": null, "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image32.png"], "kiro_answer": "A", "kiro_rationale": "Create an @release view set as default and promote packages to it after they pass tests (minimal effort)."}, {"key": "AZ-400|T7|Q89", "topic": 7, "question": 89, "url": "https://www.examtopics.com/discussions/microsoft/view/96143-exam-az-400-topic-7-question-89-discussion/", "text": "Your company has an Azure DevOps project that produces Node Package Manager (npm) packages. Multiple projects consume the packages.\nYou need to minimize the amount of disk space used by older packages in Azure Artifacts.\nWhat should you modify?", "choices": [{"letter": "A", "text": "the retention settings of the project’s release"}, {"letter": "B", "text": "the retention settings of the project’s pipeline"}, {"letter": "C", "text": "the retention settings of the project’s tests"}, {"letter": "D", "text": "the retention settings of the company pipeline"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Modify the pipeline's retention settings to reduce disk used by older packages/artifacts."}, {"key": "AZ-400|T8|Q1", "topic": 8, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/48636-exam-az-400-topic-8-question-1-discussion/", "text": "HOTSPOT -\nYou manage the Git repository for a large enterprise application.\nYou need to minimize the data size of the repository.\nHow should you complete the commands? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0039900001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q2", "topic": 8, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/37479-exam-az-400-topic-8-question-2-discussion/", "text": "SIMULATION -\nYou plan to deploy a template named D:\\Deploy.json to a resource group named Deploy-lod123456789.\nYou need to modify the template to meet the following requirements, and then to deploy the template:\n✑ The address space must be reduced to support only 256 total IP addresses.\n✑ The subnet address space must be reduced to support only 64 total IP addresses.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q3", "topic": 8, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/94802-exam-az-400-topic-8-question-3-discussion/", "text": "SIMULATION -\nYou need to configure an Azure web app named az400-123456789-main to contain an environmental variable named `MAX_ITEMS`. The environmental variable must have a value of 50.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q4", "topic": 8, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/17731-exam-az-400-topic-8-question-4-discussion/", "text": "DRAG DROP -\nYou provision an Azure Kubernetes Service (AKS) cluster that has RBAC enabled. You have a Helm chart for a client application.\nYou need to configure Helm and Tiller on the cluster and install the chart.\nWhich three commands should you recommend be run in sequence? To answer, move the appropriate commands from the list of commands to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0040700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q5", "topic": 8, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/23761-exam-az-400-topic-8-question-5-discussion/", "text": "Your company builds a multi-tier web application.\nYou use Azure DevOps and host the production application on Azure virtual machines.\nYour team prepares an Azure Resource Manager template of the virtual machine that you will use to test new features.\nYou need to create a staging environment in Azure that meets the following requirements:\n✑ Minimizes the cost of Azure hosting\n✑ Provisions the virtual machines automatically\n✑ Uses the custom Azure Resource Manager template to provision the virtual machines\nWhat should you do?", "choices": [{"letter": "A", "text": "In Azure Cloud Shell, run Azure CLI commands to create and delete the new virtual machines in a staging resource group."}, {"letter": "B", "text": "In Azure DevOps, configure new tasks in the release pipeline to deploy to Azure Cloud Services."}, {"letter": "C", "text": "From Azure Cloud Shell, run Azure PowerShell commands to create and delete the new virtual machines in a staging resource group."}, {"letter": "D", "text": "In Azure DevOps, configure new tasks in the release pipeline to create and delete the virtual machines in Azure DevTest Labs."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Use Azure DevTest Labs release tasks to auto-create/delete VMs from the ARM template, minimizing cost."}, {"key": "AZ-400|T8|Q6", "topic": 8, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/20895-exam-az-400-topic-8-question-6-discussion/", "text": "DRAG DROP -\nYou are implementing an Azure DevOps strategy for mobile devices using App Center.\nYou plan to use distribution groups to control access to releases.\nYou need to create the distribution groups shown in the following table.\nWhich type of distribution group should you use for each group? To answer, drag the appropriate group types to the correct locations. Each group type may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0040900004.png", "/assets/media/exam-media/04257/0041000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q7", "topic": 8, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/87249-exam-az-400-topic-8-question-7-discussion/", "text": "SIMULATION -\nYou need to ensure that the https://contoso.com/statushook webhook is called every time a repository named az400123456789acr1 receives a new version of an image named dotnetapp.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q8", "topic": 8, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/74072-exam-az-400-topic-8-question-8-discussion/", "text": "HOTSPOT -\nYou need to create deployment files for an Azure Kubernetes Service (AKS) cluster. The deployments must meet the provisioning storage requirements shown in the following table.\nWhich resource type should you use for each deployment? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0041300001.png", "/assets/media/exam-media/04257/0041300002.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q9", "topic": 8, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/35917-exam-az-400-topic-8-question-9-discussion/", "text": "Your company uses Azure DevOps to manage the build and release processes for applications.\nYou use a Git repository for applications source control.\nYou plan to create a new branch from an existing pull request. Later, you plan to merge the new branch and the target branch of the pull request.\nYou need to use a pull request action to create the new branch. The solution must ensure that the branch uses only a portion of the code in the pull request.\nWhich pull request action should you use?", "choices": [{"letter": "A", "text": "Set as default branch"}, {"letter": "B", "text": "Approve with suggestions"}, {"letter": "C", "text": "Cherry-pick"}, {"letter": "D", "text": "Reactivate"}, {"letter": "E", "text": "Revert"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Cherry-pick creates a new branch with only the selected commits from the pull request."}, {"key": "AZ-400|T8|Q10", "topic": 8, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/48920-exam-az-400-topic-8-question-10-discussion/", "text": "DRAG DROP -\nYou manage the Git repository for a large enterprise application.\nDuring the development of the application, you use a file named Config.json.\nYou need to prevent Config.json from being committed to the source control whenever changes to the application are committed.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0041600001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q11", "topic": 8, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/35765-exam-az-400-topic-8-question-11-discussion/", "text": "You are designing a build pipeline in Azure Pipelines.\nThe pipeline requires a self-hosted agent. The build pipeline will run once daily and will take 30 minutes to complete.\nYou need to recommend a compute type for the agent. The solution must minimize costs.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "an Azure Kubernetes Service (AKS) cluster"}, {"letter": "B", "text": "Azure Container Instances"}, {"letter": "C", "text": "an Azure virtual machine scale set"}, {"letter": "D", "text": "Azure virtual machines"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Azure Container Instances run the short daily job and stop, minimizing cost vs always-on VMs."}, {"key": "AZ-400|T8|Q12", "topic": 8, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/49156-exam-az-400-topic-8-question-12-discussion/", "text": "HOTSPOT -\nYou are finalizing a release in GitHub.\nYou need to apply the following labels to the release:\n✑ Name\n✑ Email\n✑ Release v3.0\n✑ Release date\nHow should you complete the git command? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0041900001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q13", "topic": 8, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/31239-exam-az-400-topic-8-question-13-discussion/", "text": "You have a project in Azure DevOps. You have an Azure Resource Group deployment project in Microsoft Visual Studio that is checked in to the Azure DevOps project.\nYou need to create a release pipeline that will deploy resources by using Azure Resource Manager templates. The solution must minimize administrative effort.\nWhich task type should you include in the solution?", "choices": [{"letter": "A", "text": "Azure Cloud Service Deployment"}, {"letter": "B", "text": "Azure RM Web App Deployment"}, {"letter": "C", "text": "Azure PowerShell"}, {"letter": "D", "text": "Azure App Service Manage"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Use the Azure PowerShell (or ARM template deployment) task to deploy the Visual Studio Resource Group project. NOTE: community voted C; an ARM template deployment task is also valid - verify."}, {"key": "AZ-400|T8|Q14", "topic": 8, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/48936-exam-az-400-topic-8-question-14-discussion/", "text": "DRAG DROP -\nYour company has a project in Azure DevOps.\nYou plan to create a release pipeline that will deploy resources by using Azure Resource Manager templates. The templates will reference secrets stored in Azure\nKey Vault.\nYou need to recommend a solution for accessing eployment conditions for the last stage of the pipeline."}, {"letter": "C", "text": "Add an agentless job to the pipeline."}, {"letter": "D", "text": "Modify the service hooks for the project."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Modify the pipeline's Integrations options to automatically add release info to associated work items."}, {"key": "AZ-400|T8|Q17", "topic": 8, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/88199-exam-az-400-topic-8-question-17-discussion/", "text": "SIMULATION -\nYou plan to add a new web farm that will be published by using an IP address of 10.0.0.5.\nYou need to allow traffic from the web farm to an Azure Database for MySQL server named az400-123456789-mysql.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q18", "topic": 8, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/24981-exam-az-400-topic-8-question-18-discussion/", "text": "Your company has a release pipeline in an Azure DevOps project.\nYou plan to deploy to an Azure Kubernetes Services (AKS) cluster by using the Helm package and deploy task.\nYou need to install a service in the AKS namespace for the planned deployment.\nWhich service should you install?", "choices": [{"letter": "A", "text": "Azure Container Registry"}, {"letter": "B", "text": "Chart"}, {"letter": "C", "text": "Kubectl"}, {"letter": "D", "text": "Tiller"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Helm v2 requires Tiller installed in the AKS namespace for the deploy task."}, {"key": "AZ-400|T8|Q19", "topic": 8, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/17871-exam-az-400-topic-8-question-19-discussion/", "text": "SIMULATION -\nYou need to creat ": "B", "kiro_rationale": "No. 'Time between re-evaluation of gates' is for gates, not the approval timeout."}, {"key": "AZ-400|T8|Q29", "topic": 8, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/6822-exam-az-400-topic-8-question-29-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an approval process that contains a condition. The condition requires that releases be approved by a team leader before they are deployed.\nYou have a policy stating that approvals must occur within eight hours.\nYou discover that deployment fail if the approvals take longer than two hours.\nYou need to ensure that the deployments only fail if the approvals take longer than eight hours.\nSolution: From Pre-deployment conditions, you modify the Time between re-evaluation of gates option.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Gate re-evaluation time doesn't control the approval timeout."}, {"key": "AZ-400|T8|Q30", "topic": 8, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/17035-exam-az-400-topic-8-question-30-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an approval process that contains a condition. The condition requires that releases be approved by a team leader before they are deployed.\nYou have a policy stating that approvals must occur within eight hours.\nYou discover that deployment fail if the approvals take longer than two hours.\nYou need to ensure that the deployments only fail if the approvals take longer than eight hours.\nSolution: From Pre-deployment conditions, you modify the Timeout setting for pre-deployment approvals.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Modify the pre-deployment approval Timeout setting to allow up to eight hours."}, {"key": "AZ-400|T8|Q31", "topic": 8, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/17038-exam-az-400-topic-8-question-31-discussion/", "text": "DRAG DROP -\nYou are defining release strategies for two applications as shown in the following table.\nWhich release strategy should you use for each application? To answer, drag the appropriate release strategies to the correct applications. Each release strategy may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0045000001.png", "/assets/media/exam-media/04257/0045100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q32", "topic": 8, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/35523-exam-az-400-topic-8-question-32-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an approval process that contains a condition. The condition requires that releases be approved by a team leader before they are deployed.\nYou have a policy stating that approvals must occur within eight hours.\nYou discover that deployment fail if the approvals take longer than two hours.\nYou need to ensure that the deployments only fail if the approvals take longer than eight hours.\nSolution: From Post-deployment conditions, you modify the Timeout setting for post-deployment approvals.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. The failing approval is pre-deployment, so changing the post-deployment timeout doesn't help."}, {"key": "AZ-400|T8|Q33", "topic": 8, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/48821-exam-az-400-topic-8-question-33-discussion/", "text": "DRAG DROP -\nYou have an Azure DevOps organization named Contoso.\nYou have 10 Azure virtual machines that run Windows Server 2019. The virtual machines host an application that you build and deploy by using Azure Pipelines.\nEach virtual machine has the Web Server (IIS) role installed and configured.\nYou need to ensure that the web server configurations on the virtual machines is maintained automatically. The solution must provide centralized management of the configuration settings and minimize management overhead.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0045300001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q34", "topic": 8, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/48973-exam-az-400-topic-8-question-34-discussion/", "text": "You have a free tier of an Azure DevOps organization named Contoso. Contoso contains 10 private projects. Each project has multiple jobs with no dependencies. The build process requires access to resource files located in an on-premises file system.\nYou frequently run the jobs on five self-hosted agents but experience long build times and frequently queued builds.\nYou need to minimize the number of queued builds and the time it takes to run the builds.\nWhat should you do?", "choices": [{"letter": "A", "text": "Configure the pipelines to use the Microsoft-hosted agents."}, {"letter": "B", "text": "Register additional self-hosted agents."}, {"letter": "C", "text": "Purchase self-hosted parallel jobs."}, {"letter": "D", "text": "Purchase Microsoft-hosted parallel jobs."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Purchasing self-hosted parallel jobs lets the existing on-prem agents run more builds concurrently."}, {"key": "AZ-400|T8|Q35", "topic": 8, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/94816-exam-az-400-topic-8-question-35-discussion/", "text": "SIMULATION -\nYou need to ensure that an Azure web app named az400-123456789-main supports rolling upgrades. The solution must ensure that only 10 percent of users who connect to az400-123456789-main use update versions of the app.\nThe solution must minimize administrative effort.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q36", "topic": 8, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/20475-exam-az-400-topic-8-question-36-discussion/", "text": "You have an Azure DevOps project named Project1 and an Azure subscription named Sub1. Sub1 contains an Azure SQL database named DB1.\nYou need to create a release pipeline that uses the Azure SQL Database Deployment task to update DB1.\nWhich artifact should you deploy?", "choices": [{"letter": "A", "text": "a BACPAC"}, {"letter": "B", "text": "a DACPAC"}, {"letter": "C", "text": "an LDF file"}, {"letter": "D", "text": "an MDF file"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "The Azure SQL Database Deployment task deploys a DACPAC."}, {"key": "AZ-400|T8|Q37", "topic": 8, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/20313-exam-az-400-topic-8-question-37-discussion/", "text": "HOTSPOT -\nYou have a project in Azure DevOps.\nYou plan to create a build pipeline that will deploy resources by using Azure Resource Manager templates. The templates will reference secrets stored in Azure\nKey Vault.\nYou need to ensure that you can dynamically generate the resource ID of the key vault during template deployment.\nWhat should you include in the template? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0046000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q38", "topic": 8, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/11446-exam-az-400-topic-8-question-38-discussion/", "text": "Your company has a project in Azure DevOps for a new web application.\nThe company uses ServiceNow for change management.\nYou need to ensure that a change request is processed before any components can be deployed to the production environment.\nWhat are two ways to integrate ServiceNow into the Azure DevOps release pipeline? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Define a deployment control that invokes the ServiceNow REST API."}, {"letter": "B", "text": "Define a pre-deployment gate before the deployment to the Prod stage."}, {"letter": "C", "text": "Define a deployment control that invokes the ServiceNow SOAP API."}, {"letter": "D", "text": "Define a post-deployment gate after the deployment to the QA stage."}], "community": "BD", "type": "multiple-choice", "images": [], "kiro_answer": "BD", "kiro_rationale": "Add a ServiceNow pre-deployment gate before Prod (B) or a post-deployment gate after QA (D) to enforce change management."}, {"key": "AZ-400|T8|Q39", "topic": 8, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/37406-exam-az-400-topic-8-question-39-discussion/", "text": "Your company develops an application named App1 that is deployed in production.\nAs part of an application update, a new service is being added to App1. The new service requires access to an application named App2 that is currently in development.\nYou need to ensure that you can deploy the update to App1 before App2 becomes available. You must be able to enable the service in App1 once App2 is deployed.\nWhat should you do?", "choices": [{"letter": "A", "text": "Implement a feature flag."}, {"letter": "B", "text": "Create a fork in the build."}, {"letter": "C", "text": "Create a branch in the build."}, {"letter": "D", "text": "Implement a branch policy."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A feature flag lets you ship App1 with the new service disabled and enable it once App2 is live."}, {"key": "AZ-400|T8|Q40", "topic": 8, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/10950-exam-az-400-topic-8-question-40-discussion/", "text": "You have a private distribution group that contains provisioned and unprovisioned devices.\nYou need to distribute a new iOS application to the distribution group by using Microsoft Visual Studio App Center.\nWhat should you do?", "choices": [{"letter": "A", "text": "Request the Apple ID associated with the user of each device."}, {"letter": "B", "text": "Register the devices on the Apple Developer portal."}, {"letter": "C", "text": "Create an active subscription in App Center Test."}, {"letter": "D", "text": "Add the device owner to the organization in App Center."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Register the devices on the Apple Developer portal so the unprovisioned ones can install the iOS app."}, {"key": "AZ-400|T8|Q41", "topic": 8, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/22442-exam-az-400-topic-8-question-41-discussion/", "text": "You are developing an iOS application by using Azure DevOps.\nYou need to test the application manually on 10 devices without releasing the application to the public.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Create a Microsoft Intune device compliance policy."}, {"letter": "B", "text": "Deploy a certificate from an internal certification authority (CA) to each device."}, {"letter": "C", "text": "Register the application in the iTunes store."}, {"letter": "D", "text": "Onboard the devices into Microsoft Intune."}, {"letter": "E", "text": "Distribute a new release of the application."}, {"letter": "F", "text": "Register the IDs of the devices in the Apple Developer portal."}], "community": "EF", "type": "multiple-choice", "images": [], "kiro_answer": "EF", "kiro_rationale": "Register the device IDs in the Apple Developer portal (F) and distribute a new release to the devices (E)."}, {"key": "AZ-400|T8|Q42", "topic": 8, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/57990-exam-az-400-topic-8-question-42-discussion/", "text": "You have a private distribution group that contains provisioned and unprovisioned devices.\nYou need to distribute a new iOS application to the distribution group by using Microsoft Visual Studio App Center.\nWhat should you do?", "choices": [{"letter": "A", "text": "Select Register devices and sign my app."}, {"letter": "B", "text": "Create an active subscription in App Center Test."}, {"letter": "C", "text": "Create an unsigned build."}, {"letter": "D", "text": "Add the device owner to the collaborators group."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Select 'Register devices and sign my app' so App Center provisions and re-signs for the unprovisioned devices."}, {"key": "AZ-400|T8|Q43", "topic": 8, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/121081-exam-az-400-topic-8-question-43-discussion/", "text": "SIMULATION -\nYou plan to deploy a website that will be hosted in two Azure regions.\nYou need to create an Azure Traffic Manager profile named az400123456789n1-tm in a resource group named RG1lod123456789. The solution must ensure that users will always connect to a copy of the website that is in the same country.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q44", "topic": 8, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/10511-exam-az-400-topic-8-question-44-discussion/", "text": "Your company has an on-premises Bitbucket Server that is used for Git-based source control. The server is protected by a firewall that blocks inbound Internet traffic.\nYou plan to use Azure DevOps to manage the build and release processes.\nWhich two components are required to integrate Azure DevOps and Bitbucket? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "a deployment group"}, {"letter": "B", "text": "a Microsoft-hosted agent"}, {"letter": "C", "text": "service hooks"}, {"letter": "D", "text": "a self-hosted agent"}, {"letter": "E", "text": "an External Git service connection"}], "community": "DE", "type": "multiple-choice", "images": [], "kiro_answer": "DE", "kiro_rationale": "A self-hosted agent (D) reaches the firewalled Bitbucket server and an External Git service connection (E) links it to Azure DevOps."}, {"key": "AZ-400|T8|Q45", "topic": 8, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/50001-exam-az-400-topic-8-question-45-discussion/", "text": "HOTSPOT -\nYour company uses Git as a source code control system for a complex app named App1.\nYou plan to add a new functionality to App1.\nYou need to design a branching model for the new functionality.\nWhich branch lifetime and branch time should you use in the branching model? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0047100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q46", "topic": 8, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/74767-exam-az-400-topic-8-question-46-discussion/", "text": "You have a project in Azure DevOps.\nYou plan to deploy a self-hosted agent by using an unattended configuration script.\nWhich two values should you define in the configuration script? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "authorization credentials"}, {"letter": "B", "text": "the project name"}, {"letter": "C", "text": "the deployment group name"}, {"letter": "D", "text": "the organization URL"}, {"letter": "E", "text": "the agent pool name"}], "community": "AD", "type": "multiple-choice", "images": [], "kiro_answer": "AD", "kiro_rationale": "An unattended agent config needs authorization credentials/PAT (A) and the organization URL (D)."}, {"key": "AZ-400|T8|Q47", "topic": 8, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/74855-exam-az-400-topic-8-question-47-discussion/", "text": "HOTSPOT -\nYou have an Azure virtual machine named VM1 that runs Linux.\nYou plan to deploy the Desired State Configuration (DSC) extension to VM1.\nYou need to grant the Log Analytics agent the appropriate directory permissions.\nHow should you complete the command? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0047400001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q48", "topic": 8, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/74410-exam-az-400-topic-8-question-48-discussion/", "text": "HOTSPOT -\nYou are using PowerShell to administer Azure Log Analytics workspaces.\nYou need to list the available workspaces and their properties.\nHow should you complete the command? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0047500001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q49", "topic": 8, "question": 49, "url": "https://www.examtopics.com/discussions/microsoft/view/75928-exam-az-400-topic-8-question-49-discussion/", "text": "You have Azure Pipelines and GitHub integrated as a source code repository.\nThe build pipeline has continuous integration enabled.\nYou plan to trigger an automated build whenever code changes are committed to the repository.\nYou need to ensure that the system will wait until a build completes before queuing another build.\nWhat should you implement?", "choices": [{"letter": "A", "text": "path filters"}, {"letter": "B", "text": "batch changes"}, {"letter": "C", "text": "scheduled builds"}, {"letter": "D", "text": "branch filters"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Enable 'Batch changes' so the system waits for the current build to finish before queuing the next."}, {"key": "AZ-400|T8|Q50", "topic": 8, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/74560-exam-az-400-topic-8-question-50-discussion/", "text": "You are using GitHub as a source code repository.\nYou create a client-side Git hook on the commit-msg event. The hook requires that each commit message contain a custom work item tag.\nYou need to make a commit that does not have a work item tag.\nWhich git commit parameter should you use?", "choices": [{"letter": "A", "text": "--squash"}, {"letter": "B", "text": "--no-verify"}, {"letter": "C", "text": "--message ''"}, {"letter": "D", "text": "--no-post-rewrite"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "git commit --no-verify bypasses the client-side commit-msg hook."}, {"key": "AZ-400|T8|Q51", "topic": 8, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/82874-exam-az-400-topic-8-question-51-discussion/", "text": "You have a private distribution group that contains provisioned and unprovisioned devices.\nYou need to distribute a new iOS application to the distribution group by using Microsoft Visual Studio App Center.\nWhat should you do?", "choices": [{"letter": "A", "text": "Select Register devices and sign my app."}, {"letter": "B", "text": "Create an active subscription in App Center Test."}, {"letter": "C", "text": "Add the device owner to the organization in App Center."}, {"letter": "D", "text": "Create an unsigned build."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Select 'Register devices and sign my app' to distribute to provisioned and unprovisioned devices."}, {"key": "AZ-400|T8|Q52", "topic": 8, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/79255-exam-az-400-topic-8-question-52-discussion/", "text": "DRAG DROP -\nYou need to deploy Internet Information Services (IIS) to an Azure virtual machine that runs Windows Server 2019.\nHow should you complete the Desired State Configuration (DSC) configuration script? To answer, drag the appropriate values to the correct locations. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0047900001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q53", "topic": 8, "question": 53, "url": "https://www.examtopics.com/discussions/microsoft/view/79257-exam-az-400-topic-8-question-53-discussion/", "text": "HOTSPOT -\nYou plan to use Desired State Configuration (DSC) to maintain the configuration of a server that runs Windows Server 2019.\nThe server must have the following features installed:\n✑ A web server\n✑ An email server\nHow should you complete the DSC configuration file? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0048100001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q54", "topic": 8, "question": 54, "url": "https://www.examtopics.com/discussions/microsoft/view/82875-exam-az-400-topic-8-question-54-discussion/", "text": "You have a private distribution group that contains provisioned and unprovisioned devices.\nYou need to distribute a new iOS application to the distribution group by using Microsoft Visual Studio App Center.\nWhat should you do?", "choices": [{"letter": "A", "text": "Register the devices on the Apple Developer portal."}, {"letter": "B", "text": "Add the device owner to the organization in App Center."}, {"letter": "C", "text": "Create an unsigned build."}, {"letter": "D", "text": "Add the device owner to the collaborators group."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Register the devices on the Apple Developer portal so the iOS app can install on unprovisioned devices."}, {"key": "AZ-400|T8|Q55", "topic": 8, "question": 55, "url": "https://www.examtopics.com/discussions/microsoft/view/35914-exam-az-400-topic-8-question-55-discussion/", "text": "Your company uses Azure Artifacts for package management.\nYou need to configure an upstream source in Azure Artifacts for Python packages.\nWhich repository type should you use as an upstream source?", "choices": [{"letter": "A", "text": "npmjs.org"}, {"letter": "B", "text": "PyPI"}, {"letter": "C", "text": "Maven Central"}, {"letter": "D", "text": "third-party trusted Python"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use PyPI as the upstream source repository type for Python packages."}, {"key": "AZ-400|T8|Q56", "topic": 8, "question": 56, "url": "https://www.examtopics.com/discussions/microsoft/view/79000-exam-az-400-topic-8-question-56-discussion/", "text": "You have a GitHub repository that contains workflows. The workflows contain steps that execute predefined actions. Each action has one or more versions.\nYou need to request the specific version of an action to execute.\nWhich three attributes can you use to identify the version? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "the SHA-based hashes"}, {"letter": "B", "text": "the tag"}, {"letter": "C", "text": "the runner"}, {"letter": "D", "text": "the branch"}, {"letter": "E", "text": "the serial"}], "community": "ABD", "type": "multiple-choice", "images": [], "kiro_answer": "ABD", "kiro_rationale": "A GitHub action version can be pinned by SHA hash (A), tag (B) or branch (D)."}, {"key": "AZ-400|T8|Q57", "topic": 8, "question": 57, "url": "https://www.examtopics.com/discussions/microsoft/view/79008-exam-az-400-topic-8-question-57-discussion/", "text": "You have an Azure subscription that contains multiple Azure pipelines.\nYou need to deploy a monitoring solution for the pipelines. The solution must meet the following requirements:\n✑ Parse logs from multiple sources.\n✑ Identify the root cause of issues.\nWhat advanced feature of a monitoring tool should you include in the solution?", "choices": [{"letter": "A", "text": "analytics"}, {"letter": "B", "text": "synthetic monitoring"}, {"letter": "C", "text": "directed monitoring"}, {"letter": "D", "text": "Alert Management"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Analytics parses logs from multiple sources and helps identify root cause."}, {"key": "AZ-400|T8|Q58", "topic": 8, "question": 58, "url": "https://www.examtopics.com/discussions/microsoft/view/79010-exam-az-400-topic-8-question-58-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou use Azure Pipelines to build and test a React.js application.\nYou have a pipeline that has a single job.\nYou discover that installing JavaScript packages from npm takes approximately five minutes each time you run the pipeline.\nYou need to recommend a solution to reduce the pipeline execution time.\nSolution: You recommend using pipeline artifacts.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Pipeline artifacts pass files between stages; they do not eliminate the npm install time."}, {"key": "AZ-400|T8|Q59", "topic": 8, "question": 59, "url": "https://www.examtopics.com/discussions/microsoft/view/79011-exam-az-400-topic-8-question-59-discussion/", "text": "You use GitHub for source control of .NET applications.\nYou need to deploy a documentation solution that meets the following requirements:\n✑ Documents will be written in Markdown as developers make code changes.\n✑ Changes to the documents will trigger the recompilation of a static website.\n✑ Users will access the documents from the static website.\n✑ Documents will be stored in a GitHub repository.\nWhich two tools can you use to compile the website? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Word Press"}, {"letter": "B", "text": "Jekyll"}, {"letter": "C", "text": "DocFX"}, {"letter": "D", "text": "caret"}, {"letter": "E", "text": "Medium"}], "community": "BC", "type": "multiple-choice", "images": [], "kiro_answer": "BC", "kiro_rationale": "Jekyll (B) and DocFX (C) compile Markdown into a static documentation website."}, {"key": "AZ-400|T8|Q60", "topic": 8, "question": 60, "url": "https://www.examtopics.com/discussions/microsoft/view/79016-exam-az-400-topic-8-question-60-discussion/", "text": "You have an on-premises app named App1 that accesses Azure resources by using credentials stored in a configuration file.\nYou plan to upgrade App1 to use an Azure service principal.\nWhat is required for App1 to programmatically sign in to Azure Active Directory (Azure AD)?", "choices": [{"letter": "A", "text": "the application ID, a client secret, and the object ID"}, {"letter": "B", "text": "a client secret, the object ID, and the tenant ID"}, {"letter": "C", "text": "the application ID, a client secret, and the tenant ID"}, {"letter": "D", "text": "the application ID, a client secret, and the subscription ID"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A service principal sign-in needs the application (client) ID, a client secret, and the tenant ID."}, {"key": "AZ-400|T8|Q61", "topic": 8, "question": 61, "url": "https://www.examtopics.com/discussions/microsoft/view/79332-exam-az-400-topic-8-question-61-discussion/", "text": "HOTSPOT -\nYou have a virtual machine that runs Windows Server 2019 and is managed by using Desired State Configuration (DSC).\nYou have the following DSC configuration.\nYou have the following Local Configuration Manager (LCM) configuration.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0048900001.jpg", "/assets/media/exam-media/04257/0049000001.jpg", "/assets/media/exam-media/04257/0049000002.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q62", "topic": 8, "question": 62, "url": "https://www.examtopics.com/discussions/microsoft/view/79338-exam-az-400-topic-8-question-62-discussion/", "text": "DRAG DROP -\nYou have a web app named App1 that is hosted on multiple servers. App1 uses Application Insights in Azure Monitor.\nYou need to compare the daily CPU usage from the last week for all servers.\nHow should you complete the query? To answer, drag the appropriate values to the correct targets.    Each value may be used once, more than once, or not at all.\nYou may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0049200001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q63", "topic": 8, "question": 63, "url": "https://www.examtopics.com/discussions/microsoft/view/79020-exam-az-400-topic-8-question-63-discussion/", "text": "You have an Azure subscription that contains 50 virtual machines.\nYou plan to manage the configuration of the virtual machines by using Azure Automation State Configuration.\nYou need to create the Desired State Configuration (DSC) configuration files.\nHow should you structure the code blocks?", "choices": [{"letter": "A", "text": "Node > Configuration > Resource"}, {"letter": "B", "text": "Configuration > Resource > Node"}, {"letter": "C", "text": "Resource > Configuration > Node"}, {"letter": "D", "text": "Configuration > Node > Resource"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "DSC structure is Configuration > Node > Resource."}, {"key": "AZ-400|T8|Q64", "topic": 8, "question": 64, "url": "https://www.examtopics.com/discussions/microsoft/view/79022-exam-az-400-topic-8-question-64-discussion/", "text": "Your team uses Azure Pipelines to deploy applications.\nYou need to ensure that when a failure occurs during the build or release process, all the team members are notified by using Microsoft Teams. The solution must minimize development effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "Install the Azure Boards app for Teams and configure a subscription to receive notifications in a channel."}, {"letter": "B", "text": "Use Azure Automation to connect to the Azure DevOps REST API and notify the team members."}, {"letter": "C", "text": "Use an Azure function to connect to the Azure DevOps REST API and notify the team members."}, {"letter": "D", "text": "Install the Azure Pipelines app for Teams and configure a subscription to receive notifications in a channel."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Install the Azure Pipelines app for Teams and subscribe to failure notifications (minimal effort)."}, {"key": "AZ-400|T8|Q65", "topic": 8, "question": 65, "url": "https://www.examtopics.com/discussions/microsoft/view/79341-exam-az-400-topic-8-question-65-discussion/", "text": "DRAG DROP -\nYou have an app named App1. You have a Log Analytics workspace named Workspace1 that contains a table named AppEvents. App1 writes logs to\nWorkspace1.\nYou need to query the AppEvents table. The solution must meet the following requirements:\n✑ Only query rows for a column named Name that starts with the following text: \"Clicked Create New Ticket.\"\n✑ Calculate the number of daily clicks per user.\n✑ Return the top 10 users based on their number of clicks for any day.\n✑ Sort the results based on the highest number of clicks.\n✑ Ignore any users who have less than three daily clicks.\nIn which order should you arrange the query statements? To answer, move all statements from the list of statements to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0049400006.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q66", "topic": 8, "question": 66, "url": "https://www.examtopics.com/discussions/microsoft/view/96016-exam-az-400-topic-8-question-66-discussion/", "text": "HOTSPOT\n-\nYou have an Azure subscription that contains two resource groups named ContosoRG and ContosoDev, an Azure data factory named Contoso Data Factory, and a release pipeline in Azure Pipelines named Pipeline1.\nYou plan to deploy Contoso Data Factory to ContosoRG by using Pipeline1.\nYou add the Azure Resource Manager (ARM) template deployment task shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image35.png", "https://img.examtopics.com/az-400/image36.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q67", "topic": 8, "question": 67, "url": "https://www.examtopics.com/discussions/microsoft/view/96015-exam-az-400-topic-8-question-67-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Pipeline.\nYou need to store configuration values as variables.\nAt which four scopes can the variables be defined, and what is the precedence of the variables from the highest precedence to lowest precedence? To answer, move the appropriate scope from the list of scopes to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image38.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q68", "topic": 8, "question": 68, "url": "https://www.examtopics.com/discussions/microsoft/view/96017-exam-az-400-topic-8-question-68-discussion/", "text": "You have a project in Azure DevOps named Project1 that contains two environments named environment1 and environment2.\nWhen a new version of Project is released, the latest version is deployed to environment2, and the previous version is redeployed to environment1.\nYou need to distribute users across the environments. The solution must meet the following requirements:\n•\tNew releases must be available to only a subset of the users.\n•\tYou must gradually increase the number of users that can access environment2.\nWhat should you use?", "choices": [{"letter": "A", "text": "VIP swaping"}, {"letter": "B", "text": "web app deployment slots"}, {"letter": "C", "text": "Azure Load Balancer"}, {"letter": "D", "text": "Azure Traffic Manager"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Azure Traffic Manager gradually shifts a growing subset of users to environment2 (weighted routing)."}, {"key": "AZ-400|T8|Q69", "topic": 8, "question": 69, "url": "https://www.examtopics.com/discussions/microsoft/view/95996-exam-az-400-topic-8-question-69-discussion/", "text": "DRAG DROP\n-\nYou are designing a versioning strategy for Git-based packages.\nYou plan to use a Semantic Versioning (SemVer)-based strategy.\nYou need to identify when to change the build version.\nWhat should you identify for each scenario? To answer, drag the appropriate versions to the correct scenarios. Each version may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image40.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q70", "topic": 8, "question": 70, "url": "https://www.examtopics.com/discussions/microsoft/view/96018-exam-az-400-topic-8-question-70-discussion/", "text": "You use Calendar Versioning (CalVer) for code assets.\nYou need to store an optional tag of beta as part of the version.\nWhich part of the version should you use for the tag?", "choices": [{"letter": "A", "text": "minor"}, {"letter": "B", "text": "major"}, {"letter": "C", "text": "micro"}, {"letter": "D", "text": "modifier"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "In CalVer, an optional tag like 'beta' goes in the modifier segment."}, {"key": "AZ-400|T8|Q71", "topic": 8, "question": 71, "url": "https://www.examtopics.com/discussions/microsoft/view/95985-exam-az-400-topic-8-question-71-discussion/", "text": "DRAG DROP\n-\nYou have an Azure subscription that uses Azure Automation State Configuration to manage the configuration of virtual machines.\nYou need to identify which nodes are noncompliant.\nHow should you complete the query? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image42.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q72", "topic": 8, "question": 72, "url": "https://www.examtopics.com/discussions/microsoft/view/96179-exam-az-400-topic-8-question-72-discussion/", "text": "You have a project in Azure DevOps named Project1.\nYou need to ensure that all new pipelines in Project1 execute three specific tasks during pipeline execution.\nWhat should you create?", "choices": [{"letter": "A", "text": "a task group"}, {"letter": "B", "text": "a JSON template"}, {"letter": "C", "text": "a YAML template"}, {"letter": "D", "text": "a PowerShell task"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Create a task group so the three tasks can be reused across new pipelines. NOTE: for YAML pipelines a template is preferred; community voted C - verify per pipeline type."}, {"key": "AZ-400|T8|Q73", "topic": 8, "question": 73, "url": "https://www.examtopics.com/discussions/microsoft/view/96180-exam-az-400-topic-8-question-73-discussion/", "text": "HOTSPOT -\nYou have a project in Azure DevOps that contains a release pipeline. The pipeline contains two stages named QA and Prod. QA deploys code to an Azure web app named webapp1. Prod deploys code to an Azure web app named webapp2.\nYou need to ensure that code deployments to webapp2 are blocked if Azure Application Insights generates Failed requests alerts following the deployment of new code to webapp1.\nWhat should you do for each stage? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image44.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q74", "topic": 8, "question": 74, "url": "https://www.examtopics.com/discussions/microsoft/view/95964-exam-az-400-topic-8-question-74-discussion/", "text": "You use Azure DevOps processes to build and deploy code.\nYou need to compare how much time is spent troubleshooting issues found during development and how much time is spent troubleshooting issues found in released code.\nWhich KPI should you use?", "choices": [{"letter": "A", "text": "defect escape rate"}, {"letter": "B", "text": "unplanned work rate"}, {"letter": "C", "text": "defect rate"}, {"letter": "D", "text": "rework rate"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Defect escape rate compares defects found in development vs those that escape to released code."}, {"key": "AZ-400|T8|Q75", "topic": 8, "question": 75, "url": "https://www.examtopics.com/discussions/microsoft/view/96185-exam-az-400-topic-8-question-75-discussion/", "text": "You have a project in Azure DevOps named Project1.\nYou implement a Continuous Integration/Continuous Deployment (CI/CD) pipeline that uses PowerShell Desired State Configuration (DSC) to configure the application infrastructure.\nYou need to perform a unit test and an integration test of the configuration before Project1 is deployed.\nWhat should you use?", "choices": [{"letter": "A", "text": "the PSScriptAnalyzer tool"}, {"letter": "B", "text": "the Pester test framework"}, {"letter": "C", "text": "the PSCodeHealth module"}, {"letter": "D", "text": "the Test-DscConfiguration cmdlet"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Pester is the PowerShell test framework for unit/integration testing DSC configurations."}, {"key": "AZ-400|T8|Q76", "topic": 8, "question": 76, "url": "https://www.examtopics.com/discussions/microsoft/view/111401-exam-az-400-topic-8-question-76-discussion/", "text": "You use Azure Repos to manage source code and Azure Pipelines to implement continuous integration and continuous deployment (CI/CD).\nYou need to ensure that all comments on pull requests are resolved before the pull requests are included in a build. The solution must minimize administrative effort.\nWhat should you include in the solution?", "choices": [{"letter": "A", "text": "a custom action"}, {"letter": "B", "text": "a post-deployment gate"}, {"letter": "C", "text": "a branch policy"}, {"letter": "D", "text": "a pre-deployment gate"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A branch policy can require all PR comments to be resolved before completion (minimal effort)."}, {"key": "AZ-400|T8|Q77", "topic": 8, "question": 77, "url": "https://www.examtopics.com/discussions/microsoft/view/111402-exam-az-400-topic-8-question-77-discussion/", "text": "DRAG DROP\n-\nYou have a project in Azure DevOps named Project that has a release pipeline in Azure Pipeline named ReleaseP1.\nYou need to ensure that when a new release is generated for ReleaseP1, a new release note document is created. The release notes must contain new features and bug fixes.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nNOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image68.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T8|Q78", "topic": 8, "question": 78, "url": "https://www.examtopics.com/discussions/microsoft/view/225293-exam-az-400-topic-8-question-78-discussion/", "text": "SIMULATION\n-\nYou need to configure a virtual machine template in a DevTest Labs environment named az400-123456789-dtl1. The operating system must be based on Windows Server 2016 Datacenter. Virtual machines created from the DevTest Lab must include the Selenium tool and the Google Chrome browser.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T9|Q1", "topic": 9, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/111106-exam-az-400-topic-9-question-1-discussion/", "text": "You plan to create an image that will contain a .NET Core application.\nYou have a Dockerfile file that contains the following code. (Line numbers are included for reference only.)\nYou need to ensure that the image is as small as possible when the image is built.\nWhich line should you modify in the file?", "choices": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "3"}, {"letter": "C", "text": "4"}, {"letter": "D", "text": "7"}], "community": "C", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image50.png"], "kiro_answer": "A", "kiro_rationale": "Use a smaller base image on the FROM line to minimize image size. NOTE: depends on the exhibit; verify the FROM line number."}, {"key": "AZ-400|T9|Q2", "topic": 9, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/111327-exam-az-400-topic-9-question-2-discussion/", "text": "You have a project in Azure DevOps named Project1. Project1 contains a build pipeline named Pipe1 that builds an application named App1.\nYou have an agent pool named Pool1 that contains a Windows Server 2022-based self-hosted agent. Pipe1 uses Pool1.\nYou plan to implement another project named Project2. Project2 will have a build pipeline named Pipe2 that builds an application named App2.\nApp1 and App2 have conflicting dependencies.\nYou need to minimize the possibility that the two build pipelines will conflict with each other. The solution must minimize infrastructure costs.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add another self-hosted agent."}, {"letter": "B", "text": "Add a Docker Compose task to the build pipelines."}, {"letter": "C", "text": "Change the self-hosted agent to use Red Hat Enterprise Linux (RHEL) 9."}, {"letter": "D", "text": "Create two container jobs."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Use container jobs to isolate the two pipelines' conflicting dependencies on one agent (minimal cost)."}, {"key": "AZ-400|T9|Q3", "topic": 9, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/110881-exam-az-400-topic-9-question-3-discussion/", "text": "You have an Azure subscription that contains the resources shown in the following table.\nDepPipeline1 and ADFPipeline1 use a single credential that is stored in Vault1.\nYou need to configure ADFPipeline1 to retrieve the credential from Vault1.\nWhich type of activity should you use?", "choices": [{"letter": "A", "text": "Lookup"}, {"letter": "B", "text": "Get Metadata"}, {"letter": "C", "text": "Сoрy"}, {"letter": "D", "text": "Web"}], "community": "D", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image51.png"], "kiro_answer": "D", "kiro_rationale": "Use a Web activity in ADF to retrieve the credential from Key Vault (Vault1)."}, {"key": "AZ-400|T9|Q4", "topic": 9, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/146648-exam-az-400-topic-9-question-4-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou need to use an Azure Pipelines pipeline to test an app. The solution meet the following requirements:\n•\tThe pipeline must fail if any tests fail.\n•\tThe test results must be published to the pipeline.\n•\tThe test for every pipeline run must be triggered unless the pipeline is cancelled.\nSolution: You include the following elements in the YAML definition of the pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": ["https://img.examtopics.com/az-400/image170.png"], "kiro_answer": "B", "kiro_rationale": "No (per this test series' key); the shown YAML misses one of the fail/publish/always-run requirements."}, {"key": "AZ-400|T9|Q5", "topic": 9, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/111503-exam-az-400-topic-9-question-5-discussion/", "text": "You have an Azure web app that is deployed by using Azure Pipelines.\nYou need to ensure that when a new version of the app is deployed to production, you
