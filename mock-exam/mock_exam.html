code in a GitHub repository. The repository contains a file named README.md.\nYou need to ensure that README.md includes the status of the work items on the board. The solution must minimize administrative effort.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Create a GitHub personal access token (PAT)."}, {"letter": "B", "text": "Enable GitHub annotations for the board."}, {"letter": "C", "text": "Install the Azure Boards app for GitHub."}, {"letter": "D", "text": "Select Allow anonymous users to access the status badge."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Install the Azure Boards app for GitHub first to surface board status in README."}, {"key": "AZ-400|T6|Q51", "topic": 6, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/146604-exam-az-400-topic-6-question-51-discussion/", "text": "You manage a project by using Azure Boards, and you manage the project code by using Azure Repos.\nYou have a bug work item that has an ID of 123.\nYou need to set the work item state to Resolved.\nWhat should you add to the commit message?", "choices": [{"letter": "A", "text": "#123 fixed"}, {"letter": "B", "text": "#123 Resolved-"}, {"letter": "C", "text": "Verifies #123-"}, {"letter": "D", "text": "Resolves #123-"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Among the (malformed) options, '#123 fixed' is the closest valid Azure Repos transition keyword to resolve the item."}, {"key": "AZ-400|T6|Q52", "topic": 6, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/146606-exam-az-400-topic-6-question-52-discussion/", "text": "You manage projects by using Azure Boards.\nYou have a current work item named itemA that is dependent on a work item named itemB.\nYou need to define the dependency for itemA.\nWhat should you do in the web portal for Azure DevOps?", "choices": [{"letter": "A", "text": "Add a Parent link to the user story of itemA."}, {"letter": "B", "text": "From Backlogs, open the context menu, select Add link, and then select itemA. Set Link type to Successor and add the ID of itemB."}, {"letter": "C", "text": "From Backlogs, open the context menu, select Add link, and then select itemB. Set Link type to Related and add the ID of itemA."}, {"letter": "D", "text": "From itemA, open the Links tab, and then select Add link. Set Link type to References and add the ID of itemB."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Add a Successor link from itemA to itemB to define the dependency."}, {"key": "AZ-400|T6|Q53", "topic": 6, "question": 53, "url": "https://www.examtopics.com/discussions/microsoft/view/155541-exam-az-400-topic-6-question-53-discussion/", "text": "SIMULATION\n-\nYou need to create a new team dashboard named Dashboard1 for the default project team of Project1.\nThe dashboard must display the members of the team.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q54", "topic": 6, "question": 54, "url": "https://www.examtopics.com/discussions/microsoft/view/151191-exam-az-400-topic-6-question-54-discussion/", "text": "SIMULATION\n-\nFor Project1, you need to create a project wiki named Wiki1 that uses the Mermaid syntax to render a diagram.\nA sample of the desired output is stored in C : \\Resources\\TCPHandshake.png.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T6|Q55", "topic": 6, "question": 55, "url": "https://www.examtopics.com/discussions/microsoft/view/149197-exam-az-400-topic-6-question-55-discussion/", "text": "HOTSPOT\n-\nYou have an Azure DevOps project that is used to build and test an app named App1.\nYou need to troubleshoot the following issues:\n•\tMost bugs are detected and reported by customers.\n•\tIt takes a long time to detect failures.\nWhich metric should you review for each issue? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image177.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q1", "topic": 7, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/79681-exam-az-400-topic-7-question-1-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou need to recommend an integration strategy for the build process of a Java application. The solution must meet the following requirements:\n✑ The build must access an on-premises dependency management system.\n✑ The build outputs must be stored as Server artifacts in Azure DevOps.\n✑ The source code must be stored in a Git repository in Azure DevOps.\nSolution: Configure the build pipeline to use a Microsoft-hosted agent pool running the Windows Server 2019 with Visual Studio 2019 image. Include the Java Tool\nInstaller task in the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A Microsoft-hosted agent cannot access the on-premises dependency management system."}, {"key": "AZ-400|T7|Q2", "topic": 7, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/74716-exam-az-400-topic-7-question-2-discussion/", "text": "You have a project in Azure DevOps.\nYou create the following YAML template named Template1.yml.\nsteps:\n- script: npm install\n- script: yarn install\n- script: npm run compile\nYou create the following pipeline named File1.yml.\nparameters:\nusersteps:\n- task: MyTask@1\n- script: echo Done\nYou need to ensure that Template1.yaml runs before File1.yml.\nHow should you update File1.yml?", "choices": [{"letter": "A", "text": "parameters: usersteps: extends: template: template1.yml - task: MyTask@1 - script: echo Done"}, {"letter": "B", "text": "template: template1.yml parameters: usersteps: - task: MyTask@1 - script: echo Done"}, {"letter": "C", "text": "extends: template: templatel.yml parameters: usersteps: - task: MyTask@1 - script: echo Done"}, {"letter": "D", "text": "parameters: usersteps: - template: templatel.yml - task: MyTask@1 - script: echo Done"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Use 'extends: template: template1.yml' so the template wraps and runs before the user steps."}, {"key": "AZ-400|T7|Q3", "topic": 7, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/75095-exam-az-400-topic-7-question-3-discussion/", "text": "You have an Azure solution that contains a build pipeline in Azure Pipelines.\nYou experience intermittent delays before the build pipeline starts.\nYou need to reduce the time it takes to start the build pipeline.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable self-hosted build agents."}, {"letter": "B", "text": "Create a new agent pool."}, {"letter": "C", "text": "Split the build pipeline into multiple stages."}, {"letter": "D", "text": "Purchase an additional parallel job."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Intermittent start delays are queue waits; purchase an additional parallel job to start sooner."}, {"key": "AZ-400|T7|Q4", "topic": 7, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/74624-exam-az-400-topic-7-question-4-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou need to recommend an integration strategy for the build process of a Java application. The solution must meet the following requirements:\n✑ The build must access an on-premises dependency management system.\n✑ The build outputs must be stored as Server artifacts in Azure DevOps.\n✑ The source code must be stored in a Git repository in Azure DevOps.\nSolution: Configure the build pipeline to use a Microsoft-hosted agent pool running a Linux image. Include the Java Tool Installer task in the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A Microsoft-hosted agent cannot reach the on-premises dependency system."}, {"key": "AZ-400|T7|Q5", "topic": 7, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/35805-exam-az-400-topic-7-question-5-discussion/", "text": "You store source code in a Git repository in Azure Repos. You use a third-party continuous integration (CI) tool to control builds.\nWhat will Azure DevOps use to authenticate with the tool?", "choices": [{"letter": "A", "text": "certificate authentication"}, {"letter": "B", "text": "a personal access token (PAT)"}, {"letter": "C", "text": "a Shared Access Signature (SAS) token"}, {"letter": "D", "text": "NTLM authentication"}] e code must be stored in a Git repository in Azure DevOps.\nSolution: Configure an Octopus Tentacle on an on-premises machine. Use the Package Application task in the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. An Octopus Tentacle is for deployment, not for building with on-prem dependency access into Server artifacts."}, {"key": "AZ-400|T7|Q8", "topic": 7, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/73929-exam-az-400-topic-7-question-8-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou need to recommend an integration strategy for the build process of a Java application. The solution must meet the following requirements:\n✑ The builds must access an on-premises dependency management system.\n✑ The build outputs must be stored as Server artifacts in Azure DevOps.\nThe source code must be stored in a Git repository in Azure DevOps.\nSolution: Install and configure a self-hosted build agent on an on-premises machine. Configure the build pipeline to use the Default agent pool. Include the Java\nTool Installer task in the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": ["/assets/media/exam-media/04257/0028400003.png"], "kiro_answer": "A", "kiro_rationale": "Yes. A self-hosted on-prem agent in the Default pool can reach the on-prem dependency system and publish Server artifacts."}, {"key": "AZ-400|T7|Q9", "topic": 7, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/20894-exam-az-400-topic-7-question-9-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou need to recommend an integration strategy for the build process of a Java application. The solution must meet the following requirements:\n✑ The builds must access an on-premises dependency management system.\n✑ The build outputs must be stored as Server artifacts in Azure DevOps.\n✑ The source code must be stored in a Git repository in Azure DevOps.\nSolution: Configure the build pipeline to use a Hosted VS 2019 agent pool. Include the Java Tool Installer task in the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A hosted agent cannot access the on-premises dependency management system."}, {"key": "AZ-400|T7|Q10", "topic": 7, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/18900-exam-az-400-topic-7-question-10-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou need to recommend an integration strategy for the build process of a Java application. The solution must meet the following requirements:\n✑ The builds must access an on-premises dependency management system.\n✑ The build outputs must be stored as Server artifacts in Azure DevOps.\n✑ The source code must be stored in a Git repository in Azure DevOps.\nSolution: Configure the build pipeline to use a Hosted Ubuntu agent pool. Include the Java Tool Installer task in the build pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A hosted Ubuntu agent cannot reach the on-premises dependency system."}, {"key": "AZ-400|T7|Q11", "topic": 7, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/20529-exam-az-400-topic-7-question-11-discussion/", "text": "Your company uses a Git repository in Azure Repos to manage the source code of a web application. The master branch is protected from direct updates.\nDevelopers work on new features in the topic branches.\nBecause of the high volume of requested features, it is difficult to follow the history of the changes to the master branch.\nYou need to enforce a pull request merge strategy. The strategy must meet the following requirements:\n✑ Consolidate commit histories.\n✑ Merge the changes into a single commit.\nWhich merge strategy should you use in the branch policy?", "choices": [{"letter": "A", "text": "squash merge"}, {"letter": "B", "text": "fast-forward merge"}, {"letter": "C", "text": "Git fetch"}, {"letter": "D", "text": "no-fast-forward merge"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Squash merge consolidates a topic branch's commits into a single commit on master."}, {"key": "AZ-400|T7|Q12", "topic": 7, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/48644-exam-az-400-topic-7-question-12-discussion/", "text": "Your company uses cloud-hosted Jenkins for builds.\nYou need to ensure that Jenkins can retrieve source code from Azure Repos.\nWhich three actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Create a webhook in Jenkins."}, {"letter": "B", "text": "Add the Team Foundation Server (TFS) plug-in to Jenkins."}, {"letter": "C", "text": "Add a personal access token to your Jenkins account."}, {"letter": "D", "text": "Create a personal access token (PAT) in your Azure DevOps account."}, {"letter": "E", "text": "Create a service hook in Azure DevOps."}], "community": "CDE", "type": "multiple-choice", "images": [], "kiro_answer": "CDE", "kiro_rationale": "Create a PAT in Azure DevOps (D), add it to Jenkins (C), and create a service hook in Azure DevOps (E)."}, {"key": "AZ-400|T7|Q13", "topic": 7, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/48645-exam-az-400-topic-7-question-13-discussion/", "text": "DRAG DROP -\nYour company has four projects. The version control requirements for each project are shown in the following table.\nYou plan to use Azure Repos for all the projects.\nWhich version control system should you use for each project? To answer, drag the appropriate version control systems to the correct projects. Each version control system may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0028900001.png", "/assets/media/exam-media/04257/0029000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q14", "topic": 7, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/48646-exam-az-400-topic-7-question-14-discussion/", "text": "You are automating the build process for a Java-based application by using Azure DevOps.\nYou need to add code coverage testing and publish the outcomes to the pipeline.\nWhat should you use?", "choices": [{"letter": "A", "text": "Bullseye Coverage"}, {"letter": "B", "text": "JUnit"}, {"letter": "C", "text": "JaCoCo"}, {"letter": "D", "text": "MSTest"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "JaCoCo provides Java code coverage that publishes to the pipeline."}, {"key": "AZ-400|T7|Q15", "topic": 7, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/48779-exam-az-400-topic-7-question-15-discussion/", "text": "HOTSPOT -\nYou company uses Azure DevOps to deploy infrastructures to Azure.\nPipelines are developed by using YAML.\nYou execute a pipeline and receive the results in the web portal for Azure Pipelines as shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0029300001.jpg", "/assets/media/exam-media/04257/0029400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q16", "topic": 7, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/48778-exam-az-400-topic-7-question-16-discussion/", "text": "DRAG DROP -\nYou are configuring Azure DevOps build pipelines.\nYou plan to use hosted build agents.\nWhich build agent pool should you use to compile each application type? To answer, drag the appropriate build agent pools to the correct application types. Each build agent pool may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0029600001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q17", "topic": 7, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/10251-exam-az-400-topic-7-question-17-discussion/", "text": "You are automating the build process for a Java-based application by using Azure DevOps.\nYou need to add code coverage testing and publish the outcomes to the pipeline.\nWhat should you use?", "choices": [{"letter": "A", "text": "Cobertura"}, {"letter": "B", "text": "Bullseye Coverage"}, {"letter": "C", "text": "MSTest"}, {"letter": "D", "text": "Coverlet"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Cobertura is a supported Java code-coverage format to publish to the pipeline."}, {"key": "AZ-400|T7|Q18", "topic": 7, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/44297-exam-az-400-topic-7-question-18-discussion/", "text": "You have an existing build pipeline in Azure Pipelines.\nYou need to use incremental builds without purging the environment between pipeline executions.\nWhat should you use?", "choices": [{"letter": "A", "text": "a self-hosted agent"}, {"letter": "B", "text": "Microsoft-hosted parallel jobs"}, {"letter": "C", "text": "a File Transform task"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A self-hosted agent preserves the working directory between runs, enabling incremental builds."}, {"key": "AZ-400|T7|Q19", "topic": 7, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/49157-exam-az-400-topic-7-question-19-discussion/", "text": "HOTSPOT -\nYou are designing YAML-based Azure pipelines for the apps shown in the following table.\nYou need to configure the YAML strategy value for each app. The solution must minimize app downtime.\nWhich value should you configure for each app? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0029900001.png", "/assets/media/exam-media/04257/0030000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q20", "topic": 7, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/36244-exam-az-400-topic-7-question-20-discussion/", "text": "You have a private project in Azure DevOps.\nYou need to ensure that a project manager can create custom work item queries to report on the project's progress. The solution must use the principle of least privilege.\nTo which security group should you add the project manager?", "choices": [{"letter": "A", "text": "Reader"}, {"letter": "B", "text": "Project Collection Administrators"}, {"letter": "C", "text": "Project Administrators"}, {"letter": "D", "text": "Contributor"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Contributor lets the PM create and share work item queries (least privilege vs admin)."}, {"key": "AZ-400|T7|Q21", "topic": 7, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/22452-exam-az-400-topic-7-question-21-discussion/", "text": "Your company has a project in Azure DevOps for a new application. The application will be deployed to several Azure virtual machines that run Windows Server\n2019.\nYou need to recommend a deployment strategy for the virtual machines. The strategy must meet the following requirements:\n✑ Ensure that the virtual machines maintain a consistent configuration.\n✑ Minimize administrative effort to configure the virtual machines.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "Azure Resource Manager templates and the PowerShell Desired State Configuration (DSC) extension for Windows"}, {"letter": "B", "text": "Deployment YAML and Azure pipeline deployment groups"}, {"letter": "C", "text": "Azure Resource Manager templates and the Custom Script Extension for Windows"}, {"letter": "D", "text": "Deployment YAML and Azure pipeline stage templates"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "ARM templates plus the PowerShell DSC extension keep VMs consistently configured with low effort."}, {"key": "AZ-400|T7|Q22", "topic": 7, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/44294-exam-az-400-topic-7-question-22-discussion/", "text": "You have an Azure DevOps project that uses many package feeds.\nYou need to simplify the project by using a single feed that stores packages produced by your company and packages consumed from remote feeds. The solution must support public feeds and authenticated feeds.\nWhat should you enable in DevOps?", "choices": [{"letter": "A", "text": "Universal Packages"}, {"letter": "B", "text": "upstream sources"}, {"letter": "C", "text": "views in Azure Artifacts"}, {"letter": "D", "text": "a symbol server"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Upstream sources let one feed combine your packages with public/authenticated remote feeds."}, {"key": "AZ-400|T7|Q23", "topic": 7, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/50325-exam-az-400-topic-7-question-23-discussion/", "text": "DRAG DROP -\nYour company has two virtual machines that run Linux in a third-party public cloud.\nYou plan to use the company's Azure Automation State Configuration implementation to manage the two virtual machines and detect configuration drift.\nYou need to onboard the Linux virtual machines.\nYou install PowerShell Desired State Configuration (DSC) on the virtual machines, and then run register.py.\nWhich three actions should you perform next in sequence? To answer, move the actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0030500001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q24", "topic": 7, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/49165-exam-az-400-topic-7-question-24-discussion/", "text": "SIMULATION -\nYou plan to deploy a runbook that will create Azure AD user accounts.\nYou need to ensure that runbooks can run the Azure PowerShell cmdlets for Azure Active Directory.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q25", "topic": 7, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/74325-exam-az-400-topic-7-question-25-discussion/", "text": "DRAG DROP -\nYou are creating a container for an ASP.NET Core app.\nYou need to create a Dockerfile file to build the image. The solution must ensure that the size of the image is minimized.\nHow should you configure the file? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0031100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q26", "topic": 7, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/49179-exam-az-400-topic-7-question-26-discussion/", "text": "DRAG DROP -\nYou are configuring the settings of a new Git repository in Azure Repos.\nYou need to ensure that pull requests in a branch meet the following criteria before they are merged:\n✑ Committed code must compile successfully.\n✑ Pull requests must have a Quality Gate status of Passed in SonarCloud.\nWhich policy type should you configure for each requirement? To answer, drag the appropriate policy types to the correct requirements. Each policy type may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0031300001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q27", "topic": 7, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/56833-exam-az-400-topic-7-question-27-discussion/", "text": "You use a Git repository in Azure Repos to manage the source code of a web application. Developers commit changes directly to the default branch.\nYou need to implement a change management procedure that meets the following requirements:\n✑ The default branch must be protected, and new changes must be built in the feature branches first.\n✑ Changes must be reviewed and approved by at least one release manager before each merge.\n✑ Changes must be brought into the default branch by using pull requests.\nWhat should you configure in Azure Repos?", "choices": [{"letter": "A", "text": "branch policies of the default branch"}, {"letter": "B", "text": "Services in Project Settings"}, {"letter": "C", "text": "Deployment pools in Project Settings"}, {"letter": "D", "text": "branch security of the default branch"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Branch policies on the default branch enforce PRs, required reviewers and feature-branch workflow."}, {"key": "AZ-400|T7|Q28", "topic": 7, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/30547-exam-az-400-topic-7-question-28-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company uses Azure DevOps to manage the build and release processes for applications.\nYou use a Git repository for applications source control.\nYou need to implement a pull request strategy that reduces the history volume in the master branch.\nSolution: You implement a pull request strategy that uses fast-forward merges.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Fast-forward merges keep all individual commits, not reducing history volume."}, {"key": "AZ-400|T7|Q29", "topic": 7, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/30548-exam-az-400-topic-7-question-29-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company uses Azure DevOps to manage the build and release processes for applications.\nYou use a Git repository for applications source control.\nYou need to implement a pull request strategy that reduces the history volume in the master branch.\nSolution: You implement a pull request strategy that uses squash merges.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Squash merges collapse PR commits into one, reducing master history volume."}, {"key": "AZ-400|T7|Q30", "topic": 7, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/30549-exam-az-400-topic-7-question-30-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company uses Azure DevOps to manage the build and release processes for applications.\nYou use a Git repository for applications source control.\nYou need to implement a pull request strategy that reduces the history volume in the master branch.\nSolution: You implement a pull request strategy that uses an explicit merge.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. An explicit (merge-commit) merge keeps all commits plus a merge commit."}, {"key": "AZ-400|T7|Q31", "topic": 7, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/30550-exam-az-400-topic-7-question-31-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company uses Azure DevOps to manage the build and release processes for applications.\nYou use a Git repository for applications source control.\nYou need to implement a pull request strategy that reduces the history volume in the master branch.\nSolution: You implement a pull request strategy that uses a three-way merge.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A three-way merge retains the full commit history."}, {"key": "AZ-400|T7|Q32", "topic": 7, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/24978-exam-az-400-topic-7-question-32-discussion/", "text": "You need to recommend a Docker container build strategy that meets the following requirements:\n✑ Minimizes image sizes\n✑ Minimizes the security surface area of the final image\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "multi-stage builds"}, {"letter": "B", "text": "PowerShell Desired State Configuration (DSC)"}, {"letter": "C", "text": "Docker Swarm"}, {"letter": "D", "text": "single-stage builds"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Multi-stage Docker builds minimize final image size and attack surface by excluding build tooling."}, {"key": "AZ-400|T7|Q33", "topic": 7, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/9785-exam-az-400-topic-7-question-33-discussion/", "text": "You plan to create an image that will contain a .NET Core application.\nYou have a Dockerfile file that contains the following code. (Line numbers are included for reference only.)\nYou need to ensure that the image is as small as possible when the image is built.\nWhich line should you modify in the file?", "choices": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "3"}, {"letter": "C", "text": "4"}, {"letter": "D", "text": "7"}], "community": "C", "type": "multiple-choice", "images": ["/assets/media/exam-media/04257/0031900001.png"], "kiro_answer": "A", "kiro_rationale": "Use a smaller base image on the FROM line (line 1) to minimize image size. NOTE: depends on the exhibit; verify the FROM line number."}, {"key": "AZ-400|T7|Q34", "topic": 7, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/51184-exam-az-400-topic-7-question-34-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company has a project in Azure DevOps for a new web application.\nYou need to ensure that when code is checked in, a build runs automatically.\nSolution: From the Triggers tab of the build pipeline, you select Batch changes while a build is in progress.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. 'Batch changes' tunes CI batching but is not what enables a build to run on check-in (Enable continuous integration is)."}, {"key": "AZ-400|T7|Q35", "topic": 7, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/51150-exam-az-400-topic-7-question-35-discussion/", "text": "HOTSPOT -\nYou need to deploy Azure Kubernetes Service (AKS) to host an application. The solution must meet the following requirements:\n✑ Containers must only be published internally.\n✑ AKS clusters must be able to create and manage containers in Azure.\nWhat should you use for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0032100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q36", "topic": 7, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/20364-exam-az-400-topic-7-question-36-discussion/", "text": "You have 50 Node.js-based projects that you scan by using WhiteSource. Each project includes Package.json, Package-lock.json, and Npm-shrinkwrap.json files.\nYou need to minimize the number of libraries reports by WhiteSource to only the libraries that you explicitly reference.\nWhat should you do?", "choices": [{"letter": "A", "text": "Configure the File System Agent plug-in."}, {"letter": "B", "text": "Add a devDependencies section to Package-lock.json."}, {"letter": "C", "text": "Configure the Artifactory plug-in."}, {"letter": "D", "text": "Delete Package-lock.json."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Configure the File System Agent plug-in to report only explicitly referenced libraries."}, {"key": "AZ-400|T7|Q37", "topic": 7, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/22957-exam-az-400-topic-7-question-37-discussion/", "text": "Your company deploys applications in Docker containers.\nYou want to detect known exploits in the Docker images used to provision the Docker containers.\nYou need to integrate image scanning into the application lifecycle. The solution must expose the exploits as early as possible during the application lifecycle.\nWhat should you configure?", "choices": [{"letter": "A", "text": "a task executed in the continuous integration pipeline and a scheduled task that analyzes the image registry"}, {"letter": "B", "text": "manual tasks performed during the planning phase and the deployment phase"}, {"letter": "C", "text": "a task executed in the continuous deployment pipeline and a scheduled task against a running production container"}, {"letter": "D", "text": "a task executed in the continuous integration pipeline and a scheduled task that analyzes the production container"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Scan images in the CI pipeline (earliest) plus a scheduled scan of the image registry."}, {"key": "AZ-400|T7|Q38", "topic": 7, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/17732-exam-az-400-topic-7-question-38-discussion/", "text": "Your company has a hybrid cloud between Azure and Azure Stack.\nThe company uses Azure DevOps for its full CI/CD pipelines. Some applications are built by using Erlang and Hack.\nYou need to ensure that Erlang and Hack are supported as part of the build strategy across the hybrid cloud. The solution must minimize management overhead.\nWhat should you use to execute the build pipeline?", "choices": [{"letter": "A", "text": "a Microsoft-hosted agent"}, {"letter": "B", "text": "Azure DevOps self-hosted agents on Azure DevTest Labs virtual machines."}, {"letter": "C", "text": "Azure DevOps self-hosted agents on Hyper-V virtual machines"}, {"letter": "D", "text": "Azure DevOps self-hosted agents on virtual machines that run on Azure Stack"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Run self-hosted agents on VMs in Azure Stack so the hybrid build supports Erlang/Hack with minimal overhead."}, {"key": "AZ-400|T7|Q39", "topic": 7, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/35769-exam-az-400-topic-7-question-39-discussion/", "text": "Your company has an Azure DevOps project,\nThe source code for the project is stored in an on-premises repository and uses on an on-premises build server.\nYou plan to use Azure DevOps to control the build process on the build server by using a self-hosted agent.\nYou need to implement the self-hosted agent.\nYou download and install the agent on the build server.\nWhich two actions should you perform next? Each correct answer presents part of the solution.", "choices": [{"letter": "A", "text": "From Azure, create a shared access signature (SAS)."}, {"letter": "B", "text": "From the build server, create a certificate, and then upload the certificate to Azure Storage."}, {"letter": "C", "text": "From the build server, create a certificate, and then upload the certificate to Azure Key Vault."}, {"letter": "D", "text": "From DevOps, create a personal access token (PAT)."}, {"letter": "E", "text": "From the build server, run config.cmd."}], "community": "DE", "type": "multiple-choice", "images": [], "kiro_answer": "DE", "kiro_rationale": "Create a PAT in Azure DevOps (D) and run config.cmd on the build server to register the agent (E)."}, {"key": "AZ-400|T7|Q40", "topic": 7, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/36127-exam-az-400-topic-7-question-40-discussion/", "text": "You have an Azure subscription that contains an Azure Active Directory (Azure AD) tenant.\nYou are configuring a build pipeline in Azure Pipelines that will include a task named Task1. Task1 will authenticate by using an Azure AD service principal.\nWhich three values should you configure for Task1? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "the tenant ID"}, {"letter": "B", "text": "the subscription ID"}, {"letter": "C", "text": "the client secret"}, {"letter": "D", "text": "the app ID"}, {"letter": "E", "text": "the object ID"}], "community": "ACD", "type": "multiple-choice", "images": [], "kiro_answer": "ACD", "kiro_rationale": "A service principal connection needs the tenant ID (A), client secret (C) and app/client ID (D)."}, {"key": "AZ-400|T7|Q41", "topic": 7, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/48653-exam-az-400-topic-7-question-41-discussion/", "text": "DRAG DROP -\nYou are deploying a new application that uses Azure virtual machines.\nYou plan to use the Desired State Configuration (DSC) extension on the virtual machines.\nYou need to ensure that the virtual machines always have the same Windows feature installed.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0032700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q42", "topic": 7, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/36084-exam-az-400-topic-7-question-42-discussion/", "text": "You need to execute inline testing of an Azure DevOps pipeline that uses a Docker deployment model. The solution must prevent the results from being published to the pipeline.\nWhat should you use for the inline testing?", "choices": [{"letter": "A", "text": "a single stage Dockerfile"}, {"letter": "B", "text": "an Azure Kubernetes Service (AKS) pod"}, {"letter": "C", "text": "a multi-stage Dockerfile"}, {"letter": "D", "text": "a Docker Compose file"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A multi-stage Dockerfile runs tests in a build stage without publishing results to the pipeline."}, {"key": "AZ-400|T7|Q43", "topic": 7, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/35824-exam-az-400-topic-7-question-43-discussion/", "text": "You are designing an Azure DevOps strategy for your company's development team.\nYou suspect that the team's productivity is low due to accumulate technical debt.\nYou need to recommend a metric to assess the amount of the team's technical debt.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "the number of code modules in an application"}, {"letter": "B", "text": "the number of unit test failures"}, {"letter": "C", "text": "the percentage of unit test failures"}, {"letter": "D", "text": "the percentage of overall time spent on rework"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Percentage of time spent on rework is a meaningful technical-debt metric."}, {"key": "AZ-400|T7|Q44", "topic": 7, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/51082-exam-az-400-topic-7-question-44-discussion/", "text": "You are developing an open source solution that uses a GitHub repository.\nYou create a new public project in Azure DevOps.\nYou plan to use Azure Pipelines for continuous build. The solution will use the GitHub Checks API.\nWhich authentication type should you use?", "choices": [{"letter": "A", "text": "OpenID"}, {"letter": "B", "text": "GitHub App"}, {"letter": "C", "text": "a personal access token (PAT)"}, {"letter": "D", "text": "SAML"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use the GitHub App authentication to support the GitHub Checks API."}, {"key": "AZ-400|T7|Q45", "topic": 7, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/20898-exam-az-400-topic-7-question-45-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company has a project in Azure DevOps for a new web application.\nYou need to ensure that when code is checked in, a build runs automatically.\nSolution: From the Continuous deployment trigger settings of the release pipeline, you enable the Pull request trigger setting.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A release pipeline PR trigger does not cause a build to run on code check-in."}, {"key": "AZ-400|T7|Q46", "topic": 7, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/35455-exam-az-400-topic-7-question-46-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company has a project in Azure DevOps for a new web application.\nYou need to ensure that when code is checked in, a build runs automatically.\nSolution: From the Pre-deployment conditions settings of the release pipeline, you select After stage.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Release pre-deployment 'After stage' does not trigger a build on check-in."}, {"key": "AZ-400|T7|Q47", "topic": 7, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/17857-exam-az-400-topic-7-question-47-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company has a project in Azure DevOps for a new web application.\nYou need to ensure that when code is checked in, a build runs automatically.\nSolution: From the Pre-deployment conditions settings of the release pipeline, you select Batch changes while a build is in progress.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. 'Batch changes' on release pre-deployment conditions does not trigger a build on check-in."}, {"key": "AZ-400|T7|Q48", "topic": 7, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/50979-exam-az-400-topic-7-question-48-discussion/", "text": "DRAG DROP -\nYou have an Azure DevOps release pipeline as shown in the following exhibit.\nYou need to complete the pipeline to configure OWASP ZAP for security testing.\nWhich five Azure CLI tasks should you add in sequence? To answer, move the tasks from the list of tasks to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0033300001.jpg", "/assets/media/exam-media/04257/0033400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q49", "topic": 7, "question": 49, "url": "https://www.examtopics.com/discussions/microsoft/view/96494-exam-az-400-topic-7-question-90-discussion/", "text": "DRAG DROP -\nYou have an Azure DevOps pipeline that is used to deploy a Node.js app.\nYou need to ensure that the dependencies are cached between builds.\nHow should you configure the deployment YAML? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image33.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q50", "topic": 7, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/36087-exam-az-400-topic-7-question-50-discussion/", "text": "You have a build pipeline in Azure Pipelines that uses different jobs to compile an application for 10 different architectures.\nThe build pipeline takes approximately one day to complete.\nYou need to reduce the time it takes to execute the build pipeline.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Move to a blue/green deployment pattern"}, {"letter": "B", "text": "Create a deployment group"}, {"letter": "C", "text": "Increase the number of parallel jobs"}, {"letter": "D", "text": "Reduce the size of the repository"}, {"letter": "E", "text": "Create an agent pool"}], "community": "CE", "type": "multiple-choice", "images": [], "kiro_answer": "CE", "kiro_rationale": "Increase parallel jobs (C) and add an agent pool (E) so the 10 architecture jobs run concurrently."}, {"key": "AZ-400|T7|Q51", "topic": 7, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/35990-exam-az-400-topic-7-question-51-discussion/", "text": "You are creating a build pipeline in Azure Pipelines.\nYou define several tests that might fail due to third-party applications.\nYou need to ensure that the build pipeline completes successfully if the third-party applications are unavailable.\nWhat should you do?", "choices": [{"letter": "A", "text": "Configure the build pipeline to use parallel jobs"}, {"letter": "B", "text": "Configure flaky tests"}, {"letter": "C", "text": "Increase the test pass percentage"}, {"letter": "D", "text": "Add the Requirements quality widget to your dashboard"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Configure flaky tests so unreliable third-party-dependent tests don't fail the build."}, {"key": "AZ-400|T7|Q52", "topic": 7, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/48923-exam-az-400-topic-7-question-52-discussion/", "text": "DRAG DROP -\nYou have an Azure subscription that contains a resources group named RG1. RG1 contains the following resources:\n✑ Four Azure virtual machines that run Windows Server and have Internet Information Services (IIS) installed.\n✑ SQL Server on an Azure virtual machine.\n✑ An Azure Load Balancer.\nYou need to deploy an application to the virtual machines in RG1 by using Azure Pipelines.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nNOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0034100001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q53", "topic": 7, "question": 53, "url": "https://www.examtopics.com/discussions/microsoft/view/15958-exam-az-400-topic-7-question-53-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYour company has a project in Azure DevOps for a new web application.\nYou need to ensure that when code is checked in, a build runs automatically.\nSolution: From the Triggers tab of the build pipeline, you select Enable continuous integration.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Enabling continuous integration on the build pipeline triggers a build on check-in."}, {"key": "AZ-400|T7|Q54", "topic": 7, "question": 54, "url": "https://www.examtopics.com/discussions/microsoft/view/7497-exam-az-400-topic-7-question-54-discussion/", "text": "You have an Azure DevOps organization named Contoso and an Azure DevOps project named Project1.\nYou plan to use Microsoft-hosted agents to build container images that will host full Microsoft .NET Framework apps in a YAML pipeline in Project1.\nWhat are two possible virtual machine images that you can use for the Microsoft-hosted agent pool? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "vs2017-win2016"}, {"letter": "B", "text": "ubuntu-16.04"}, {"letter": "C", "text": "win1803"}, {"letter": "D", "text": "macOS-10.13"}, {"letter": "E", "text": "vs.2015-win2012r2"}], "community": "AB", "type": "multiple-choice", "images": [], "kiro_answer": "AC", "kiro_rationale": "Full .NET Framework container builds need Windows images: vs2017-win2016 (A) and win1803 (C)."}, {"key": "AZ-400|T7|Q55", "topic": 7, "question": 55, "url": "https://www.examtopics.com/discussions/microsoft/view/16096-exam-az-400-topic-7-question-55-discussion/", "text": "HOTSPOT -\nYou currently use JIRA, Jenkins, and Octopus as part of your DevOps processes.\nYou plan to use Azure DevOps to replace these tools.\nWhich Azure DevOps service should you use to replace each tool? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0034500001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q56", "topic": 7, "question": 56, "url": "https://www.examtopics.com/discussions/microsoft/view/24979-exam-az-400-topic-7-question-56-discussion/", "text": "Your company has a project in Azure DevOps.\nYou need to ensure that when there are multiple builds pending deployment, only the most recent build is deployed.\nWhat should you use?", "choices": [{"letter": "A", "text": "deployment conditions"}, {"letter": "B", "text": "deployment queue settings"}, {"letter": "C", "text": "release gates"}, {"letter": "D", "text": "pull request triggers"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Deployment queue settings can deploy only the latest build when several are pending."}, {"key": "AZ-400|T7|Q57", "topic": 7, "question": 57, "url": "https://www.examtopics.com/discussions/microsoft/view/16097-exam-az-400-topic-7-question-57-discussion/", "text": "Your company develops a client banking application that processes a large volume of data.\nCode quality is an ongoing issue for the company. Recently, the code quality has deteriorated because of an increase in time pressure on the development team.\nYou need to implement static code analysis.\nDuring which phase should you use static code analysis?", "choices": [{"letter": "A", "text": "integration testing"}, {"letter": "B", "text": "staging"}, {"letter": "C", "text": "production release"}, {"letter": "D", "text": "build"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Static code analysis runs during the build phase."}, {"key": "AZ-400|T7|Q58", "topic": 7, "question": 58, "url": "https://www.examtopics.com/discussions/microsoft/view/48674-exam-az-400-topic-7-question-58-discussion/", "text": "DRAG DROP -\nYou have a project in Azure DevOps that uses packages from multiple public feeds. Some of the feeds are unreliable.\nYou need to consolidate the packages into a single feed.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0034900001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q59", "topic": 7, "question": 59, "url": "https://www.examtopics.com/discussions/microsoft/view/51597-exam-az-400-topic-7-question-59-discussion/", "text": "HOTSPOT -\nYou have the Azure DevOps pipeline shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0035000001.jpg", "/assets/media/exam-media/04257/0035100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q60", "topic": 7, "question": 60, "url": "https://www.examtopics.com/discussions/microsoft/view/96950-exam-az-400-topic-7-question-60-discussion/", "text": "SIMULATION -\nYou have an Azure function hosted in an App Service plan named az400-123456789-func1.\nYou need to configure az400-123456789-func1 to upgrade the functions automatically whenever new code is committed to the master branch of https:// github.com/Azure-Samples/functions-quickstart.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q61", "topic": 7, "question": 61, "url": "https://www.examtopics.com/discussions/microsoft/view/16986-exam-az-400-topic-7-question-61-discussion/", "text": "DRAG DROP -\nYou need to use Azure Automation State Configuration to manage the ongoing consistency of virtual machine configurations.\nWhich five actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nNOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0035400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T7|Q62", "topic": 7, "question": 62, "url": "https://www.examtopics.com/discussions/microsoft/view/30573-exam-az-400-topic-7-question-62-discussion/", "text": "You are developing an application. The application source has multiple branches.\nYou make several changes to a branch used for experimentation.\nYou need to update the main branch to capture the changes made to the experimentation branch and override the history of the Git repository.\nWhich Git option should you use?", "choices": [{"letter": "A", "text": "Rebase"}, {"letter": "B", "text": "Fetch"}, {"letter": "C", "text": "Merge"}, {"letter": "D", "text": "Push"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Rebase rewrites history to bring the experimentation branch changes onto main."}, {"key": "AZ-400|T7|Q63", "topic": 7, "question": 63, "url": "https://www.examtopics.com/discussions/microsoft/view/48983-exam-az-400-topic-7-question-63-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou use Azure Pipelines to build and test a React.js application.\nYou have a pipeline that has a single job.\nYou discover that installing JavaScript packages from npm takes approximately five minutes each time you run the pipeline.\nYou need to recommend a solution to reduce the pipeline execution time.\nSolution: You recommend defining a container job that uses a custom container that has the JavaScript packages preinstalled.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. A custom container image with packages preinstalled removes the npm install time."}, {"key": "AZ-400|T7|Q64", "topic": 7, "question": 64, "url": "https://www.examtopics.com/discussions/microsoft/view/54689-exam-az-400-topic-7-question-64-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou use Azure Pipelines to build and test a React.js application.\nYou have a pipeline that has a single job.\nYou discover that installing JavaScript packages from npm takes approximately five minutes each time you run the pipeline.\nYou need to recommend a solution to reduce the pipeline execution time.\nSolution: You recommend enabling pipeline caching.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Pipeline caching of npm packages reduces repeated install time."}, {"key": "AZ-400|T7|Q65", "topic": 7, "question": 65, "url": "https://www.examtopics.com/discussions/microsoft/view/52902-exam-az-400-topic-7-question-65-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou use Azure Pipelines to build and test a React.js application.\nYou have a pipeline that has a single job.\nYou discover that installing JavaScript packages from npm takes approximately five minutes each time you run the pipeline.\nYou need to recommend a solution to reduce the pipeline execution time.\nSolution: You recommend enabling parallel jobs for the pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Parallel jobs run jobs concurrently but do not remove the npm install time within a single job."}, {"key": "AZ-400|T7|Q66", "topic": 7, "question": 66, "url": "https://www.examtopics.com/discussions/microsoft/view/17036-exam-az-400-topic-7-question-66-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to create a release pipeline that will deploy Azure resources by using Azure Resource Manager templates. The release pipeline will create the following resources:\n✑ Two resource groups\n✑ Four Azure virtual machines in one resource group\n✑ Two Azure SQL databases in other resource group\nYou need to recommend a solution to deploy the resources.\nSolution: Create two standalone templates, each of which will deploy the resources in its respective group.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Two standalone templates require two separate deployments; a single linked/main template is the intended solution."}, {"key": "AZ-400|T7|Q67", "topic": 7, "question": 67, "url": "https://www.examtopics.com/discussions/microsoft/view/20684-exam-az-400-topic-7-question-67-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to create a release pipeline that will deploy Azure resources by using Azure Resource Manager templates. The release pipeline will create the following resources:\n✑ Two resource groups\n✑ Four Azure virtual machines in one resource group\n✑ Two Azure SQL databases in other resource group\nYou need to recommend a solution to deploy the resources.\nSolution: Create a single standalone template that will deploy all the resources.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A single template cannot target two different resource groups in one deployment."}, {"key": "AZ-400|T7|Q68", "topic": 7, "question": 68, "url": "https://www.examtopics.com/discussions/microsoft/view/23590-exam-az-400-topic-7-question-68-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps project.\nYour build process creates several artifacts.\nYou need to deploy the artifacts to on-premises servers.\nSolution: You deploy a Kubernetes cluster on-premises. You deploy a Helm agent to the cluster. You add a Download Build Artifacts task to the deployment pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A Kubernetes/Helm deployment is not the way to copy build artifacts onto generic on-prem servers."}, {"key": "AZ-400|T7|Q69", "topic": 7, "question": 69, "url": "https://www.examtopics.com/discussions/microsoft/view/23401-exam-az-400-topic-7-question-69-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps project.\nYour build process creates several artifacts.\nYou need to deploy the artifacts to on-premises servers.\nSolution: You deploy a Docker build to an on-premises server. You add a Download Build Artifacts task to the deployment pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A Docker build doesn't deploy arbitrary artifacts to on-prem servers via a self-hosted agent download."}, {"key": "AZ-400|T7|Q70", "topic": 7, "question": 70, "url": "https://www.examtopics.com/discussions/microsoft/view/23402-exam-az-400-topic-7-question-70-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps project.\nYour build process creates several artifacts.\nYou need to deploy the artifacts to on-premises servers.\nSolution: You deploy an Azure self-hosted agent to an on-premises server. You add a Copy and Publish Build Artifacts task to the deployment pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. A self-hosted agent on the on-prem server with a Download/Publish Artifacts task deploys the artifacts."}, {"key": "AZ-400|T7|Q71", "topic": 7, "question": 71, "url": "https://www.examtopics.com/discussions/microsoft/view/35934-exam-az-400-topic-7-question-71-discussion/", "text": "You have a project in Azure DevOps named Project1. Project1 contains a pipeline that builds a container image named Image1 and pushes Image1 to an Azure container registry named ACR1. Image1 uses a base image stored in Docker Hub.\nYou need to ensure that Image1 is updated automatically whenever the base image is updated.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable the Azure Event Grid resource provider and subscribe to registry events."}, {"letter": "B", "text": "Add a Docker Hub service connection to Azure Pipelines."}, {"letter": "C", "text": "Create and run an Azure Container Registry task."}, {"letter": "D", "text": "Create a service hook in Project1."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Create an ACR Task that auto-rebuilds Image1 when its Docker Hub base image updates."}, {"key": "AZ-400|T7|Q72", "topic": 7, "question": 72, "url": "https://www.examtopics.com/discussions/microsoft/view/49524-exam-az-400-topic-7-question-72-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps project.\nYour build process creates several artifacts.\nYou need to deploy the artifacts to on-premises servers.\nSolution: You deploy an Octopus Deploy server. You deploy a polled Tentacle agent to an on-premises server. You add an Octopus task to the deployment pipeline.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No (per this series' key): the Octopus polled-Tentacle option is marked as not meeting the goal here."}, {"key": "AZ-400|T7|Q73", "topic": 7, "question": 73, "url": "https://www.examtopics.com/discussions/microsoft/view/9787-exam-az-400-topic-7-question-73-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to create a release pipeline that will deploy Azure resources by using Azure Resource Manager templates. The release pipeline will create the following resources:\n✑ Two resource groups\n✑ Four Azure virtual machines in one resource group\n✑ Two Azure SQL databases in other resource group\nYou need to recommend a solution to deploy the resources.\nSolution: Create a main template that will deploy the resources in one resource group and a nested template that will deploy the resources in the other resource group.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A main+nested template still deploys both groups but the keyed correct design is separate linked templates per group."}, {"key": "AZ-400|T7|Q74", "topic": 7, "question": 74, "url": "https://www.examtopics.com/discussions/microsoft/view/9788-exam-az-400-topic-7-question-74-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to create a release pipeline that will deploy Azure resources by using Azure Resource Manager templates. The release pipeline will create the following resources:\n✑ Two resource groups\n✑ Four Azure virtual machines in one resource group\n✑ Two Azure SQL databases in other resource group\nYou need to recommend a solution to deploy the resources.\nSolution: Create a main template that has two linked templates, each of which will deploy the resources in its respective group.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. A main template with two linked templates, one per resource group, correctly deploys both."}, {"key": "AZ-400|T7|Q75", "topic": 7, "question": 75, "url": "https://www.examtopics.com/discussions/microsoft/view/53251-exam-az-400-topic-7-question-75-discussion/", "text": "DRAG DROP -\nYou are building an application that has the following assets:\n✑ Source code\n✑ Logs from automated tests and builds\n✑ Large and frequently updated binary assets\n✑ A common library used by multiple applications\nWhere should you store each asset? To answer, drag the appropri
