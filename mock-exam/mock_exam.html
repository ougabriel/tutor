56-exam-az-400-topic-4-question-9-discussion/", "text": "You create a Microsoft ASP.NET Core application.\nYou plan to use Azure Key Vault to provide secrets to the application as configuration data.\nYou need to create a Key Vault access policy to assign secret permissions to the application. The solution must use the principle of least privilege.\nWhich secret permissions should you use?", "choices": [{"letter": "A", "text": "List only"}, {"letter": "B", "text": "Get only"}, {"letter": "C", "text": "Get and List"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "The app must Get and List secrets to read configuration; that is the minimal needed set here."}, {"key": "AZ-400|T4|Q10", "topic": 4, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/56614-exam-az-400-topic-4-question-10-discussion/", "text": "DRAG DROP -\nYour company has a project in Azure DevOps.\nYou plan to create a release pipeline that will deploy resources by using Azure Resource Manager templates. The templates will reference secrets stored in Azure\nKey Vault.\nYou need to recommend a solution for accessing the secrets stored in the key vault during deployments. The solution must use the principle of least privilege.\nWhat should you include in the recommendation? To answer, drag the appropriate configurations to the correct targets. Each configuration may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0014100003.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q11", "topic": 4, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/16256-exam-az-400-topic-4-question-11-discussion/", "text": "DRAG DROP -\nYou need to configure access to Azure DevOps agent pools to meet the following requirements:\n✑ Use a project agent pool when authoring build or release pipelines.\n✑ View the agent pool and agents of the organization.\n✑ Use the principle of least privilege.\nWhich role memberships are required for the Azure DevOps organization and the project? To answer, drag the appropriate role memberships to the correct targets. Each role membership may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0014400004.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q12", "topic": 4, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/20613-exam-az-400-topic-4-question-12-discussion/", "text": "You have a branch policy in a project in Azure DevOps. The policy requires that code always builds successfully.\nYou need to ensure that a specific user can always merge changes to the master branch, even if the code fails to compile. The solution must use the principle of least privilege.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add the user to the Build Administrators group."}, {"letter": "B", "text": "Add the user to the Project Administrators group."}, {"letter": "C", "text": "From the Security settings of the repository, modify the access control for the user."}, {"letter": "D", "text": "From the Security settings of the branch, modify the access control for the user."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Grant the user 'Bypass policies when completing pull requests' on the branch Security settings (least privilege)."}, {"key": "AZ-400|T4|Q13", "topic": 4, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/24850-exam-az-400-topic-4-question-13-discussion/", "text": "You have an Azure Resource Manager template that deploys a multi-tier application.\nYou need to prevent the user who performs the deployment from viewing the account credentials and connection strings used by the application.\nWhat should you use?", "choices": [{"letter": "A", "text": "Azure Key Vault"}, {"letter": "B", "text": "a Web.config file"}, {"letter": "C", "text": "an Appsettings.json file"}, {"letter": "D", "text": "an Azure Storage table"}, {"letter": "E", "text": "an Azure Resource Manager parameter file"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Reference secrets from Azure Key Vault so the deploying user never sees the credentials/connection strings."}, {"key": "AZ-400|T4|Q14", "topic": 4, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/55151-exam-az-400-topic-4-question-14-discussion/", "text": "SIMULATION -\nYour company plans to implement a new compliance strategy that will require all Azure web apps to be backed up every five hours.\nYou need to back up an Azure web app named az400-123456789-main every five hours to an Azure Storage account in your resource group.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q15", "topic": 4, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/85472-exam-az-400-topic-4-question-15-discussion/", "text": "SIMULATION -\nYou need to configure a virtual machine named VM1 to securely access stored secrets in an Azure Key Vault named az400-123456789-kv.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q16", "topic": 4, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/49038-exam-az-400-topic-4-question-16-discussion/", "text": "DRAG DROP -\nYour company has an Azure subscription named Subscription1. Subscription1 is associated to an Azure Active Directory tenant named contoso.com.\nYou need to provision an Azure Kubernetes Services (AKS) cluster in Subscription1 and set the permissions for the cluster by using RBAC roles that reference the identities in contoso.com.\nWhich three objects should you create in sequence? To answer, move the appropriate objects from the list of objects to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0015000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q17", "topic": 4, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/56617-exam-az-400-topic-4-question-17-discussion/", "text": "HOTSPOT -\nYou manage build and release pipelines by using Azure DevOps. Your entire managed environment resides in Azure.\nYou need to configure a service endpoint for accessing Azure Key Vault secrets. The solution must meet the following requirements:\n✑ Ensure that the secrets are retrieved by Azure DevOps.\n✑ Avoid persisting credentials and tokens in Azure DevOps.\nHow should you configure the service endpoint? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0015200001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q18", "topic": 4, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/35808-exam-az-400-topic-4-question-18-discussion/", "text": "You are deploying a server application that will run on a Server Core installation of Windows Server 2019.\nYou create an Azure key vault and a secret.\nYou need to use the key vault to secure API secrets for third-party integrations.\nWhich three actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Configure RBAC for the key vault."}, {"letter": "B", "text": "Modify the application to access the key vault."}, {"letter": "C", "text": "Configure a Key Vault access policy."}, {"letter": "D", "text": "Deploy an Azure Desired State Configuration (DSC) extension."}, {"letter": "E", "text": "Deploy a virtual machine that uses a system-assigned managed identity."}], "community": "ABE", "type": "multiple-choice", "images": [], "kiro_answer": "BCE", "kiro_rationale": "Deploy a VM with a system-assigned managed identity (E), grant it access via a Key Vault access policy (C), and modify the app to read from the vault (B)."}, {"key": "AZ-400|T4|Q19", "topic": 4, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/20530-exam-az-400-topic-4-question-19-discussion/", "text": "HOTSPOT -\nYour company is creating a suite of three mobile applications.\nYou need to control access to the application builds. The solution must be managed at the organization level.\nWhat should you use? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0015400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q20", "topic": 4, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/35918-exam-az-400-topic-4-question-20-discussion/", "text": "You have an Azure DevOps organization named Contoso that contains a project named Project1.\nYou provision an Azure key vault named Keyvault1.\nYou need to reference Keyvault1 secrets in a build pipeline of Project1.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Add a secure file to Project1."}, {"letter": "B", "text": "Create an XAML build service."}, {"letter": "C", "text": "Create a variable group in Project1."}, {"letter": "D", "text": "Configure the security policy of Contoso."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Create a variable group linked to the key vault to reference its secrets in the pipeline."}, {"key": "AZ-400|T4|Q21", "topic": 4, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/131241-exam-az-400-topic-4-question-73-discussion/", "text": "DRAG DROP -\nYou have a tenant in Microsoft Azure Active Directory (Azure AD), part of Microsoft Entra. The tenant contains three groups named Group1, Group2, and Group3.\nYou create a new project in Azure DevOps named Project1.\nYou need to secure the service connections for Project1. The solution must meet the following requirements:\n•\tThe members of Group1 must be able to share and unshare a service connection with other projects.\n•\tThe members of Group2 must be able to rename a service connection and update the description.\n•\tThe members of Group3 must be able to use the service connection within build or release pipelines.\n•\tThe principle of least privilege must be followed.\nWhich permission should you grant to each group? To answer, drag the appropriate permissions to the correct groups. Each permission may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image103.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q22", "topic": 4, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/48661-exam-az-400-topic-4-question-22-discussion/", "text": "You have the following Azure policy.\nYou assign the policy to the Tenant root group.\nWhat is the effect of the policy?", "choices": [{"letter": "A", "text": "prevents all HTTP traffic to existing Azure Storage accounts"}, {"letter": "B", "text": "ensures that all traffic to new Azure Storage accounts is encrypted"}, {"letter": "C", "text": "prevents HTTPS traffic to new Azure Storage accounts when the accounts are accessed over the Internet"}, {"letter": "D", "text": "ensures that all data for new Azure Storage accounts is encrypted at rest"}], "community": "B", "type": "multiple-choice", "images": ["/assets/media/exam-media/04257/0015700001.png"], "kiro_answer": "B", "kiro_rationale": "The policy enforces 'secure transfer required', ensuring traffic to new storage accounts is encrypted (HTTPS)."}, {"key": "AZ-400|T4|Q23", "topic": 4, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/20533-exam-az-400-topic-4-question-23-discussion/", "text": "You have an Azure DevOps organization named Contoso, an Azure DevOps project named Project1, an Azure subscription named Sub1, and an Azure key vault named vault1.\nYou need to ensure that you can reference the values of the secrets stored in vault1 in all the pipelines of Project1. The solution must prevent the values from being stored in the pipelines.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create a variable group in Project1."}, {"letter": "B", "text": "Add a secure file to Project1."}, {"letter": "C", "text": "Modify the security settings of the pipelines."}, {"letter": "D", "text": "Configure the security policy of Contoso."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A variable group linked to vault1 lets all pipelines reference the secrets without storing values."}, {"key": "AZ-400|T4|Q24", "topic": 4, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/49151-exam-az-400-topic-4-question-24-discussion/", "text": "DRAG DROP -\nYou use GitHub Enterprise Server as a source code repository.\nYou create an Azure DevOps organization named Contoso.\nIn the Contoso organization, you create a project named Project1.\nYou need to link GitHub commits, pull requests, and issues to the work items of Project1. The solution must use OAuth-based authentication.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0015900001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q25", "topic": 4, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/49152-exam-az-400-topic-4-question-25-discussion/", "text": "DRAG DROP -\nYou are configuring an Azure DevOps deployment pipeline. The deployed application will authenticate to a web service by using a secret stored in an Azure key vault.\nYou need to use the secret in the deployment pipeline.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0016100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q26", "topic": 4, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/49153-exam-az-400-topic-4-question-26-discussion/", "text": "DRAG DROP -\nYou have a private project in Azure DevOps and two users named User1 and User2.\nYou need to add User1 and User2 to groups to meet the following requirements:\n✑ User1 must be able to create a code wiki.\n✑ User2 must be able to edit wiki pages.\n✑ The solution must use the principle of least privilege.\nTo which group should you add each user? To answer, drag the appropriate groups to the correct users. Each group may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0016400004.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q27", "topic": 4, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/31774-exam-az-400-topic-4-question-27-discussion/", "text": "You use WhiteSource Bolt to scan a Node.js application.\nThe WhiteSource Bolt scan identifies numerous libraries that have invalid licenses. The libraries are used only during development and are not part of a production deployment.\nYou need to ensure that WhiteSource Bolt only scans production dependencies.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Run npm install and specify the --production flag."}, {"letter": "B", "text": "Modify the WhiteSource Bolt policy and set the action for the licenses used by the development tools to Reassign."}, {"letter": "C", "text": "Modify the devDependencies section of the project's Package.json file."}, {"letter": "D", "text": "Configure WhiteSource Bolt to scan the node_modules directory only."}], "community": "AC", "type": "multiple-choice", "images": [], "kiro_answer": "AC", "kiro_rationale": "Run npm install --production (A) and move dev-only packages into devDependencies (C) so only prod deps are scanned."}, {"key": "AZ-400|T4|Q28", "topic": 4, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/30817-exam-az-400-topic-4-question-28-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to update the Azure DevOps strategy of your company.\nYou need to identify the following issues as they occur during the company's development process:\n✑ Licensing violations\n✑ Prohibited libraries\nSolution: You implement continuous integration.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. CI alone does not identify licensing violations / prohibited libraries."}, {"key": "AZ-400|T4|Q29", "topic": 4, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/49214-exam-az-400-topic-4-question-29-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to update the Azure DevOps strategy of your company.\nYou need to identify the following issues as they occur during the company's development process:\n✑ Licensing violations\n✑ Prohibited libraries\nSolution: You implement pre-deployment gates.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Pre-deployment gates do not detect licensing/prohibited-library issues."}, {"key": "AZ-400|T4|Q30", "topic": 4, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/50914-exam-az-400-topic-4-question-30-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to update the Azure DevOps strategy of your company.\nYou need to identify the following issues as they occur during the company's development process:\n✑ Licensing violations\n✑ Prohibited libraries\nSolution: You implement automated security testing.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Automated security testing (dependency/license scanning) detects licensing violations and prohibited libraries."}, {"key": "AZ-400|T4|Q31", "topic": 4, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/50916-exam-az-400-topic-4-question-31-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou plan to update the Azure DevOps strategy of your company.\nYou need to identify the following issues as they occur during the company's development process:\n✑ Licensing violations\n✑ Prohibited libraries\nSolution: You implement continuous deployment.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Continuous deployment does not identify licensing/prohibited-library issues."}, {"key": "AZ-400|T4|Q32", "topic": 4, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/48958-exam-az-400-topic-4-question-32-discussion/", "text": "SIMULATION -\nYou manage a website that uses an Azure SQL Database named db1 in a resource group named RG1lod11566895.\nYou need to modify the SQL database to protect against SQL injection.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q33", "topic": 4, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/17037-exam-az-400-topic-4-question-33-discussion/", "text": "HOTSPOT -\nYour company has an Azure subscription.\nThe company requires that all resource groups in the subscription have a tag named organization set to a value of Contoso.\nYou need to implement a policy to meet the tagging requirement.\nHow should you complete the policy? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0017300001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q34", "topic": 4, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/36610-exam-az-400-topic-4-question-34-discussion/", "text": "You need to configure GitHub to use Azure Active Directory (Azure AD) for authentication.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Create a conditional access policy in Azure AD."}, {"letter": "B", "text": "Register GitHub in Azure AD."}, {"letter": "C", "text": "Create an Azure Active Directory B2C (Azure AD B2C) tenant."}, {"letter": "D", "text": "Modify the Security settings of the GitHub organization."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "First register GitHub as an application in Azure AD to use Azure AD authentication."}, {"key": "AZ-400|T4|Q35", "topic": 4, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/44153-exam-az-400-topic-4-question-35-discussion/", "text": "You have an Azure DevOps project named Project1 and an Azure subscription named Sub1.\nYou need to prevent releases from being deployed unless the releases comply with the Azure Policy rules assigned to Sub1.\nWhat should you do in the release pipeline of Project1?", "choices": [{"letter": "A", "text": "Add a deployment gate."}, {"letter": "B", "text": "Modify the Deployment queue settings."}, {"letter": "C", "text": "Configure a deployment trigger."}, {"letter": "D", "text": "Create a pipeline variable."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A deployment gate can evaluate Azure Policy compliance and block non-compliant releases."}, {"key": "AZ-400|T4|Q36", "topic": 4, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/16111-exam-az-400-topic-4-question-36-discussion/", "text": "DRAG DROP -\nYou have an Azure Kubernetes Service (AKS) implementation that is RBAC-enabled.\nYou plan to use Azure Container Instances as a hosted development environment to run containers in the AKS implementation.\nYou need to configure Azure Container Instances as a hosted environment for running the containers in AKS.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0017700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q37", "topic": 4, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/74553-exam-az-400-topic-4-question-37-discussion/", "text": "You have an Azure DevOps project that contains a build pipeline. The build pipeline uses approximately 50 open source libraries.\nYou need to ensure that all the open source libraries comply with your company's licensing standards.\nWhich service should you use?", "choices": [{"letter": "A", "text": "Ansible"}, {"letter": "B", "text": "Maven"}, {"letter": "C", "text": "WhiteSource Bolt"}, {"letter": "D", "text": "Helm"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "WhiteSource Bolt scans open-source libraries for license compliance."}, {"key": "AZ-400|T4|Q38", "topic": 4, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/36228-exam-az-400-topic-4-question-38-discussion/", "text": "You are designing the security validation strategy for a project in Azure DevOps.\nYou need to identify package dependencies that have known security issues and can be resolved by an update.\nWhat should you use?", "choices": [{"letter": "A", "text": "Octopus Deploy"}, {"letter": "B", "text": "Jenkins"}, {"letter": "C", "text": "Gradle"}, {"letter": "D", "text": "SonarQube"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "SonarQube identifies dependencies with known security issues that an update can resolve."}, {"key": "AZ-400|T4|Q39", "topic": 4, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/51044-exam-az-400-topic-4-question-39-discussion/", "text": "You administer an Azure DevOps project that includes package feeds.\nYou need to ensure that developers can unlist and deprecate packages. The solution must use the principle of least privilege.\nWhich access level should you grant to the developers?", "choices": [{"letter": "A", "text": "Collaborator"}, {"letter": "B", "text": "Contributor"}, {"letter": "C", "text": "Owner"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Contributor access lets developers unlist/deprecate packages (least privilege vs Owner)."}, {"key": "AZ-400|T4|Q40", "topic": 4, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/49719-exam-az-400-topic-4-question-40-discussion/", "text": "HOTSPOT -\nYou have a project in Azure DevOps that has three teams as shown in the Teams exhibit. (Click the Teams tab.)\nYou create a new dashboard named Dash1.\nYou configure the dashboard permissions for the Contoso project as shown in the Permissions exhibit. (Click the Permissions tab.)\nAll other permissions have the default values set.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0018200001.jpg", "/assets/media/exam-media/04257/0018200002.png", "/assets/media/exam-media/04257/0018300001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q41", "topic": 4, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/75280-exam-az-400-topic-4-question-41-discussion/", "text": "Your company is concerned that when developers introduce open source libraries, it creates licensing compliance issues.\nYou need to add an automated process to the build pipeline to detect when common open source libraries are added to the code base.\nWhat should you use?", "choices": [{"letter": "A", "text": "Microsoft Visual SourceSafe"}, {"letter": "B", "text": "Code Style"}, {"letter": "C", "text": "Black Duck"}, {"letter": "D", "text": "Jenkins"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Black Duck detects open-source libraries and their licensing compliance in the pipeline."}, {"key": "AZ-400|T4|Q42", "topic": 4, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/27390-exam-az-400-topic-4-question-42-discussion/", "text": "DRAG DROP -\nYou are implementing a package management solution for a Node.js application by using Azure Artifacts.\nYou need to configure the development environment to connect to the package repository. The solution must minimize the likelihood that credentials will be leaked.\nWhich file should you use to configure each connection? To answer, drag the appropriate files to the correct connections. Each file may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0018500001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q43", "topic": 4, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/29724-exam-az-400-topic-4-question-43-discussion/", "text": "HOTSPOT -\nYou have an Azure DevOps project that contains a build pipeline. The build pipeline uses approximately 50 open source libraries.\nYou need to ensure that the project can be scanned for known security vulnerabilities in the open source libraries.\nWhat should you do? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0018700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q44", "topic": 4, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/75281-exam-az-400-topic-4-question-44-discussion/", "text": "You have an Azure DevOps project that contains a build pipeline. The build pipeline uses approximately 50 open source libraries.\nYou need to ensure that all the open source libraries comply with your company's licensing standards.\nWhich service should you use?", "choices": [{"letter": "A", "text": "NuGet"}, {"letter": "B", "text": "Maven"}, {"letter": "C", "text": "Black Duck"}, {"letter": "D", "text": "Helm"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Black Duck checks open-source libraries for licensing compliance."}, {"key": "AZ-400|T4|Q45", "topic": 4, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/17060-exam-az-400-topic-4-question-45-discussion/", "text": "DRAG DROP -\nYou plan to use Azure Kubernetes Service (AKS) to host containers deployed from images hosted in a Docker Trusted Registry.\nYou need to recommend a solution for provisioning and connecting to AKS. The solution must ensure that AKS is RBAC-enabled and uses a custom service principal.\nWhich three commands should you recommend be run in sequence? To answer, move the appropriate commands from the list of commands to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0019000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q46", "topic": 4, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/28872-exam-az-400-topic-4-question-46-discussion/", "text": "Your company develops an app for iOS. All users of the app have devices that are members of a private distribution group in Microsoft Visual Studio App Center.\nYou plan to distribute a new release of the app.\nYou need to identify which certificate file you require to distribute the new release from App Center.\nWhich file type should you upload to App Center?", "choices": [{"letter": "A", "text": ".cer"}, {"letter": "B", "text": ".pfx"}, {"letter": "C", "text": ".p12"}, {"letter": "D", "text": ".pvk"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "App Center iOS distribution requires a .p12 certificate file."}, {"key": "AZ-400|T4|Q47", "topic": 4, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/16452-exam-az-400-topic-4-question-47-discussion/", "text": "SIMULATION -\nYou need to prepare a network security group (NSG) named az400-123456789-nsg1 to host an Azure DevOps pipeline agent. The solution must allow only the required outbound port for Azure DevOps and deny all other inbound and outbound access to the Internet.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q48", "topic": 4, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/56805-exam-az-400-topic-4-question-48-discussion/", "text": "DRAG DROP -\nYou have a project in Azure DevOps named Project1 that contains two Azure DevOps pipelines named Pipeline1 and Pipeline2.\nYou need to ensure that Pipeline1 can deploy code successfully to an Azure web app named webapp1. The solution must ensure that Pipeline2 does not have permission to webapp1.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0019400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q49", "topic": 4, "question": 49, "url": "https://www.examtopics.com/discussions/microsoft/view/57255-exam-az-400-topic-4-question-49-discussion/", "text": "DRAG DROP -\nYou need to increase the security of your team's development process.\nWhich type of security tool should you recommend for each stage of the development process? To answer, drag the appropriate security tools to the correct stages. Each security tool may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0019600001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q50", "topic": 4, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/48635-exam-az-400-topic-4-question-50-discussion/", "text": "Your company is concerned that when developers introduce open source libraries, it creates licensing compliance issues.\nYou need to add an automated process to the build pipeline to detect when common open source libraries are added to the code base.\nWhat should you use?", "choices": [{"letter": "A", "text": "OWASP ZAP"}, {"letter": "B", "text": "Jenkins"}, {"letter": "C", "text": "Code Style"}, {"letter": "D", "text": "WhiteSource Bolt"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "WhiteSource Bolt detects open-source libraries added to the codebase for license compliance."}, {"key": "AZ-400|T4|Q51", "topic": 4, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/33149-exam-az-400-topic-4-question-51-discussion/", "text": "You plan to use a NuGet package in a project in Azure DevOps. The NuGet package is in a feed that requires authentication.\nYou need to ensure that the project can restore the NuGet package automatically.\nWhat should the project use to automate the authentication?", "choices": [{"letter": "A", "text": "an Azure Automation account"}, {"letter": "B", "text": "an Azure Artifacts Credential Provider"}, {"letter": "C", "text": "an Azure Active Directory (Azure AD) account that has multi-factor authentication (MFA) enabled"}, {"letter": "D", "text": "an Azure Active Directory (Azure AD) service principal"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "The Azure Artifacts Credential Provider automates authenticated NuGet restore."}, {"key": "AZ-400|T4|Q52", "topic": 4, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/35915-exam-az-400-topic-4-question-52-discussion/", "text": "You use Azure Pipelines to manage project builds and deployments.\nYou plan to use Azure Pipelines for Microsoft Teams to notify the legal team when a new build is ready for release.\nYou need to configure the Organization Settings in Azure DevOps to support Azure Pipelines for Microsoft Teams.\nWhat should you turn on?", "choices": [{"letter": "A", "text": "Third-party application access via OAuth"}, {"letter": "B", "text": "Azure Active Directory Conditional Access Policy Validation"}, {"letter": "C", "text": "Alternate authentication credentials"}, {"letter": "D", "text": "SSH authentication"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Turn on 'Third-party application access via OAuth' so the Teams app can integrate."}, {"key": "AZ-400|T4|Q53", "topic": 4, "question": 53, "url": "https://www.examtopics.com/discussions/microsoft/view/35757-exam-az-400-topic-4-question-53-discussion/", "text": "You have an existing project in Azure DevOps.\nYou plan to integrate GitHub as the repository for the project.\nYou need to ensure that Azure Pipelines runs under the Azure Pipelines identity.\nWhich authentication mechanism should you use?", "choices": [{"letter": "A", "text": "personal access token (PAT)"}, {"letter": "B", "text": "GitHub App"}, {"letter": "C", "text": "Azure Active Directory (Azure AD)"}, {"letter": "D", "text": "OAuth"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Use the GitHub App so pipelines run under the Azure Pipelines identity."}, {"key": "AZ-400|T4|Q54", "topic": 4, "question": 54, "url": "https://www.examtopics.com/discussions/microsoft/view/79298-exam-az-400-topic-4-question-54-discussion/", "text": "DRAG DROP -\nYou have an Azure subscription that uses Azure Monitor and contains a Log Analytics workspace.\nYou have an encryption key.\nYou need to configure Azure Monitor to use the key to encrypt log data.\nWhich five actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nNOTE: More than one order of answer choices is correct. You will receive credit for any of the correct orders you select.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0020000001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q55", "topic": 4, "question": 55, "url": "https://www.examtopics.com/discussions/microsoft/view/79299-exam-az-400-topic-4-question-55-discussion/", "text": "DRAG DROP -\nYou have an Azure Key Vault that contains an encryption key named key1.\nYou plan to create a Log Analytics workspace that will store logging data.\nYou need to encrypt the workspace by using key1.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0020300001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q56", "topic": 4, "question": 56, "url": "https://www.examtopics.com/discussions/microsoft/view/78922-exam-az-400-topic-4-question-56-discussion/", "text": "You use release pipelines in Azure Pipelines to deploy an app. Secrets required be the pipeline are stored as pipeline variables. Logging of commands is enabled for the Azure Pipelines agent.\nYou need to prevent the values of the secrets from being logged.\nWhat should you do?", "choices": [{"letter": "A", "text": "Store the secrets in the environment variables instead of the pipeline variables."}, {"letter": "B", "text": "Pass the secrets on the command line instead of in the pipeline variables."}, {"letter": "C", "text": "Apply a prefix of secret to the name of the variables."}, {"letter": "D", "text": "Echo the values of the secrets to the command line."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Store secrets in (secret) environment variables mapped from pipeline variables so they aren't echoed in logs. NOTE: phrasing is awkward; the intent is to map secret vars to env vars for the task, not log them."}, {"key": "AZ-400|T4|Q57", "topic": 4, "question": 57, "url": "https://www.examtopics.com/discussions/microsoft/view/79308-exam-az-400-topic-4-question-57-discussion/", "text": "DRAG DROP -\nYou need to deploy a new project in Azure DevOps that has the following requirements:\n* The lead developer must be able to create repositories, manage permissions, manage policies, and contribute to the repository.\n* Developers must be able to contribute to the repository and create branches, but NOT bypass policies when pushing builds.\n* Project managers must only be able to view the repository.\n* The principle of least privilege must be used.\nYou create a new Azure DevOps project team for each role.\nTo which Azure DevOps groups should you add each team? To answer, drag the appropriate groups to the correct teams. Each group may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0020600001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q58", "topic": 4, "question": 58, "url": "https://www.examtopics.com/discussions/microsoft/view/95979-exam-az-400-topic-4-question-58-discussion/", "text": "DRAG DROP -\nYou have an Azure subscription that contains a project in Azure DevOps named Project1. You have three Azure Active Directory (Azure AD) users that require access to Project1 as shown in the following table.\nYou need to ensure that the users have the appropriate permissions. The solution must use the principle of least privilege.\nTo which permission group in Azure DevOps should you add each user? To answer, drag the appropriate permission groups to the correct users. Each permission group may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image8.png", "https://img.examtopics.com/az-400/image9.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q59", "topic": 4, "question": 59, "url": "https://www.examtopics.com/discussions/microsoft/view/95771-exam-az-400-topic-3-question-32-discussion/", "text": "You have an Azure subscription linked to an Azure Active Directory Premium Plan 1 tenant.\nA security review indicates that too many users have privileged access to resources.\nYou need to deploy a privileged access management solution that meets the following requirements:\n•\tEnforces time limits on the use of privileged access\n•\tRequires approval to activate privileged access\n•\tMinimizes costs\nWhat should you do first?", "choices": [{"letter": "A", "text": "Configure notifications when privileged roles are activated."}, {"letter": "B", "text": "Configure alerts for the activation of privileged roles."}, {"letter": "C", "text": "Enforce Azure Multi-Factor Authentication (MFA) for role activation."}, {"letter": "D", "text": "Upgrade the license of the Azure Active Directory (Azure AD) tenant."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "PIM requires Azure AD Premium P2; first upgrade the tenant license, then configure time-bound, approval-based activation."}, {"key": "AZ-400|T4|Q60", "topic": 4, "question": 60, "url": "https://www.examtopics.com/discussions/microsoft/view/96170-exam-az-400-topic-4-question-60-discussion/", "text": "You plan to create a GitHub workflow that will use GitHub Actions. The actions will require a 256-KB secret.\nYou need to recommend a solution to store and encrypt the secret. The secret value must be accessible only to the workflow. The solution must minimize administrative effort\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Store the secret in the organization-level GitHub secrets."}, {"letter": "B", "text": "Store the secret in the repository-level GitHub secrets."}, {"letter": "C", "text": "Encrypt the secret value and store the value in the repository. Store the decryption key in the repository-level GitHub secrets."}, {"letter": "D", "text": "Encrypt the secret value and store the value in the repository. Store the decryption key in the organization-level GitHub secrets."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "GitHub secrets cap at 64 KB, so encrypt the 256-KB secret, store the ciphertext in the repo, and keep the decryption key in a repository-level secret."}, {"key": "AZ-400|T4|Q61", "topic": 4, "question": 61, "url": "https://www.examtopics.com/discussions/microsoft/view/95773-exam-az-400-topic-3-question-34-discussion/", "text": "You have a GitHub Enterprise account.\nYou need to enable push protection for secret scanning of the account repositories.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Purchase a GitHub Advanced Security license."}, {"letter": "B", "text": "Purchase Premium Plus support."}, {"letter": "C", "text": "Enforce multi-factor authentication (MFA)."}, {"letter": "D", "text": "Create an access policy for secrets."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Push protection for secret scanning requires a GitHub Advanced Security license first."}, {"key": "AZ-400|T4|Q62", "topic": 4, "question": 62, "url": "https://www.examtopics.com/discussions/microsoft/view/95777-exam-az-400-topic-3-question-35-discussion/", "text": "DRAG DROP -\nYour company has a project in Azure DevOps named Project1.\nAll the developers at the company have Windows 10 devices.\nYou need to create a Git repository for Project1. The solution must meet the following requirements:\n•\tSupport large binary files.\n•\tStore binary files outside of the repository.\n•\tUse a standard Git workflow to maintain the metadata of the binary files by using commits to the repository.\nWhich three actions should you perform in sequence on each developer’s device? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image11.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q63", "topic": 4, "question": 63, "url": "https://www.examtopics.com/discussions/microsoft/view/114039-exam-az-400-topic-4-question-63-discussion/", "text": "Your company uses Azure DevOps and Microsoft Azure Active Directory (Azure AD), part of Microsoft Entra.\nOnly users who have accounts in Azure AD can access the Azure DevOps environment.\nYou need to ensure that only devices that are connected to the on-premises network can access the Azure DevOps environment.\nWhat should you do?", "choices": [{"letter": "A", "text": "Assign the Stakeholder access level to all users."}, {"letter": "B", "text": "In Azure DevOps, configure Security in Project Settings."}, {"letter": "C", "text": "In Azure AD, configure conditional access."}, {"letter": "D", "text": "In Azure AD, configure risky sign-ins."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Configure Conditional Access in Azure AD to restrict access to on-premises (trusted-network) devices."}, {"key": "AZ-400|T4|Q64", "topic": 4, "question": 64, "url": "https://www.examtopics.com/discussions/microsoft/view/111296-exam-az-400-topic-4-question-64-discussion/", "text": "You have an Azure subscription that contains four Azure virtual machines.\nYou need to configure the virtual machines to use a single identity. The solution must meet the following requirements:\n•\tEnsure that the credentials for the identity are managed automatically.\n•\tSupport granting privileges to the identity.\nWhich type of identity should you use?", "choices": [{"letter": "A", "text": "a system-assigned managed identity"}, {"letter": "B", "text": "a user-assigned managed identity"}, {"letter": "C", "text": "a service principal"}, {"letter": "D", "text": "a user account"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "A user-assigned managed identity gives multiple VMs one auto-managed identity that can be granted privileges."}, {"key": "AZ-400|T4|Q65", "topic": 4, "question": 65, "url": "https://www.examtopics.com/discussions/microsoft/view/111396-exam-az-400-topic-4-question-65-discussion/", "text": "HOTSPOT\n-\nYou have an Azure subscription that contains an Azure key vault named Vault1, an Azure pipeline named Pipeline1, and an Azure SQL database named DB1.\nPipeline1 is used to deploy an app that will authenticate to DB1 by using a password.\nYou need to store the password in Vault1. The solution must ensure that the password can be accessed by Pipeline1.\nWhat should you do? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image58.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q66", "topic": 4, "question": 66, "url": "https://www.examtopics.com/discussions/microsoft/view/111397-exam-az-400-topic-4-question-66-discussion/", "text": "You have a GitHub repository that contains multiple workflows and a secret stored at the environment level.\nYou need to ensure that the secret can be used by all the workflows.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Recreate the secret at the organization level."}, {"letter": "B", "text": "Recreate the secret at the repository level."}, {"letter": "C", "text": "Enable required reviewers."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Recreate the secret at the repository level so all workflows can use it (environment-level scopes to one environment)."}, {"key": "AZ-400|T4|Q67", "topic": 4, "question": 67, "url": "https://www.examtopics.com/discussions/microsoft/view/111273-exam-az-400-topic-4-question-67-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub organization that contains three users named User1, User2, and User3. You have a project that contains a repository named repo1.\nYou need to configure permissions for repo1. The solution must meet the following requirements:\n•\tEnsure that User1 can actively push to repo1.\n•\tEnsure that User2 can manage issues and pull requests for repo1.\n•\tEnsure that User3 can manage repo1.\n•\tPrevent User3 from accessing sensitive data in repo1.\nWhich role should you assign to each user? To answer, drag the appropriate roles to the correct users. Each role may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image60.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q68", "topic": 4, "question": 68, "url": "https://www.examtopics.com/discussions/microsoft/view/122302-exam-az-400-topic-4-question-68-discussion/", "text": "You have an Azure key vault named KV1 and three web servers.\nYou plan to deploy an app named App1 to the web servers.\nYou need to ensure that App1 can retrieve a secret from KV1. The solution must meet the following requirements:\n•\tMinimize the number of permission grants required.\n•\tFollow the principle of least privilege.\nWhat should you include in the solution?", "choices": [{"letter": "A", "text": "role-based access control (RBAC) permission"}, {"letter": "B", "text": "a system-assigned managed identity"}, {"letter": "C", "text": "a user-assigned managed identity"}, {"letter": "D", "text": "a service principal"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A user-assigned managed identity shared by the three servers minimizes permission grants (one grant) with least privilege."}, {"key": "AZ-400|T4|Q69", "topic": 4, "question": 69, "url": "https://www.examtopics.com/discussions/microsoft/view/127190-exam-az-400-topic-4-question-69-discussion/", "text": "You plan to use Azure DevOps to build and deploy an app that will be hosted in a Kubernetes cluster.\nYou need to scan the app image for vulnerabilities before the image is deployed to the cluster.\nWhat should you include in the solution?", "choices": [{"letter": "A", "text": "Microsoft Defender for Containers"}, {"letter": "B", "text": "Microsoft Defender for App Service"}, {"letter": "C", "text": "Microsoft Defender for DevOps"}, {"letter": "D", "text": "Microsoft Defender for Storage"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Microsoft Defender for Containers scans images for vulnerabilities before deployment to Kubernetes."}, {"key": "AZ-400|T4|Q70", "topic": 4, "question": 70, "url": "https://www.examtopics.com/discussions/microsoft/view/128932-exam-az-400-topic-4-question-70-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Pipelines application CI/CD pipeline named Pipeline1.\nYou need to add OWASP ZAP testing to Pipeline1.\nWhich four actions should you add to Pipeline1 in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image94.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q71", "topic": 4, "question": 71, "url": "https://www.examtopics.com/discussions/microsoft/view/127412-exam-az-400-topic-4-question-71-discussion/", "text": "You have an app named App1 that is built by using Azure Pipelines. The source code for App1 is stored in Azure Repos and contains open source libraries.\nYou need to identify security vulnerabilities in the open source code.\nWhat should you use?", "choices": [{"letter": "A", "text": "Mend Bolt"}, {"letter": "B", "text": "Rollbar"}, {"letter": "C", "text": "Code Climate"}, {"letter": "D", "text": "DeepSource"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Mend Bolt (formerly WhiteSource Bolt) finds security vulnerabilities in open-source dependencies."}, {"key": "AZ-400|T4|Q72", "topic": 4, "question": 72, "url": "https://www.examtopics.com/discussions/microsoft/view/131246-exam-az-400-topic-4-question-72-discussion/", "text": "You manage code by using GitHub.\nYou plan to use Dependabot to scan for code dependencies.\nYou need to identify when scanning will be triggered automatically.\nWhich two actions will trigger a scan? Each correct answer presents a complete solution.\nNOTE: Each correct solution is worth one point.", "choices": [{"letter": "A", "text": "The dependency graph of a repository changes."}, {"letter": "B", "text": "A pull request is created."}, {"letter": "C", "text": "A branch is forked."}, {"letter": "D", "text": "Any commit is pushed."}, {"letter": "E", "text": "A new advisory is added."}], "community": "AE", "type": "multiple-choice", "images": [], "kiro_answer": "AE", "kiro_rationale": "Dependabot scans when the dependency graph changes (A) and when a new security advisory is added (E)."}, {"key": "AZ-400|T4|Q73", "topic": 4, "question": 73, "url": "https://www.examtopics.com/discussions/microsoft/view/146545-exam-az-400-topic-4-question-73-discussion/", "text": "HOTSPOT\n-\nYou have a GitHub organization.\nYou configure the personal access token (PAT) policy shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image116.png", "https://img.examtopics.com/az-400/image117.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q74", "topic": 4, "question": 74, "url": "https://www.examtopics.com/discussions/microsoft/view/146546-exam-az-400-topic-4-question-74-discussion/", "text": "DRAG DROP\n-\nYou have an Azure Repos repository named Repo1 that is used for source control.\nYou need to configure code scanning for Repo1.\nWhich three tasks should the pipeline perform in sequence? To answer, move the appropriate tasks from the list of tasks to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image146.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q75", "topic": 4, "question": 75, "url": "https://www.examtopics.com/discussions/microsoft/view/148941-exam-az-400-topic-4-question-75-discussion/", "text": "SIMULATION\n-\nYou need to create a personal access token (PAT) named Token1 that has only the following capabilities:\n•\tRead, write, and manage code\n•\tRead and execute builds\n•\tRead releases\nToken1 must expire in 60 days.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q76", "topic": 4, "question": 76, "url": "https://www.examtopics.com/discussions/microsoft/view/149535-exam-az-400-topic-4-question-76-discussion/", "text": "You have a GitHub repository that uses GitHub Actions and stores access keys by using GitHub encrypted secrets.\nYou plan to update the secrets by using the GitHub REST API.\nYou need to wrap the secrets before adding them to a REST-based call.\nWhich encryption library should you use?", "choices": [{"letter": "A", "text": "CryptoNet"}, {"letter": "B", "text": "BouncyCastle"}, {"letter": "C", "text": "libsodium"}, {"letter": "D", "text": "hashlib"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "GitHub's encrypted-secrets REST API requires sealing secrets with libsodium."}, {"key": "AZ-400|T4|Q77", "topic": 4, "question": 77, "url": "https://www.examtopics.com/discussions/microsoft/view/149536-exam-az-400-topic-4-question-77-discussion/", "text": "HOTSPOT\n-\nYou have a GitHub repository named Repo1 and an app named App1. Repo1 stores the source code for App1.\nYou need to perform the following tests:\n•\tTest1: Run a ZAP spider against App1 for one minute and wait for passive scanning to complete. The test must NOT perform active attacks.\n•\tTest2: Run a ZAP spider against App1, and when complete, execute an AJAX spider scan.\nWhich GitHub action should you use for each test? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image173.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q78", "topic": 4, "question": 78, "url": "https://www.examtopics.com/discussions/microsoft/view/148942-exam-az-400-topic-4-question-78-discussion/", "text": "You use Azure Pipelines pipeline to build and deploy an app named App1.\nYou need to ensure that before App1 is deployed, all the code for the app passes a security validation by using a custom tool.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add a status check to the policies of the branch used by your company's development department."}, {"letter": "B", "text": "Add a status check to the policies of the main branch."}, {"letter": "C", "text": "Add a service hook to the project."}, {"letter": "D", "text": "Limit the job authorization scope to the current project for all the release pipelines."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Add a branch policy status check on the main branch so the custom security validation must pass before deployment."}, {"key": "AZ-400|T5|Q1", "topic": 5, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/31981-exam-az-400-topic-5-question-1-discussion/", "text": "You are designing the development process for your company.\nYou need to recommend a solution for continuous inspection of the company's code base to locate common code patterns that are known to be problematic.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "Microsoft Visual Studio test plans"}, {"letter": "B", "text": "Gradle wrapper scripts"}, {"letter": "C", "text": "SonarCloud analysis"}, {"letter": "D", "text": "the JavaScript task runner"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "SonarCloud provides continuous code inspection for known problematic patterns."}, {"key": "AZ-400|T5|Q2", "topic": 5, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/50539-exam-az-400-topic-5-question-2-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nThe lead developer at your company reports that adding new application features takes longer than expected due to a large accumulated technical debt.\nYou need to recommend changes to reduce the accumulated technical debt.\nSolution: You recommend reducing the code coupling and the dependency cycles?\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Reducing code coupling and dependency cycles reduces technical debt."}, {"key": "AZ-400|T5|Q3", "topic": 5, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/23054-exam-az-400-topic-5-question-3-discussion/", "text": "Your company uses Azure DevOps for the build pipelines and deployment pipelines of Java-based projects.\nYou need to recommend a strategy for managing technical debt.\nWhich two actions should you include in the recommendation? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Configure post-deployment approvals in the deployment pipeline."}, {"letter": "B", "text": "Configure pre-deployment approvals in the deployment pipeline."}, {"letter": "C", "text": "Integrate Azure DevOps and SonarQube."}, {"letter": "D", "text": "Integrate Azure DevOps and Azure DevTest Labs."}], "community": "BC", "type": "multiple-choice", "images": [], "kiro_answer": "BC", "kiro_rationale": "Integrate SonarQube (C) for quality/debt analysis and use pre-deployment approvals (B) to gate on it."}, {"key": "AZ-400|T5|Q4", "topic": 5, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/52518-exam-az-400-topic-5-question-4-discussion/", "text": "Your company is building a new solution in Java.\nThe company currently uses a SonarQube server to analyze the code of .NET solutions.\nYou need to analyze and monitor the code quality of the Java solution.\nWhich task types should you add to the build pipeline?", "choices": [{"letter": "A", "text": "Gradle"}, {"letter": "B", "text": "CocoaPods"}, {"letter": "C", "text": "Grunt"}, {"letter": "D", "text": "Gulp"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "For a Java/Gradle project, add the Gradle task (it runs SonarQube analysis)."}, {"key": "AZ-400|T5|Q5", "topic": 5, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/80408-exam-az-400-topic-5-question-5-discussion/", "text": "HOTSPOT -\nYour company uses GitHub for source control. GitHub repositories store source code and store process documentation. The process documentation is saved as\nMicrosoft Word documents that contain simple flow charts stored as .bmp files.\nYou need to optimize the integration and versioning of the process documentation and the flow charts. The solution must meet the following requirements:\n✑ Store documents as plain text.\n✑ Minimize the number of files that must be maintained.\n✑ Simplify the modification, merging, and reuse of flow charts.\nSimplify the modification, merging, and reuse of documents.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0022600012.png", "/assets/media/exam-media/04257/0022700001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q6", "topic": 5, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/35487-exam-az-400-topic-5-question-6-discussion/", "text": "Your company is building a new solution in Java.\nThe company currently uses a SonarQube server to analyze the code of .NET solutions.\nYou need to analyze and monitor the code quality of the Java solution.\nWhich task types should you add to the build pipeline?", "choices": [{"letter": "A", "text": "Grunt"}, {"letter": "B", "text": "Octopus"}, {"letter": "C", "text": "Maven"}, {"letter": "D", "text": "Gulp"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "For a Java/Maven project, add the Maven task to run SonarQube analysis."}, {"key": "AZ-400|T5|Q7", "topic": 5, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/16981-exam-az-400-topic-5-question-7-discussion/", "text": "DRAG DROP -\nYou are developing a full Microsoft .NET Framework solution that includes unit tests.\nYou need to configure SonarQube to perform a code quality validation of the C# code as part of the build pipelines.\nWhich four tasks should you perform in sequence? To answer, move the appropriate tasks from the list of tasks to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0023000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q8", "topic": 5, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/58190-exam-az-400-topic-5-question-8-discussion/", "text": "Your company uses Azure DevOps for the build pipelines and deployment pipelines of Java-based projects.\nYou need to recommend a strategy for managing technical debt.\nWhich action should you include in the recommendation?", "choices": [{"letter": "A", "text": "Configure post-deployment approvals in the deployment pipeline."}, {"letter": "B", "text": "Integrate Azure DevOps and SonarQube."}, {"letter": "C", "text": "Integrate Azure DevOps and Azure DevTest Labs."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Integrate Azure DevOps with SonarQube to manage technical debt."}, {"key": "AZ-400|T5|Q9", "topic": 5, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/23792-exam-az-400-topic-5-question-9-discussion/", "text": "DRAG DROP -\nYou need to find and isolate shared code. The shared code will be maintained in a series of packages.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0023300006.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q10", "topic": 5, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/17043-exam-az-400-topic-5-question-10-discussion/", "text": "DRAG DROP -\nYou are creating a NuGet package.\nYou plan to distribute the package to your development team privately.\nYou need to share the package and test that the package can be consumed.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0023500001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T5|Q11", "topic": 5, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/20515-exam-az-400-topic-5-question-11-discussion/", "text": "During a code review, you discover many quality issues. Many modules contain unused variables and empty catch blocks.\nYou need to recommend a solution to improve the quality of the code.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "In a Grunt build task, select Enabled from Control Options."}, {"letter": "B", "text": "In a Maven build task, select Run PMD."}, {"letter": "C", "text": "In a Xcode build task, select Use xcpretty from Advanced."}, {"letter": "D", "text": "In a Gradle build task, select Run Checkstyle."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "For a Maven (Java) build, select Run PMD to detect unused variables and empty catch blocks."}, {"key": "AZ-400|T5|Q12", "topic": 5, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/20892-exam-az-400-topic-5-question-12-discussion/", "text": "Your development team is building a new web solution by using the Microsoft Visual Studio integrated development environment (IDE).\nYou need to make a custom package available to all the developers. The package must be managed centrally, and the latest version must be available for consumption in Visual Studio automatically.\nWhich three actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Publish the package to a feed."}, {"letter": "B", "text": "Create a new feed in Azure Artifacts."}, {"letter": "C", "text": "Upload a package to a Git repository."}, {"letter": "D", "text": "Add the package URL to the Environment settings in Visual Studio."}, {"letter": "E", "text": "Add the package URL to the NuGet Package Manager settings in Visual Studio."}, {"letter": "F", "text": "Create a Git repository in Azure Repos."}], "community": "ABE", "type": "multiple-choice", "images": [], "kiro_answer": "ABE", "kiro_rationale": "Create a feed (B), publish the package to it (A), and add the feed URL to NuGet Package Manager in Visual Studio (E)."}, {"key": "AZ-400|T5|Q13", "topic": 5, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/74555-exam-az-400-topic-5-question-13-discussion/", "text": "You use GitHub for source control.\nA file that contains sensitive data is committed accidentally to the Git repository of a project.\nYou need to delete the file and its history form the repository.\nWhich two tools can you use? Each correct answer presents a complete solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "the git filter-branch command"}, {"letter": "B", "text": "BFG Repo-Cleaner"}, {"letter": "C", "text": "the git rebase command"}, {"letter": "D", "text": "GitHub Desktop"}], "community": "AB", "type": "multiple-choice", "images": [], "kiro_answer": "AB", "kiro_rationale": "git filter-branch (A) and BFG Repo-Cleaner (B) both remove a file and its history."}, {"key": "AZ-400|T5|Q14", "topic": 5, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/73902-exam-az-400-topic-5-question-14-discussion/", "text": "Your company uses GitHub for source control. The company has a team that performs code reviews.\nYou need to automate the assignment of the code reviews. The solution must meet the following requirements:\n✑ Prioritize the assignment of code reviews to team members who have the fewest outstanding assignments.\n✑ Ensure that each team member performs an equal number of code reviews in any 30-day period.\n✑ Prevent the assignment of code reviews to the team leader.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Clear Never assign certain team members."}, {"letter": "B", "text": "Select If assigning team members, don't notify the entire team."}, {"letter": "C", "text": "Select Never assign certain team members."}, {"letter": "D", "text": "Set Routing algorithm to Round robin."}, {"letter": "E", "text": "Set Routing algorithm to Load balance."}], "community": "CE", "type": "multiple-choice", "images": [], "kiro_answer": "CE", "kiro_rationale": "Use 'Never assign certain team members' to exclude the team leader (C) and set Load balance routing (E) to equalize reviews."}, {"key": "AZ-400|T5|Q15", "topic": 5, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/20518-exam-az-400-topic-5-question-15-discussion/", "text": "You have a GitHub repository.\nYou create a new repository in Azure DevOps.\nYou need to recommend a procedure to clone the repository from GitHub to Azure DevOps.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Create a pull request."}, {"letter": "B", "text": "Create a webhook."}, {"letter": "C", "text": "Create a service connection for GitHub."}, {"letter": "D", "text": "From Import a Git repository, click Import."}, {"letter": "E", "text": "Create a personal access token in Azure DevOps."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Use 'Import a Git repository' in Azure Repos to clone from GitHub."}, {"key": "AZ-400|T5|Q16", "topic": 5, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/50224-exam-az Gulp build task, specify a custom condition expression."}, {"letter": "D", "text": "In a Grunt build task, select Enabled from Control Options."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "In a Maven build task select Run PMD to detect unused variables/empty catch blocks in Java."}, {"key": "AZ-400|T5|Q20", "topic": 5, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/10248-exam-az-400-topic-5-question-20-discussion/", "text": "You use Azure Artifacts to host NuGet packages that you create.\nYou need to make one of the packages available to anonymous users outside your organization. The solution must minimize the number of publication points.\nWhat should you do?", "choices": [{"letter": "A", "text": "Change the feed URL of the package"}, {"letter": "B", "text": "Create a new feed for the package"}, {"letter": "C", "text": "Promote the package to a release view."}, {"letter": "D", "text": "Publish the package to a public NuGet repository."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Create a new (public) feed for the package to share it with anonymous external users with minimal publication points. NOTE: community voted B; verify against current Azure Artifacts public-feed behavior."}, {"key": "AZ-400|T5|Q21", "topic": 5, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/78924-exam-az-400-topic-5-question-21-discussion/", "text": "You use GitHub for source control and project-related discussions.\nYou receive a notification when an entry is made to any team discussion.\nYou need to ensure that you receive email notifications only for discussions in which you commented or in which you are mentioned.\nWhich two Notifications settings should you clear? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Automaticall
