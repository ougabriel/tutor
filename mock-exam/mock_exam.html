s; it does not improve completeness and may worsen omission of required clauses."}, {"key": "AI-103|T1|Q44", "topic": 1, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/412476-exam-ai-103-topic-1-question-44-discussion/", "text": "Note: This section contains one or more sets of questions with the same scenario and problem. Each question presents a unique solution to the problem. You must determine whether the solution meets the stated goals. More than one solution in the set might solve the problem. It is also possible that none of the solutions in the set solve the problem.\nAfter you answer a question in this section, you will NOT be able to return. As a result, these questions do not appear on the Review Screen.\nYou have a Microsoft Foundry project that contains an agent. The agent generates summaries from retrieved policy documents.\nUsers report that some responses omit required regulatory clauses, even when the clauses are present in the retrieved content.\nYou need to improve response completeness.\nSolution: You run an evaluation flow that scores responses for completeness and blocks responses that fall below a defined threshold.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Yes. An evaluation flow that scores completeness and blocks responses below a threshold enforces complete responses, meeting the goal."}, {"key": "AI-103|T1|Q45", "topic": 1, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/412477-exam-ai-103-topic-1-question-45-discussion/", "text": "You are creating an image-editing workflow in a Microsoft Foundry project.\nThe workflow must meet the following requirements:\nEnsure that background objects can be removed by applying a mask-based inpainting edit.\nPreserve the original lighting and style of the edited images.\nUse the built-in image editing controls, NOT a custom model.\nYou need to ensure that image edits apply exclusively inside the masked area.\nHow should you configure the workflow?", "choices": [{"letter": "A", "text": "Set generation mode to image_variation and provide the original image as a reference."}, {"letter": "B", "text": "Enable text_to_image mode and a prompt describing the desired background removal."}, {"letter": "C", "text": "Enable image_to_image mode and a high-strength value to regenerate the full image based on the prompt."}, {"letter": "D", "text": "Enable mask_inpainting and supply both the input image and a mask indicating which part of the image to modify."}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Background removal that preserves the subject is best done with mask inpainting: supply the image plus a mask marking the region to change. Full image_to_image regeneration risks altering the subject."}, {"key": "AI-103|T1|Q46", "topic": 1, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/412478-exam-ai-103-topic-1-question-46-discussion/", "text": "You have a Microsoft Foundry project that generates product marketing images from text prompts.\nAfter publishing several images, the legal team at your company identifies a competitor’s logo on a sign in the background of an image.\nYou need to remove only the logo, while preserving the rest of the image.\nWhat should you do?", "choices": [{"letter": "A", "text": "Apply a mask-based inpainting edit to the part of the image that contains the logo."}, {"letter": "B", "text": "Increase the prompt guidance strength."}, {"letter": "C", "text": "Modify the original prompt to exclude brand names."}, {"letter": "D", "text": "Rerun the prompt by using a different random seed."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "To remove a specific logo while keeping the rest, apply mask-based inpainting to the logo region. Prompt/seed/guidance changes regenerate the whole image unpredictably."}, {"key": "AI-103|T1|Q47", "topic": 1, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/412479-exam-ai-103-topic-1-question-47-discussion/", "text": "You have a Microsoft Foundry project that contains an agent.\nThe agent ingests scanned PDF vendor invoices that contain tables and embedded QR codes.\nThe agent must preserve the PDF layout in the extracted output to ensure that downstream processing can reference sections and tables.\nYou plan to call Azure Content Understanding in Foundry Tools.\nYou need to extract content and layout elements and detect QR codes without requiring a language model deployment.\nWhich built-in analyzer should you use?", "choices": [{"letter": "A", "text": "prebuilt-documentFieldSchema"}, {"letter": "B", "text": "prebuilt-read"}, {"letter": "C", "text": "prebuilt-documentSearch"}, {"letter": "D", "text": "prebuilt-layout"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "prebuilt-layout extracts tables, structure and layout from documents with varied layouts - needed for invoices. prebuilt-read is OCR-only; the others are not layout extractors."}, {"key": "AI-103|T1|Q48", "topic": 1, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/412480-exam-ai-103-topic-1-question-48-discussion/", "text": "You have a Microsoft Foundry project that contains an agent and an image generation model deployment.\nThe agent generates original images from user-supplied product photos.\nYou need to ensure that the generated images maintain the product identity and visual characteristics of the provided photo.\nWhat should you do?", "choices": [{"letter": "A", "text": "Set the input_fidelity parameter to high."}, {"letter": "B", "text": "Apply a groundedness detection filter."}, {"letter": "C", "text": "Include a prompt and input image in the request."}, {"letter": "D", "text": "Decrease the value of the temperature parameter."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Set input_fidelity to high to preserve fine detail/text from the input image during image editing/generation."}, {"key": "AI-103|T1|Q49", "topic": 1, "question": 49, "url": "https://www.examtopics.com/discussions/microsoft/view/412481-exam-ai-103-topic-1-question-49-discussion/", "text": "HOTSPOT -\nYou have a Microsoft Foundry project that contains an agent.\nThe agent accepts user-uploaded screenshots and uses a multimodal chat model.\nSome screenshots contain potentially malicious embedded text.\nYou need to prevent a prompt injection attack and ensure that third-party content is treated as lower trust.\nHow should you configure prompt shields for document attacks? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q50", "topic": 1, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/412482-exam-ai-103-topic-1-question-50-discussion/", "text": "You are deploying a support agent that enables users to upload photos.\nYou need to automatically classify uploaded images for harmful content. The solution must block content based on severity levels.\nWhat should you do?", "choices": [{"letter": "A", "text": "Apply keyword scanning to optical character recognition (OCR) output by using Azure Vision in Foundry Tools."}, {"letter": "B", "text": "Enable prompt shields."}, {"letter": "C", "text": "Use blocklists."}, {"letter": "D", "text": "Implement image moderation."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "To screen text embedded in images, run OCR (Azure Vision) and apply keyword scanning over the OCR output. Prompt shields/blocklists/image moderation do not scan extracted in-image text the same way."}, {"key": "AI-103|T1|Q51", "topic": 1, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/412483-exam-ai-103-topic-1-question-51-discussion/", "text": "You have an app named App1 that uses a Microsoft Foundry multimodal model deployment.\nApp1 runs optical character recognition (OCR) on uploaded images and appends the OCR output to the prompt as additional context.\nSome uploaded images contain embedded text.\nYou need to prevent potentially malicious instructions from being processed by the model.\nWhat should you use?", "choices": [{"letter": "A", "text": "image moderation"}, {"letter": "B", "text": "prompt shields for documents"}, {"letter": "C", "text": "protected material text"}, {"letter": "D", "text": "prompt shields for user prompts"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Prompt shields for documents protect against injected instructions hidden in ingested documents/grounding content."}, {"key": "AI-103|T1|Q52", "topic": 1, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/412484-exam-ai-103-topic-1-question-52-discussion/", "text": "You have a Microsoft Foundry project that contains an agent.\nYou need to process mixed-format documents that contain scanned text, tables, and multicolumn layouts. The extracted content must preserve the document structure and be converted into the Markdown format for downstream reasoning.\nWhat should you configure first?", "choices": [{"letter": "A", "text": "an Azure Language in Foundry Tools text analysis model deployment"}, {"letter": "B", "text": "a generative chat completion request"}, {"letter": "C", "text": "an Azure OpenAI Responses API call that uses a multimodal model"}, {"letter": "D", "text": "an Azure Content Understanding in Foundry Tools analyzer"}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q53", "topic": 1, "question": 53, "url": "https://www.examtopics.com/discussions/microsoft/view/412485-exam-ai-103-topic-1-question-53-discussion/", "text": "You have an application that processes scanned PDF invoices. The invoices have varied layouts and include multipage tables.\nYou have a pipeline that uses optical character recognition (OCR) and extracts totals and invoice numbers. The results are often incorrect because the document structure is ignored.\nYou need to implement a solution that provides OCR, layout analysis, and template-generalizing field extraction. The solution must NOT require training a custom model. The solution must minimize administrative effort.\nWhat should you include in the solution?", "choices": [{"letter": "A", "text": "Azure Language in Foundry Tools"}, {"letter": "B", "text": "Azure Content Understanding in Foundry Tools"}, {"letter": "C", "text": "an Azure Machine Learning model"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Azure Content Understanding extracts structured fields from mixed-layout documents (tables, logos, varied layouts) - suited to invoice processing."}, {"key": "AI-103|T1|Q54", "topic": 1, "question": 54, "url": "https://www.examtopics.com/discussions/microsoft/view/412486-exam-ai-103-topic-1-question-54-discussion/", "text": "You have a Microsoft Foundry project that contains an agent.\nThe agent uses a knowledge source built from documents stored in Azure Blob Storage. The documents include digitally scanned PDFs that contain multipage tables.\nYou have an ingestion job that extracts only plain text, causing loss of table structure, headings, and page-number metadata.\nUsers frequently ask questions that require the retrieval of specific table rows across the pages.\nYou need to configure an ingestion job for a Retrieval Augmented Generation (RAG) pipeline that performs optical character recognition (OCR) on scanned PDFs, preserves tables and headings as structure-aware chunks, and stores page-number metadata with each chunk.\nHow should you configure the ingestion job?", "choices": [{"letter": "A", "text": "Use advanced data parsing to reingest the documents."}, {"letter": "B", "text": "Use OCR and page-level chunking."}, {"letter": "C", "text": "Use page-level OCR extraction and store each page as a single chunk."}, {"letter": "D", "text": "Use basic parsing and fixed-size chunking."}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q55", "topic": 1, "question": 55, "url": "https://www.examtopics.com/discussions/microsoft/view/412487-exam-ai-103-topic-1-question-55-discussion/", "text": "You have a Microsoft Foundry project that contains an agent.\nThe agent uses Azure AI Search as the retriever.\nYou plan to ingest PDF into an Azure AI Search index to ensure that the agent can ground responses in texts in both documents and embedded images.\nUsers require citations that link to the source files.\nYou need to ensure that during indexing, the images are extracted into a structure that can be used as input for the built-in optical character recognition (OCR) skill.\nWhich indexing approach should you use?", "choices": [{"letter": "A", "text": "an indexer to extract image data into a normalized_images collection"}, {"letter": "B", "text": "a Shaper skill to restructure the OCR input"}, {"letter": "C", "text": "a skillset to run the OCR skill directly against the content field of the index"}, {"letter": "D", "text": "the outputFieldMappings parameter to write image data to a searchable field"}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q56", "topic": 1, "question": 56, "url": "https://www.examtopics.com/discussions/microsoft/view/412488-exam-ai-103-topic-1-question-56-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will bed to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the “Next” button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the “Question” button to return to the question.\nOverview -\nCompany Information -\nContoso, Ltd is a multinational retail company that builds, deploys, and manages generative AI and agent-based solutions by using Microsoft Foundry.\nExisting Environment -\nIdentity Environment -\nContoso uses Microsoft Entra ID for identity management, authentication, and authorization capabilities that enable agents to access organizational resources and services.\nContoso recently formed a new AI engineering team named Agent1Dev Team to optimize and maintain existing AI solutions.\nThe team collaborates with solution architects, DevOps engineers, and security engineers to design, implement. monitor, and secure AI applications.\nContoso also has a team named Agent1Test Team that is responsible for validating AI solutions before the solution deployments.\nGenerative Environment -\nContoso has a Microsoft Foundry deployment that contains two projects named Project1 and Project2.\nProject1 -\nProject1 contains a customer support agent named Agent1 that assists customers with product inquiries and troubleshooting requests.\nAgent1 has the following configurations:\nAgent1 uses a base model deployment.\nA safety evaluation pipeline is NOT enabled.\nTool invocation approval workflows are NOT enabled.\nConversation memory constraints are NOT configured.\nAgent1 interacts with customers by using digital support channels and answers general questions about Contoso products.\nProject1 is deployed to an Azure region located in the European Union (EU).\nAgent1Dev Team will use Project1 to optimize and maintain Agent1.\nProject2 -\nProject2 contains a deployed video generation model. The marketing department at Contoso has access to Project2 and plans to use the model to develop a video creation solution.\nDevelopment of the solution is incomplete.\nData Environment -\nContoso stores product-related information in Azure resources that support AI applications.\nThe Azure environment contains an Azure Blob Storage account named storage1 that stores product detail sheets for all the Contoso products.\nThe product sheets include specifications, feature descriptions, and product support information that Agent1 can use to answer customer questions. The product sheets are stored in the PDF format.\nProblem Statements -\nContoso identifies the following issues:\nAgent1 has only general knowledge of the Contoso products.\nA recent chat interaction with Agent1 was analyzed for sentiment. The results of the analysis have NOT been processed yet.\nAgent1 does NOT use the detailed product information in the product sheets stored in storage1 when responding to customer questions.\nThe finance department at Contoso reports that vendor invoices must be reviewed manually to ensure that the invoices match the terms defined in the vendor contracts. The invoices contain tables, logos, and varied layouts that make the documents difficult to process consistently.\nRequirements -\nPlanned Changes -\nContoso plans to implement the following changes:\nImplement a solution for Project1 that analyzes the vendor invoices by evaluating both the visual layout and the textual content of the invoices, so that the invoice details can be verified against the vendor contract terms.\nUpdate the base model deployment used by Agent1 and standardize the model version to ensure continuity and consistent responses.\nEnable Agent1 to retrieve and use the detailed product information from the product sheets stored in storage1.\nImplement an indexing solution for the product sheets that Agent1 can use to answer customer questions.\nComplete the development of the video creation solution.\nTechnical Requirements -\nContoso identifies the following technical requirements:\nThe model deployment used by Agent1 must support scalable, high-throughput generative AI workloads and dynamically scale to handle variable customer support traffic, without requiring reserved throughput capacity.\nThe product sheets must be processed by using an indexing pipeline that enables semantic and vector search, so that Agent1 can retrieve the relevant product information.\nResponses generated by using the product sheet information must be relevant, complete, and accurate.\nAgent1 must be able to use the product sheets to answer natural language questions about product details.\nThe model version used by Agent1 must remain consistent to ensure stable responses.\nThe data processed by the model must remain within the EU.\nSecurity and Compliance Requirements\nContoso identifies the following security and compliance requirements:\nAPI keys must NOT be used to access Foundry-deployed models.\nAccess to the Azure resources must follow the principle of least privilege.\nThe developers at Contoso must authenticate to Microsoft Foundry resources by using Microsoft Entra authentication.\nAccess to Project1 must be assigned to the members of Agent1Dev Team by using a security group named SC_Agent1_Dev.\nAccess to Project1 must be assigned to the members of Agent1Test Team by using a security group named SC_Agent1_Test.\nAgent1 must never reveal customer information, even if a document that contains customer data is added erroneously to the product sheet repository in storage1.\nThe product sheets might contain images that include embedded text. Agent1 must be protected from malicious instructions potentially hidden within the images.\nBusiness Requirements -\nContoso identifies the following business requirements:\nUsers that interact with Agent1 must have a personalized experience in future interactions, including the ability for Agent1 to retain conversation context and recall relevant information from previous interactions.\nAgent1 must answer questions only about the products sold by Contoso.\nYou need to recommend an invoice review solution that resolves the issue reported by the finance department.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "chat completions"}, {"letter": "B", "text": "Azure Document Intelligence in Foundry Tools"}, {"letter": "C", "text": "Azure Content Understanding in Foundry Tools"}, {"letter": "D", "text": "Image Analysis"}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Azure Content Understanding handles multi-format/multimodal extraction for varied invoice layouts. Document Intelligence/Image Analysis/chat completions are narrower."}, {"key": "AI-103|T1|Q57", "topic": 1, "question": 57, "url": "https://www.examtopics.com/discussions/microsoft/view/412489-exam-ai-103-topic-1-question-57-discussion/", "text": "You have a Microsoft Foundry project that contains an agent.\nThe knowledge source for the agent is a set of scanned PDF troubleshooting guides stored in Azure Blob Storage. The guide pages contain two-column layouts and tables.\nYou use Azure Content Understanding in Foundry Tools to process the PDFs.\nYou plan to ingest the processed content into an index for Retrieval Augmented Generation (RAG) and store extracted fields for downstream automation.\nStakeholders must be able to verify where each extracted field value came from in the original PDF and route low-reliability extractions for manual review.\nYou need to ensure that the Content Understanding document analyzer output includes a per-field confidence score and source grounding to locations within the source document.\nWhat should you do?", "choices": [{"letter": "A", "text": "Set enableSegment to true."}, {"letter": "B", "text": "Provide labeled samples."}, {"letter": "C", "text": "Enable estimateFieldSourceAndConfidence."}, {"letter": "D", "text": "Configure the analyzer to use generative extraction for all fields."}], "community": null, "type": "multiple-choice", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-103|T1|Q58", "topic": 1, "question": 58, "url": "https://www.examtopics.com/discussions/microsoft/view/412490-exam-ai-103-topic-1-question-58-discussion/", "text": "You are building a speech processing solution in Microsoft Foundry for a customer support platform.\nThe platform will transcribe live phone calls, so that supervisors at your company can view call transcripts and detect issues while the calls are in progress. The call audio will arrive as a continuous stream from the telephony system.\nYou need to ensure that the call transcripts appear within only a few seconds of the audio stream.\nWhat should you do?", "choices": [{"letter": "A", "text": "Use text to speech by using a custom neural voice."}, {"letter": "B", "text": "Use speech translation to generate the transcripts into multiple languages."}, {"letter": "C", "text": "Run a batch transcription job on recorded audio files."}, {"letter": "D", "text": "Use real-time speech to text to process streaming audio input."}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "For large volumes of recorded audio files, run a batch transcription job - the scalable, asynchronous option. Real-time is for live streams."}, {"key": "AI-103|T1|Q59", "topic": 1, "question": 59, "url": "https://www.examtopics.com/discussions/microsoft/view/412491-exam-ai-103-topic-1-question-59-discussion/", "text": "You are creating an agent workflow in a Microsoft Foundry project to support natural voice interactions.\nThe agent must receive continuous audio input, convert the input into text for reasoning, and then return spoken responses to a user. The workflow must meet the following requirements:\nSupport turn-taking dynamics, where the agent begins to generate the speech output before the user finishes speaking.\nOperate with low latency to maintain conversational experience.\nYou need to enable both speech to text and text to speech in a real-time agent interaction.\nWhat should you do?", "choices": [{"letter": "A", "text": "Use batch transcription to convert the audio input and return text responses from the agent."}, {"letter": "B", "text": "Use real-time speech to text for incoming audio and text to speech for agent responses."}, {"letter": "C", "text": "Use an embeddings model to encode the audio, and then decode the audio into text and speech."}, {"letter": "D", "text": "Use speech translation to convert the audio into another language and return the translated text."}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "For a live voice agent, use real-time speech to text for incoming audio and text to speech for responses - the standard low-latency conversational pattern."}, {"key": "AI-103|T1|Q60", "topic": 1, "question": 60, "url": "https://www.examtopics.com/discussions/microsoft/view/412492-exam-ai-103-topic-1-question-60-discussion/", "text": "You have an application named App1 that uses Azure Speech in Foundry Tools to transcribe live calls.\nTranscript segments often contain both English and Spanish. App1 sends each segment to Azure Translator in Foundry Tools to translate to another language.\nSometimes, mixed-language segments result in incomplete or incorrect translations.\nYou need to reduce translation errors. The solution must ensure that the entire transcript is translated successfully.\nWhat should you do before sending the segments to Translator?", "choices": [{"letter": "A", "text": "Use document translation to translate the entire transcript as a single document."}, {"letter": "B", "text": "Split the mixed-language segments into single-language segments and translate each segment separately."}, {"letter": "C", "text": "Enable automatic language detection for the translation request."}, {"letter": "D", "text": "Specify English as the source language in the translation request for all the segments."}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Split mixed-language segments into single-language segments and translate each separately so Translator handles each correctly. Treating mixed text as one document/source language degrades quality."}, {"key": "AI-103|T1|Q61", "topic": 1, "question": 61, "url": "https://www.examtopics.com/discussions/microsoft/view/412493-exam-ai-103-topic-1-question-61-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this c the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will bed to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the “Next” button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the “Question” button to return to the question.\nOverview -\nCompany Information -\nContoso, Ltd is a multinational retail company that builds, deploys, and manages generative AI and agent-based solutions by using Microsoft Foundry.\nExisting Environment -\nIdentity Environment -\nContoso uses Microsoft Entra ID for identity management, authentication, and authorization capabilities that enable agents to access organizational resources and services.\nContoso recently formed a new AI engineering team named Agent1Dev Team to optimize and maintain existing AI solutions.\nThe team collaborates with solution architects, DevOps engineers, and security engineers to design, implement. monitor, and secure AI applications.\nContoso also has a team named Agent1Test Team that is responsible for validating AI solutions before the solution deployments.\nGenerative Environment -\nContoso has a Microsoft Foundry deployment that contains two projects named Project1 and Project2.\nProject1 -\nProject1 contains a customer support agent named Agent1 that assists customers with product inquiries and troubleshooting requests.\nAgent1 has the following configurations:\nAgent1 uses a base model deployment.\nA safety evaluation pipeline is NOT enabled.\nTool invocation approval workflows are NOT enabled.\nConversation memory constraints are NOT configured.\nAgent1 interacts with customers by using digital support channels and answers general questions about Contoso products.\nProject1 is deployed to an Azure region located in the European Union (EU).\nAgent1Dev Team will use Project1 to optimize and maintain Agent1.\nProject2 -\nProject2 contains a deployed video generation model. The marketing department at Contoso has access to Project2 and plans to use the model to develop a video creation solution.\nDevelopment of the solution is incomplete.\nData Environment -\nContoso stores product-related information in Azure resources that support AI applications.\nThe Azure environment contains an Azure Blob Storage account named storage1 that stores product detail sheets for all the Contoso products.\nThe product sheets include specifications, feature descriptions, and product support information that Agent1 can use to answer customer questions. The product sheets are stored in the PDF format.\nProblem Statements -\nContoso identifies the following issues:\nAgent1 has only general knowledge of the Contoso products.\nA recent chat interaction with Agent1 was analyzed for sentiment. The results of the analysis have NOT been processed yet.\nAgent1 does NOT use the detailed product information in the product sheets stored in storage1 when responding to customer questions.\nThe finance department at Contoso reports that vendor invoices must be reviewed manually to ensure that the invoices match the terms defined in the vendor contracts. The invoices contain tables, logos, and varied layouts that make the documents difficult to process consistently.\nRequirements -\nPlanned Changes -\nContoso plans to implement the following changes:\nImplement a solution for Project1 that analyzes the vendor invoices by evaluating both the visual layout and the textual content of the invoices, so that the invoice details can be verified against the vendor contract terms.\nUpdate the base model deployment used by Agent1 and standardize the model version to ensure continuity and consistent responses.\nEnable Agent1 to retrieve and use the detailed product information from the product sheets stored in storage1.\nImplement an indexing solution for the product sheets that Agent1 can use to answer customer questions.\nComplete the development of the video creation solution.\nTechnical Requirements -\nContoso identifies the following technical requirements:\nThe model deployment used by Agent1 must support scalable, high-throughput generative AI workloads and dynamically scale to handle variable customer support traffic, without requiring reserved throughput capacity.\nThe product sheets must be processed by using an indexing pipeline that enables semantic and vector search, so that Agent1 can retrieve the relevant product information.\nResponses generated by using the product sheet information must be relevant, complete, and accurate.\nAgent1 must be able to use the product sheets to answer natural language questions about product details.\nThe model version used by Agent1 must remain consistent to ensure stable responses.\nThe data processed by the model must remain within the EU.\nSecurity and Compliance Requirements\nContoso identifies the following security and compliance requirements:\nAPI keys must NOT be used to access Foundry-deployed models.\nAccess to the Azure resources must follow the principle of least privilege.\nThe developers at Contoso must authenticate to Microsoft Foundry resources by using Microsoft Entra authentication.\nAccess to Project1 must be assigned to the members of Agent1Dev Team by using a security group named SC_Agent1_Dev.\nAccess to Project1 must be assigned to the members of Agent1Test Team by using a security group named SC_Agent1_Test.\nAgent1 must never reveal customer information, even if a document that contains customer data is added erroneously to the product sheet repository in storage1.\nThe product sheets might contain images that include embedded text. Agent1 must be protected from malicious instructions potentially hidden within the images.\nBusiness Requirements -\nContoso identifies the following business requirements:\nUsers that interact with Agent1 must have a personalized experience in future interactions, including the ability for Agent1 to retain conversation context and recall relevant information from previous interactions.\nAgent1 must answer questions only about the products sold by Contoso.\nYou need to recommend a solution to support the planned changes and technical requirements for Agent1 to use the product information stored in storage1.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "Azure Translator in Foundry Tools"}, {"letter": "B", "text": "Grounding with Bing Search"}, {"letter": "C", "text": "Azure AI Search"}, {"letter": "D", "text": "Azure Document intelligence in Foundry Tools"}], "community": null, "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Azure AI Search provides the index/retrieval layer for grounding the agent on the documents."}, {"key": "AI-103|T1|Q63", "topic": 1, "question": 63, "url": "https://www.examtopics.com/discussions/microsoft/view/412495-exam-ai-103-topic-1-question-63-discussion/", "text": "You have a Microsoft Foundry project named Project1.\nProject1 contains an application that processes PDF vendor invoices.\nYou need to configure Azure Document Intelligence in Foundry Tools to generate a Markdown output that preserves the sections and table structure of the PDFs. The solution must minimize development effort.\nWhat should you do?", "choices": [{"letter": "A", "text": "Configure output=figures when you analyze the PDF."}, {"letter": "B", "text": "Configure content=markdown when you analyze the document."}, {"letter": "C", "text": "Increase the confidence threshold."}, {"letter": "D", "text": "Set the output_content_format=ContentFormat.MARKDOWN value."}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Configure content=markdown so the analyzer returns structured markdown (preserving tables/headings) for downstream processing."}, {"key": "AI-103|T1|Q64", "topic": 1, "question": 64, "url": "https://www.examtopics.com/discussions/microsoft/view/412496-exam-ai-103-topic-1-question-64-discussion/", "text": "You have a Microsoft Foundry project that ingests scanned PDF invoices stored in Azure Blob Storage. Each invoice contains printed fine items and has a table-based layout.\nExtracted results are stored as structured JSON and used as grounding data for an agent in a Retrieval Augmented Generation (RAG) solution.\nYou need to create a single analyzer that meets the following requirements:\nExtracts the invoice number, invoice date, vendor name, and total amount across varying templates\nReturns confidence scores so that results with confidence below 0.80 can be routed for supervisor review\nWhat should you use?", "choices": [{"letter": "A", "text": "a Foundry agent that has groundedness guardrails enabled to extract invoice fields and confidence scores"}, {"letter": "B", "text": "a custom Azure Content Understanding in Foundry Tools analyzer that defines the required fields as the extracted fields and the returned confidence scores for routing"}, {"letter": "C", "text": "the Azure Content Understanding in Foundry Tools prebuilt-layout analyzer"}, {"letter": "D", "text": "the Azure Content Understanding in Foundry Tools prebuilt-documentSearch analyzer and search.score from the Azure AI Search results for routing"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Use a custom Azure Content Understanding analyzer that defines the required invoice fields as the extraction schema - tailored field extraction across varied layouts. Prebuilt-layout/documentSearch are generic."}, {"key": "AI-103|T1|Q65", "topic": 1, "question": 65, "url": "https://www.examtopics.com/discussions/microsoft/view/412497-exam-ai-103-topic-1-question-65-discussion/", "text": "You have a Microsoft Foundry project that uses Azure AI Search to ground an agent in internal documentation.\nAfter a recent content update, users report that the agent’s answers have become less accurate.\nYou need to identify whether the retrieved content is negatively influencing the model’s generated responses.\nWhich observability signal should you review?", "choices": [{"letter": "A", "text": "indexer status and failure history"}, {"letter": "B", "text": "latency breakdown traces"}, {"letter": "C", "text": "prediction drift metrics"}, {"letter": "D", "text": "groundedness evaluation metrics"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "When responses are incomplete/ungrounded, review groundedness evaluation metrics to see whether outputs are supported by retrieved content. Indexer status/latency/drift address other failure modes."}], "AI-300": [{"key": "AI-300|T2|Q1", "topic": 2, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404549-exam-ai-300-topic-2-question-1-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will need to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the \"Next\" button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the \"Question\" button to return to the question.\nBackground -\nFabrikam Inc. is a mid-sized healthcare analytics company that provides population health dashboards and predictive insights to regional hospital systems across the United States. Fabrikam Inc. customers rely on near real time analytics to monitor patient flow, staffing needs, and readmission risks. They use multiple traditional forecasting machine learning models for predictions.\nFabrikam Inc. has an established Microsoft Azure footprint. The company uses Jupyter Notebooks that run on a local server as the primary development environment. The data science team is experiencing scalability, asset management and code management issues with the current development platform. Fabrikam Inc. plans to migrate to a cloud-based development environment to mitigate the issues.\nAdditionally, the company plans to implement a Retrieval-Augmented Generation (RAG)-based chat application for client support. Leadership requires the application to be developed and deployed with a low operational risk.\nCurrent Environment -\nFabrikam Inc. operates a single Azure subscription that has the following components:\nAzure Data Lake Storage Gen2 that contains de-identified clinical and operational datasets\nAzure AI Search indexing curated analytical documents and reference materials\nA small set of Python-based training scripts maintained by data scientists\nAzure OpenAI Service with deployed foundational models\nA Microsoft Foundry resource for building a RAG-based solution\nEvaluation data has manually defined expected responses.\nThe current challenges faced by the data science team include the following:\nModel training jobs are run manually from notebooks.\nExperiment tracking is inconsistent\nModel versions are registered without standardized metadata.\nDeployment is performed manually by data scientists, with limited rollback capability.\nThe team has no standardized evaluation process for generative AI outputs.\nThe environment currently allows public network access. Authentication relies on user accounts rather than managed identities. Compute targets are manually created and shared across experiments. This has led to resource contention during peak usage.\nBusiness Requirements -\nFabrikam Inc. has the following business requirements for the modernization initiative:\nProvide a conversational interface that answers analytics questions by using internal documents and datasets.\nEnsure that sensitive healthcare-related data is not exposed outside the Fabrikam Inc. Azure tenant.\nEnable repeatable and auditable model training and deployment processes.\nSupport experimentation to compare prompt strategies and fine-tuned models.\nAlign the model with the ranked preferences and optimize behavior for the long term.\nMinimize disruption to existing analytics workloads during rollout.\nTechnical Requirements -\nTo support the business goals, Fabrikam Inc. identifies these technical requirements:\nUse Azure Machine Learning workspaces to centrally manage data assets, models, and environments.\nImplement experiment tracking and model versioning for all training jobs.\nOrchestrate training and evaluation by using pipelines rather than manually running notebooks.\nDeploy traditional machine learning models with support for staged rollout and rollback.\nImprove RAG-based solution output quality.\nUse the existing evaluation datasets that are based on real data with input-output pairs.\nApply advanced fine-tuning techniques only when prompt engineering is insufficient\nIssues and Constraints -\nFabrikam Inc. must comply with internal security policies that require the company to restrict network access and avoid long-lived secrets. The data science team has limited Azure DevOps experience, so solutions must favor managed services and automation over custom infrastructure.\nCost predictability is important. Leadership prefers serverless or managed compute options where possible but is willing to approve dedicated compute for stable production workloads.\nProblem Statement -\nFabrikam Inc. must design and implement an Azure-based AI operations solution that enables reliable training, evaluation, deployment, and iteration of generative AI models. The solution must support experimentation and gradual rollout while ensuring governance, security, and operational stability. The data science and platform teams must collaborate to deliver this solution by using Azure Machine Learning and Microsoft Foundry capabilities.\nYou need to standardize how Fabrikam Inc. manages machine learning assets.\nWhich action should you perform first?", "choices": [{"letter": "A", "text": "Register assets in the Azure Machine Learning registry."}, {"letter": "B", "text": "Create a shared Azure Machine Learning workspace."}, {"letter": "C", "text": "Deploy a managed online endpoint."}, {"letter": "D", "text": "Create a new Microsoft Foundry project."}], "community": "B", "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Standardizing ML asset management starts with a shared Azure Machine Learning workspace - it is the top-level container that centrally manages data, models, environments and compute. Registries (A) are for cross-workspace sharing and come later."}, {"key": "AI-300|T2|Q2", "topic": 2, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404550-exam-ai-300-topic-2-question-2-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will need to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the \"Next\" button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the \"Question\" button to return to the question.\nBackground -\nFabrikam Inc. is a mid-sized healthcare analytics company that provides population health dashboards and predictive insights to regional hospital systems across the United States. Fabrikam Inc. customers rely on near real time analytics to monitor patient flow, staffing needs, and readmission risks. They use multiple traditional forecasting machine learning models for predictions.\nFabrikam Inc. has an established Microsoft Azure footprint. The company uses Jupyter Notebooks that run on a local server as the primary development environment. The data science team is experiencing scalability, asset management and code management issues with the current development platform. Fabrikam Inc. plans to migrate to a cloud-based development environment to mitigate the issues.\nAdditionally, the company plans to implement a Retrieval-Augmented Generation (RAG)-based chat application for client support. Leadership requires the application to be developed and deployed with a low operational risk.\nCurrent Environment -\nFabrikam Inc. operates a single Azure subscription that has the following components:\nAzure Data Lake Storage Gen2 that contains de-identified clinical and operational datasets\nAzure AI Search indexing curated analytical documents and reference materials\nA small set of Python-based training scripts maintained by data scientists\nAzure OpenAI Service with deployed foundational models\nA Microsoft Foundry resource for building a RAG-based solution\nEvaluation data has manually defined expected responses.\nThe current challenges faced by the data science team include the following:\nModel training jobs are run manually from notebooks.\nExperiment tracking is inconsistent\nModel versions are registered without standardized metadata.\nDeployment is performed manually by data scientists, with limited rollback capability.\nThe team has no standardized evaluation process for generative AI outputs.\nThe environment currently allows public network access. Authentication relies on user accounts rather than managed identities. Compute targets are manually created and shared across experiments. This has led to resource contention during peak usage.\nBusiness Requirements -\nFabrikam Inc. has the following business requirements for the modernization initiative:\nProvide a conversational interface that answers analytics questions by using internal documents and datasets.\nEnsure that sensitive healthcare-related data is not exposed outside the Fabrikam Inc. Azure tenant.\nEnable repeatable and auditable model training and deployment processes.\nSupport experimentation to compare prompt strategies and fine-tuned models.\nAlign the model with the ranked preferences and optimize behavior for the long term.\nMinimize disruption to existing analytics workloads during rollout.\nTechnical Requirements -\nTo support the business goals, Fabrikam Inc. identifies these technical requirements:\nUse Azure Machine Learning workspaces to centrally manage data assets, models, and environments.\nImplement experiment tracking and model versioning for all training jobs.\nOrchestrate training and evaluation by using pipelines rather than manually running notebooks.\nDeploy traditional machine learning models with support for staged rollout and rollback.\nImprove RAG-based solution output quality.\nUse the existing evaluation datasets that are based on real data with input-output pairs.\nApply advanced fine-tuning techniques only when prompt engineering is insufficient\nIssues and Constraints -\nFabrikam Inc. must comply with internal security policies that require the company to restrict network access and avoid long-lived secrets. The data science team has limited Azure DevOps experience, so solutions must favor managed services and automation over custom infrastructure.\nCost predictability is important. Leadership prefers serverless or managed compute options where possible but is willing to approve dedicated compute for stable production workloads.\nProblem Statement -\nFabrikam Inc. must design and implement an Azure-based AI operations solution that enables reliable training, evaluation, deployment, and iteration of generative AI models. The solution must support experimentation and gradual rollout while ensuring governance, security, and operational stability. The data science and platform teams must collaborate to deliver this solution by using Azure Machine Learning and Microsoft Foundry capabilities.\nYou need to isolate training workloads while remaining cost-aware to address Fabrikam Inc.’s issues, constraints, and technical requirements.\nWhat should you implement?", "choices": [{"letter": "A", "text": "Training jobs that run on a single shared compute cluster"}, {"letter": "B", "text": "Fixed-size compute cluster"}, {"letter": "C", "text": "Dedicated compute clusters per experiment"}, {"letter": "D", "text": "Managed compute targets with autoscaling"}], "community": "D", "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Managed compute targets with autoscaling isolate workloads while staying cost-aware: nodes scale up on demand and back to zero when idle, avoiding the contention of a shared cluster (A) and the waste of a fixed-size (B) or always-dedicated (C) cluster."}, {"key": "AI-300|T2|Q3", "topic": 2, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404551-exam-ai-300-topic-2-question-3-discussion/", "text": "HOTSPOT -\nA team trains an MLflow model that scores customer churn risk. The model will be consumed by different downstream systems.\nOne system requests predictions synchronously during customer interactions.\nAnother system submits files containing millions of records for scheduled scoring.\nYou need to deploy the model by using managed inference options that match each usage pattern.\nWhich option should you use for each usage pattern? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T2|Q4", "topic": 2, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404552-exam-ai-300-topic-2-question-4-discussion/", "text": "You manage an Azure Machine learning workspace. You develop a machine learning model.\nYou must deploy the model to use a low-priority VM with a pricing discount.\nYou need to deploy the model.\nWhich compute target should you use?", "choices": [{"letter": "A", "text": "Azure Container Instances (ACI)"}, {"letter": "B", "text": "Azure Machine Learning compute clusters"}, {"letter": "C", "text": "Local deployment"}, {"letter": "D", "text": "Azure Kubernetes Service (AKS)"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Azure Machine Learning compute clusters support low-priority (spot) VMs at a discount. ACI and AKS do not offer the low-priority/spot pricing tier, and local deployment has no Azure discount."}, {"key": "AI-300|T2|Q5", "topic": 2, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404553-exam-ai-300-topic-2-question-5-discussion/", "text": "A team manages an Azure Machine Learning workspace where they deploy models to online endpoints.\nThe team needs to introduce a new version of a model to production without disrupting existing users.\nThe team must validate the new version before full rollout.\nYou need to reduce risk during deployment.\nWhat should you do?", "choices": [{"letter": "A", "text": "Deploy the model to a batch endpoint."}, {"letter": "B", "text": "Split traffic between deployments."}, {"letter": "C", "text": "Replace the existing endpoint."}, {"letter": "D", "text": "Route all traffic to the new deployment."}], "community": "B", "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "For a safe, gradual rollout you split traffic between the existing and new deployments behind one online endpoint (blue/green / canary). Replacing or routing 100% (C, D) removes the staged rollback ability; batch (A) is not for live traffic."}, {"key": "AI-300|T2|Q6", "topic": 2, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404554-exam-ai-300-topic-2-question-6-discussion/", "text": "You have a deployment of an Azure OpenAI Service base model.\nYou plan to fine-tune the model.\nYou need to prepare a file that contains training data.\nWhich file format should you use?", "choices": [{"letter": "A", "text": "CSV"}, {"letter": "B", "text": "TSV"}, {"letter": "C", "text": "JSONL"}, {"letter": "D", "text": "JSON"}], "community": "C", "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "Azure OpenAI fine-tuning and most generative training datasets require JSONL (one JSON object per line). CSV/TSV/plain JSON are not the expected format."}, {"key": "AI-300|T2|Q7", "topic": 2, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404555-exam-ai-300-topic-2-question-7-discussion/", "text": "You have a deployment of an Azure OpenAI Service base model.\nYou plan to fine-tune the model.\nYou need to prepare a file that contains training data for multi-turn chat.\nWhich file encoding method should you use?", "choices": [{"letter": "A", "text": "ISO-8859-1"}, {"letter": "B", "text": "UTF-16"}, {"letter": "C", "text": "UTF-8"}, {"letter": "D", "text": "ASCII"}], "community": "C", "type": "multiple-choice", "kiro_answer": "C", "kiro_rationale": "UTF-8 is the required/standard encoding for Azure AI training and JSONL data files."}, {"key": "AI-300|T2|Q8", "topic": 2, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/404556-exam-ai-300-topic-2-question-8-discussion/", "text": "You are fine-tuning a base language model to analyze customer feedback.\nYou label examples of support tickets. You must improve classification accuracy by configuring and fine-tuning the base model in Microsoft Foundry.\nYou need to configure and run fine-tuning.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Use prompt flow to generate multiple prompt templates for evaluation."}, {"letter": "B", "text": "Deploy the base model to an online endpoint before starting fine-tuning."}, {"letter": "C", "text": "Enable tracing for all inference calls in the evaluation pipeline."}, {"letter": "D", "text": "Format the dataset as a JSONL file with prompt-completion pairs and upload the file."}], "community": "D", "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "Before fine-tuning you must prepare and upload the training data as a JSONL file of prompt-completion (or messages) pairs. The other steps are not the prerequisite first action."}, {"key": "AI-300|T2|Q9", "topic": 2, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/404557-exam-ai-300-topic-2-question-9-discussion/", "text": "A team is working in Microsoft Foundry to test and compare large language model (LLM) prompt variants in a development environment.\nThe team requires consistent inputs to evaluate prompt variants without relying on live user traffic.\nYou need to create a controlled evaluation of input data.\nWhich action should you perform first?", "choices": [{"letter": "A", "text": "Generate synthetic interaction data."}, {"letter": "B", "text": "Configure content filters."}, {"letter": "C", "text": "Apply a blocklist."}, {"letter": "D", "text": "Enable observability metrics."}], "community": null, "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "To evaluate prompt variants with consistent inputs and no live traffic, first generate synthetic interaction/test data to use as a controlled evaluation dataset."}, {"key": "AI-300|T2|Q10", "topic": 2, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/404558-exam-ai-300-topic-2-question-10-discussion/", "text": "DRAG DROP -\nA team maintains Infrastructure as Code (IaC) templates to provision Azure Machine Learning resources.\nProvisioning must be triggered by changes in the templates and executed without manual intervention.\nYou need to automate resource provisioning.\nWhich action should you take for each requirement? To answer, move the appropriate actions to the correct requirements. You may use each action once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T2|Q11", "topic": 2, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/404559-exam-ai-300-topic-2-question-11-discussion/", "text": "An organization maintains separate Azure Machine Learning workspaces for development and production.\nBoth environments must use the same validated assets without duplicating them.\nAssets must be shared across workspaces while maintaining centralized governance and version control.\nYou need to enable reuse of assets across workspaces without copying them.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable workspace-level Git integration and sync assets between repositories."}, {"letter": "B", "text": "Publish the asset as a pipeline component."}, {"letter": "C", "text": "Create a shared Azure Machine Learning environment that includes the asset."}, {"letter": "D", "text": "Publish the asset to an Azure Machine Learning registry."}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "To make an asset reusable and governable across workspaces/projects, publish it to an Azure Machine Learning registry. Git sync, pipeline components and environments do not provide the cross-workspace asset sharing a registry does."}, {"key": "AI-300|T2|Q12", "topic": 2, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/404560-exam-ai-300-topic-2-question-12-discussion/", "text": "An Azure Machine Learning workspace processes sensitive training data.\nThe workspace must NOT be accessible from the public internet.\nYou need to restrict network access.\nWhich configuration should you implement?", "choices": [{"letter": "A", "text": "Azure Firewall rules"}, {"letter": "B", "text": "Private endpoints"}, {"letter": "C", "text": "Network security groups"}, {"letter": "D", "text": "Service endpoints"}], "community": "B", "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "Private endpoints restrict access to Azure ML / dependent resources over a private IP and remove public exposure - the standard way to meet 'no public network access'. NSGs/firewall/service endpoints are weaker, subnet-level controls."}, {"key": "AI-300|T2|Q13", "topic": 2, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/404561-exam-ai-300-topic-2-question-13-discussion/", "text": "A team is experimenting with traditional models for a classification workflow in Azure Machine Learning.\nThe team requires a consistent way to manage assets that are created during experimentation.\nYou need to ensure that artifacts can be reused and governed across projects.\nWhich asset should you register?", "choices": [{"letter": "A", "text": "Model"}, {"letter": "B", "text": "Component"}, {"letter": "C", "text": "Environment"}, {"letter": "D", "text": "Pipeline"}], "community": "B", "type": "multiple-choice", "kiro_answer": "A", "kiro_rationale": "Registering the Model asset makes the trained artifact versioned, reusable and governed across projects. Components, environments and pipelines serve other purposes."}, {"key": "AI-300|T2|Q14", "topic": 2, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/404562-exam-ai-300-topic-2-question-14-discussion/", "text": "HOTSPOT -\nYou manage an Azure Machine Learning workspace named workspace1 by using the Python SDK v2.\nThe default datastore of workspace1 contains a folder named sample_data. The folder structure contains the following content:\nYou write Python SDK v2 code to materialize the data from the files in the sample_data folder into a Pandas data frame.\nYou need to complete the Python SDK v2 code to use the MLTable folder as the materialization blueprint.\nHow should you complete the code? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T2|Q15", "topic": 2, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/404563-exam-ai-300-topic-2-question-15-discussion/", "text": "HOTSPOT -\nYou manage an Azure Machine Learning workspace named workspace1 by using the Python SDK v2. You create a General Purpose v2 Azure storage account named mlstorage1. The storage account includes a publicly accessible container named mlcontainer1. The container stores 10 blobs with files in the CSV format.\nYou must develop Python SDK v2 code to create a data asset referencing all blobs in the container named mlcontainer1.\nYou need to complete the Python SDK v2 code.\nHow should you complete the code? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T2|Q16", "topic": 2, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/404564-exam-ai-300-topic-2-question-16-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou manage an Azure Machine Learning workspace. The Python script named script.py reads an argument named training_data. The training_data argument specifies the path to the training data in a file named dataset1.csv.\nYou plan to run the script.py Python script as a command job that trains a machine learning model.\nYou need to provide the command to pass the path for the dataset as a parameter value when you submit the script as a training job.\nSolution: python train.py --training_data training_data\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. 'python train.py --training_data training_data' runs the wrong script (train.py vs script.py) and passes the literal string 'training_data' instead of binding the job input. It does not pass the dataset path."}, {"key": "AI-300|T2|Q17", "topic": 2, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/404565-exam-ai-300-topic-2-question-17-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou manage an Azure Machine Learning workspace. The Python script named script.py reads an argument named training_data. The training_data argument specifies the path to the training data in a file named dataset1.csv.\nYou plan to run the script.py Python script as a command job that trains a machine learning model.\nYou need to provide the command to pass the path for the dataset as a parameter value when you submit the script as a training job.\nSolution: python script.py --trainingdata ${{inputs.training_data}}\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. The script reads an argument named 'training_data', but the command supplies '--trainingdata' (missing underscore), so the argument name does not match. Community also voted B."}, {"key": "AI-300|T2|Q18", "topic": 2, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/404566-exam-ai-300-topic-2-question-18-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou manage an Azure Machine Learning workspace. The Python script named script.py reads an argument named training_data. The training_data argument specifies the path to the training data in a file named dataset1.csv.\nYou plan to run the script.py Python script as a command job that trains a machine learning model.\nYou need to provide the command to pass the path for the dataset as a parameter value when you submit the script as a training job.\nSolution: python script.py dataset1.csv\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "No. 'python script.py dataset1.csv' hard-codes the file as a positional value and does not bind it to the job input '${{inputs.training_data}}', so it does not pass the parameter correctly for a command job."}, {"key": "AI-300|T3|Q1", "topic": 3, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404567-exam-ai-300-topic-3-question-1-discussion/", "text": "Case Study -\nThis is a case study. Case studies are not timed separately from other exam sections. You can use as much exam time as you would like to complete each case study. However, there might be additional case studies or other exam sections. Manage your time to ensure that you can complete all the exam sections in the time provided. Pay attention to the Exam Progress at the top of the screen so you have sufficient time to complete any exam sections that follow this case study.\nTo answer the case study questions, you will need to reference information that is provided in the case. Case studies and associated questions might contain exhibits or other resources that provide more information about the scenario described in the case. Information provided in an individual question does not apply to the other questions in the case study.\nA Review Screen will appear at the end of this case study. From the Review Screen, you can review and change your answers before you move to the next exam section. After you leave this case study, you will NOT be able to return to it.\nTo start the case study -\nTo display the first question in this case study, select the \"Next\" button. To the left of the question, a menu provides links to information such as business requirements, the existing environment, and problem statements. Please read through all this information before answering any questions. When you are ready to answer a question, select the \"Question\" button to return to the question.\nBackground -\nFabrikam Inc. is a mid-sized healthcare analytics company that provides population health dashboards and predictive insights to regional hospital systems across the United States. Fabrikam Inc. customers rely on near real time analytics to monitor patient flow, staffing needs, and readmission risks. They use multiple traditional forecasting machine learning models for predictions.\nFabrikam Inc. has an established Microsoft Azure footprint. The company uses Jupyter Notebooks that run on a local server as the primary development environment. The data science team is experiencing scalability, asset management and code management issues with the current development platform. Fabrikam Inc. plans to migrate to a cloud-based development environment to mitigate the issues.\nAdditionally, the company plans to implement a Retrieval-Augmented Generation (RAG)-based chat application for client support. Leadership requires the application to be developed and deployed with a low operational risk.\nCurrent Environment -\nFabrikam Inc. operates a single Azure subscription that has the following components:\nAzure Data Lake Storage Gen2 that contains de-identified clinical and operational datasets\nAzure AI Search indexing curated analytical documents and reference materials\nA small set of Python-based training scripts maintained by data scientists\nAzure OpenAI Service with deployed foundational models\nA Microsoft Foundry resource for building a RAG-based solution\nEvaluation data has manually defined expected responses.\nThe current challenges faced by the data science team include the following:\nModel training jobs are run manually from notebooks.\nExperiment tracking is inconsistent\nModel versions are registered without standardized metadata.\nDeployment is performed manually by data scientists, with limited rollback capability.\nThe team has no standardized evaluation process for generative AI outputs.\nThe environment currently allows public network access. Authentication relies on user accounts rather than managed identities. Compute targets are manually created and shared across experiments. This has led to resource contention during peak usage.\nBusiness Requirements -\nFabrikam Inc. has the following business requirements for the modernization initiative:\nProvide a conversational interface that answers analytics questions by using internal documents and datasets.\nEnsure that sensitive healthcare-related data is not exposed outside the Fabrikam Inc. Azure tenant.\nEnable repeatable and auditable model training and deployment processes.\nSupport experimentation to compare prompt strategies and fine-tuned models.\nAlign the model with the ranked preferences and optimize behavior for the long term.\nMinimize disruption to existing analytics workloads during rollout.\nTechnical Requirements -\nTo support the business goals, Fabrikam Inc. identifies these technical requirements:\nUse Azure Machine Learning workspaces to centrally manage data assets, models, and environments.\nImplement experiment tracking and model versioning for all training jobs.\nOrchestrate training and evaluation by using pipelines rather than manually running notebooks.\nDeploy traditional machine learning models with support for staged rollout and rollback.\nImprove RAG-based solution output quality.\nUse the existing evaluation datasets that are based on real data with input-output pairs.\nApply advanced fine-tuning techniques only when prompt engineering is insufficient\nIssues and Constraints -\nFabrikam Inc. must comply with internal security policies that require the company to restrict network access and avoid long-lived secrets. The data science team has limited Azure DevOps experience, so solutions must favor managed services and automation over custom infrastructure.\nCost predictability is important. Leadership prefers serverless or managed compute options where possible but is willing to approve dedicated compute for stable production workloads.\nProblem Statement -\nFabrikam Inc. must design and implement an Azure-based AI operations solution that enables reliable training, evaluation, deployment, and iteration of generative AI models. The solution must support experimentation and gradual rollout while ensuring governance, security, and operational stability. The data science and platform teams must collaborate to deliver this solution by using Azure Machine Learning and Microsoft Foundry capabilities.\nYou need to recommend an experiment-tracking strategy that ensures consistent experiment results.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Azure Machine Learning job output logs"}, {"letter": "B", "text": "MLflow experiment tracking"}, {"letter": "C", "text": "Application Insights logs"}, {"letter": "D", "text": "Azure Monitor alerts"}], "community": null, "type": "multiple-choice", "kiro_answer": "B", "kiro_rationale": "MLflow experiment tracking is the built-in way to record and compare metrics/params/artifacts across Azure ML training runs. Job logs, App Insights and Monitor alerts are not experiment-comparison tools."}, {"key": "AI-300|T3|Q2", "topic": 3, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404600-exam-ai-300-topic-3-question-2-discussion/", "text": "HOTSPOT -\nA machine learning model is deployed to production in Azure Machine Learning and is actively serving predictions for a business application. The model was trained by using a historical dataset that represented expected input patterns at the time of deployment.\nThe team working on the model must ensure the following:\nChanges in input data distribution are detected.\nAppropriate actions are triggered when predefined thresholds are exceeded.\nYou need to configure monitoring to meet the requirements.\nWhich configuration should you use for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q3", "topic": 3, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404601-exam-ai-300-topic-3-question-3-discussion/", "text": "You create a binary classification model. You use the Fairlearn package to assess model fairness.\nYou must eliminate the need to retrain the model.\nYou need to implement the Fairlearn package.\nWhich algorithm should you use?", "choices": [{"letter": "A", "text": "fairiearn.reductions.ExponentiatedGradient"}, {"letter": "B", "text": "fairlearn.preprocessing.CorrelationRemover"}, {"letter": "C", "text": "fairlearn.reductions.GridSearch"}, {"letter": "D", "text": "fairlearn.postprocessing.ThresholdOptimizer"}], "community": null, "type": "multiple-choice", "kiro_answer": "D", "kiro_rationale": "fairlearn.postprocessing.ThresholdOptimizer adjusts decision thresholds on an already-trained model to satisfy fairness constraints without retraining - the typical post-hoc mitigation."}, {"key": "AI-300|T3|Q4", "topic": 3, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404602-exam-ai-300-topic-3-question-4-discussion/", "text": "DRAG DROP -\nA real-time endpoint is deployed in Azure Machine Learning to serve predictions to a web application.\nUsers report intermittent failures and unexpected responses when calling the endpoint.\nYou need to identify the appropriate troubleshooting action for each reported issue.\nWhich troubleshooting action should you perform for each issue? To answer, move the appropriate troubleshooting actions to the correct issues. You may use each troubleshooting action once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q5", "topic": 3, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404603-exam-ai-300-
