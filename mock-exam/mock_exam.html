sed worldwide.\nYou need to run a URL ping test once every five minutes and create an alert when the web app is unavailable from specific Azure regions. The solution must minimize development time.\nWhat should you do?", "choices": [{"letter": "A", "text": "Create an Azure Monitor Availability metric and alert."}, {"letter": "B", "text": "Create an Azure Application Insights availability test and alert."}, {"letter": "C", "text": "Write an Azure function and deploy the function to the specific regions."}, {"letter": "D", "text": "Create an Azure Service Health alert for the specific regions."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "An Application Insights availability (URL ping) test runs every 5 min from regions and alerts on outages with minimal dev time."}, {"key": "AZ-400|T2|Q6", "topic": 2, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/35799-exam-az-400-topic-2-question-6-discussion/", "text": "You have a multi-tier application. The front end of the application is hosted in Azure App Service.\nYou need to identify the average load times of the application pages.\nWhat should you use?", "choices": [{"letter": "A", "text": "Azure Application Insights"}, {"letter": "B", "text": "the activity log of the App Service"}, {"letter": "C", "text": "the diagnostics logs of the App Service"}, {"letter": "D", "text": "Azure Advisor"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Application Insights reports average page load times for the App Service front end."}, {"key": "AZ-400|T2|Q7", "topic": 2, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/79976-exam-az-400-topic-2-question-7-discussion/", "text": "SIMULATION -\nYou need to create an instance of Azure Application Insights named az400-123456789-main and configure the instance to receive telemetry data from an Azure web app named az400-123456789-main.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q8", "topic": 2, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/35611-exam-az-400-topic-2-question-8-discussion/", "text": "Your company uses ServiceNow for incident management.\nYou develop an application that runs on Azure.\nThe company needs to generate a ticket in ServiceNow when the application fails to authenticate.\nWhich Azure Log Analytics solution should you use?", "choices": [{"letter": "A", "text": "Application Insights Connector"}, {"letter": "B", "text": "Automation & Control"}, {"letter": "C", "text": "IT Service Management Connector (ITSM)"}, {"letter": "D", "text": "Insight & Analytics"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "The IT Service Management Connector (ITSM) creates ServiceNow tickets from Azure alerts/logs."}, {"key": "AZ-400|T2|Q9", "topic": 2, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/18625-exam-az-400-topic-2-question-9-discussion/", "text": "HOTSPOT -\nYour company is building a new web application.\nYou plan to collect feedback from pilot users on the features being delivered.\nAll the pilot users have a corporate computer that has Google Chrome and the Microsoft Test & Feedback extension installed. The pilot users will test the application by using Chrome.\nYou need to identify which access levels are required to ensure that developers can request and gather feedback from the pilot users. The solution must use the principle of least privilege.\nWhich access levels in Azure DevOps should you identify? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0004800001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q10", "topic": 2, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/55100-exam-az-400-topic-2-question-10-discussion/", "text": "You use Azure SQL Database Intelligent Insights and Azure Application Insights for monitoring.\nYou need to write ad-hoc queries against the monitoring data.\nWhich query language should you use?", "choices": [{"letter": "A", "text": "Kusto Query Language (KQL)"}, {"letter": "B", "text": "PL/pgSQL"}, {"letter": "C", "text": "PL/SQL"}, {"letter": "D", "text": "Transact-SQL"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Kusto Query Language (KQL) is used for ad-hoc queries over Application Insights / Log Analytics data."}, {"key": "AZ-400|T2|Q11", "topic": 2, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/26060-exam-az-400-topic-2-question-11-discussion/", "text": "Your company creates a web application.\nYou need to recommend a solution that automatically sends to Microsoft Teams a daily summary of the exceptions that occur in the application.\nWhich two Azure services should you recommend? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Azure Logic Apps"}, {"letter": "B", "text": "Azure Pipelines"}, {"letter": "C", "text": "Microsoft Visual Studio App Center"}, {"letter": "D", "text": "Azure DevOps Project"}, {"letter": "E", "text": "Azure Application Insights"}], "community": "AE", "type": "multiple-choice", "images": [], "kiro_answer": "AE", "kiro_rationale": "Application Insights (E) captures exceptions; a Logic App (A) posts the daily summary to Microsoft Teams."}, {"key": "AZ-400|T2|Q12", "topic": 2, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/17061-exam-az-400-topic-2-question-12-discussion/", "text": "DRAG DROP -\nYour company wants to use Azure Application Insights to understand how user behaviors affect an application.\nWhich Application Insights tool should you use to analyze each behavior? To answer, drag the appropriate tools to the correct behaviors. Each tool may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0005200001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q13", "topic": 2, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/16580-exam-az-400-topic-2-question-13-discussion/", "text": "Your company is building a mobile app that targets Android and iOS devices.\nYour team uses Azure DevOps to manage all work items and release cycles.\nYou need to recommend a solution to perform the following tasks:\n✑ Collect crash reports for issue analysis.\n✑ Distribute beta releases to your testers.\n✑ Get user feedback on the functionality of new apps.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "the Microsoft Test & Feedback extension"}, {"letter": "B", "text": "Microsoft Visual Studio App Center integration"}, {"letter": "C", "text": "Azure Application Insights widgets"}, {"letter": "D", "text": "Jenkins integration"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Visual Studio App Center integration collects crash reports, distributes beta builds and gathers user feedback."}, {"key": "AZ-400|T2|Q14", "topic": 2, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/17247-exam-az-400-topic-2-question-14-discussion/", "text": "You have an Azure DevOps project named Project1 and an Azure subscription named Sub1. Sub1 contains an Azure virtual machine scale set named VMSS1.\nVMSS1 hosts a web application named WebApp1. WebApp1 uses stateful sessions.\nThe WebApp1 installation is managed by using the Custom Script extension. The script resides in an Azure Storage account named sa1.\nYou plan to make a minor change to a UI element of WebApp1 and to gather user feedback about the change.\nYou need to implement limited user testing for the new version of WebApp1 on VMSS1.\nWhich three actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Modify the load balancer settings of VMSS1."}, {"letter": "B", "text": "Redeploy VMSS1."}, {"letter": "C", "text": "Upload a custom script file to sa1."}, {"letter": "D", "text": "Modify the Custom Script extension settings of VMSS1."}, {"letter": "E", "text": "Update the configuration of a virtual machine in VMSS1."}], "community": "CDE", "type": "multiple-choice", "images": [], "kiro_answer": "CDE", "kiro_rationale": "Upload a new custom script to sa1 (C), update the Custom Script extension (D), and update a VM's config (E) to canary the new version on part of VMSS1."}, {"key": "AZ-400|T2|Q15", "topic": 2, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/75423-exam-az-400-topic-2-question-15-discussion/", "text": "SIMULATION -\nYou need to create a notification if the peak average response time of an Azure web app named az400-123456789-main is more than five seconds when evaluated during a five-minute period. The notification must trigger the `https://contoso.com/notify` webhook.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q16", "topic": 2, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/90217-exam-az-400-topic-2-question-16-discussion/", "text": "SIMULATION -\nYou need to create and configure an Azure Storage account named az400lod123456789stor in a resource group named RG1lod123456789 to store the boot diagnostics for a virtual machine named VM1.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q17", "topic": 2, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/57999-exam-az-400-topic-2-question-17-discussion/", "text": "SIMULATION -\nYou have a web app that connects to an Azure SQL Database named db1.\nYou need to configure db1 to send Query Store runtime statistics to Azure Log Analytics.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q18", "topic": 2, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/49525-exam-az-400-topic-2-question-18-discussion/", "text": "DRAG DROP -\nYou have several Azure virtual machines that run Windows Server 2019.\nYou need to identify the distinct event IDs of each virtual machine as shown in the following table.\nHow should you complete the Azure Monitor query? To answer, drag the appropriate values to the correct locations. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0006100001.png", "/assets/media/exam-media/04257/0006200001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q19", "topic": 2, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/57162-exam-az-400-topic-2-question-19-discussion/", "text": "HOTSPOT -\nYou have an Azure web app named Webapp1.\nYou need to use an Azure Monitor query to create a report that details the top 10 pages of Webapp1 that failed.\nHow should you complete the query? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0006400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q20", "topic": 2, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/45570-exam-az-400-topic-2-question-20-discussion/", "text": "You are monitoring the health and performance of an Azure web app by using Azure Application Insights.\nYou need to ensure that an alert is sent when the web app has a sudden rise in performance issues and failures.\nWhat should you use?", "choices": [{"letter": "A", "text": "custom events"}, {"letter": "B", "text": "Application Insights Profiler"}, {"letter": "C", "text": "usage analysis"}, {"letter": "D", "text": "Smart Detection"}, {"letter": "E", "text": "Continuous export"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Smart Detection automatically alerts on sudden rises in failures/performance issues in Application Insights."}, {"key": "AZ-400|T2|Q21", "topic": 2, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/48922-exam-az-400-topic-2-question-21-discussion/", "text": "HOTSPOT -\nYou have a project in Azure DevOps named Contoso App that contains pipelines in Azure Pipelines for GitHub repositories.\nYou need to ensure that developers receive Microsoft Teams notifications when there are failures in a pipeline of Contoso App.\nWhat should you run in Teams? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0006700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q22", "topic": 2, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/54343-exam-az-400-topic-2-question-22-discussion/", "text": "You have a private GitHub repository.\nYou need to display the commit status of the repository on Azure Boards.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Configure multi-factor authentication (MFA) for your GitHub account."}, {"letter": "B", "text": "Add the Azure Pipelines app to the GitHub repository."}, {"letter": "C", "text": "Add the Azure Boards app to the repository."}, {"letter": "D", "text": "Create a GitHub action in GitHub."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Add the Azure Boards app to the GitHub repository first to surface commit status on Boards."}, {"key": "AZ-400|T2|Q23", "topic": 2, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/35955-exam-az-400-topic-2-question-23-discussion/", "text": "You are integrating Azure Pipelines and Microsoft Teams.\nYou install the Azure Pipelines app in Microsoft Teams.\nYou have an Azure DevOps organization named Contoso that contains a project name Project1.\nYou subscribe to Project1 in Microsoft Teams.\nYou need to ensure that you only receive events about failed builds in Microsoft Teams.\nWhat should you do first?", "choices": [{"letter": "A", "text": "From Microsoft Teams, run @azure pipelines subscribe https://dev.azure.com/Contoso/Project1."}, {"letter": "B", "text": "From Azure Pipelines, add a Publish Build Artifacts task to Project1."}, {"letter": "C", "text": "From Microsoft Teams, run @azure pipelines subscriptions."}, {"letter": "D", "text": "From Azure Pipelines, enable continuous integration for Project1."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Run '@azure pipelines subscriptions' in Teams to manage subscriptions and filter to failed builds only."}, {"key": "AZ-400|T2|Q24", "topic": 2, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/36353-exam-az-400-topic-2-question-24-discussion/", "text": "You have an Azure DevOps organization named Contoso.\nYou need to receive Microsoft Teams notifications when work items are updated.\nWhat should you do?", "choices": [{"letter": "A", "text": "From Azure DevOps, configure a service hook subscription"}, {"letter": "B", "text": "From Microsoft Teams, configure a connector"}, {"letter": "C", "text": "From the Microsoft Teams admin center, configure external access"}, {"letter": "D", "text": "From Microsoft Teams, add a channel"}, {"letter": "E", "text": "From Azure DevOps, install an extension"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Configure a service hook subscription in Azure DevOps to send work-item update notifications to Teams. NOTE: community voted B (Teams connector) - both are defensible; verify."}, {"key": "AZ-400|T2|Q25", "topic": 2, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/49130-exam-az-400-topic-2-question-25-discussion/", "text": "You create an alert rule in Azure Monitor as shown in the following exhibit.\nWhich action will trigger an alert?", "choices": [{"letter": "A", "text": "a failed attempt to delete the ASP-9bb7 resource"}, {"letter": "B", "text": "a change to a role assignment for the ASP-9bb7 resource"}, {"letter": "C", "text": "a successful attempt to delete the ASP-9bb7 resource"}, {"letter": "D", "text": "a failed attempt to scale up the ASP-9bb7 resource"}], "community": "A", "type": "multiple-choice", "images": ["/assets/media/exam-media/04257/0007200001.jpg"], "kiro_answer": "A", "kiro_rationale": "Activity-log alert rules fire on operations; a failed delete attempt matches the rule's signal."}, {"key": "AZ-400|T2|Q26", "topic": 2, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/52925-exam-az-400-topic-2-question-26-discussion/", "text": "You have a web app hosted on Azure App Service. The web app stores data in an Azure SQL database.\nYou need to generate an alert when there are 10,000 simultaneous connections to the database. The solution must minimize development effort.\nWhich option should you select in the Diagnostics settings of the database?", "choices": [{"letter": "A", "text": "Send to Log Analytics"}, {"letter": "B", "text": "Stream to an event hub"}, {"letter": "C", "text": "Archive to a storage account"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Send diagnostics to Log Analytics and alert on the connection metric with minimal effort."}, {"key": "AZ-400|T2|Q27", "topic": 2, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/51081-exam-az-400-topic-2-question-27-discussion/", "text": "HOTSPOT -\nYou use Azure DevOps to manage the build and deployment of an app named App1.\nYou have a release pipeline that deploys a virtual machine named VM1.\nYou plan to monitor the release pipeline by using Azure Monitor.\nYou need to create an alert to monitor the performance of VM1. The alert must be triggered when the average CPU usage exceeds 70 percent for five minutes.\nThe alert must calculate the average once every minute.\nHow should you configure the alert rule? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0007600001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q28", "topic": 2, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/78608-exam-az-400-topic-2-question-28-discussion/", "text": "You have an Azure virtual machine that is monitored by using Azure Monitor.\nThe virtual machine has the Azure Log Analytics agent installed.\nYou plan to deploy the Service Map solution from the Azure Marketplace.\nWhat should you deploy to the virtual machine to support the Service Map solution?", "choices": [{"letter": "A", "text": "the Dependency agent"}, {"letter": "B", "text": "the Telegraf agent"}, {"letter": "C", "text": "the Windows Azure diagnostics extension (WAD)"}, {"letter": "D", "text": "the Azure monitor agent"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Service Map requires the Dependency agent (alongside the Log Analytics agent)."}, {"key": "AZ-400|T2|Q29", "topic": 2, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/78607-exam-az-400-topic-2-question-29-discussion/", "text": "HOTSPOT -\nYou have a project in Azure DevOps that contains a Continuous Integration/Continuous Deployment (CI/CD) pipeline.\nYou need to enable detailed logging by defining a pipeline variable.\nHow should you configure the variable? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0008000001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q30", "topic": 2, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/78910-exam-az-400-topic-2-question-30-discussion/", "text": "You build an iOS app.\nYou receive crash reports from Crashlytics.\nYou need to capture the following data:\n✑ Crash-free users\n✑ Custom events\n✑ Breadcrumbs\nWhat should you do?", "choices": [{"letter": "A", "text": "Configure the xcworkspace file in the project"}, {"letter": "B", "text": "Add the GoogleAnalytics pod to the app."}, {"letter": "C", "text": "Configure the Crashlytics pod in the app."}, {"letter": "D", "text": "Import the Firebase module to UIApplicationDelegate."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Import the Firebase module into UIApplicationDelegate to capture crash-free users, custom events and breadcrumbs."}, {"key": "AZ-400|T2|Q31", "topic": 2, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/95731-exam-az-400-topic-2-question-31-discussion/", "text": "You have multiple teams that work on multiple projects in Azure DevOps.\nYou need to plan and manage the consumers and producers for each project. The solution must provide an overview of all the projects.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add a Predecessor or Successor link to the feature or user story for the items of each project."}, {"letter": "B", "text": "Add a Parent or Child link to the feature or user story for the items of each project."}, {"letter": "C", "text": "Install the Dependency Tracker extension and create dependencies for each project."}, {"letter": "D", "text": "Create a custom query to show the consumers and producers and add a widget to a dashboard."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "The Dependency Tracker extension manages producers/consumers across projects with an overview."}, {"key": "AZ-400|T2|Q32", "topic": 2, "question": 32, "url": "https://www.examtopics.com/discussions/microsoft/view/95732-exam-az-400-topic-2-question-32-discussion/", "text": "DRAG DROP\n-\nYou have a GitHub repository that contains the source code for an app named App1.\nYou need to create process documentation for App1. The solution must include a diagram that displays the relationships between the phases of App1 as shown in the following exhibit.\nHow should you complete the markdown code? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image1.png", "https://img.examtopics.com/az-400/image2.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q33", "topic": 2, "question": 33, "url": "https://www.examtopics.com/discussions/microsoft/view/95734-exam-az-400-topic-2-question-33-discussion/", "text": "HOTSPOT\n-\nYou have an Azure web app named webapp1 that uses the .NET Core runtime stack. You have an Azure Application Insights resource named AppInsights1 that collects telemetry data generated by webapp1.\nYou plan to deploy webapp1 by using an Azure DevOps pipeline.\nYou need to modify the sampling rate of the telemetry data processed by AppInsights1 without having to redeploy webapp1 after each modification.\nWhat should you do? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image4.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q34", "topic": 2, "question": 34, "url": "https://www.examtopics.com/discussions/microsoft/view/95738-exam-az-400-topic-2-question-34-discussion/", "text": "Your company has multiple microservices-based apps that use the following tracing libraries:\n•\tOpenTelemetry\n•\tOpenCensus\n•\tOpenTracing\n•\tHoneycomb\n•\tJaeger\nThe company purchases an Azure subscription and implements Application Insights in Azure Monitor.\nYou plan to centralize distributed tracing for the apps.\nYou need to identify which libraries can integrate directly with Application Insights.\nWhich two libraries should you identify? Each correct answer presents a complete solution.\nNOTE: Each correct solution is worth one point.", "choices": [{"letter": "A", "text": "Honeycomb"}, {"letter": "B", "text": "OpenTracing"}, {"letter": "C", "text": "Jaeger"}, {"letter": "D", "text": "OpenTelemtry"}, {"letter": "E", "text": "OpenCensus"}], "community": "DE", "type": "multiple-choice", "images": [], "kiro_answer": "DE", "kiro_rationale": "OpenTelemetry and OpenCensus integrate directly with Application Insights."}, {"key": "AZ-400|T2|Q35", "topic": 2, "question": 35, "url": "https://www.examtopics.com/discussions/microsoft/view/95739-exam-az-400-topic-2-question-35-discussion/", "text": "You have an Azure web app named webapp1 that uses the .NET Core runtime stack. You have an Azure Application Insights resource named AppInsights1. Webapp1 sends telemetry data to AppInsights1.\nYou need to ensure that webapp1 sends the telemetry data at a fixed sampling rate.\nWhat should you do?", "choices": [{"letter": "A", "text": "From the code repository of webapp1, modify the ApplicationInsights.config file."}, {"letter": "B", "text": "From the code repository of webapp1, modify the Startup.cs file."}, {"letter": "C", "text": "From AppInsights1, modify the Usage and estimated costs settings."}, {"letter": "D", "text": "From AppInsights1, configure the Continuous export settings."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Fixed-rate sampling for a .NET Core app is configured in Startup.cs (ApplicationInsights.config is for .NET Framework)."}, {"key": "AZ-400|T2|Q36", "topic": 2, "question": 36, "url": "https://www.examtopics.com/discussions/microsoft/view/96334-exam-az-400-topic-2-question-36-discussion/", "text": "DRAG DROP\n-\nYou have an app named App1. You have a Log Analytics workspace named Workspace1 that contains two tables named Events and Logs. App1 manages events in multiple locations and writes logs to Workspace1.\nYou need to query Workspace1 for all log entries related to Asia that occurred during the last two days.\nIn which order should you arrange the query statements? To answer, move all statements from the list of statements to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image6.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q37", "topic": 2, "question": 37, "url": "https://www.examtopics.com/discussions/microsoft/view/111389-exam-az-400-topic-2-question-37-discussion/", "text": "DRAG DROP\n-\nYou have a web app named App1 that uses Application Insights in Azure Monitor.\nYou need to compare the hourly CPU usage of App1 from the last 24 hours. The solution must include a graph that has a threshold line at 75 percent.\nHow should you complete the query? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image54.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q38", "topic": 2, "question": 38, "url": "https://www.examtopics.com/discussions/microsoft/view/111390-exam-az-400-topic-2-question-38-discussion/", "text": "You use Azure Pipelines to build and deploy an app named App1.\nYou plan to monitor App1 by using Application Insights.\nYou create an Application Insights instance named AI1.\nYou need to configure App1 to use AI1.\nWhich file should you modify?", "choices": [{"letter": "A", "text": "appsettings.json"}, {"letter": "B", "text": "launchSettings.json"}, {"letter": "C", "text": "startup.cs"}, {"letter": "D", "text": "project.json"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Set the Application Insights connection string/instrumentation key in appsettings.json."}, {"key": "AZ-400|T2|Q39", "topic": 2, "question": 39, "url": "https://www.examtopics.com/discussions/microsoft/view/111391-exam-az-400-topic-2-question-39-discussion/", "text": "HOTSPOT\n-\nYou have an Azure virtual machine named web1.\nYou need to query the amount of free memory that was available on web1 during the past seven days. The solution must meet the following requirements:\n•\tDisplay the data as a time chart.\n•\tCalculate the average value per hour.\nHow should you complete the KQL query? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image56.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q40", "topic": 2, "question": 40, "url": "https://www.examtopics.com/discussions/microsoft/view/114975-exam-az-400-topic-2-question-40-discussion/", "text": "DRAG DROP\n-\nYou have a web app named App1 that uses Application Insights in Azure Monitor to store log data. App1 has users in multiple locations.\nYou need to query App1 requests from London and Paris that return a 404 error. The solution must meet the following requirements:\n•\tReturn the timestamp url, resultCode, and duration fields\n•\tOnly show requests made during the last hour.\nHow should you complete the query? To answer, drag the appropriate values to the correct targets. Each value may be used once, more than once, or not at all.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image74.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q41", "topic": 2, "question": 41, "url": "https://www.examtopics.com/discussions/microsoft/view/122238-exam-az-400-topic-2-question-41-discussion/", "text": "DRAG DROP\n-\nYou have a project in Azure DevOps.\nYou need to configure a dashboard. The solution must include the following metrics:\n•\tBottlenecks in the software development process\n•\tA burndown chart for the work in a single iteration\n•\tHow long it takes to close a work item after the item was started\nWhich type of widget should you use for each metric? To answer, drag the appropriate widget types to the correct metrics. Each widget type may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image82.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q42", "topic": 2, "question": 42, "url": "https://www.examtopics.com/discussions/microsoft/view/127099-exam-az-400-topic-2-question-42-discussion/", "text": "You have an Azure subscription that contains a Log Analytics workspace named WS1 and a virtual machine named VM1.\nYou need to install the Microsoft Enterprise Cloud Monitoring extension on VM1.\nWhich two values are required to configure the extension? Each correct answer presents part of the solution.\nNOTE: Each correct answer is worth one point.", "choices": [{"letter": "A", "text": "the secret key of WS1"}, {"letter": "B", "text": "the ID of the subscription"}, {"letter": "C", "text": "the system-assigned managed identity of VM1"}, {"letter": "D", "text": "the ID of WS1"}, {"letter": "E", "text": "the resource ID of VM1"}], "community": "AD", "type": "multiple-choice", "images": [], "kiro_answer": "AD", "kiro_rationale": "The Microsoft Monitoring/Enterprise Cloud Monitoring extension needs the workspace ID (D) and the workspace key/secret (A)."}, {"key": "AZ-400|T2|Q43", "topic": 2, "question": 43, "url": "https://www.examtopics.com/discussions/microsoft/view/127100-exam-az-400-topic-2-question-43-discussion/", "text": "You have an app named App1 that uses Application Insights to monitor application performance.\nYou need to analyze how often a page in App1 is accessed.\nWhich pane in Application Insights should you use?", "choices": [{"letter": "A", "text": "Events"}, {"letter": "B", "text": "Sessions"}, {"letter": "C", "text": "Impact"}, {"letter": "D", "text": "Users"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "The Events pane shows how often a specific page/event is accessed."}, {"key": "AZ-400|T2|Q44", "topic": 2, "question": 44, "url": "https://www.examtopics.com/discussions/microsoft/view/127102-exam-az-400-topic-2-question-44-discussion/", "text": "HOTSPOT\n-\nYou have a project in Azure DevOps that includes two users named User1 and User2.\nYou plan to use Azure Monitor to manage logs.\nYou need to ensure that the users can perform the actions shown in following the table.\nThe solution must follow the principle of least privilege.\nWhich role should you assign to each user? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image91.png", "https://img.examtopics.com/az-400/image92.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q45", "topic": 2, "question": 45, "url": "https://www.examtopics.com/discussions/microsoft/view/146357-exam-az-400-topic-2-question-45-discussion/", "text": "DRAG DROP\n-\nYou have a project in Azure DevOps.\nYou need to configure a dashboard that will provide information on the following metrics.\n•\tHow long it takes to close a work item\n•\tThe number of completed backlog items\n•\tHow long it takes to restore failed services\nWhich type of widget should you use for each metric? To answer, drag the appropriate widget types to the correct metrics. Each widget type may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image114.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q46", "topic": 2, "question": 46, "url": "https://www.examtopics.com/discussions/microsoft/view/146322-exam-az-400-topic-2-question-46-discussion/", "text": "You have an Azure App Service app named App1.\nYou need to identify when App1 was offline. The solution must minimize administrative effort.\nWhich troubleshooting category in App Service diagnostics should you use?", "choices": [{"letter": "A", "text": "Navigator"}, {"letter": "B", "text": "Configuration and Management"}, {"letter": "C", "text": "Diagnostic Tools"}, {"letter": "D", "text": "Availability and Performance"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "App Service diagnostics 'Availability and Performance' identifies when the app was offline."}, {"key": "AZ-400|T2|Q47", "topic": 2, "question": 47, "url": "https://www.examtopics.com/discussions/microsoft/view/146323-exam-az-400-topic-2-question-47-discussion/", "text": "You have an Azure subscription that contains an Azure Kubernetes Service (AKS) instance named AKS1.\nYou collect and analyze metrics for AKS1 by using the Azure Monitor managed service for Prometheus.\nYou need to analyze the performance of AKS1.\nWhich query language should you use?", "choices": [{"letter": "A", "text": "PL/SQL"}, {"letter": "B", "text": "PromQL"}, {"letter": "C", "text": "SparkQL"}, {"letter": "D", "text": "KQL"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Prometheus metrics are queried with PromQL."}, {"key": "AZ-400|T2|Q48", "topic": 2, "question": 48, "url": "https://www.examtopics.com/discussions/microsoft/view/146360-exam-az-400-topic-2-question-48-discussion/", "text": "HOTSPOT\n-\nYou are interrogating logs by using KQL.\nYou execute the query shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image140.png", "https://img.examtopics.com/az-400/image141.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q50", "topic": 2, "question": 50, "url": "https://www.examtopics.com/discussions/microsoft/view/151125-exam-az-400-topic-2-question-50-discussion/", "text": "SIMULATION\n-\nFor the RG1lod12345678 resource group, you need to create an action group named DevOpsAG that can be triggered in any region by using Alerts.\nThe action group must email two users named [email protected] and [email protected] and notify members of the Owner role for the resource.\nUse only the common alert schema for notifying the resource owners.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q51", "topic": 2, "question": 51, "url": "https://www.examtopics.com/discussions/microsoft/view/147259-exam-az-400-topic-2-question-51-discussion/", "text": "SIMULATION\n-\nYou need to write a KQL query that will count the number of inbound requests for each source IP address, for any connection made during the last three months of 2021.\nOn Azure Data Explorer by using the following link:\nhttps://dataexplorer.azure.corn/clusters/help/databases/SecurityLogs\nThe requests are contained in a table named InboundBrowsing in the SecurityLogs connection.\nThe query must return two columns named NumberOfRequests and SourceIP.\nExport the query result to C:\\Samples.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q52", "topic": 2, "question": 52, "url": "https://www.examtopics.com/discussions/microsoft/view/149161-exam-az-400-topic-2-question-52-discussion/", "text": "HOTSPOT\n-\nYou have an Azure subscription that contains multiple web apps.\nYou need to enable Change Analysis for the web apps.\nHow should you complete the script? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/az-400/image171.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T3|Q1", "topic": 3, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/74028-exam-az-400-topic-3-question-1-discussion/", "text": "You have an Azure subscription that contains multiple Azure services.\nYou need to send an SMS alert when scheduled maintenance is planned for the Azure services.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Enable Azure Security Center."}, {"letter": "B", "text": "Create and configure an Azure Monitor alert rule."}, {"letter": "C", "text": "Create an Azure Service Health alert."}, {"letter": "D", "text": "Create and configure an action group."}], "community": "CD", "type": "multiple-choice", "images": [], "kiro_answer": "CD", "kiro_rationale": "Create a Service Health alert (C) for planned maintenance and an action group (D) configured with an SMS action."}, {"key": "AZ-400|T3|Q2", "topic": 3, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/76638-exam-az-400-topic-3-question-2-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps organization named Contoso and an Azure subscription. The subscription contains an Azure virtual machine scale set named VMSS1 that is configured for autoscaling.\nYou have a project in Azure DevOps named Project1. Project1 is used to build a web app named App1 and deploy App1 to VMSS1.\nYou need to ensure that an email alert is generated whenever VMSS1 scales in or out.\nSolution: From Azure Monitor, configure the autoscale settings.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Azure Monitor autoscale settings can email on scale in/out via the autoscale notifications."}, {"key": "AZ-400|T3|Q3", "topic": 3, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/74090-exam-az-400-topic-3-question-3-discussion/", "text": "You configure Azure Application Insights and the shared service plan tier for a web app.\nYou enable Smart Detection.\nYou confirm that standard metrics are visible in the logs, but when you test a failure, you do not receive a Smart Detection notification.\nWhat prevents the Smart Detection notification from being sent?", "choices": [{"letter": "A", "text": "You must enable the Snapshot Debugger for the web app."}, {"letter": "B", "text": "Smart Detection uses the first 24 hours to establish the normal behavior of the web app."}, {"letter": "C", "text": "The web app is configured to use the shared service plan tier."}, {"letter": "D", "text": "You must restart the web app before Smart Detection is enabled."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Smart Detection needs ~24 hours to learn the app's normal behavior before it can alert."}, {"key": "AZ-400|T3|Q4", "topic": 3, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/20516-exam-az-400-topic-3-question-4-discussion/", "text": "DRAG DROP -\nYou are planning projects for three customers. Each customer's preferred process for work items is shown in the following table.\nThe customers all plan to use Azure DevOps for work item management.\nWhich work item process should you use for each customer? To answer, drag the appropriate work item processes to the correct customers. Each work item process may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0008900001.png", "/assets/media/exam-media/04257/0009000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T3|Q5", "topic": 3, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/36099-exam-az-400-topic-3-question-5-discussion/", "text": "You configure an Azure Application Insights availability test.\nYou need to notify the customer services department at your company by email when availability is degraded.\nYou create an Azure logic app that will handle the email and follow up actions.\nWhich type of trigger should you use to invoke the logic app?", "choices": [{"letter": "A", "text": "an HTTPWebhook trigger"}, {"letter": "B", "text": "an HTTP trigger"}, {"letter": "C", "text": "a Request trigger"}, {"letter": "D", "text": "an ApiConnection trigger"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Use a Request trigger so the availability alert webhook can invoke the logic app over HTTP."}, {"key": "AZ-400|T3|Q6", "topic": 3, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/35946-exam-az-400-topic-3-question-6-discussion/", "text": "You have an Azure DevOps organization named Contoso and an Azure subscription.\nYou use Azure DevOps to build a containerized app named App1 and deploy App1 to an Azure container instance named ACI1.\nYou need to restart ACI1 when App1 stops responding.\nWhat should you do?", "choices": [{"letter": "A", "text": "Add a liveness probe to the YAML configuration of App1."}, {"letter": "B", "text": "Add a readiness probe to the YAML configuration of App1."}, {"letter": "C", "text": "Use Connection Monitor in Azure Network Watcher."}, {"letter": "D", "text": "Use IP flow verify in Azure Network Watcher."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A liveness probe restarts the container when the app stops responding."}, {"key": "AZ-400|T3|Q7", "topic": 3, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/18644-exam-az-400-topic-3-question-7-discussion/", "text": "You have a multi-tier application that has an Azure Web Apps front end and an Azure SQL Database back end.\nYou need to recommend a solution to capture and store telemetry data. The solution must meet the following requirements:\n✑ Support using ad-hoc queries to identify baselines.\n✑ Trigger alerts when metrics in the baseline are exceeded.\n✑ Store application and database metrics in a central location.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "Azure Event Hubs"}, {"letter": "B", "text": "Azure SQL Database Intelligent Insights"}, {"letter": "C", "text": "Azure Application Insights"}, {"letter": "D", "text": "Azure Log Analytics"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Azure Log Analytics centrally stores app+DB metrics, supports ad-hoc KQL baselines and alerting."}, {"key": "AZ-400|T3|Q8", "topic": 3, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/36102-exam-az-400-topic-3-question-8-discussion/", "text": "You have an Azure DevOps organization named Contoso and an Azure subscription. The subscription contains an Azure virtual machine scale set named VMSS1 that is configured for autoscaling.\nYou use Azure DevOps to build a web app named App1 and deploy App1 to VMSS1. App1 is used heavily and has usage patterns that vary on a weekly basis.\nYou need to recommend a solution to detect an abnormal rise in the rate of failed requests to App1. The solution must minimize administrative effort.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "the Smart Detection feature in Azure Application Insights"}, {"letter": "B", "text": "the Failures feature in Azure Application Insights"}, {"letter": "C", "text": "an Azure Service Health alert"}, {"letter": "D", "text": "an Azure Monitor alert that uses an Azure Log Analytics query"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Smart Detection in Application Insights flags abnormal rises in failed requests with minimal effort."}, {"key": "AZ-400|T3|Q9", "topic": 3, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/36092-exam-az-400-topic-3-question-9-discussion/", "text": "SIMULATION -\nYou need to ensure that Microsoft Visual Studio 2017 can remotely attach to an Azure Function named fa-11566895.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T3|Q10", "topic": 3, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/44298-exam-az-400-topic-3-question-10-discussion/", "text": "You have an Azure subscription that contains resources in several resource groups.\nYou need to design a monitoring strategy that will provide a consolidated view. The solution must support the following requirements:\n✑ Support role-based access control (RBAC) by using Azure Active Directory (Azure AD) identifies.\n✑ Include visuals from Azure Monitor that are generated by using the Kusto query language.\n✑ Support documentation written in markdown.\n✑ Use the latest data available for each visual.\nWhat should you use to create the consolidated view?", "choices": [{"letter": "A", "text": "Azure Monitor"}, {"letter": "B", "text": "Microsoft Power BI"}, {"letter": "C", "text": "Azure Data Explorer"}, {"letter": "D", "text": "Azure dashboards"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Azure dashboards give a consolidated, RBAC-controlled view with KQL visuals, markdown tiles and live data."}, {"key": "AZ-400|T3|Q11", "topic": 3, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/20531-exam-az-400-topic-3-question-11-discussion/", "text": "You are automating the testing process for your company.\nYou need to automate UI testing of a web application.\nWhich framework should you use?", "choices": [{"letter": "A", "text": "JaCoco"}, {"letter": "B", "text": "Selenium"}, {"letter": "C", "text": "Xamarin.UITest"}, {"letter": "D", "text": "Microsoft.CodeAnalysis"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Selenium is the standard framework for automated web UI testing."}, {"key": "AZ-400|T3|Q12", "topic": 3, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/44154-exam-az-400-topic-3-question-12-discussion/", "text": "You are building an ASP.NET Core application.\nYou plan to create an application utilization baseline by capturing telemetry data.\nYou need to add code to the application to capture the telemetry data. The solution must minimize the costs of storing the telemetry data.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point", "choices": [{"letter": "A", "text": "Add the <InitialSamplingPercentage>99</InitialSamplingPercentage> parameter to the ApplicationInsights.config file."}, {"letter": "B", "text": "From the code of the application, enable adaptive sampling."}, {"letter": "C", "text": "From the code of the application, add Azure Application Insights telemetry."}, {"letter": "D", "text": "Add the <MaxTelemetryItemsPerSecond>5</MaxTelemetryItemsPerSecond> parameter to the ApplicationInsights.config file."}, {"letter": "E", "text": "From the code of the application, disable adaptive sampling."}], "community": "CE", "type": "multiple-choice", "images": [], "kiro_answer": "BC", "kiro_rationale": "Add Application Insights telemetry (C) and enable adaptive sampling (B) to capture a baseline while minimizing storage cost."}, {"key": "AZ-400|T3|Q13", "topic": 3, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/44703-exam-az-400-topic-3-question-13-discussion/", "text": "You have an Azure DevOps organization named Contoso and an Azure subscription. The subscription contains an Azure virtual machine scale set named VMSS1 and an Azure Standard Load Balancer named LB1. LB1 distributes incoming requests across VMSS1 instances.\nYou use Azure DevOps to build a web app named App1 and deploy App1 to VMSS1. App1 is accessible via HTTPS only and configured to require mutual authentication by using a client certificate.\nYou need to recommend a solution for implementing a health check of App1. The solution must meet the following requirements:\n✑ Identify whether individual instances of VMSS1 are eligible for an upgrade operation.\n✑ Minimize administrative effort.\nWhat should you include in the recommendation?", "choices": [{"letter": "A", "text": "an Azure Load Balancer health probe"}, {"letter": "B", "text": "Azure Monitor autoscale"}, {"letter": "C", "text": "the Custom Script Extension"}, {"letter": "D", "text": "the Application Health extension"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "The Application Health extension reports per-instance health for VMSS rolling upgrades with minimal effort (works with mutual-auth HTTPS)."}, {"key": "AZ-400|T3|Q14", "topic": 3, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/48663-exam-az-400-topic-3-question-14-discussion/", "text": "HOTSPOT -\nYou have an application named App1 that has a custom domain of app.contoso.com.\nYou create a test in Azure Application Insights as shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0009900001.jpg", "/assets/media/exam-media/04257/0010000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T3|Q15", "topic": 3, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/51100-exam-az-400-topic-3-question-15-discussion/", "text": "You have a build pipeline in Azure Pipelines that occasionally fails.\nYou discover that a test measuring the response time of an API endpoint causes the failures.\nYou need to prevent the build pipeline from failing due to the test.\nWhich two actions should you perform? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Set Flaky test detection to Off."}, {"letter": "B", "text": "Clear Flaky tests included in test pass percentage."}, {"letter": "C", "text": "Enable Test Impact Analysis (TIA)."}, {"letter": "D", "text": "Manually mark the test as flaky."}, {"letter": "E", "text": "Enable test slicing."}], "community": "BD", "type": "multiple-choice", "images": [], "kiro_answer": "BD", "kiro_rationale": "Manually mark the test as flaky (D) and exclude flaky tests from the pass percentage (B) so the build won't fail on it."}, {"key": "AZ-400|T3|Q16", "topic": 3, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/35525-exam-az-400-topic-3-question-16-discussion/", "text": "Your company hosts a web application in Azure. The company uses Azure Pipelines for the build and release management of the application.\nStakeholders report that the past few releases have negatively affected system performance.\nYou configure alerts in Azure Monitor.\nYou need to ensure that new releases are only deployed to production if the releases meet defined performance baseline criteria in the staging environment first.\nWhat should you use to prevent the deployment of releases that fall to meet the performance baseline?", "choices": [{"letter": "A", "text": "an Azure Scheduler job"}, {"letter": "B", "text": "a trigger"}, {"letter": "C", "text": "a gate"}, {"letter": "D", "text": "an Azure function"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A release gate enforces the Azure Monitor performance baseline before production deployment."}, {"key": "AZ-400|T3|Q17", "topic": 3, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/52677-exam-az-400-topic-3-question-17-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou manage a project in Azure DevOps.\nYou need to prevent the configuration of the project from changing over time.\nSolution: Perform a Subscription Health scan when packages are created.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. A Subscription Health scan does not lock project configuration from drifting over time."}, {"key": "AZ-400|T3|Q18", "topic": 3, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/35778-exam-az-400-topic-3-question-18-discussion/", "text": "Your company uses the following resources:\n✑ Windows Server 2019 container images hosted in an Azure Container Registry.\n✑ Azure virtual machines that run the latest version of Ubuntu\n✑ An Azure Log Analytics workspace\n✑ Azure Active Directory (Azure AD)\n✑ An Azure key vault\nFor which two resources can you receive vulnerability assessments in Azure Security Center? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "the Azure Log Analytics workspace"}, {"letter": "B", "text": "the Azure key vault"}, {"letter": "C", "text": "the Azure virtual machines that run the latest version of Ubuntu"}, {"letter": "D", "text": "Azure Active Directory (Azure AD)"}, {"letter": "E", "text": "The Windows Server 2019 container images hosted in the Azure Container Registry."}], "community": "CE", "type": "multiple-choice", "images": [], "kiro_answer": "CE", "kiro_rationale": "Security Center provides vulnerability assessments for the Ubuntu VMs (C) and the container images in ACR (E)."}, {"key": "AZ-400|T3|Q19", "topic": 3, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/36309-exam-az-400-topic-3-question-19-discussion/", "text": "You use Azure Pipelines to manage build pipelines, GitHub to store source code, and Dependabot to manage dependencies.\nYou have an app named App1.\nDependabot detects a dependency in App1 that requires an update.\nWhat should you do first to apply the update?", "choices": [{"letter": "A", "text": "Create a pull request."}, {"letter": "B", "text": "Approve the pull request."}, {"letter": "C", "text": "Create a branch."}, {"letter": "D", "text": "Perform a commit."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Dependabot already opens the PR with the update; you approve the pull request to apply it."}, {"key": "AZ-400|T3|Q20", "topic": 3, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/33255-exam-az-400-topic-3-question-20-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou manage a project in Azure DevOps.\nYou need to prevent the configuration of the project from changing over time.\nSolution: Add a code coverage step to the build pipelines.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Adding a code coverage step does not prevent project configuration from changing."}, {"key": "AZ-400|T3|Q21", "topic": 3, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/37488-exam-az-400-topic-3-question-21-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou manage a project in Azure DevOps.\nYou need to prevent the configuration of the project from changing over time.\nSolution: Implement Continuous Integration for the project.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Implementing CI does not lock project configuration against drift."}, {"key": "AZ-400|T3|Q22", "topic": 3, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/39067-exam-az-400-topic-3-question-22-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou manage a project in Azure DevOps.\nYou need to prevent the configuration of the project from changing over time.\nSolution: Implement Continuous Assurance for the project.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Continuous Assurance (AzSK) continuously checks and enforces the secure configuration over time."}, {"key": "AZ-400|T3|Q23", "topic": 3, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/57918-exam-az-400-topic-3-question-23-discussion/", "text": "You are designing a configuration management solution to support five apps hosted on Azure App Service. Each app is available in the following three environments: development, test, and production.\nYou need to recommend a configuration management solution that meets the following requirements:\n✑ Supports feature flags\n✑ Tracks configuration changes from the past 30 days\n✑ Stores hierarchically structured configuration values\n✑ Controls access to the configurations by using role-based access control (RBAC) permissions\n✑ Stores shared values as key/value pairs that can be used by all the apps\nWhich Azure service should you recommend as the configuration management solution?", "choices": [{"letter": "A", "text": "Azure Cosmos DB"}, {"letter": "B", "text": "Azure App Service"}, {"letter": "C", "text": "Azure App Configuration"}, {"letter": "D", "text": "Azure Key Vault"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Azure App Configuration supports feature flags, change history, hierarchical keys, RBAC and shared key/value pairs."}, {"key": "AZ-400|T3|Q24", "topic": 3, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/37404-exam-az-400-topic-3-question-24-discussion/", "text": "You have a containerized solution that runs in Azure Container Instances. The solution contains a frontend container named App1 and a backend container named DB1. DB1 loads a large amount of data during startup.\nYou need to verify that DB1 can handle incoming requests before users can submit requests to App1.\nWhat should you configure?", "choices": [{"letter": "A", "text": "a liveness probe"}, {"letter": "B", "text": "a performance log"}, {"letter": "C", "text": "a readiness probe"}, {"letter": "D", "text": "an Azure Load Balancer health probe"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A readiness probe holds traffic until DB1 finishes loading and can handle requests."}, {"key": "AZ-400|T3|Q25", "topic": 3, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/51392-exam-az-400-topic-3-question-25-discussion/", "text": "You are designing a strategy to monitor the baseline metrics of Azure virtual machines that run Windows Server.\nYou need to collect detailed data about the processes running in the guest operating system.\nWhich two agents should you deploy? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "the Telegraf agent"}, {"letter": "B", "text": "the Azure Log Analytics agent"}, {"letter": "C", "text": "the Azure Network Watcher Agent for Windows"}, {"letter": "D", "text": "the Dependency agent"}], "community": "BD", "type": "multiple-choice", "images": [], "kiro_answer": "BD", "kiro_rationale": "Deploy the Log Analytics agent (B) plus the Dependency agent (D) to collect detailed guest process data."}, {"key": "AZ-400|T3|Q26", "topic": 3, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/74033-exam-az-400-topic-3-question-26-discussion/", "text": "DRAG DROP -\nYou use Azure Pipelines to automate Continuous Integration/Continuous Deployment (CI/CD) for an Azure web app named WebApp1.\nYou configure an Azure Monitor alert that is triggered when WebApp1 generates an error.\nYou need to configure the alert to forward details of the error to a third-party system. The solution must minimize administrative effort.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0011300001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T3|Q27", "topic": 3, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/76884-exam-az-400-topic-3-question-27-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps organization named Contoso and an Azure subscription. The subscription contains an Azure virtual machine scale set named VMSS1 that is configured for autoscaling.\nYou have a project in Azure DevOps named Project1. Project1 is used to build a web app named App1 and deploy App1 to VMSS1.\nYou need to ensure that an email alert is generated whenever VMSS1 scales in or out.\nSolution: From Azure DevOps, configure the Notifications settings for Project1.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Azure DevOps project Notifications are for work-item/build events, not VMSS scale events."}, {"key": "AZ-400|T3|Q28", "topic": 3, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/76270-exam-az-400-topic-3-question-28-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps organization named Contoso and an Azure subscription. The subscription contains an Azure virtual machine scale set named VMSS1 that is configured for autoscaling.\nYou have a project in Azure DevOps named Project1. Project1 is used to build a web app named App1 and deploy App1 to VMSS1.\nYou need to ensure that an email alert is generated whenever VMSS1 scales in or out.\nSolution: From Azure DevOps, configure the Service hooks settings for Project1.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Azure DevOps Service hooks do not observe VMSS autoscale events."}, {"key": "AZ-400|T3|Q29", "topic": 3, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/76020-exam-az-400-topic-3-question-29-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.\nYou have an Azure DevOps organization named Contoso and an Azure subscription. The subscription contains an Azure virtual machine scale set named VMSS1 that is configured for autoscaling.\nYou have a project in Azure DevOps named Project1. Project1 is used to build a web app named App1 and deploy App1 to VMSS1.\nYou need to ensure that an email alert is generated whenever VMSS1 scales in or out.\nSolution: From Azure Monitor, create an action group.\nDoes this meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. An Azure Monitor action group (with email) combined with the autoscale notification generates the email alert."}, {"key": "AZ-400|T3|Q30", "topic": 3, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/79282-exam-az-400-topic-3-question-30-discussion/", "text": "DRAG DROP -\nYou are using the Dependency Tracker extension in a project in Azure DevOps.\nYou generate a risk graph for the project.\nWhat should you use in the risk graph to identify the number of dependencies and the risk level of the project? To answer, drag the appropriate elements to the correct data points. Each element may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0011800001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q1", "topic": 4, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/74304-exam-az-400-topic-4-question-1-discussion/", "text": "HOTSPOT -\nYou have an Azure subscription that contains the resources shown in the following table.\nYou plan to create a linked service in DF1. The linked service will connect to SQL1 by using Microsoft SQL Server authentication. The password for the SQL\nServer login will be stored -\nin KV1.\nYou need to configure DF1 to retrieve the password when the data factory connects to SQL1. The solution must use the principle of least privilege.\nHow should you configure DF1? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0013200001.png", "/assets/media/exam-media/04257/0013300001.jpg"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q2", "topic": 4, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/74034-exam-az-400-topic-4-question-2-discussion/", "text": "You have several Azure Active Directory (Azure AD) accounts.\nYou need to ensure that users use multi-factor authentication (MFA) to access Azure apps from untrusted networks.\nWhat should you configure in Azure AD?", "choices": [{"letter": "A", "text": "access reviews"}, {"letter": "B", "text": "managed identities"}, {"letter": "C", "text": "entitlement management"}, {"letter": "D", "text": "conditional access"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Conditional Access enforces MFA from untrusted/locations for Azure apps."}, {"key": "AZ-400|T4|Q3", "topic": 4, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/35920-exam-az-400-topic-4-question-3-discussion/", "text": "You plan to provision a self-hosted Linux agent.\nWhich authentication mechanism should you use to register the self-hosted agent?", "choices": [{"letter": "A", "text": "personal access token (PAT)"}, {"letter": "B", "text": "SSH key"}, {"letter": "C", "text": "Alternate credentials"}, {"letter": "D", "text": "certificate"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "A self-hosted agent registers using a personal access token (PAT)."}, {"key": "AZ-400|T4|Q4", "topic": 4, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/35919-exam-az-400-topic-4-question-4-discussion/", "text": "You are building a Microsoft ASP.NET application that requires authentication.\nYou need to authenticate users by using Azure Active Directory (Azure AD).\nWhat should you do first?", "choices": [{"letter": "A", "text": "Assign an enterprise application to users and groups"}, {"letter": "B", "text": "Create an app registration in Azure AD"}, {"letter": "C", "text": "Configure the application to use a SAML endpoint"}, {"letter": "D", "text": "Create a new OAuth token from the application"}, {"letter": "E", "text": "Create a membership database in an Azure SQL database"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "First create an app registration in Azure AD to enable Azure AD authentication for the app."}, {"key": "AZ-400|T4|Q5", "topic": 4, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/44299-exam-az-400-topic-4-question-5-discussion/", "text": "You have an Azure DevOps organization named Contoso.\nYou need to recommend an authentication mechanism that meets the following requirements:\n✑ Supports authentication from Git\n✑ Minimizes the need to provide credentials during authentication\nWhat should you recommend?", "choices": [{"letter": "A", "text": "personal access tokens (PATs) in Azure DevOps"}, {"letter": "B", "text": "Alternate credentials in Azure DevOps"}, {"letter": "C", "text": "user accounts in Azure Active Directory (Azure AD)"}, {"letter": "D", "text": "managed identities in Azure Active Directory (Azure AD)"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Personal access tokens support Git auth and minimize repeated credential prompts."}, {"key": "AZ-400|T4|Q6", "topic": 4, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/29727-exam-az-400-topic-4-question-6-discussion/", "text": "You have an application that consists of several Azure App Service web apps and Azure functions.\nYou need to assess the security of the web apps and the functions.\nWhich Azure feature can you use to provide a recommendation for the security of the application?", "choices": [{"letter": "A", "text": "Security & Compliance in Azure Log Analytics"}, {"letter": "B", "text": "Resource health in Azure Service Health"}, {"letter": "C", "text": "Smart Detection in Azure Application Insights"}, {"letter": "D", "text": "Compute & apps in Azure Security Center"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Azure Security Center's Compute & Apps provides security recommendations for web apps and functions."}, {"key": "AZ-400|T4|Q7", "topic": 4, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/9791-exam-az-400-topic-4-question-7-discussion/", "text": "Your company has a project in Azure DevOps for a new web application.\nThe company identifies security as one of the highest priorities.\nYou need to recommend a solution to minimize the likelihood that infrastructure credentials will be leaked.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Add a Run Inline Azure PowerShell task to the pipeline."}, {"letter": "B", "text": "Add a PowerShell task to the pipeline and run Set-AzureKeyVaultSecret."}, {"letter": "C", "text": "Add an Azure Key Vault task to the pipeline."}, {"letter": "D", "text": "Add Azure Key Vault references to Azure Resource Manger templates."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Add an Azure Key Vault task so the pipeline fetches secrets at runtime instead of storing credentials."}, {"key": "AZ-400|T4|Q8", "topic": 4, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/87016-exam-az-400-topic-4-question-8-discussion/", "text": "SIMULATION -\nYou need to ensure that an Azure web app named az400-123456789-main can retrieve secrets from an Azure key vault named az400-123456789-kv1 by using a system managed identity.\nThe solution must use the principle of least privilege.\nTo complete this task, sign in to the Microsoft Azure portal.", "choices": [], "community": null, "type": "no text choices", "images": [], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T4|Q9", "topic": 4, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/230
