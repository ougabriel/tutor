technical requirements:\nUse Azure Machine Learning workspaces to centrally manage data assets, models, and environments.\nImplement experiment tracking and model versioning for all training jobs.\nOrchestrate training and evaluation by using pipelines rather than manually running notebooks.\nDeploy traditional machine learning models with support for staged rollout and rollback.\nImprove RAG-based solution output quality.\nUse the existing evaluation datasets that are based on real data with input-output pairs.\nApply advanced fine-tuning techniques only when prompt engineering is insufficient\nIssues and Constraints -\nFabrikam Inc. must comply with internal security policies that require the company to restrict network access and avoid long-lived secrets. The data science team has limited Azure DevOps experience, so solutions must favor managed services and automation over custom infrastructure.\nCost predictability is important. Leadership prefers serverless or managed compute options where possible but is willing to approve dedicated compute for stable production workloads.\nProblem Statement -\nFabrikam Inc. must design and implement an Azure-based AI operations solution that enables reliable training, evaluation, deployment, and iteration of generative AI models. The solution must support experimentation and gradual rollout while ensuring governance, security, and operational stability. The data science and platform teams must collaborate to deliver this solution by using Azure Machine Learning and Microsoft Foundry capabilities.\nYou need to recommend an experiment-tracking strategy that ensures consistent experiment results.\nWhat should you recommend?", "choices": [{"letter": "A", "text": "Azure Machine Learning job output logs"}, {"letter": "B", "text": "MLflow experiment tracking"}, {"letter": "C", "text": "Application Insights logs"}, {"letter": "D", "text": "Azure Monitor alerts"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "MLflow experiment tracking is the built-in way to record and compare metrics/params/artifacts across Azure ML training runs. Job logs, App Insights and Monitor alerts are not experiment-comparison tools."}, {"key": "AI-300|T3|Q2", "topic": 3, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404600-exam-ai-300-topic-3-question-2-discussion/", "text": "HOTSPOT -\nA machine learning model is deployed to production in Azure Machine Learning and is actively serving predictions for a business application. The model was trained by using a historical dataset that represented expected input patterns at the time of deployment.\nThe team working on the model must ensure the following:\nChanges in input data distribution are detected.\nAppropriate actions are triggered when predefined thresholds are exceeded.\nYou need to configure monitoring to meet the requirements.\nWhich configuration should you use for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image10.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q3", "topic": 3, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404601-exam-ai-300-topic-3-question-3-discussion/", "text": "You create a binary classification model. You use the Fairlearn package to assess model fairness.\nYou must eliminate the need to retrain the model.\nYou need to implement the Fairlearn package.\nWhich algorithm should you use?", "choices": [{"letter": "A", "text": "fairiearn.reductions.ExponentiatedGradient"}, {"letter": "B", "text": "fairlearn.preprocessing.CorrelationRemover"}, {"letter": "C", "text": "fairlearn.reductions.GridSearch"}, {"letter": "D", "text": "fairlearn.postprocessing.ThresholdOptimizer"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "fairlearn.postprocessing.ThresholdOptimizer adjusts decision thresholds on an already-trained model to satisfy fairness constraints without retraining - the typical post-hoc mitigation."}, {"key": "AI-300|T3|Q4", "topic": 3, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404602-exam-ai-300-topic-3-question-4-discussion/", "text": "DRAG DROP -\nA real-time endpoint is deployed in Azure Machine Learning to serve predictions to a web application.\nUsers report intermittent failures and unexpected responses when calling the endpoint.\nYou need to identify the appropriate troubleshooting action for each reported issue.\nWhich troubleshooting action should you perform for each issue? To answer, move the appropriate troubleshooting actions to the correct issues. You may use each troubleshooting action once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image12.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q5", "topic": 3, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404603-exam-ai-300-topic-3-question-5-discussion/", "text": "A team manages an Azure Machine Learning workspace and deploys a model to an endpoint.\nA deployed online endpoint shows inconsistent response times during periods of high traffic.\nYou need to identify potential performance degradation.\nWhich three metrics should you monitor? Each correct answer presents part of the solution. Choose three.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Feature count"}, {"letter": "B", "text": "Requests per minute"}, {"letter": "C", "text": "Connections active"}, {"letter": "D", "text": "Dataset size"}, {"letter": "E", "text": "Request latency"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "BE", "kiro_rationale": "For monitoring a deployed online endpoint, the performance metrics to track are Requests per minute (B) and Request latency (E). Feature count and dataset size are training-time concerns."}, {"key": "AI-300|T3|Q6", "topic": 3, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404604-exam-ai-300-topic-3-question-6-discussion/", "text": "DRAG DROP -\nA team deploys a machine learning model to a managed online endpoint. The team monitors model performance and data quality metrics in production.\nWhen monitoring thresholds are exceeded, the team requires an automated operational response that notifies downstream systems.\nYou need to configure the monitoring solution to meet the requirements.\nWhich configuration should you associate with each requirement as a first step? To answer, move the appropriate configurations to the correct requirements. You may use each configuration once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image14.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q7", "topic": 3, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404605-exam-ai-300-topic-3-question-7-discussion/", "text": "HOTSPOT -\nYou use Azure Machine Learning to train models across multiple experiments by using the same workspace.\nYou must record training runs in a centralized location to compare results from different jobs.\nDuring training, performance values must be captured so they appear in the experiment run history.\nYou need to configure experiment tracking.\nWhat should you configure for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image16.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q8", "topic": 3, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/404606-exam-ai-300-topic-3-question-8-discussion/", "text": "A data science team trains a classification model that predicts loan approval outcomes.\nBefore registering the model, the team must ensure the following:\nPredictions must not disproportionately impact protected groups.\nPrediction errors can be evaluated across different data segments.\nYou need to assess whether the model meets Responsible AI expectations.\nWhich two approaches should you use? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Analyze error rates across the global cohort."}, {"letter": "B", "text": "Measure endpoint latency under load."}, {"letter": "C", "text": "Validate inference schema compatibility."}, {"letter": "D", "text": "Evaluate feature importance for prediction transparency."}, {"letter": "E", "text": "Analyze error rates across defined demographic cohorts."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "DE", "kiro_rationale": "To assess responsible AI before deployment: evaluate feature importance for prediction transparency (D) and analyze error rates across defined demographic cohorts (E) for fairness. Latency and schema compatibility are operational, not responsible-AI, checks."}, {"key": "AI-300|T3|Q9", "topic": 3, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/404568-exam-ai-300-topic-3-question-9-discussion/", "text": "A team deploys a model to a real-time endpoint in Azure Machine Learning. You deploy some updates to the endpoint.\nThe endpoint returns errors after the new deployment is released.\nYou need to restore the service as quickly as possible.\nWhat should you do first?", "choices": [{"letter": "A", "text": "Roll back traffic to the previous deployment."}, {"letter": "B", "text": "Delete the endpoint and immediately redeploy it."}, {"letter": "C", "text": "Change the authentication type to Azure Machine Learning token-based authentication."}, {"letter": "D", "text": "Increase the compute size."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "When a new deployment is unhealthy, the first mitigation is to roll traffic back to the previous known-good deployment to restore service, then investigate."}, {"key": "AI-300|T3|Q10", "topic": 3, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/404569-exam-ai-300-topic-3-question-10-discussion/", "text": "HOTSPOT -\nYou train a model in Azure Machine Learning.\nYou plan to capture experiment details for later comparison. The training code must log parameters and metrics for each run.\nYou review the following training script.\nYou need to verify whether the training script meets the experiment tracking requirement. For each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image18.png", "https://img.examtopics.com/ai-300/image19.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q11", "topic": 3, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/404570-exam-ai-300-topic-3-question-11-discussion/", "text": "A data science team completes multiple training runs within an experiment by using MLflow.\nThe team wants to store a selected model in Azure Machine Learning so that it can be versioned and deployed later.\nThe model must be versioned centrally for reuse across environments.\nYou need to version the trained model.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Locate and capture the model artifacts from the outputs of the training run."}, {"letter": "B", "text": "Register the model in the Azure Machine Learning workspace."}, {"letter": "C", "text": "Tag the training experiment with a name."}, {"letter": "D", "text": "Export the model files to local storage."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "AB", "kiro_rationale": "To register a trained model: first locate and capture the model artifacts from the training run outputs (A), then register the model in the workspace (B). Tagging experiments and exporting locally are not the registration steps."}, {"key": "AI-300|T3|Q12", "topic": 3, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/404571-exam-ai-300-topic-3-question-12-discussion/", "text": "DRAG DROP -\nA team deploys a classification model to production and monitors performance and data changes.\nThe team wants to ensure that significant drops in prediction accuracy automatically trigger the following:\nStakeholders must be notified of the drops.\nRetraining must be initiated when thresholds are exceeded\nYou need to configure monitoring to meet the requirements.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image21.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T3|Q13", "topic": 3, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/404572-exam-ai-300-topic-3-question-13-discussion/", "text": "An Azure Machine Learning workspace contains multiple registered versions of a model that is used in production.\nAn older model version must no longer be deployable, but it must remain available for compliance review and potential rollback.\nYou need to change the state of the model version to meet the requirements.\nWhat should you do?", "choices": [{"letter": "A", "text": "Archive the training dataset for the model version."}, {"letter": "B", "text": "Delete the model version."}, {"letter": "C", "text": "Archive the model version."}, {"letter": "D", "text": "Unregister the model version."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Archive the model version to retire it from active use while preserving lineage/auditability. Deleting or unregistering destroys history."}, {"key": "AI-300|T3|Q14", "topic": 3, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/404573-exam-ai-300-topic-3-question-14-discussion/", "text": "A team is deploying machine learning models to a production inference endpoint in Azure Machine Learning.\nThe team requires a safe way to validate a new model version without disrupting existing users.\nYou need to recommend a deployment strategy for controlled testing of a new model version.\nWhat should you configure?", "choices": [{"letter": "A", "text": "traffic splitting between deployments"}, {"letter": "B", "text": "the model asset version in the registry"}, {"letter": "C", "text": "deployment to a separate staging endpoint"}, {"letter": "D", "text": "an evaluation script in Azure Machine Learning"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Traffic splitting between deployments on the online endpoint enables safe staged rollout/comparison of a new model version."}, {"key": "AI-300|T3|Q15", "topic": 3, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/404574-exam-ai-300-topic-3-question-15-discussion/", "text": "HOTSPOT -\nYou are monitoring a fine-tuned large language model deployed in Microsoft Foundry.\nYou evaluate the model before and after fine-tuning by using the same evaluation dataset.\nYou review the following evaluation results:\nYou need to determine whether the fine-tuned model shows improved performance without introducing regression. For each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image23.png", "https://img.examtopics.com/ai-300/image24.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q1", "topic": 4, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404575-exam-ai-300-topic-4-question-1-discussion/", "text": "DRAG DROP -\nA team runs training jobs by using multiple Azure Machine Learning pipelines.\nThe team must ensure that all runs use the same Python packages and system libraries. The solution must allow dependency updates to be versioned without modifying training code.\nYou need to configure the workspace so that runtime dependencies are consistent and reusable.\nWhich four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image26.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q2", "topic": 4, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404576-exam-ai-300-topic-4-question-2-discussion/", "text": "DRAG DROP -\nA company is standardizing generative AI development across multiple teams.\nEach team requires an isolated workspace. Governance and shared connections must be centrally managed.\nYou need to implement a Microsoft Foundry environment structure that supports centralized governance and team isolation.\nWhich type of configuration should you use for each requirement? To answer, move the appropriate configurations to the correct requirements. You may use each configuration once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image28.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q3", "topic": 4, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404577-exam-ai-300-topic-4-question-3-discussion/", "text": "A financial services company is deploying Microsoft Foundry to host generative AI workloads that process regulated customer data. The Microsoft Foundry environment must prevent any public network exposure while still allowing services managed by Microsoft Foundry to communicate with dependent Azure resources.\nSecurity auditors require that all traffic to and from the Microsoft Foundry resource remain on private networks, with no public endpoints available.\nYou need to configure the Microsoft Foundry environment so that network access is restricted while maintaining full platform functionality.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Configure a managed virtual network for the Microsoft Foundry resource."}, {"letter": "B", "text": "Use API key authentication for all model endpoints."}, {"letter": "C", "text": "Deploy the Microsoft Foundry resource in a separate Azure subscription."}, {"letter": "D", "text": "Disable public network access to the Microsoft Foundry resource."}, {"letter": "E", "text": "Disable all inbound network access."}], "community": "AD", "type": "multiple-choice", "images": [], "kiro_answer": "AD", "kiro_rationale": "Configure a managed virtual network for the Foundry resource (A) and disable public network access (D) to lock it down. API keys (B) violate least-privilege/no-secrets; a separate subscription (C) and disabling all inbound (E) are not the required network-isolation steps. Matches community AD."}, {"key": "AI-300|T4|Q4", "topic": 4, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404578-exam-ai-300-topic-4-question-4-discussion/", "text": "DRAG DROP -\nAn organization uses Microsoft Foundry to develop generative AI projects that access shared Azure resources such as storage accounts and vector databases.\nThe organization s security policy requires eliminating secret key-based authentication and enforcing least-privilege access.\nYou must configure identity and access so that:\nServices authenticate without stored credentials.\nPermissions are scoped appropriately across projects and shared resources.\nYou need to configure the appropriate identity or access mechanism for each requirement.\nWhat should you configure in Microsoft Foundry to meet each requirement? To answer, move the appropriate configuration mechanisms to the correct requirements. You may use each configuration mechanism once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image30.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q5", "topic": 4, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404579-exam-ai-300-topic-4-question-5-discussion/", "text": "DRAG DROP -\nA company plans to deploy a foundation model in Microsoft Foundry.\nThe mode must support the following workloads:\nA customer support workload used across multiple regions\nA marketing workload that must remain within a specific region due to data residency requirements\nYou need to select the deployment type.\nWhich deployment type should you use for each workload? To answer, move the appropriate deployment types to the correct requirements. You may use each deployment type once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image32.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q6", "topic": 4, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404580-exam-ai-300-topic-4-question-6-discussion/", "text": "DRAG DROP -\nA team manages prompts that are used by a generative AI application built on Microsoft Foundry. Multiple developers contribute prompt updates, and changes must be reviewed and tracked over time.\nThe team requires that:\nPrompt changes are reviewed before being applied to the version in production.\nPrevious prompt versions can be restored if issues occur.\nPrompt updates follow the same governance practices as the application code.\nYou need to implement a controlled process for managing and updating prompts in production.\nHow should you manage prompt updates to meet the requirements? To answer, move the appropriate actions to the correct requirements. You may use each action once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image34.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T4|Q7", "topic": 4, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404607-exam-ai-300-topic-4-question-7-discussion/", "text": "A team develops multiple AI applications in Microsoft Foundry that rely on shared prompt templates.\nThe team requires a centralized way to track, version, and reuse prompt content across projects.\nYou need to recommend a solution to track and reuse prompt content.\nWhich approach should you recommend?", "choices": [{"letter": "A", "text": "Store prompts as versioned files in a Git repository."}, {"letter": "B", "text": "Register prompts as datasets in the Azure Machine Learning workspace."}, {"letter": "C", "text": "Embed prompts directly in application configuration files."}, {"letter": "D", "text": "Persist prompts in Azure Blob Storage with folder-level organization."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Store prompts as versioned files in Git for change history, review and rollback - prompt assets are code-like and benefit from source control."}, {"key": "AI-300|T4|Q8", "topic": 4, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/404608-exam-ai-300-topic-4-question-8-discussion/", "text": "A team plans to deploy a large foundation model in Microsoft Foundry as part of a new enterprise AI capability.\nDifferent business units across the team's organization will access the model from various internal applications.\nYou need to deploy a foundation model by minimizing latency.\nWhich deployment type should you use?", "choices": [{"letter": "A", "text": "Developer"}, {"letter": "B", "text": "Data Zone Batch"}, {"letter": "C", "text": "Data Zone Standard"}, {"letter": "D", "text": "Global Batch"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Data Zone Standard gives low-latency, real-time (non-batch) interactive throughput within a data zone for many applications. Batch types add latency; Developer is for limited dev use."}, {"key": "AI-300|T4|Q9", "topic": 4, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/404609-exam-ai-300-topic-4-question-9-discussion/", "text": "A company's platform engineers manage the resource settings and governance of Microsoft Foundry.\nDevelopers must be able to create and update project assets but must not be able to change resource-level configurations.\nYou need to enforce least privilege access for the engineers and developers.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Assign a resource-level Azure AI Administrator role to the platform engineers."}, {"letter": "B", "text": "Disable Microsoft Entra ID authentication for the Microsoft Foundry resource."}, {"letter": "C", "text": "Assign the Azure AI Developer role to the developers."}, {"letter": "D", "text": "Share a single API key across all teams."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "AC", "kiro_rationale": "Use Entra ID RBAC with least privilege: assign Azure AI Developer to developers (C) and an appropriate admin role where needed (A). Disabling Entra auth (B) and sharing one API key (D) violate the security requirements."}, {"key": "AI-300|T4|Q10", "topic": 4, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/404610-exam-ai-300-topic-4-question-10-discussion/", "text": "You have a Microsoft Foundry project.\nYou plan to use the Microsoft Foundry portal to fine-tune a base Azure OpenAI Service model that can accept both text and images as input.\nYou need to choose the suitable model.\nWhich model should you choose?", "choices": [{"letter": "A", "text": "davinci-002"}, {"letter": "B", "text": "gpt-4o"}, {"letter": "C", "text": "gpt-35-turbo"}, {"letter": "D", "text": "gpt-4"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "gpt-4o is the multimodal Azure OpenAI model that accepts both text and images and supports fine-tuning. davinci-002, gpt-35-turbo and gpt-4 (base) do not fit the text+image fine-tune requirement."}, {"key": "AI-300|T4|Q11", "topic": 4, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/404611-exam-ai-300-topic-4-question-11-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou work in Microsoft Foundry with a prompt flow.\nYou must manually evaluate prompts and compare results across prompt variants.\nYou need to capture the inputs, outputs, token usage, and latencies for each flow run for the evaluation.\nSolution: Create prompt variants and compare their outputs in the Evaluation experience.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. The Evaluation experience with prompt variants captures inputs, outputs, token usage and latency for comparison, meeting the goal. Community voted A."}, {"key": "AI-300|T4|Q12", "topic": 4, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/404612-exam-ai-300-topic-4-question-12-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou work in Microsoft Foundry with a prompt flow.\nYou must manually evaluate prompts and compare results across prompt variants.\nYou need to capture the inputs, outputs, token usage, and latencies for each flow run for the evaluation.\nSolution: Use the prompt flow SDK to enable tracing for the flow before executing runs. Then run the flow to generate traceable results.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Enabling tracing via the prompt flow SDK before runs captures inputs, outputs, token usage and latencies - a valid solution to the same goal."}, {"key": "AI-300|T4|Q13", "topic": 4, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/404613-exam-ai-300-topic-4-question-13-discussion/", "text": "Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution.\nAfter you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear on the review screen.\nYou work in Microsoft Foundry with a prompt flow.\nYou must manually evaluate prompts and compare results across prompt variants.\nYou need to capture the inputs, outputs, token usage, and latencies for each flow run for the evaluation.\nSolution: In Microsoft Foundry, turn on Tracing for the prompt flow of the project and execute test runs to produce trace data.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Turning on Tracing for the project's prompt flow in Foundry and running tests produces the required trace data (inputs/outputs/tokens/latency). NOTE: community voted B for this variant - verify, as wording differences in this Yes/No series matter."}, {"key": "AI-300|T5|Q1", "topic": 5, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404614-exam-ai-300-topic-5-question-1-discussion/", "text": "DRAG DROP -\nA team iterates prompts used by a generative AI agent. The team must support internal review before releasing changes.\nThe team must:\nTrack prompt changes with a clear history for audit and rollback.\nCompare prompt variants in parallel without affecting the prompt used in the production environment.\nYou need to select the appropriate source control approach for each requirement.\nWhat should you use for each requirement? To answer, move the appropriate source controls to the correct requirements. You may use each source control once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image36.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T5|Q2", "topic": 5, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404615-exam-ai-300-topic-5-question-2-discussion/", "text": "DRAG DROP -\nA team deploys a generative AI application that uses a model deployed in Microsoft Foundry. The application must support latency monitoring under production load.\nYou need to enable performance observability.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image38.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T5|Q3", "topic": 5, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404616-exam-ai-300-topic-5-question-3-discussion/", "text": "A team is developing a generative AI assistant. The team is experimenting with multiple prompt variants to improve the user experience.\nWhen comparing prompt variants, the team plans to assess whether the generated responses are grammatically correct.\nYou need to evaluate the quality of the language from the generated responses.\nWhich evaluator should you use?", "choices": [{"letter": "A", "text": "Coherence"}, {"letter": "B", "text": "Textual similarity"}, {"letter": "C", "text": "Grounded ness"}, {"letter": "D", "text": "Fluency"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Groundedness measures whether a generated answer is supported by the provided source/context - the evaluator for RAG factual grounding. Coherence/fluency/similarity assess other qualities."}, {"key": "AI-300|T5|Q4", "topic": 5, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404617-exam-ai-300-topic-5-question-4-discussion/", "text": "You manage a Microsoft Foundry project. You build a multi-turn chatbot application.\nYou plan to filter your traces to identify issues while observing how the application is responding. The solution must not use an external knowledge base.\nYou need to select an evaluation metric.\nWhich built-in evaluator should you use?", "choices": [{"letter": "A", "text": "RelevanceEvaluator"}, {"letter": "B", "text": "SimilarityEvaluator"}, {"letter": "C", "text": "QAEvaluator"}, {"letter": "D", "text": "CoherenceEvaluator"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "RelevanceEvaluator scores how relevant the response is to the question/context. Use it when relevance is the target metric."}, {"key": "AI-300|T5|Q5", "topic": 5, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404618-exam-ai-300-topic-5-question-5-discussion/", "text": "DRAG DROP -\nAn organization operates a generative AI application in production by using Microsoft Foundry. The application serves live user traffic and is updated by a data scientist team regularly as prompts and models evolve.\nThe application intermittently times out during production use, which requires ongoing visibility into runtime behavior.\nThe team must also validate model quality and safety before releasing new updates to avoid introducing regressions.\nYou need to apply the correct mechanisms for continuous runtime monitoring and for release time validation.\nWhich mechanisms should you use for each requirement? To answer, move the appropriate mechanisms to the correct requirements. You may use each mechanism once, more than once, or not at all. You may need to move the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image40.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T5|Q6", "topic": 5, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404619-exam-ai-300-topic-5-question-6-discussion/", "text": "An organization validates generative AI applications during CI/CD Microsoft Foundry.\nEvaluation must run automatically and block releases when quality thresholds are NOT met. Manual evaluation is no longer acceptable.\nEvaluation must use both predefined quality metrics and custom safety checks.\nYou need to implement an automated evaluation workflow that supports both built-in and custom metrics.\nWhat should you do?", "choices": [{"letter": "A", "text": "Enable application tracing to collect runtime telemetry."}, {"letter": "B", "text": "Review evaluation results manually after deployment."}, {"letter": "C", "text": "Monitor latency metrics during model inference."}, {"letter": "D", "text": "Implement an evaluation step by using GitHub Actions."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Implement an evaluation step in CI (GitHub Actions) so prompts/models are automatically evaluated before deployment - the repeatable, automated gate. Manual review and latency monitoring are not automated quality gates."}, {"key": "AI-300|T5|Q7", "topic": 5, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404620-exam-ai-300-topic-5-question-7-discussion/", "text": "A team develops and manages a conversational assistant by using Microsoft Foundry.\nThe team must be able to validate that the assistant does not produce hateful responses before the application is exposed to any users.\nYou need to evaluate the model output for hateful responses as part of a repeatable validation process.\nWhich evaluator should you configure first?", "choices": [{"letter": "A", "text": "Protected material"}, {"letter": "B", "text": "Groundedness"}, {"letter": "C", "text": "Indirect attacks"}, {"letter": "D", "text": "Content safety"}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "For a RAG solution, configure the Groundedness evaluator first to ensure answers are supported by retrieved content. Protected material/indirect attacks/content safety address different risks."}, {"key": "AI-300|T6|Q1", "topic": 6, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/404621-exam-ai-300-topic-6-question-1-discussion/", "text": "An organization is deploying several generative AI workloads by using Microsoft Foundry. Each workload must meet different requirements related to data governance, task specialization, and operational cost control.\nThe organization requires models that meet the following requirements:\nModel behavior aligns with the task being performed.\nData handling aligns with internal governance policies.\nOperational complexity and cost are justified by workload needs.\nYou need to select the foundation model options that meet the requirements.\nWhich three models can you select? Each correct answer presents a complete solution. Choose three.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "A model that is optimized for conversational reasoning when deploying an interactive assistant"}, {"letter": "B", "text": "The largest available model to simplify operational management"}, {"letter": "C", "text": "The smallest available model to minimize the usage cost"}, {"letter": "D", "text": "A model that supports multiple input types when workloads require combined text and image analysis"}, {"letter": "E", "text": "A model that offers enterprise governance controls when workloads process regulated business data"}], "community": "ADE", "type": "multiple-choice", "images": [], "kiro_answer": "ADE", "kiro_rationale": "Choose a model fit for purpose: conversational-reasoning model for an interactive assistant (A), multimodal when combining text+image (D), and one with enterprise governance for regulated data (E). 'Largest' (B) and 'smallest' (C) as blanket rules are wrong. Matches community ADE."}, {"key": "AI-300|T6|Q2", "topic": 6, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/404622-exam-ai-300-topic-6-question-2-discussion/", "text": "HOTSPOT -\nA team is building a generative AI agent by using Retrieval-Augmented Generation (RAG) in Microsoft Foundry.\nThe team frequently updates prompt content. The team must be able to track changes across contributors while avoiding full application redeployments.\nYou need to enable rapid prompt iteration with traceability. Applications consuming the agent must be able to use updated prompts without requiring redeployment.\nWhat should you configure for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image42.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q3", "topic": 6, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/404623-exam-ai-300-topic-6-question-3-discussion/", "text": "HOTSPOT -\nA company is creating an internal tool that summarizes long meeting transcripts and extracts action items.\nThe model must:\nProcess text inputs up to 200k tokens long.\nGenerate concise summaries in seconds.\nSupport interactive testing before integration into the app.\nYou need to select, deploy, and test a model that supports summarization with low latency.\nHow should you complete the configuration plan? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image44.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q4", "topic": 6, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/404624-exam-ai-300-topic-6-question-4-discussion/", "text": "HOTSPOT -\nYou manage a Retrieval-Augmented Generation (RAG) system that retrieves internal policy documents from a vector index.\nRecent analysis shows that:\nRetrieved results frequently include duplicated content from the same document.\nRetrieved chunks sometimes span unrelated policy sections.\nYou review the following retrieval and ingestion configurations:\nYou need to reduce duplicated retrieval results and improve chunk relevance across policy sections. For each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image46.png", "https://img.examtopics.com/ai-300/image47.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q5", "topic": 6, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/404625-exam-ai-300-topic-6-question-5-discussion/", "text": "HOTSPOT -\nYou are reviewing a dataset that will be used for an advanced fine-tuning job in Microsoft Foundry.\nThe fine-tuning job uses preference comparison data.\nYou review the following dataset excerpt.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image49.png", "https://img.examtopics.com/ai-300/image50.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q6", "topic": 6, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/404626-exam-ai-300-topic-6-question-6-discussion/", "text": "HOTSPOT -\nYou manage a Retrieval-Augmented Generation (RAG) system that uses Azure AI Search to retrieve documents from an indexed knowledge base.\nThe system must support the following retrieval requirements:\nQueries that include exact policy identifiers must return matching documents even when semantic similarity is low.\nNatural-language questions must prioritize semantically relevant documents even when keywords are not an exact match.\nYou need to configure the retrieval approach to meet the requirements.\nHow should you configure the retrieval behavior for each requirement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["https://img.examtopics.com/ai-300/image52.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AI-300|T6|Q7", "topic": 6, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/404627-exam-ai-300-topic-6-question-7-discussion/", "text": "A Retrieval-Augmented Generation (RAG) solution returns incomplete answers because relevant content is inconsistently retrieved from the knowledge source.\nYou need to improve RAG accuracy without changing the embedding model currently in use. You need to achieve this goal while minimizing operational costs.\nWhich two actions should you perform? Each correct answer presents part of the solution. Choose two.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "Tune chunk size and overlap to match content structure."}, {"letter": "B", "text": "Implement an optimized re-ranker."}, {"letter": "C", "text": "Increase token limits for all requests."}, {"letter": "D", "text": "Optimize the length of embedding vectors."}], "community": null, "type": "multiple-choice", "images": [], "kiro_answer": "AB", "kiro_rationale": "To improve RAG retrieval quality, tune chunk size/overlap to the content (A) and add an optimized re-ranker (B). Raising token limits (C) and changing embedding length (D) do not directly fix retrieval relevance."}], "AZ-400": [{"key": "AZ-400|T1|Q1", "topic": 1, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/73884-exam-az-400-topic-1-question-1-discussion/", "text": "You are configuring project metrics for dashboards in Azure DevOps.\nYou need to configure a chart widget that measures the elapsed time to complete work items once they become active.\nWhich of the following is the widget you should use?", "choices": [{"letter": "A", "text": "Cumulative Flow Diagram"}, {"letter": "B", "text": "Burnup"}, {"letter": "C", "text": "Cycle time"}, {"letter": "D", "text": "Burndown"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Cycle time measures elapsed time from when a work item becomes active to completion. Lead time is creation-to-done; burn-up/down track scope/remaining work."}, {"key": "AZ-400|T1|Q2", "topic": 1, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/56898-exam-az-400-topic-1-question-2-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nThe Burnup widget measures the elapsed time from creation of work items to their completion.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "Lead time"}, {"letter": "C", "text": "Test results trend"}, {"letter": "D", "text": "Burndown"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Creation-to-completion elapsed time is Lead time, not Burnup, so the underlined segment is inaccurate."}, {"key": "AZ-400|T1|Q3", "topic": 1, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/73950-exam-az-400-topic-1-question-3-discussion/", "text": "You are making use of Azure DevOps manage build pipelines, and also deploy pipelines.\nThe development team is quite large, and is regularly added to.\nYou have been informed that the management of users and licenses must be automated when it can be.\nWhich of the following is a task that can't be automated?", "choices": [{"letter": "A", "text": "Group membership changes"}, {"letter": "B", "text": "License assignment"}, {"letter": "C", "text": "Assigning entitlements"}, {"letter": "D", "text": "License procurement"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "License procurement (buying licenses) cannot be automated; group membership, license assignment and entitlements can."}, {"key": "AZ-400|T1|Q4", "topic": 1, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/75619-exam-az-400-topic-1-question-4-discussion/", "text": "You have been tasked with strengthening the security of your team's development process.\nYou need to suggest a security tool type for the Continuous Integration (CI) phase of the development process.\nWhich of the following is the option you would suggest?", "choices": [{"letter": "A", "text": "Penetration testing"}, {"letter": "B", "text": "Static code analysis"}, {"letter": "C", "text": "Threat modeling"}, {"letter": "D", "text": "Dynamic code analysis"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Static code analysis runs in CI against source without executing it. Pen/dynamic testing need a running app; threat modeling is design-phase."}, {"key": "AZ-400|T1|Q5", "topic": 1, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/74077-exam-az-400-topic-1-question-5-discussion/", "text": "Your company is currently making use of Team Foundation Server 2013 (TFS 2013), but intend to migrate to Azure DevOps.\nYou have been tasked with supplying a migration approach that allows for the preservation of Team Foundation Version Control changesets dates, as well as the changes dates of work items revisions. The approach should also allow for the migration of all TFS artifacts, while keeping migration effort to a minimum.\nYou have suggested upgrading TFS to the most recent RTW release.\nWhich of the following should also be suggested?", "choices": [{"letter": "A", "text": "Installing the TFS kava SDK"}, {"letter": "B", "text": "Using the TFS Database Import Service to perform the upgrade."}, {"letter": "C", "text": "Upgrading PowerShell Core to the latest version."}, {"letter": "D", "text": "Using the TFS Integration Platform to perform the upgrade."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "TFS Database Import Service migrates a full collection to Azure DevOps Services preserving history with minimal effort."}, {"key": "AZ-400|T1|Q6", "topic": 1, "question": 6, "url": "https://www.examtopics.com/discussions/microsoft/view/74363-exam-az-400-topic-1-question-6-discussion/", "text": "DRAG DROP -\nYou have an on-premises Bitbucket Server with a firewall configured to block inbound Internet traffic. The server is used for Git-based source control.\nYou intend to manage the build and release processes using Azure DevOps. This plan requires you to integrate Azure DevOps and Bitbucket.\nWhich of the following will allow for this integration? Answer by dragging the correct options from the list to the answer area.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0000700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T1|Q7", "topic": 1, "question": 7, "url": "https://www.examtopics.com/discussions/microsoft/view/57052-exam-az-400-topic-1-question-7-discussion/", "text": "You are currently developing a project for a client that will be managing work items via Azure DevOps.\nYou want to make sure that the work item process you use for the client allows for requirements, change requests, risks, and reviews to be tracked.\nWhich of the following is the option you would choose?", "choices": [{"letter": "A", "text": "Basic"}, {"letter": "B", "text": "Agile"}, {"letter": "C", "text": "Scrum"}, {"letter": "D", "text": "CMMI"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "The CMMI process supports requirements, change requests, risks and reviews as work item types."}, {"key": "AZ-400|T1|Q8", "topic": 1, "question": 8, "url": "https://www.examtopics.com/discussions/microsoft/view/75243-exam-az-400-topic-1-question-8-discussion/", "text": "Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.\nYou run the Register-AzureRmAutomationDscNode command in your company's environment.\nYou need to make sure that your company's test servers remain correctly configured, regardless of configuration drift.\nSolution: You set the -ConfigurationMode parameter to ApplyOnly.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. ApplyOnly applies config once and does not correct drift, so servers won't stay configured."}, {"key": "AZ-400|T1|Q9", "topic": 1, "question": 9, "url": "https://www.examtopics.com/discussions/microsoft/view/57746-exam-az-400-topic-1-question-9-discussion/", "text": "Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.\nYou run the Register-AzureRmAutomationDscNode command in your company's environment.\nYou need to make sure that your company's test servers remain correctly configured, regardless of configuration drift.\nSolution: You set the -ConfigurationMode parameter to ApplyAndMonitor.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. ApplyAndMonitor reports drift but does not auto-correct it."}, {"key": "AZ-400|T1|Q10", "topic": 1, "question": 10, "url": "https://www.examtopics.com/discussions/microsoft/view/57747-exam-az-400-topic-1-question-10-discussion/", "text": "Note: The question is included in a number of questions that depicts the identical set-up. However, every question has a distinctive result. Establish if the solution satisfies the requirements.\nYou run the Register-AzureRmAutomationDscNode command in your company's environment.\nYou need to make sure that your company's test servers remain correctly configured, regardless of configuration drift.\nSolution: You set the -ConfigurationMode parameter to ApplyAndAutocorrect.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. ApplyAndAutoCorrect reapplies configuration to fix drift, keeping servers correctly configured."}, {"key": "AZ-400|T1|Q11", "topic": 1, "question": 11, "url": "https://www.examtopics.com/discussions/microsoft/view/73936-exam-az-400-topic-1-question-11-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nTo compile an Internet Information Services (IIS) web application that runs docker, you should use a Default build agent pool.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "Hosted Windows Container"}, {"letter": "C", "text": "Hosted"}, {"letter": "D", "text": "Hosted macOS"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Building an IIS web app that runs Docker needs a Hosted Windows Container agent, so 'Default' is inaccurate."}, {"key": "AZ-400|T1|Q12", "topic": 1, "question": 12, "url": "https://www.examtopics.com/discussions/microsoft/view/73986-exam-az-400-topic-1-question-12-discussion/", "text": "Your company has an Azure DevOps environment that can only be accessed by Azure Active Directory users.\nYou are instructed to make sure that the Azure DevOps environment can only be accessed from devices connected to the company's on-premises network.\nWhich of the following actions should you take?", "choices": [{"letter": "A", "text": "Assign the devices to a security group."}, {"letter": "B", "text": "Create a GPO."}, {"letter": "C", "text": "Configure Security in Project Settings from Azure DevOps."}, {"letter": "D", "text": "Configure conditional access in Azure Active Directory."}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Conditional Access in Azure AD restricts access to devices on the corporate network (location-based)."}, {"key": "AZ-400|T1|Q13", "topic": 1, "question": 13, "url": "https://www.examtopics.com/discussions/microsoft/view/74039-exam-az-400-topic-1-question-13-discussion/", "text": "You are making use of Azure DevOps to configure Azure Pipelines for project, named PROJ-01.\nYou are preparing to use a version control system that allows for source code to be stored on a managed Windows server located on the company network.\nWhich of the following is the version control system you should use?", "choices": [{"letter": "A", "text": "Github Enterprise"}, {"letter": "B", "text": "Bitbucket cloud"}, {"letter": "C", "text": "Github Professional"}, {"letter": "D", "text": "Git in Azure Repos"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Git in Azure Repos is the managed, server-hosted Git option within Azure DevOps for this scenario."}, {"key": "AZ-400|T1|Q14", "topic": 1, "question": 14, "url": "https://www.examtopics.com/discussions/microsoft/view/73983-exam-az-400-topic-1-question-14-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nWhen moving to Azure DevOps, JIRA must be replaced with the build pipelines Azure DevOps service.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "repos"}, {"letter": "C", "text": "release pipelines"}, {"letter": "D", "text": "boards"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "JIRA is work-item tracking, replaced by Azure Boards, so 'build pipelines' is inaccurate."}, {"key": "AZ-400|T1|Q15", "topic": 1, "question": 15, "url": "https://www.examtopics.com/discussions/microsoft/view/57754-exam-az-400-topic-1-question-15-discussion/", "text": "You scan a Node.js application using WhiteSource Bolt.\nThe scan finds numerous libraries with invalid licenses, but are only used during development.\nYou have to make sure that only production dependencies are scanned by WhiteSource Bolt.\nWhich of the following is a command you should run?", "choices": [{"letter": "A", "text": "npm edit"}, {"letter": "B", "text": "npm publish"}, {"letter": "C", "text": "npm install"}, {"letter": "D", "text": "npm update"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "npm install (with --production) restricts scanning to production dependencies."}, {"key": "AZ-400|T1|Q16", "topic": 1, "question": 16, "url": "https://www.examtopics.com/discussions/microsoft/view/73885-exam-az-400-topic-1-question-16-discussion/", "text": "You are currently defining a release strategy for an app, named APP-01.\nThe strategy should allow you to keep the time it takes to deploy new releases of the app to a minimum. The strategy should also allow you to roll back in the shortest time required.\nWhich of the following is the release strategy you should use?", "choices": [{"letter": "A", "text": "Red/Black deployment"}, {"letter": "B", "text": "Rolling deployment"}, {"letter": "C", "text": "ג€Big Bangג€ deployment"}, {"letter": "D", "text": "Canary deployment"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Red/Black (blue-green) keeps deploy time low and allows the fastest rollback by switching back to the previous environment."}, {"key": "AZ-400|T1|Q17", "topic": 1, "question": 17, "url": "https://www.examtopics.com/discussions/microsoft/view/58289-exam-az-400-topic-1-question-17-discussion/", "text": "Your company hosts a web application in Azure, and makes use of Azure Pipelines for managing the build and release of the application.\nWhen stakeholders report that system performance has been adversely affected by the most recent releases, you configure alerts in Azure Monitor.\nYou are informed that new releases must satisfy specified performance baseline conditions in the staging environment before they can be deployed to production.\nYou need to make sure that releases not satisfying the performance baseline are prevented from being deployed.\nWhich of the following actions should you take?", "choices": [{"letter": "A", "text": "You should make use of a branch control check."}, {"letter": "B", "text": "You should make use of an alert trigger."}, {"letter": "C", "text": "You should make use of a gate."}, {"letter": "D", "text": "You should make use of an approval check."}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "A release gate evaluates Azure Monitor performance criteria and blocks promotion when baselines aren't met."}, {"key": "AZ-400|T1|Q18", "topic": 1, "question": 18, "url": "https://www.examtopics.com/discussions/microsoft/view/74040-exam-az-400-topic-1-question-18-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nTo deploy an application to a number of Azure virtual machines, you should create a universal group.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "security"}, {"letter": "C", "text": "deployment"}, {"letter": "D", "text": "resource"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "Deploying to Azure VMs uses a deployment group, so 'universal group' is inaccurate."}, {"key": "AZ-400|T1|Q19", "topic": 1, "question": 19, "url": "https://www.examtopics.com/discussions/microsoft/view/75626-exam-az-400-topic-1-question-19-discussion/", "text": "DRAG DROP -\nYou are preparing to deploy an Azure resource group via Terraform.\nTo achieve your goal, you have to install the necessary frameworks.\nWhich of the following are the frameworks you should use? Answer by dragging the correct options from the list to the answer area.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0002200001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T1|Q20", "topic": 1, "question": 20, "url": "https://www.examtopics.com/discussions/microsoft/view/56900-exam-az-400-topic-1-question-20-discussion/", "text": "You intend to make use of Azure Artifacts to share packages that you wrote, tested, validated, and deployed.\nYou want to use a solitary feed to release several builds of each package. You have to make sure that the release of packages that are in development is restricted.\nWhich of the following actions should you take?", "choices": [{"letter": "A", "text": "You should make use of static code analysis."}, {"letter": "B", "text": "You should make use of views."}, {"letter": "C", "text": "You should make use of dynamic code analysis."}, {"letter": "D", "text": "You should make use of upstream sources."}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Feed views (e.g. @prerelease/@release) control which package quality levels are exposed from a single feed."}, {"key": "AZ-400|T1|Q21", "topic": 1, "question": 21, "url": "https://www.examtopics.com/discussions/microsoft/view/58293-exam-az-400-topic-1-question-21-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nTo find when common open source libraries are added to the code base, you should add Jenkins to the build pipeline.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "SourceGear Vault"}, {"letter": "C", "text": "WhiteSource"}, {"letter": "D", "text": "OWASP ZAP"}], "community": "C", "type": "multiple-choice", "images": [], "kiro_answer": "C", "kiro_rationale": "WhiteSource detects open-source libraries (and license/vuln issues) added to the codebase."}, {"key": "AZ-400|T1|Q22", "topic": 1, "question": 22, "url": "https://www.examtopics.com/discussions/microsoft/view/57978-exam-az-400-topic-1-question-22-discussion/", "text": "Your company has an Azure DevOps project, which includes a build pipeline that makes use of roughly fifty open source libraries.\nYou have been tasked with making sure that you are able to scan project for common security weaknesses in the open source libraries.\nWhich of the following actions should you take?", "choices": [{"letter": "A", "text": "You should create a build task and use the WhiteSource Bolt service."}, {"letter": "B", "text": "You should create a deployment task and use the WhiteSource Bolt service."}, {"letter": "C", "text": "You should create a build task and use the Chef service."}, {"letter": "D", "text": "You should create a deployment task and use the Chef service."}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Create a build task using WhiteSource Bolt to scan open-source libraries for security weaknesses."}, {"key": "AZ-400|T1|Q23", "topic": 1, "question": 23, "url": "https://www.examtopics.com/discussions/microsoft/view/74041-exam-az-400-topic-1-question-23-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nBlack Duck can be used to make sure that all the open source libraries conform to your company's licensing criteria.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "Maven"}, {"letter": "C", "text": "Bamboo"}, {"letter": "D", "text": "CMAKE"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Black Duck does perform open-source license compliance scanning, so no adjustment is required."}, {"key": "AZ-400|T1|Q24", "topic": 1, "question": 24, "url": "https://www.examtopics.com/discussions/microsoft/view/57178-exam-az-400-topic-1-question-24-discussion/", "text": "You have created an Azure DevOps project for a new application that will be deployed to a number of Windows Server 2016 Azure virtual machines.\nYou are preparing a deployment solution that allows for the virtual machines to maintain a uniform configuration, and also keep administrative effort with regards to configuring the virtual machines to a minimum.\nWhich of the following should be part of your solution? (Choose two.)", "choices": [{"letter": "A", "text": "Azure Resource Manager templates"}, {"letter": "B", "text": "The PowerShell Desired State Configuration (DSC) extension for Windows"}, {"letter": "C", "text": "Azure pipeline deployment groups"}, {"letter": "D", "text": "The Custom Script Extension for Windows"}, {"letter": "E", "text": "Azure pipeline stage templates"}], "community": "AB", "type": "multiple-choice", "images": [], "kiro_answer": "BC", "kiro_rationale": "PowerShell DSC extension (B) enforces uniform VM configuration; Azure Pipeline deployment groups (C) manage the VMs with low effort. NOTE: some sources list A+B - verify."}, {"key": "AZ-400|T1|Q25", "topic": 1, "question": 25, "url": "https://www.examtopics.com/discussions/microsoft/view/57100-exam-az-400-topic-1-question-25-discussion/", "text": "Your company has an application that contains a number of Azure App Service web apps and Azure functions.\nYou would like to view recommendations with regards to the security of the web apps and functions. You plan to navigate to Compute and Apps to achieve your goal.\nWhich of the following should you access to make use of Compute and Apps?", "choices": [{"letter": "A", "text": "Azure Log Analytics"}, {"letter": "B", "text": "Azure Event Hubs"}, {"letter": "C", "text": "Azure Advisor"}, {"letter": "D", "text": "Azure Security Center"}], "community": "D", "type": "multiple-choice", "images": [], "kiro_answer": "D", "kiro_rationale": "Azure Security Center's Compute & Apps blade gives security recommendations for App Service web apps and functions."}, {"key": "AZ-400|T1|Q26", "topic": 1, "question": 26, "url": "https://www.examtopics.com/discussions/microsoft/view/57110-exam-az-400-topic-1-question-26-discussion/", "text": "You need to consider the underlined segment to establish whether it is accurate.\nYour company has a multi-tier application that has its front end hosted in Azure App Service.\nTo pinpoint the average load times of the application pages, you should make use of Azure Event Hubs.\nSelect `No adjustment required` if the underlined segment is accurate. If the underlined segment is inaccurate, select the accurate option.", "choices": [{"letter": "A", "text": "No adjustment required."}, {"letter": "B", "text": "Azure Application Insights"}, {"letter": "C", "text": "Azure Log Analytics"}, {"letter": "D", "text": "Azure Advisor"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "Average page load times come from Azure Application Insights, not Event Hubs."}, {"key": "AZ-400|T1|Q27", "topic": 1, "question": 27, "url": "https://www.examtopics.com/discussions/microsoft/view/58151-exam-az-400-topic-1-question-27-discussion/", "text": "Your company makes use of Azure SQL Database Intelligent Insights and Azure Application Insights for monitoring purposes.\nYou have been tasked with analyzing the monitoring using ad-hoc queries. You need to utilize the correct query language.\nSolution: You use the Contextual Query Language (CQL).\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. CQL is not the query language for Application Insights / Log Analytics (that's KQL)."}, {"key": "AZ-400|T1|Q28", "topic": 1, "question": 28, "url": "https://www.examtopics.com/discussions/microsoft/view/56759-exam-az-400-topic-1-question-28-discussion/", "text": "Your company makes use of Azure SQL Database Intelligent Insights and Azure Application Insights for monitoring purposes.\nYou have been tasked with analyzing the monitoring using ad-hoc queries. You need to utilize the correct query language.\nSolution: You use the Transact-SQL.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "B", "kiro_rationale": "No. Transact-SQL is not used for ad-hoc queries over Application Insights monitoring data (KQL is)."}, {"key": "AZ-400|T1|Q29", "topic": 1, "question": 29, "url": "https://www.examtopics.com/discussions/microsoft/view/56595-exam-az-400-topic-1-question-29-discussion/", "text": "Your company makes use of Azure SQL Database Intelligent Insights and Azure Application Insights for monitoring purposes.\nYou have been tasked with analyzing the monitoring using ad-hoc queries. You need to utilize the correct query language.\nSolution: You use Azure Log Analytics.\nDoes the solution meet the goal?", "choices": [{"letter": "A", "text": "Yes"}, {"letter": "B", "text": "No"}], "community": "B", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "Yes. Azure Log Analytics (KQL) is the correct way to run ad-hoc queries against the monitoring data."}, {"key": "AZ-400|T1|Q30", "topic": 1, "question": 30, "url": "https://www.examtopics.com/discussions/microsoft/view/74306-exam-az-400-topic-1-question-30-discussion/", "text": "DRAG DROP -\nYou have recently created a web application for your company.\nYou have been tasked with making sure that a summary of the exceptions that transpire in the application is automatically sent to Microsoft Teams on a daily basis.\nWhich of the following Azure services should you use? Answer by dragging the correct options from the list to the answer area.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0003100001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T1|Q31", "topic": 1, "question": 31, "url": "https://www.examtopics.com/discussions/microsoft/view/57280-exam-az-400-topic-1-question-31-discussion/", "text": "You are in the process of building a mobile app aimed at Android and iOS devices.\nAll work items and release cycles are managed via Azure DevOps.\nYou want to make sure that crash reports for issue analysis is collected, and that beta releases are distributed to your testers. Also, you want to ensure that user feedback on the functionality of new apps is received.\nWhich of the following must be part of your solution?", "choices": [{"letter": "A", "text": "The Microsoft Test & Feedback extension."}, {"letter": "B", "text": "OWASP ZAP"}, {"letter": "C", "text": "TFS Integration Platform"}, {"letter": "D", "text": "Code Style"}], "community": "A", "type": "multiple-choice", "images": [], "kiro_answer": "A", "kiro_rationale": "The Microsoft Test & Feedback (App Center / Visual Studio) tooling collects crash reports, distributes beta builds and gathers feedback."}, {"key": "AZ-400|T2|Q1", "topic": 2, "question": 1, "url": "https://www.examtopics.com/discussions/microsoft/view/20511-exam-az-400-topic-2-question-1-discussion/", "text": "DRAG DROP -\nYou need to recommend project metrics for dashboards in Azure DevOps.\nWhich chart widgets should you recommend for each metric? To answer, drag the appropriate chart widgets to the correct metrics. Each chart widget may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content.\nNOTE: Each correct selection is worth one point.\nSelect and Place:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0003400001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q2", "topic": 2, "question": 2, "url": "https://www.examtopics.com/discussions/microsoft/view/48764-exam-az-400-topic-2-question-2-discussion/", "text": "HOTSPOT -\nYou plan to create alerts that will be triggered based on the page load performance of a home page.\nYou have the Application Insights log query shown in the following exhibit.\nUse the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0003600001.png", "/assets/media/exam-media/04257/0003700001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q3", "topic": 2, "question": 3, "url": "https://www.examtopics.com/discussions/microsoft/view/44296-exam-az-400-topic-2-question-3-discussion/", "text": "You manage an Azure web app that supports an e-commerce website.\nYou need to increase the logging level when the web app exceeds normal usage patterns. The solution must minimize administrative overhead.\nWhich two resources should you include in the solution? Each correct answer presents part of the solution.\nNOTE: Each correct selection is worth one point.", "choices": [{"letter": "A", "text": "an Azure Automation runbook"}, {"letter": "B", "text": "an Azure Monitor alert that has a dynamic threshold"}, {"letter": "C", "text": "an Azure Monitor alert that has a static threshold"}, {"letter": "D", "text": "the Azure Monitor autoscale settings"}, {"letter": "E", "text": "an Azure Monitor alert that uses an action group that has an email action"}], "community": "AB", "type": "multiple-choice", "images": [], "kiro_answer": "AB", "kiro_rationale": "An Azure Monitor alert with a dynamic threshold detects abnormal usage; an Automation runbook raises the logging level with minimal overhead."}, {"key": "AZ-400|T2|Q4", "topic": 2, "question": 4, "url": "https://www.examtopics.com/discussions/microsoft/view/56295-exam-az-400-topic-2-question-4-discussion/", "text": "HOTSPOT -\nYou have an Azure Kubernetes Service (AKS) pod.\nYou need to configure a probe to perform the following actions:\n✑ Confirm that the pod is responding to service requests.\n✑ Check the status of the pod four times a minute.\n✑ Initiate a shutdown if the pod is unresponsive.\nHow should you complete the YAML configuration file? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.\nHot Area:", "choices": [], "community": null, "type": "hotspot/drag-drop (image answer)", "images": ["/assets/media/exam-media/04257/0004000001.png"], "kiro_answer": null, "kiro_rationale": null}, {"key": "AZ-400|T2|Q5", "topic": 2, "question": 5, "url": "https://www.examtopics.com/discussions/microsoft/view/49699-exam-az-400-topic-2-question-5-discussion/", "text": "You have a Microsoft ASP.NET Core web app in Azure that is acces
